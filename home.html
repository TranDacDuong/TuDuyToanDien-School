<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng tin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  background:
    radial-gradient(circle at top left, rgba(200,150,42,.12), transparent 24%),
    linear-gradient(180deg, #f4efe4 0%, #f8f5ef 26%, #f7faff 100%);
  font-family: var(--font-body);
  color: var(--ink);
}

.feed-wrap {
  max-width: 1120px;
  margin: 0 auto;
  padding: 24px 20px 60px;
  position: relative;
}

.feed-shell {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 290px;
  gap: 22px;
  align-items: start;
}

.feed-main {
  min-width: 0;
}

.feed-side {
  position: sticky;
  top: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.hero-card {
  padding: 22px;
  border-radius: 24px;
  background:
    radial-gradient(circle at top right, rgba(255,255,255,.24), transparent 30%),
    linear-gradient(135deg, rgba(15,31,61,.98) 0%, rgba(31,65,128,.95) 55%, rgba(200,150,42,.86) 100%);
  box-shadow: 0 20px 50px rgba(15,31,61,.18);
  color: #fff;
  margin-bottom: 18px;
}

.hero-top {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-start;
  flex-wrap: wrap;
}

.hero-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.14);
  font-size: .76rem;
  font-weight: 700;
  letter-spacing: .05em;
  text-transform: uppercase;
}

.hero-title {
  margin-top: 14px;
  font-family: var(--font-display);
  font-size: 2.05rem;
  line-height: 1.08;
}

.hero-sub {
  margin-top: 10px;
  max-width: 620px;
  color: rgba(255,255,255,.84);
  line-height: 1.7;
  font-size: .9rem;
}

.hero-statbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 18px;
}

.hero-stat {
  min-width: 130px;
  padding: 12px 14px;
  border-radius: 16px;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.14);
}

.hero-stat-value {
  font-size: 1.1rem;
  font-weight: 700;
}

.hero-stat-label {
  margin-top: 4px;
  color: rgba(255,255,255,.74);
  font-size: .76rem;
}

/* ── Header ── */
.feed-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px; flex-wrap: wrap; gap: 12px;
}
.social-hub {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.hub-link, .hub-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  padding: 0;
  border-radius: 50%;
  text-decoration: none;
  color: var(--navy);
  background: #eef1f5;
  border: 1px solid rgba(15,31,61,.06);
  box-shadow: none;
  font-weight: 600;
  transition: .16s ease;
  position: relative;
  cursor: pointer;
}
.hub-button {
  appearance: none;
}
.hub-link:hover, .hub-button:hover {
  transform: translateY(-1px);
  background: #e4e8ee;
  border-color: rgba(15,31,61,.08);
}
.hub-icon {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  font-size: 1.06rem;
  flex-shrink: 0;
}
.hub-link img.hub-icon {
  object-fit: cover;
  border: 2px solid rgba(255,255,255,.95);
}
.hub-copy { display: none; }
.hub-badge {
  display: none;
  position: absolute;
  top: -3px;
  right: -3px;
  min-width: 19px;
  height: 19px;
  padding: 0 5px;
  border-radius: 999px;
  background: #ef4444;
  color: #fff;
  font-size: .68rem;
  font-weight: 700;
  align-items: center;
  justify-content: center;
  border: 2px solid #fff;
}
.hub-badge.show { display: inline-flex; }
.social-panel {
  display: none;
  position: absolute;
  top: 72px;
  right: 20px;
  width: min(420px, calc(100% - 40px));
  background: var(--white);
  border: 1px solid rgba(15,31,61,.08);
  border-radius: 20px;
  box-shadow: 0 18px 42px rgba(15,31,61,.16);
  overflow: hidden;
  z-index: 1050;
}
.social-panel.open { display: block; }
.social-panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(15,31,61,.06);
  background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
}
.social-panel-title {
  font-weight: 700;
  color: var(--navy);
}
.social-panel-frame {
  width: 100%;
  height: 560px;
  border: none;
  background: #fff;
}
.chat-popup {
  display: none;
  position: fixed;
  right: 18px;
  bottom: 18px;
  width: min(390px, calc(100vw - 24px));
  height: 590px;
  background: var(--white);
  border: 1px solid rgba(15,31,61,.08);
  border-radius: 20px;
  box-shadow: 0 24px 64px rgba(15,31,61,.2);
  overflow: hidden;
  z-index: 1100;
}
.chat-popup.open { display: block; }
.chat-popup-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 14px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  color: #fff;
}
.chat-popup-title {
  font-weight: 700;
}
.chat-popup-frame {
  width: 100%;
  height: calc(100% - 50px);
  border: none;
  background: #fff;
}
.feed-tools {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.feed-filter-toggle {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border-radius: 999px;
  padding: 9px 14px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--navy);
  font-weight: 700;
  box-shadow: 0 8px 20px rgba(15,31,61,.08);
  transition: .15s;
}
.feed-filter-toggle:hover {
  transform: translateY(-1px);
  border-color: var(--gold-border);
}
.feed-filter-toggle[data-filter="all"] {
  background: linear-gradient(135deg, #fff8ea 0%, #ffffff 100%);
}
.feed-filter-toggle[data-filter="mine"] {
  background: linear-gradient(135deg, #eef4ff 0%, #ffffff 100%);
  color: #1d4ed8;
  border-color: rgba(37,99,235,.18);
}
.feed-filter-toggle[data-filter="friends"] {
  background: linear-gradient(135deg, #eefbf2 0%, #ffffff 100%);
  color: #15803d;
  border-color: rgba(22,163,74,.18);
}
.feed-filter-icon {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,.95);
  font-size: .9rem;
}
.feed-title {
  font-family: var(--font-display); font-size: 1.35rem; color: var(--navy);
  display: flex; align-items: center; gap: 10px;
}
.feed-title::before {
  content: ''; display: inline-block; width: 4px; height: 26px;
  background: linear-gradient(180deg,var(--gold),var(--gold-light)); border-radius: 2px;
}

/* ── Compose ── */
.compose-card {
  background: linear-gradient(180deg, #ffffff 0%, #fbfcff 100%);
  border-radius: 22px;
  box-shadow: 0 14px 32px rgba(15,31,61,.07);
  border: 1px solid rgba(15,31,61,.08);
  padding: 16px;
  margin-bottom: 22px;
  display: none;
}
.compose-shell {
  position: relative;
}
.compose-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.compose-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  object-fit: cover; border: 1px solid rgba(15,31,61,.08);
}
.compose-name {
  font-weight: 700;
  font-size: .94rem;
  color: var(--navy);
}
.compose-headline {
  color: var(--ink-light);
  font-size: .77rem;
  margin-top: 2px;
}
.compose-textarea {
  width: 100%;
  border: 1px solid rgba(15,31,61,.08);
  border-radius: 22px;
  padding: 16px 18px;
  font-family: var(--font-body);
  font-size: .94rem;
  resize: none;
  transition: .18s;
  background: #f0f2f5;
  color: var(--ink);
  min-height: 118px;
  padding-bottom: 72px;
}
.compose-textarea:focus {
  outline: none;
  border-color: rgba(37,99,235,.16);
  background: var(--white);
  box-shadow: 0 0 0 4px rgba(37,99,235,.08);
}
.compose-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 10px; flex-wrap: wrap; gap: 8px;
}
.compose-footer.hidden-bar { display: none; }
.compose-inline-tools {
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  pointer-events: none;
  padding-top: 10px;
  border-top: 1px solid rgba(15,31,61,.06);
}
.compose-inline-left,
.compose-inline-right {
  display: flex;
  align-items: center;
  gap: 8px;
  pointer-events: auto;
}
.compose-icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(15,31,61,.06);
  background: #eef1f5;
  box-shadow: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: .96rem;
  transition: .15s;
}
.compose-icon-btn:hover {
  background: #e4e8ee;
  border-color: rgba(15,31,61,.08);
}
.visibility-menu {
  display: none;
  position: absolute;
  left: 0;
  bottom: 50px;
  min-width: 150px;
  background: #fff;
  border: 1px solid rgba(15,31,61,.08);
  border-radius: 16px;
  box-shadow: 0 14px 32px rgba(15,31,61,.16);
  overflow: hidden;
}
.visibility-menu.open { display: block; }
.visibility-option {
  width: 100%;
  border: none;
  background: #fff;
  text-align: left;
  padding: 10px 12px;
  cursor: pointer;
  font-family: var(--font-body);
  color: var(--ink);
}
.visibility-option:hover {
  background: var(--surface);
}
.compose-status {
  font-size: .76rem;
  color: var(--ink-mid);
  font-weight: 600;
}
.compose-tools {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.compose-media {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.compose-note { font-size: .74rem; color: var(--amber); display: none; }
.compose-note.show { display: block; }
.compose-select {
  min-width: 150px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 8px 10px;
  font-family: var(--font-body);
  font-size: .82rem;
  background: var(--white);
  color: var(--ink);
}
.compose-select:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(200,150,42,.08);
}
.compose-file {
  max-width: 230px;
  font-size: .78rem;
}
.compose-file.hidden-input { display: none; }
.compose-file::-webkit-file-upload-button {
  border: none;
  background: var(--surface);
  color: var(--navy);
  padding: 7px 10px;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: .78rem;
  cursor: pointer;
  margin-right: 8px;
}
.compose-preview {
  display: none;
  margin-top: 12px;
}
.compose-preview.show {
  display: block;
}
.compose-preview img {
  width: 100%;
  max-height: 240px;
  object-fit: cover;
  border-radius: 16px;
  border: 1px solid rgba(15,31,61,.08);
}

.side-card {
  background: linear-gradient(180deg, #ffffff 0%, #fbfbfe 100%);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow-sm);
  padding: 18px;
}
.side-title {
  font-family: var(--font-display);
  color: var(--navy);
  font-size: 1.02rem;
}
.side-sub {
  margin-top: 6px;
  color: var(--ink-light);
  font-size: .79rem;
  line-height: 1.6;
}
.side-list {
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.side-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 14px;
  background: var(--surface);
  color: var(--ink-mid);
  font-size: .82rem;
}

@media (max-width: 980px) {
  .feed-shell {
    grid-template-columns: 1fr;
  }
  .feed-side {
    position: static;
  }
  .social-panel {
    right: 16px;
    width: min(420px, calc(100% - 32px));
  }
}

@media (max-width: 680px) {
  .feed-wrap {
    padding: 14px 10px 34px;
  }
  .social-panel {
    right: 10px;
    width: calc(100% - 20px);
    top: 64px;
    border-radius: 18px;
  }
  .social-panel-frame {
    height: 66vh;
  }
  .chat-popup {
    left: 10px;
    right: 10px;
    width: auto;
    height: 68vh;
    bottom: 10px;
    border-radius: 18px;
  }
  .feed-header {
    align-items: flex-start;
  }
  .compose-card {
    padding: 14px;
  }
  .compose-inline-tools {
    left: 12px;
    right: 12px;
    bottom: 12px;
    gap: 8px;
  }
  .compose-inline-left,
  .compose-inline-right {
    gap: 6px;
  }
  .compose-status {
    font-size: .72rem;
  }
}

/* ── Post card ── */
.post-card {
  background: var(--white);
  border-radius: 18px;
  box-shadow: 0 10px 26px rgba(15,31,61,.07);
  border: 1px solid rgba(15,31,61,.08);
  margin-bottom: 16px;
  overflow: hidden;
  transition: box-shadow .2s, transform .2s;
}
.post-card:hover {
  box-shadow: 0 16px 34px rgba(15,31,61,.1);
  transform: translateY(-1px);
}
.post-card.pinned  { border-top: 3px solid var(--gold); }
.post-card.pending-card  { border-left: 3px solid var(--amber); opacity: .92; }
.post-card.rejected-card { border-left: 3px solid var(--red);   opacity: .75; }

.post-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 16px 0;
}
.post-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid rgba(15,31,61,.08);
  flex-shrink: 0;
}
.post-meta { flex: 1; min-width: 0; }
.post-author {
  font-weight: 700;
  font-size: .9rem;
  color: var(--navy);
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.post-author-link { color: inherit; text-decoration: none; }
.post-author-link:hover { text-decoration: underline; }
.post-time {
  font-size: .74rem;
  color: var(--ink-light);
  margin-top: 3px;
}

.badge-pin      { font-size: .68rem; font-weight: 700; background: var(--gold-pale); color: var(--gold); border: 1px solid var(--gold-border); padding: 1px 8px; border-radius: 20px; }
.badge-pending  { font-size: .68rem; font-weight: 700; background: var(--amber-bg); color: var(--amber); padding: 1px 8px; border-radius: 20px; }
.badge-rejected { font-size: .68rem; font-weight: 700; background: var(--red-bg);   color: var(--red);   padding: 1px 8px; border-radius: 20px; }
.badge-visibility { font-size: .68rem; font-weight: 700; background: var(--blue-bg); color: var(--blue); padding: 1px 8px; border-radius: 20px; }

.post-body {
  padding: 12px 16px 14px;
  font-size: .92rem;
  line-height: 1.68;
  color: var(--ink); white-space: pre-wrap; word-break: break-word;
}
.post-media-wrap {
  padding: 0 16px 14px;
}
.post-media-img {
  width: 100%;
  max-height: 420px;
  object-fit: cover;
  border-radius: 14px;
  border: 1px solid rgba(15,31,61,.08);
  background: var(--surface);
}
.post-pending-notice {
  margin: 0 16px 10px; padding: 8px 12px;
  background: var(--amber-bg); border-radius: 8px;
  font-size: .78rem; color: var(--amber); font-weight: 500;
}
.mod-bar { display: flex; gap: 6px; padding: 0 16px 10px; flex-wrap: wrap; }

/* ── Actions ── */
.post-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 12px 12px;
  border-top: 1px solid rgba(15,31,61,.06);
}
.act-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  background: transparent; font-family: var(--font-body);
  font-size: .82rem;
  font-weight: 600;
  color: var(--ink-mid);
  cursor: pointer; transition: .15s;
}
.act-btn:hover        { background: #eef1f5; color: var(--navy); }
.act-btn.liked        { color: #e11d48; }
.act-btn.pin:hover    { background: var(--gold-pale); color: var(--gold); }
.act-btn.danger:hover { background: var(--red-bg); color: var(--red); }
.act-btn.edit:hover   { background: var(--blue-bg); color: var(--blue); }
.act-btn.mod-ok:hover { background: var(--green-bg); color: var(--green); }
.act-btn.mod-no:hover { background: var(--red-bg); color: var(--red); }
.act-spacer { flex: 1; }

/* ── Comments ── */
.cmt-section {
  border-top: 1px solid rgba(15,31,61,.06);
  padding: 0 16px 14px;
  display: none;
  background: linear-gradient(180deg, #fff 0%, #fbfcff 100%);
}
.cmt-item { display: flex; gap: 10px; padding: 10px 0; }
.cmt-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  object-fit: cover; flex-shrink: 0; margin-top: 2px;
  border: 1px solid rgba(15,31,61,.08);
}
.cmt-bubble {
  background: #f0f2f5;
  border-radius: 16px;
  padding: 9px 12px;
  flex: 1;
}
.cmt-name   { font-weight: 700; font-size: .78rem; color: var(--navy); margin-bottom: 2px; }
.cmt-text   { font-size: .84rem; color: var(--ink); line-height: 1.55; }
.cmt-time   { font-size: .7rem; color: var(--ink-light); margin-top: 4px; }
.cmt-tools  { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
.reply-link {
  font-size: .72rem; color: var(--blue); cursor: pointer;
  margin-top: 3px; display: inline-block; font-weight: 500;
}
.reply-link:hover { text-decoration: underline; }
.delete-link {
  font-size: .72rem; color: var(--red); cursor: pointer; font-weight: 500;
}
.delete-link:hover { text-decoration: underline; }
.edit-link {
  font-size: .72rem; color: var(--blue); cursor: pointer; font-weight: 500;
}
.edit-link:hover { text-decoration: underline; }
.reply-indent { margin-left: 36px; }
.reply-box { display: none; align-items: center; gap: 8px; margin-top: 6px; padding-left: 36px; }
.reply-box.open { display: flex; }

.edit-box {
  display: none;
  padding: 0 16px 14px;
  border-top: 1px solid var(--surface);
}
.edit-box.open { display: block; }
.edit-textarea {
  width: 100%;
  min-height: 100px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  resize: vertical;
  font-family: var(--font-body);
  font-size: .88rem;
  background: var(--white);
  color: var(--ink);
}
.edit-textarea:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(200,150,42,.08);
}
.edit-tools {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: center;
  margin-top: 10px;
  flex-wrap: wrap;
}
.edit-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.edit-media-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.cmt-input-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-top: 12px;
}
.cmt-input {
  flex: 1;
  border: 1px solid rgba(15,31,61,.08);
  border-radius: 999px;
  padding: 10px 14px;
  font-family: var(--font-body);
  font-size: .83rem;
  background: #f0f2f5;
  color: var(--ink);
  outline: none;
  transition: .15s;
}
.cmt-input:focus {
  border-color: rgba(37,99,235,.18);
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(37,99,235,.08);
}
.cmt-send {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;

.btn-no:hover  { background: var(--red);   color: #fff; }

</head>
<body>
<div class="feed-wrap">

  <div class="social-hub">
    <a class="hub-link" href="search.html" title="Tìm kiếm">
      <span class="hub-icon">🔎</span>
    </a>
    <a class="hub-link" href="notifications.html" title="Thông báo">
      <span class="hub-icon">🔔</span>
      <span class="hub-badge" id="homeNotificationBadge">0</span>
    </a>
    <a class="hub-link" href="friend_requests.html" title="Lời mời kết bạn">
      <span class="hub-icon">🤝</span>
      <span class="hub-badge" id="homeFriendRequestBadge">0</span>
    </a>
    <a class="hub-link" href="messages.html" title="Nhắn tin">
      <span class="hub-icon">💬</span>
      <span class="hub-badge" id="homeMessageBadge">0</span>
    </a>
    <a class="hub-link" href="profile.html" title="Trang cá nhân">
      <img class="hub-icon" id="homeProfileAvatar" src="default-avatar.png" alt="Avatar" onerror="this.src='default-avatar.png'">
    </a>
  </div>

  <div class="feed-header">
    <div class="feed-title">Bảng tin</div>
    <div class="feed-tools">
      <button class="feed-filter-toggle" id="feedFilterButton" type="button" onclick="cycleFeedFilter()">Chế độ: Tất cả</button>
    </div>
  </div>

  <div class="compose-card" id="composeCard">
    <div class="compose-header">
      <img class="compose-avatar" id="composeAvatar" src="default-avatar.png">
      <div class="compose-name" id="composeName"></div>
    </div>
    <textarea class="compose-textarea" id="postContent" rows="3"
      placeholder="Chia sẻ thông báo hoặc bài viết..."></textarea>
    <div class="compose-footer">
      <div class="compose-tools">
        <span class="compose-note" id="composeNote">⏳ Bài sẽ được duyệt trước khi hiển thị</span>
        <select class="compose-select" id="postVisibility">
          <option value="public">Công khai</option>
          <option value="friends">Bạn bè</option>
          <option value="private">Riêng tư</option>
        </select>
        <div class="compose-media">
          <input class="compose-file" type="file" id="postImage" accept="image/*" onchange="previewPostImage(event)">
        </div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="createPost()">Đăng bài</button>
    </div>
    <div class="compose-preview" id="composePreview">
      <img id="composePreviewImg" src="" alt="Xem trước ảnh bài viết">
    </div>
  </div>

  <div id="posts">
    <div class="empty-feed">
      <div class="icon">⏳</div>
      <strong>Đang tải bảng tin</strong>
      <p>Dữ liệu bài viết đang được chuẩn bị...</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script>
let currentUser, role, currentProfile;
let friendIds = new Set();
let likedPostIds = new Set();
let feedChannel = null;
let feedRefreshTimer = null;
let feedRefreshRunning = false;
let homeBadgeChannel = null;
let activeSocialPanel = "";
let currentFeedFilter = "all";

async function createNotification(userId, type, message, refId) {
  if (!userId || userId === currentUser.id) return;
  await sb.from("notifications").insert({
    user_id: userId,
    actor_id: currentUser.id,
    type,
    ref_id: refId || null,
    message
  });
}

window.previewPostImage = function(event) {
  const file = event.target.files?.[0];
  const preview = document.getElementById("composePreview");
  const img = document.getElementById("composePreviewImg");
  if (!file) {
    preview.classList.remove("show");
    img.src = "";
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    img.src = e.target.result;
    preview.classList.add("show");
  };
  reader.readAsDataURL(file);
};

function ensureHomeOverlayShell() {
  if (!document.getElementById("socialPanel")) {
    const panel = document.createElement("div");
    panel.className = "social-panel";
    panel.id = "socialPanel";
    panel.innerHTML = `
      <div class="social-panel-head">
        <div class="social-panel-title" id="socialPanelTitle">Tiện ích</div>
        <button class="btn btn-outline btn-sm" type="button" onclick="closeSocialPanel()">Đóng</button>
      </div>
      <iframe class="social-panel-frame" id="socialPanelFrame" src="about:blank" loading="lazy"></iframe>
    `;
    const feedWrap = document.querySelector(".feed-wrap");
    const socialHub = document.querySelector(".social-hub");
    if (feedWrap && socialHub) {
      feedWrap.insertBefore(panel, socialHub.nextSibling);
    }
  }

  if (!document.getElementById("chatPopup")) {
    const popup = document.createElement("div");
    popup.className = "chat-popup";
    popup.id = "chatPopup";
    popup.innerHTML = `
      <div class="chat-popup-head">
        <div class="chat-popup-title">Nhắn tin</div>
        <button class="btn btn-outline btn-sm" type="button" onclick="closeChatPopup()">Đóng</button>
      </div>
      <iframe class="chat-popup-frame" id="chatPopupFrame" src="about:blank" loading="lazy"></iframe>
    `;
    document.body.appendChild(popup);
  }
}

function enhanceHomeHub() {
  const hub = document.querySelector(".social-hub");
  if (!hub) return;
  hub.innerHTML = `
    <button class="hub-button" type="button" title="Tìm kiếm" onclick="toggleSocialPanel('search')">
      <span class="hub-icon">🔎</span>
    </button>
    <button class="hub-button" type="button" title="Thông báo" onclick="toggleSocialPanel('notifications')">
      <span class="hub-icon">🔔</span>
      <span class="hub-badge" id="homeNotificationBadge">0</span>
    </button>
    <button class="hub-button" type="button" title="Lời mời kết bạn" onclick="toggleSocialPanel('friend_requests')">
      <span class="hub-icon">🤝</span>
      <span class="hub-badge" id="homeFriendRequestBadge">0</span>
    </button>
    <button class="hub-button" type="button" title="Nhắn tin" onclick="toggleSocialPanel('messages')">
      <span class="hub-icon">💬</span>
      <span class="hub-badge" id="homeMessageBadge">0</span>
    </button>
    <a class="hub-link" id="homeProfileLink" href="profile.html" title="Trang cá nhân">
      <img class="hub-icon" id="homeProfileAvatar" src="default-avatar.png" alt="Avatar" onerror="this.src='default-avatar.png'">
    </a>
  `;
}

function enhanceComposerUI() {
  const card = document.getElementById("composeCard");
  if (!card || card.dataset.enhanced === "true") return;
  card.dataset.enhanced = "true";
  card.innerHTML = `
    <div class="compose-shell">
      <div class="compose-header">
        <img class="compose-avatar" id="composeAvatar" src="default-avatar.png">
        <div>
          <div class="compose-name" id="composeName"></div>
          <div class="compose-headline">Chia sẻ điều bạn đang nghĩ với mọi người</div>
        </div>
      </div>
      <textarea class="compose-textarea" id="postContent" rows="3" placeholder="Bạn đang nghĩ gì?"></textarea>
      <div class="compose-inline-tools">
        <div class="compose-inline-left">
          <div style="position:relative;">
            <button class="compose-icon-btn" type="button" title="Quyền riêng tư" onclick="toggleVisibilityMenu(event)">🌍</button>
            <div class="visibility-menu" id="visibilityMenu">
              <button class="visibility-option" type="button" onclick="setComposeVisibility('public')">🌍 Công khai</button>
              <button class="visibility-option" type="button" onclick="setComposeVisibility('friends')">👥 Bạn bè</button>
              <button class="visibility-option" type="button" onclick="setComposeVisibility('private')">🔒 Riêng tư</button>
            </div>
          </div>
          <button class="compose-icon-btn" type="button" title="Chọn ảnh" onclick="document.getElementById('postImage').click()">🖼️</button>
          <span class="compose-status" id="composeStatus">🌍 Công khai</span>
        </div>
        <div class="compose-inline-right">
          <span class="compose-note" id="composeNote">⏳ Bài sẽ được duyệt trước khi hiển thị</span>
          <button class="compose-icon-btn" type="button" title="Đăng bài" onclick="createPost()">📨</button>
        </div>
      </div>
      <div class="compose-footer hidden-bar">
        <div class="compose-tools">
          <select class="compose-select" id="postVisibility">
            <option value="public">Công khai</option>
            <option value="friends">Bạn bè</option>
            <option value="private">Riêng tư</option>
          </select>
          <div class="compose-media">
            <input class="compose-file" type="file" id="postImage" accept="image/*" onchange="previewPostImage(event)">
          </div>
        </div>
      </div>
      <div class="compose-preview" id="composePreview">
        <img id="composePreviewImg" src="" alt="Xem trước ảnh bài viết">
      </div>
    </div>
  `;
}

const socialPanelConfig = {
  search: { title: "Tìm kiếm", src: "search.html" },
  notifications: { title: "Thông báo", src: "notifications.html" },
  friend_requests: { title: "Lời mời kết bạn", src: "friend_requests.html" },
  messages: { title: "Nhắn tin", src: "messages.html?tray=1" }
};

function positionSocialPanel() {
  const panel = document.getElementById("socialPanel");
  const hub = document.querySelector(".social-hub");
  const wrap = document.querySelector(".feed-wrap");
  if (!panel || !hub || !wrap) return;

  const availableWidth = Math.max(320, wrap.clientWidth - 40);
  panel.style.width = Math.min(420, availableWidth) + "px";
  panel.style.top = hub.offsetTop + hub.offsetHeight + 12 + "px";
}

window.toggleSocialPanel = function(type) {
  ensureHomeOverlayShell();
  closeChatPopup();
  const panel = document.getElementById("socialPanel");
  const title = document.getElementById("socialPanelTitle");
  const frame = document.getElementById("socialPanelFrame");
  const config = socialPanelConfig[type];
  if (!panel || !title || !frame || !config) return;

  if (panel.classList.contains("open") && activeSocialPanel === type) {
    closeSocialPanel();
    return;
  }

  title.textContent = config.title;
  if (!frame.dataset.loaded || frame.dataset.loaded !== config.src) {
    frame.src = config.src;
    frame.dataset.loaded = config.src;
  }
  activeSocialPanel = type;
  positionSocialPanel();
  panel.classList.add("open");
};

window.closeSocialPanel = function() {
  const panel = document.getElementById("socialPanel");
  if (!panel) return;
  panel.classList.remove("open");
  activeSocialPanel = "";
};

window.toggleChatPopup = function() {
  ensureHomeOverlayShell();
  const popup = document.getElementById("chatPopup");
  const frame = document.getElementById("chatPopupFrame");
  if (!popup || !frame) return;

  const isOpen = popup.classList.contains("open");
  popup.classList.toggle("open", !isOpen);
  if (!isOpen && !frame.dataset.loaded) {
    frame.src = "messages.html";
    frame.dataset.loaded = "messages.html";
  }
};

window.closeChatPopup = function() {
  const popup = document.getElementById("chatPopup");
  if (!popup) return;
  popup.classList.remove("open");
};

window.openChatPopupForUser = function(userId) {
  ensureHomeOverlayShell();
  const popup = document.getElementById("chatPopup");
  const frame = document.getElementById("chatPopupFrame");
  if (!popup || !frame || !userId) return;
  frame.src = "messages.html?popup=1&user=" + encodeURIComponent(userId);
  frame.dataset.loaded = frame.src;
  popup.classList.add("open");
};

window.toggleVisibilityMenu = function(event) {
  event?.stopPropagation();
  const menu = document.getElementById("visibilityMenu");
  if (!menu) return;
  menu.classList.toggle("open");
};

window.setComposeVisibility = function(value) {
  const select = document.getElementById("postVisibility");
  const status = document.getElementById("composeStatus");
  const menu = document.getElementById("visibilityMenu");
  const labelMap = {
    public: "🌍 Công khai",
    friends: "👥 Bạn bè",
    private: "🔒 Riêng tư"
  };
  if (select) select.value = value;
  if (status) status.textContent = labelMap[value] || "🌍 Công khai";
  if (menu) menu.classList.remove("open");
};

document.addEventListener("click", (event) => {
  const menu = document.getElementById("visibilityMenu");
  if (menu && !event.target.closest(".compose-inline-left")) {
    menu.classList.remove("open");
  }

  const panel = document.getElementById("socialPanel");
  if (panel && panel.classList.contains("open")) {
    const clickedHub = event.target.closest(".social-hub");
    const clickedPanel = event.target.closest("#socialPanel");
    if (!clickedHub && !clickedPanel) closeSocialPanel();
  }
});

window.addEventListener("message", (event) => {
  const data = event.data;
  if (!data || data.type !== "open-chat-popup") return;
  const userId = data.payload?.userId;
  if (!userId) return;
  closeSocialPanel();
  openChatPopupForUser(userId);
});

window.addEventListener("resize", () => {
  if (activeSocialPanel) positionSocialPanel();
});

async function init() {
  enhanceHomeHub();
  ensureHomeOverlayShell();
  enhanceComposerUI();
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { location.href = "index.html"; return; }
  currentUser = user;
  const { data: p } = await sb.from("users").select("*").eq("id", user.id).single();
  role = p.role; currentProfile = p;
  await loadFriendIds();
  await loadLikedPosts();
  subscribeFeedRealtime();
  const card = document.getElementById("composeCard");
  card.style.display = "block";
  document.getElementById("composeAvatar").src = p.avatar_url || "default-avatar.png";
  document.getElementById("composeName").textContent = p.full_name || "Bạn";
  if (role === "student") document.getElementById("composeNote").classList.add("show");
  setupHomeLinks();
  updateFeedFilterButton();
  loadHomeHubBadges();
  subscribeHomeHubBadges();
  loadPosts();
}

async function loadFriendIds() {
  const { data } = await sb
    .from("friendships")
    .select("friend_id")
    .eq("user_id", currentUser.id);
  friendIds = new Set((data || []).map(item => item.friend_id));
}

async function loadLikedPosts() {
  const { data } = await sb
    .from("likes")
    .select("post_id")
    .eq("user_id", currentUser.id);
  likedPostIds = new Set((data || []).map(item => item.post_id));
}

function setupHomeLinks() {
  const profileLink = document.getElementById("homeProfileLink");
  if (profileLink && currentUser?.id) {
    profileLink.href = "profile.html?id=" + currentUser.id;
  }
  const profileAvatar = document.getElementById("homeProfileAvatar");
  if (profileAvatar) {
    profileAvatar.src = currentProfile?.avatar_url || "default-avatar.png";
  }
}

async function loadHomeHubBadges() {
  const [notificationRes, friendRequestRes, messageRes] = await Promise.all([
    sb.from("notifications").select("*", { count: "exact", head: true }).eq("user_id", currentUser.id).eq("is_read", false),
    sb.from("friend_requests").select("*", { count: "exact", head: true }).eq("receiver_id", currentUser.id).eq("status", "pending"),
    sb.from("notifications").select("*", { count: "exact", head: true }).eq("user_id", currentUser.id).eq("type", "message_new").eq("is_read", false)
  ]);

  updateHubBadge("homeNotificationBadge", notificationRes.count || 0);
  updateHubBadge("homeFriendRequestBadge", friendRequestRes.count || 0);
  updateHubBadge("homeMessageBadge", messageRes.count || 0);
}

function updateHubBadge(id, count) {
  const badge = document.getElementById(id);
  if (!badge) return;
  badge.textContent = count > 99 ? "99+" : String(count || 0);
  badge.classList.toggle("show", count > 0);
}

function subscribeHomeHubBadges() {
  if (homeBadgeChannel) {
    sb.removeChannel(homeBadgeChannel);
    homeBadgeChannel = null;
  }

  homeBadgeChannel = sb
    .channel("home-hub-badges:" + currentUser.id)
    .on("postgres_changes", { event: "*", schema: "public", table: "notifications", filter: "user_id=eq." + currentUser.id }, () => loadHomeHubBadges())
    .on("postgres_changes", { event: "*", schema: "public", table: "friend_requests", filter: "receiver_id=eq." + currentUser.id }, () => loadHomeHubBadges())
    .subscribe();
}

function updateFeedFilterButton() {
  const button = document.getElementById("feedFilterButton");
  if (!button) return;
  const configMap = {
    all: { icon: "🌐", label: "Tất cả" },
    mine: { icon: "👤", label: "Bài của tôi" },
    friends: { icon: "👥", label: "Bạn bè" }
  };
  const config = configMap[currentFeedFilter] || configMap.all;
  button.dataset.filter = currentFeedFilter;
  button.innerHTML = `<span class="feed-filter-icon">${config.icon}</span><span>Chế độ: ${config.label}</span>`;
}

window.cycleFeedFilter = function() {
  const order = ["all", "mine", "friends"];
  const nextIndex = (order.indexOf(currentFeedFilter) + 1) % order.length;
  currentFeedFilter = order[nextIndex];
  updateFeedFilterButton();
  loadPosts();
};

function scheduleFeedRefresh(options = {}) {
  const { withLikes = false, postId = null } = options;
  if (feedRefreshTimer) clearTimeout(feedRefreshTimer);
  feedRefreshTimer = setTimeout(async () => {
    if (feedRefreshRunning) return;
    feedRefreshRunning = true;
    try {
      if (withLikes) await loadLikedPosts();
      await loadPosts();
      if (postId && document.getElementById("cmt_" + postId)?.style.display === "block") {
        await loadComments(postId);
      }
    } finally {
      feedRefreshRunning = false;
    }
  }, 180);
}

function subscribeFeedRealtime() {
  if (feedChannel) {
    sb.removeChannel(feedChannel);
    feedChannel = null;
  }

  feedChannel = sb
    .channel("home-feed")
    .on("postgres_changes", { event: "*", schema: "public", table: "posts" }, () => {
      scheduleFeedRefresh();
    })
    .on("postgres_changes", { event: "*", schema: "public", table: "likes" }, () => {
      scheduleFeedRefresh({ withLikes: true });
    })
    .on("postgres_changes", { event: "*", schema: "public", table: "comments" }, payload => {
      const postId = payload?.new?.post_id || payload?.old?.post_id;
      scheduleFeedRefresh({ postId });
    })
    .subscribe();
}

window.addEventListener("beforeunload", () => {
  if (feedRefreshTimer) clearTimeout(feedRefreshTimer);
  if (feedChannel) {
    sb.removeChannel(feedChannel);
    feedChannel = null;
  }
  if (homeBadgeChannel) {
    sb.removeChannel(homeBadgeChannel);
    homeBadgeChannel = null;
  }
});

async function createPost() {
  const text = document.getElementById("postContent").value.trim();
  const visibility = document.getElementById("postVisibility").value;
  const imageFile = document.getElementById("postImage").files?.[0];
  if (!text && !imageFile) return;
  const status = (role === "admin" || role === "teacher") ? "approved" : "pending";
  const { data: insertedPost, error } = await sb
    .from("posts")
    .insert({ user_id: currentUser.id, content: text, status, visibility })
    .select("id")
    .single();
  if (error) { alert("Lỗi: " + error.message); return; }

  if (imageFile && insertedPost?.id) {
    const mediaPath = `posts/${currentUser.id}/${insertedPost.id}-${Date.now()}-${imageFile.name}`.replace(/\s+/g, "-");
    const { error: uploadError } = await sb.storage
      .from("post-media")
      .upload(mediaPath, imageFile);

    if (uploadError) {
      alert("Bài viết đã tạo nhưng upload ảnh lỗi. Hãy kiểm tra bucket 'post-media'. Lỗi: " + uploadError.message);
    } else {
      const { data: publicData } = sb.storage.from("post-media").getPublicUrl(mediaPath);
      await sb.from("post_media").insert({
        post_id: insertedPost.id,
        file_url: publicData.publicUrl,
        file_type: "image",
        sort_order: 0
      });
    }
  }

  document.getElementById("postContent").value = "";
  document.getElementById("postVisibility").value = "public";
  document.getElementById("postImage").value = "";
  const composeStatus = document.getElementById("composeStatus");
  if (composeStatus) composeStatus.textContent = "🌍 Công khai";
  document.getElementById("visibilityMenu")?.classList.remove("open");
  document.getElementById("composePreview").classList.remove("show");
  document.getElementById("composePreviewImg").src = "";
  loadPosts();
}

async function loadPosts() {
  const wrap = document.getElementById("posts");
  if (!wrap.dataset.loadedOnce) {
    wrap.innerHTML = `<div class="empty-feed"><div class="icon">⏳</div><strong>Đang tải bảng tin</strong><p>Dữ liệu bài viết đang được chuẩn bị...</p></div>`;
  }
  const { data: posts } = await sb
    .from("posts")
    .select(`*, users(full_name,avatar_url), likes(count), comments(count), post_media(file_url,file_type,sort_order)`)
    .order("is_pinned", { ascending: false })
    .order("created_at", { ascending: false });
  const visiblePosts = (posts || [])
    .filter(canViewPost)
    .filter(post => matchFeedFilter(post, currentFeedFilter));

  if (!visiblePosts.length) {
    wrap.innerHTML = `<div class="empty-feed"><div class="icon">📭</div><p>Chưa có bài viết nào.</p></div>`;
    return;
  }
  wrap.innerHTML = "";
  for (const post of visiblePosts) {
    wrap.appendChild(buildCard(post));
    loadComments(post.id);
  }
}

function matchFeedFilter(post, filter) {
  if (filter === "mine") return post.user_id === currentUser.id;
  if (filter === "friends") return friendIds.has(post.user_id);
  return true;
}

function canViewPost(post) {
  if (!post) return false;
  if (post.user_id === currentUser.id) return true;
  if (post.status === "pending" || post.status === "rejected") {
    return role === "admin" || role === "teacher";
  }

  const visibility = post.visibility || "public";
  if (visibility === "public") return true;
  if (visibility === "friends") return friendIds.has(post.user_id);
  if (visibility === "private") return false;
  return true;
}

function buildCard(post) {
  const isPending  = post.status === "pending";
  const isRejected = post.status === "rejected";
  const isMyPost   = post.user_id === currentUser.id;
  const canMod     = role === "admin" || role === "teacher";
  const isAdmin    = role === "admin";

  const div = document.createElement("div");
  div.id = "post_" + post.id;
  div.className = "post-card" +
    (post.is_pinned  ? " pinned"        : "") +
    (isPending       ? " pending-card"  : "") +
    (isRejected      ? " rejected-card" : "");

  const dt = new Date(post.created_at);
  const timeStr = dt.toLocaleString("vi-VN",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});

  const likeCount = post.likes?.[0]?.count ?? 0;
  const cmtCount  = post.comments?.[0]?.count ?? 0;
  const isLiked   = likedPostIds.has(post.id);

  const statusBadge = isPending  ? `<span class="badge-pending">Chờ duyệt</span>`
                    : isRejected ? `<span class="badge-rejected">Từ chối</span>` : "";
  const visibilityBadge = post.visibility === "friends"
    ? `<span class="badge-visibility">Bạn bè</span>`
    : post.visibility === "private"
      ? `<span class="badge-visibility">Riêng tư</span>`
      : `<span class="badge-visibility">Công khai</span>`;

  const modBar = (canMod && isPending) ? `
    <div class="mod-bar">
      <button class="btn-ok" onclick="moderatePost('${post.id}','approved')">✅ Duyệt</button>
      <button class="btn-no" onclick="moderatePost('${post.id}','rejected')">❌ Từ chối</button>
    </div>` : "";

  const pendingNotice = (isPending && isMyPost && role === "student")
    ? `<div class="post-pending-notice">⏳ Bài đang chờ admin/giáo viên duyệt</div>` : "";
  const mediaHtml = (post.post_media || [])
    .filter(item => item.file_type === "image")
    .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0))
    .map(item => `<div class="post-media-wrap"><img class="post-media-img" src="${item.file_url}" alt="Ảnh bài viết"></div>`)
    .join("");

  const actionBar = (!isPending && !isRejected) ? `
    <div class="post-actions">
      <button class="act-btn ${isLiked ? "liked" : ""}" id="likeBtn_${post.id}" onclick="likePost('${post.id}')">❤️ <span id="likeCount_${post.id}">${likeCount}</span></button>
      <button class="act-btn" onclick="toggleCmt('${post.id}')">💬 ${cmtCount}</button>
      <div class="act-spacer"></div>
      ${(isAdmin || isMyPost) ? `<button class="act-btn edit" onclick="toggleEditPost('${post.id}')">✏️ Sửa</button>` : ""}
      ${isAdmin && !post.is_pinned ? `<button class="act-btn pin" onclick="pinPost('${post.id}')">📌 Ghim</button>` : ""}
      ${(isAdmin || isMyPost) ? `<button class="act-btn danger" onclick="deletePost('${post.id}')">🗑</button>` : ""}
    </div>
    <div class="edit-box" id="edit_${post.id}">
      <textarea class="edit-textarea" id="editContent_${post.id}">${esc(post.content)}</textarea>
      <div class="edit-tools">
        <div class="edit-media-actions">
          <select class="compose-select" id="editVisibility_${post.id}">
            <option value="public" ${post.visibility === "public" ? "selected" : ""}>Công khai</option>
            <option value="friends" ${post.visibility === "friends" ? "selected" : ""}>Bạn bè</option>
            <option value="private" ${post.visibility === "private" ? "selected" : ""}>Riêng tư</option>
          </select>
          ${(post.post_media || []).some(item => item.file_type === "image") ? `<button class="btn btn-outline btn-sm" onclick="removePostImage('${post.id}')">Xóa ảnh</button>` : ""}
        </div>
        <div class="edit-actions">
          <button class="btn btn-outline btn-sm" onclick="toggleEditPost('${post.id}')">Hủy</button>
          <button class="btn btn-primary btn-sm" onclick="savePostEdit('${post.id}')">Lưu thay đổi</button>
        </div>
      </div>
    </div>
    <div class="cmt-section" id="cmt_${post.id}">
      <div id="cmtList_${post.id}"></div>
      <div class="cmt-input-row">
        <img class="cmt-avatar" src="${currentProfile?.avatar_url||'default-avatar.png'}" onerror="this.src='default-avatar.png'">
        <input class="cmt-input" id="cmtIn_${post.id}" placeholder="Viết bình luận..."
          onkeydown="if(event.key==='Enter')commentPost('${post.id}')">
        <button class="cmt-send" onclick="commentPost('${post.id}')">➤</button>
      </div>
    </div>` : "";

  div.innerHTML = `
    <div class="post-head">
      <img class="post-avatar" src="${post.users?.avatar_url||'default-avatar.png'}" onerror="this.src='default-avatar.png'">
      <div class="post-meta">
        <div class="post-author">
          <a class="post-author-link" href="profile.html?id=${post.user_id}">${esc(post.users?.full_name??"Người dùng")}</a>
          ${post.is_pinned ? '<span class="badge-pin">📌 Đã ghim</span>' : ""}
          ${visibilityBadge}
          ${statusBadge}
        </div>
        <div class="post-time"><a class="post-author-link" href="post.html?id=${post.id}">${timeStr}</a></div>
      </div>
    </div>
    <div class="post-body">${esc(post.content)}</div>
    ${mediaHtml}
    ${pendingNotice}${modBar}${actionBar}`;

  return div;
}

window.toggleCmt = function(pid) {
  const s = document.getElementById("cmt_" + pid);
  if (!s) return;
  const open = s.style.display === "block";
  s.style.display = open ? "none" : "block";
  if (!open) { loadComments(pid); setTimeout(()=>document.getElementById("cmtIn_"+pid)?.focus(),80); }
};

window.toggleEditPost = function(pid) {
  const box = document.getElementById("edit_" + pid);
  if (!box) return;
  box.classList.toggle("open");
  if (box.classList.contains("open")) {
    setTimeout(() => document.getElementById("editContent_" + pid)?.focus(), 50);
  }
};

window.savePostEdit = async function(pid) {
  const content = document.getElementById("editContent_" + pid)?.value.trim();
  const visibility = document.getElementById("editVisibility_" + pid)?.value || "public";
  if (!content) {
    alert("Nội dung bài viết không được để trống");
    return;
  }

  const { error } = await sb
    .from("posts")
    .update({ content, visibility })
    .eq("id", pid);

  if (error) {
    alert("Lỗi khi cập nhật bài viết: " + error.message);
    return;
  }

  loadPosts();
};

window.removePostImage = async function(pid) {
  if (!confirm("Bạn có chắc muốn xóa ảnh đính kèm khỏi bài viết không?")) return;

  const { error } = await sb
    .from("post_media")
    .delete()
    .eq("post_id", pid)
    .eq("file_type", "image");

  if (error) {
    alert("Lỗi khi xóa ảnh bài viết: " + error.message);
    return;
  }

  loadPosts();
};

window.likePost = async function(pid) {
  const el = document.getElementById("likeCount_" + pid);
  const btn = document.getElementById("likeBtn_" + pid);
  if (likedPostIds.has(pid)) {
    const { error } = await sb.from("likes").delete().eq("post_id", pid).eq("user_id", currentUser.id);
    if (error) return;
    likedPostIds.delete(pid);
    if (el) el.textContent = Math.max(0, parseInt(el.textContent) - 1);
    btn?.classList.remove("liked");
    return;
  }

  const { error } = await sb.from("likes").insert({ post_id: pid, user_id: currentUser.id });
  if (error) return;
  likedPostIds.add(pid);
  if (el) el.textContent = parseInt(el.textContent) + 1;
  btn?.classList.add("liked");
  const { data: post } = await sb.from("posts").select("user_id").eq("id", pid).maybeSingle();
  if (post?.user_id) {
    await createNotification(post.user_id, "post_like", (currentProfile?.full_name || currentUser.email || "Một người dùng") + " đã thích bài viết của bạn.", pid);
  }
};

window.pinPost = async function(pid) {
  const { error } = await sb.from("posts").update({ is_pinned: true }).eq("id", pid);
  if (error) { alert("Lỗi: " + error.message); return; }
  loadPosts();
};

window.moderatePost = async function(pid, status) {
  if (!confirm(status === "approved" ? "Duyệt bài này?" : "Từ chối bài này?")) return;
  const { data: updatedPost, error } = await sb.from("posts").update({ status }).eq("id", pid).select("user_id").single();
  if (error) { alert("Lỗi: " + error.message); return; }
  if (updatedPost?.user_id) {
    await createNotification(
      updatedPost.user_id,
      status === "approved" ? "post_approved" : "post_rejected",
      status === "approved" ? "Bài viết của bạn đã được duyệt." : "Bài viết của bạn đã bị từ chối.",
      pid
    );
  }
  loadPosts();
};

window.deletePost = async function(pid) {
  if (!confirm("Xóa bài này?")) return;
  await sb.from("comments").delete().eq("post_id", pid);
  await sb.from("likes").delete().eq("post_id", pid);
  const { error } = await sb.from("posts").delete().eq("id", pid);
  if (error) { alert("Lỗi: " + error.message); return; }
  document.getElementById("post_" + pid)?.remove();
};

window.commentPost = async function(pid) {
  const inp = document.getElementById("cmtIn_" + pid);
  const txt = inp?.value.trim();
  if (!txt) return;
  await sb.from("comments").insert({ post_id: pid, user_id: currentUser.id, content: txt });
  inp.value = "";
  const { data: post } = await sb.from("posts").select("user_id").eq("id", pid).maybeSingle();
  if (post?.user_id) {
    await createNotification(post.user_id, "post_comment", (currentProfile?.full_name || currentUser.email || "Một người dùng") + " đã bình luận vào bài viết của bạn.", pid);
  }
  loadComments(pid);
};

window.showReply = function(cid) {
  const box = document.getElementById("rbox_" + cid);
  if (!box) return;
  box.classList.toggle("open");
  if (box.classList.contains("open")) box.querySelector("input")?.focus();
};

window.sendReply = async function(pid, parentId) {
  const inp = document.getElementById("rIn_" + parentId);
  const txt = inp?.value.trim();
  if (!txt) return;
  await sb.from("comments").insert({ post_id: pid, user_id: currentUser.id, content: txt, parent_id: parentId });
  inp.value = "";
  loadComments(pid);
};

window.deleteComment = async function(pid, cid) {
  if (!confirm("Xóa bình luận này?")) return;
  const { error } = await sb.from("comments").delete().eq("id", cid);
  if (error) {
    alert("Lỗi khi xóa bình luận: " + error.message);
    return;
  }
  loadComments(pid);
  loadPosts();
};

window.editComment = async function(pid, cid, oldContent) {
  const next = prompt("Sửa nội dung bình luận:", oldContent || "");
  if (next === null) return;
  const content = next.trim();
  if (!content) {
    alert("Nội dung bình luận không được để trống");
    return;
  }

  const { error } = await sb
    .from("comments")
    .update({ content })
    .eq("id", cid);

  if (error) {
    alert("Lỗi khi sửa bình luận: " + error.message);
    return;
  }

  loadComments(pid);
};

async function loadComments(pid) {
  const { data } = await sb
    .from("comments")
    .select("*, users(full_name,avatar_url)")
    .eq("post_id", pid)
    .order("created_at", { ascending: true });
  const list = document.getElementById("cmtList_" + pid);
  if (!list) return;
  const tops    = (data||[]).filter(c => !c.parent_id);
  const replies = (data||[]).filter(c =>  c.parent_id);
  if (!tops.length) {
    list.innerHTML = `<div class="empty-feed" style="padding:18px 14px; margin-top:10px;"><strong>Chưa có bình luận nào</strong><p>Hãy là người đầu tiên để lại phản hồi cho bài viết này.</p></div>`;
    return;
  }
  list.innerHTML = tops.map(c => {
    const t = new Date(c.created_at).toLocaleString("vi-VN",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
    const canDeleteTop = role === "admin" || c.user_id === currentUser.id;
    const canEditTop = role === "admin" || c.user_id === currentUser.id;
    const rHtml = replies.filter(r => r.parent_id === c.id).map(r => `
      <div class="cmt-item reply-indent">
        <img class="cmt-avatar" src="${r.users?.avatar_url||'default-avatar.png'}" onerror="this.src='default-avatar.png'">
        <div class="cmt-bubble">
          <div class="cmt-name">${esc(r.users?.full_name??"User")}</div>
          <div class="cmt-text">${esc(r.content)}</div>
          ${(role === "admin" || r.user_id === currentUser.id) ? `<div class="cmt-tools"><span class="edit-link" onclick="editComment('${pid}','${r.id}',${JSON.stringify(String(r.content || ""))})">Sửa</span><span class="delete-link" onclick="deleteComment('${pid}','${r.id}')">Xóa</span></div>` : ""}
        </div>
      </div>`).join("");
    return `
      <div class="cmt-item">
        <img class="cmt-avatar" src="${c.users?.avatar_url||'default-avatar.png'}" onerror="this.src='default-avatar.png'">
        <div style="flex:1">
          <div class="cmt-bubble">
            <div class="cmt-name">${esc(c.users?.full_name??"User")}</div>
            <div class="cmt-text">${esc(c.content)}</div>
            <div class="cmt-time">${t}</div>
          </div>
          <div class="cmt-tools">
            <span class="reply-link" onclick="showReply('${c.id}')">Trả lời</span>
            ${canEditTop ? `<span class="edit-link" onclick="editComment('${pid}','${c.id}',${JSON.stringify(String(c.content || ""))})">Sửa</span>` : ""}
            ${canDeleteTop ? `<span class="delete-link" onclick="deleteComment('${pid}','${c.id}')">Xóa</span>` : ""}
          </div>
          <div class="reply-box" id="rbox_${c.id}">
            <input class="cmt-input" id="rIn_${c.id}" placeholder="Trả lời..."
              onkeydown="if(event.key==='Enter')sendReply('${pid}','${c.id}')">
            <button class="cmt-send" onclick="sendReply('${pid}','${c.id}')">➤</button>
          </div>
          ${rHtml}
        </div>
      </div>`;
  }).join("");
}

function esc(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

init();
</script>
</body>
</html>
