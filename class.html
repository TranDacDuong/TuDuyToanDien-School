<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quản lý Lớp học — Tạo & Danh sách</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#fff;
      --accent:#2b6cb0;
      --muted:#6b7280;
      --success:#16a34a;
      --danger:#dc2626;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    body{
      margin:0;
      background:var(--bg);
      color:#111827;
      padding:24px;
    }
    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
    }
    h1{margin:0;font-size:20px;}
    main{
      display:grid;
      grid-template-columns: 360px 1fr;
      gap:20px;
      align-items:start;
    }

    /* form */
    .card{
      background:var(--card);
      border-radius:10px;
      padding:16px;
      box-shadow:0 1px 2px rgba(15,23,42,0.05);
    }
    form .row{display:flex;gap:8px;margin-bottom:10px;}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
    input[type="text"], textarea, select{
      width:100%;
      padding:8px 10px;
      border:1px solid #e6e9ef;
      border-radius:6px;
      font-size:14px;
      background:#fff;
      box-sizing:border-box;
    }
    textarea{min-height:80px; resize:vertical;}
    button{
      background:var(--accent);
      color:#fff;
      border:0;
      padding:10px 12px;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
    }
    button.secondary{
      background:#fff;
      color:var(--accent);
      border:1px solid #cfe0f6;
    }
    .muted{color:var(--muted); font-size:13px;}

    /* class list */
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
      gap:12px;
    }
    .class-card{
      background:var(--card);
      border-radius:10px;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:8px;
      box-shadow:0 1px 2px rgba(15,23,42,0.04);
      border-left:4px solid rgba(43,108,176,0.12);
    }
    .class-title{font-weight:700;font-size:15px;}
    .tag{display:inline-block;background:#eef6ff;color:var(--accent);padding:4px 8px;border-radius:999px;font-size:12px;}
    .meta{font-size:13px;color:var(--muted);}
    .actions{margin-top:auto;display:flex;gap:8px;justify-content:flex-end;}
    .small{font-size:12px;padding:6px 8px;border-radius:8px;}

    .message{padding:8px;border-radius:8px;margin-bottom:10px;}
    .message.success{background:rgba(22,163,74,0.12);color:var(--success);border:1px solid rgba(22,163,74,0.08);}
    .message.error{background:rgba(220,38,38,0.08);color:var(--danger);border:1px solid rgba(220,38,38,0.06);}

    @media (max-width:900px){
      main{grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Tạo lớp & Danh sách lớp của giáo viên</h1>
    <div class="muted">Bạn đang ở trang quản lý lớp</div>
  </header>

  <main>
    <!-- Left: Create class -->
    <section class="card" id="createSection" aria-labelledby="createTitle">
      <h2 id="createTitle" style="margin:0 0 10px 0;font-size:16px;">Tạo Lớp Mới</h2>

      <div id="messageContainer" aria-live="polite"></div>

      <form id="createForm">
        <div>
          <label for="name">Tên lớp</label>
          <input id="name" name="name" type="text" placeholder="VD: Toán 10A1" required />
        </div>

        <div class="row">
          <div style="flex:1;">
            <label for="code">Mã lớp</label>
            <input id="code" name="code" type="text" placeholder="VD: TOAN10A1" />
          </div>
          <div style="width:120px;">
            <label for="grade">Khối</label>
            <select id="grade" name="grade">
              <option value="">--</option>
              <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option><option>11</option><option>12</option>
            </select>
          </div>
        </div>

        <div>
          <label for="subject">Môn học</label>
          <input id="subject" name="subject" type="text" placeholder="VD: Toán học" />
        </div>

        <div>
          <label for="description">Mô tả (không bắt buộc)</label>
          <textarea id="description" name="description" placeholder="Ghi chú ngắn gọn về lớp..."></textarea>
        </div>

        <div style="display:flex;gap:8px;margin-top:10px;">
          <button id="createBtn" type="submit">Tạo lớp</button>
          <button id="resetBtn" type="button" class="secondary">Đặt lại</button>
        </div>
      </form>
    </section>

    <!-- Right: List classes -->
    <section class="card" aria-labelledby="listTitle">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h2 id="listTitle" style="margin:0;font-size:16px;">Danh sách lớp của bạn</h2>
        <div class="muted" id="countText">0 lớp</div>
      </div>

      <div id="listContainer">
        <div class="muted">Đang tải danh sách...</div>
      </div>
    </section>
  </main>

  <!-- Supabase client expected to be provided by supabaseClient.js in repository -->
  <script src="./supabaseClient.js"></script>

  <script>
    // --- Assumptions ---
    // - supabaseClient.js exposes a global `supabase` object (window.supabase)
    // - There is a `classes` table with columns:
    //     id (uuid), name (text), code (text), subject (text), grade (text), description (text),
    //     teacher_id (uuid), created_at (timestamp)
    // - User is authenticated; teacher's user id is available from supabase.auth

    (function () {
      const createForm = document.getElementById('createForm');
      const messageContainer = document.getElementById('messageContainer');
      const listContainer = document.getElementById('listContainer');
      const createBtn = document.getElementById('createBtn');
      const resetBtn = document.getElementById('resetBtn');
      const countText = document.getElementById('countText');

      let currentUser = null;

      // Compatibility with Supabase v1/v2 auth API
      async function getCurrentUser() {
        if (!window.supabase) {
          throw new Error('Supabase client không được tìm thấy. Hãy kiểm tra supabaseClient.js');
        }

        // v2: supabase.auth.getUser()
        if (supabase.auth && typeof supabase.auth.getUser === 'function') {
          const { data, error } = await supabase.auth.getUser();
          if (error) throw error;
          return data.user;
        }

        // v1: supabase.auth.user()
        if (supabase.auth && typeof supabase.auth.user === 'function') {
          return supabase.auth.user();
        }

        // fallback for setups that attach user to supabase.currentUser
        return supabase.currentUser || null;
      }

      function showMessage(text, type = 'success') {
        messageContainer.innerHTML = '';
        const el = document.createElement('div');
        el.className = 'message ' + (type === 'error' ? 'error' : 'success');
        el.textContent = text;
        messageContainer.appendChild(el);
        // auto hide after 4s
        setTimeout(() => {
          if (messageContainer.contains(el)) messageContainer.removeChild(el);
        }, 4000);
      }

      function showError(text) {
        showMessage(text, 'error');
      }

      function setLoading(on = true) {
        createBtn.disabled = on;
        createBtn.textContent = on ? 'Đang tạo...' : 'Tạo lớp';
      }

      function renderClasses(items) {
        if (!items || items.length === 0) {
          listContainer.innerHTML = '<div class="muted">Chưa có lớp nào. Tạo lớp mới ở bên trái.</div>';
          countText.textContent = '0 lớp';
          return;
        }

        countText.textContent = items.length + (items.length > 1 ? ' lớp' : ' lớp');

        const grid = document.createElement('div');
        grid.className = 'grid';

        items.forEach(it => {
          const c = document.createElement('article');
          c.className = 'class-card';
          c.setAttribute('data-id', it.id || '');

          const title = document.createElement('div');
          title.className = 'class-title';
          title.textContent = it.name || '(Không có tên)';

          const tagRow = document.createElement('div');
          if (it.code) {
            const tag = document.createElement('span');
            tag.className = 'tag';
            tag.textContent = it.code;
            tagRow.appendChild(tag);
          }

          const meta = document.createElement('div');
          meta.className = 'meta';
          const parts = [];
          if (it.subject) parts.push(it.subject);
          if (it.grade) parts.push('Khối ' + it.grade);
          if (it.created_at) {
            const dt = new Date(it.created_at).toLocaleString();
            parts.push(dt);
          }
          meta.textContent = parts.join(' • ');

          const desc = document.createElement('div');
          desc.className = 'muted';
          desc.style.minHeight = '36px';
          desc.textContent = it.description || '';

          const actions = document.createElement('div');
          actions.className = 'actions';
          const openBtn = document.createElement('button');
          openBtn.className = 'small';
          openBtn.textContent = 'Mở';
          openBtn.addEventListener('click', () => {
            // mở trang lớp (nếu có route)
            // ví dụ: /class.html?id=...
            const url = new URL(window.location);
            url.pathname = '/class.html';
            url.searchParams.set('id', it.id);
            window.location.href = url.toString();
          });

          const editBtn = document.createElement('button');
          editBtn.className = 'small secondary small';
          editBtn.textContent = 'Sửa';
          editBtn.addEventListener('click', () => {
            // simple inline edit: fill form with values
            document.getElementById('name').value = it.name || '';
            document.getElementById('code').value = it.code || '';
            document.getElementById('subject').value = it.subject || '';
            document.getElementById('grade').value = it.grade || '';
            document.getElementById('description').value = it.description || '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            showMessage('Đã điền thông tin lớp vào form. Chỉnh sửa và nhấn "Tạo lớp" để cập nhật (tính năng cập nhật: chưa cài đặt).', 'success');
          });

          actions.appendChild(editBtn);
          actions.appendChild(openBtn);

          c.appendChild(title);
          if (tagRow.children.length) c.appendChild(tagRow);
          c.appendChild(meta);
          c.appendChild(desc);
          c.appendChild(actions);

          grid.appendChild(c);
        });

        listContainer.innerHTML = '';
        listContainer.appendChild(grid);
      }

      async function fetchClasses() {
        listContainer.innerHTML = '<div class="muted">Đang tải danh sách...</div>';
        try {
          const teacherId = currentUser.id;
          // select all classes for this teacher
          const { data, error } = await supabase
            .from('classes')
            .select('*')
            .eq('teacher_id', teacherId)
            .order('created_at', { ascending: false });

          if (error) {
            console.error('Lỗi khi lấy lớp:', error);
            showError('Không thể tải danh sách lớp: ' + (error.message || error));
            listContainer.innerHTML = '<div class="muted">Lỗi khi tải danh sách.</div>';
            return;
          }

          renderClasses(data || []);
        } catch (err) {
          console.error(err);
          showError('Lỗi hệ thống khi tải lớp.');
          listContainer.innerHTML = '<div class="muted">Lỗi khi tải danh sách.</div>';
        }
      }

      async function createClassHandler(evt) {
        evt.preventDefault();
        if (!currentUser) {
          showError('Bạn chưa đăng nhập.');
          return;
        }

        const name = document.getElementById('name').value.trim();
        const code = document.getElementById('code').value.trim();
        const subject = document.getElementById('subject').value.trim();
        const grade = document.getElementById('grade').value;
        const description = document.getElementById('description').value.trim();

        if (!name) {
          showError('Tên lớp không được để trống.');
          return;
        }

        setLoading(true);

        try {
          // Attempt to insert; you may want to implement update-on-duplicate in future
          const payload = {
            name,
            code: code || null,
            subject: subject || null,
            grade: grade || null,
            description: description || null,
            teacher_id: currentUser.id
          };

          const { data, error } = await supabase
            .from('classes')
            .insert([payload])
            .select() // return inserted row (if supported)
            .single();

          if (error) {
            console.error('Insert error', error);
            showError('Tạo lớp thất bại: ' + (error.message || error));
            setLoading(false);
            return;
          }

          showMessage('Tạo lớp thành công!');
          createForm.reset();
          await fetchClasses();
        } catch (err) {
          console.error(err);
          showError('Lỗi khi tạo lớp.');
        } finally {
          setLoading(false);
        }
      }

      function resetForm() {
        createForm.reset();
      }

      async function init() {
        try {
          const user = await getCurrentUser();
          if (!user) {
            // redirect to login page
            window.location.href = '/index.html';
            return;
          }
          currentUser = user;
          // optionally show username somewhere
          // load classes
          await fetchClasses();
        } catch (err) {
          console.error(err);
          showError('Không thể xác thực người dùng. Vui lòng đăng nhập lại.');
          setTimeout(() => window.location.href = '/index.html', 1800);
        }
      }

      // events
      createForm.addEventListener('submit', createClassHandler);
      resetBtn.addEventListener('click', resetForm);

      // start
      init();
    })();
  </script>
</body>
</html>
