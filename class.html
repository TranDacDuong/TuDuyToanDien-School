<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quản lý Lớp học — Tạo & Danh sách</title>

  <style>
    :root{
      --bg:#f4f7fb;
      --card:#fff;
      --accent:#2563eb;
      --muted:#6b7280;
      --danger:#dc2626;
      --success:#16a34a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,Arial,sans-serif;
      background:var(--bg);
      color:#0f172a;
      padding:20px;
    }
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    h1{margin:0;font-size:20px}
    main{display:grid;grid-template-columns:440px 1fr;gap:18px;align-items:start}
    .card{background:var(--card);padding:14px;border-radius:10px;box-shadow:0 1px 4px rgba(2,6,23,0.06)}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    input[type="text"], input[type="number"], select, textarea, input[type="time"]{
      width:100%;padding:8px;border:1px solid #e6edf3;border-radius:8px;background:#fff;font-size:14px
    }
    textarea{min-height:80px;resize:vertical}
    .row{display:flex;gap:8px}
    .row>div{flex:1}
    button{background:var(--accent);color:#fff;border:0;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:600}
    button.secondary{background:#fff;color:var(--accent);border:1px solid #cfe0f6}
    .muted{color:var(--muted);font-size:13px}
    .schedules{display:flex;flex-direction:column;gap:8px;margin-top:8px}
    .schedule-row{display:grid;grid-template-columns:110px 1fr 1fr 1fr 40px;gap:8px;align-items:center}
    .small{padding:6px 8px;border-radius:8px;border:1px solid #e6edf3;background:#fafafa;cursor:pointer;font-size:13px}
    .controls{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
    .class-card{padding:10px;border-radius:10px;background:#fff;box-shadow:0 1px 2px rgba(2,6,23,0.04);cursor:pointer;border-left:4px solid rgba(37,99,235,0.14)}
    .class-title{font-weight:700}
    .meta{font-size:13px;color:var(--muted);margin-top:6px}
    .message{padding:8px;border-radius:8px;margin-bottom:10px}
    .message.success{background:#ecfdf5;color:#065f46}
    .message.error{background:#fff1f2;color:#981b24}
    .hidden{display:none}
    .label-inline{font-size:13px;color:var(--muted);margin-right:8px}
  </style>
</head>
<body>
  <header>
    <h1>Quản lý Lớp học</h1>
    <div id="userInfo" class="muted">Đang tải thông tin người dùng...</div>
  </header>

  <main>
    <!-- Left: Create/Edit -->
    <section class="card" aria-labelledby="createTitle">
      <h2 id="createTitle" style="margin:0 0 10px 0;font-size:16px">Tạo / Chỉnh sửa lớp</h2>

      <div id="messageContainer"></div>

      <form id="classForm">
        <label for="class_name">Tên lớp</label>
        <input id="class_name" name="class_name" type="text" placeholder="Ví dụ: Toán nâng cao A1" required />

        <div class="row" style="margin-top:10px">
          <div>
            <label for="grade_id">Khối</label>
            <select id="grade_id" name="grade_id" required>
              <option value="">-- Đang tải --</option>
            </select>
          </div>
          <div>
            <label for="subject_id">Môn</label>
            <select id="subject_id" name="subject_id" required>
              <option value="">-- Chọn khối trước --</option>
            </select>
          </div>
        </div>

        <div style="margin-top:10px">
          <label for="tuition_type">Kiểu học phí</label>
          <select id="tuition_type" name="tuition_type">
            <option value="per_session">Theo buổi</option>
            <option value="per_course">Theo khóa</option>
          </select>
        </div>

        <div style="margin-top:8px">
          <label id="tuition_label" for="tuition_fee">Số tiền (VNĐ)</label>
          <input id="tuition_fee" name="tuition_fee" type="number" min="0" step="1000" placeholder="Ví dụ: 200000" />
          <div class="muted" style="margin-top:6px">Nếu chọn "Theo buổi" => tiền trên mỗi buổi; nếu "Theo khóa" => tiền toàn khóa.</div>
        </div>

        <div style="margin-top:10px">
          <label for="note">Ghi chú (tuỳ chọn)</label>
          <textarea id="note" name="note"></textarea>
        </div>

        <h3 style="margin-top:12px;margin-bottom:6px;font-size:15px">Lịch học (có thể nhiều buổi)</h3>
        <div class="schedules" id="schedules"></div>
        <div style="display:flex;justify-content:flex-end;margin-top:6px">
          <button type="button" id="addSchedule" class="secondary">+ Thêm buổi</button>
        </div>

        <div class="controls">
          <button type="submit" id="saveBtn">Lưu lớp</button>
          <button type="button" id="resetBtn" class="secondary">Đặt lại</button>
        </div>
      </form>
    </section>

    <!-- Right: List classes -->
    <section class="card" aria-labelledby="listTitle">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 id="listTitle" style="margin:0;font-size:16px">Các lớp tôi quản lý</h2>
        <div class="muted" id="countText">0 lớp</div>
      </div>

      <div id="listContainer">
        <div class="muted">Đang tải...</div>
      </div>
    </section>
  </main>

  <!-- Supabase lib then supabaseClient.js (which may define sb or window.sb) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabaseClient.js"></script>

  <script>
    (function () {
      // Elements
      const userInfo = document.getElementById('userInfo');
      const messageContainer = document.getElementById('messageContainer');
      const classForm = document.getElementById('classForm');
      const gradeSelect = document.getElementById('grade_id');
      const subjectSelect = document.getElementById('subject_id');
      const tuitionType = document.getElementById('tuition_type');
      const tuitionFee = document.getElementById('tuition_fee');
      const tuitionLabel = document.getElementById('tuition_label');
      const noteInput = document.getElementById('note');
      const schedulesEl = document.getElementById('schedules');
      const addScheduleBtn = document.getElementById('addSchedule');
      const listContainer = document.getElementById('listContainer');
      const saveBtn = document.getElementById('saveBtn');
      const resetBtn = document.getElementById('resetBtn');
      const countText = document.getElementById('countText');

      let currentUser = null;
      let editingClassId = null;

      const WEEKDAYS = [
        { v: 1, label: 'Thứ 2' },
        { v: 2, label: 'Thứ 3' },
        { v: 3, label: 'Thứ 4' },
        { v: 4, label: 'Thứ 5' },
        { v: 5, label: 'Thứ 6' },
        { v: 6, label: 'Thứ 7' },
        { v: 0, label: 'Chủ nhật' }
      ];

      function showMessage(text, type = 'success') {
        messageContainer.innerHTML = '';
        const el = document.createElement('div');
        el.className = 'message ' + (type === 'error' ? 'error' : 'success');
        el.textContent = text;
        messageContainer.appendChild(el);
        setTimeout(() => { if (messageContainer.contains(el)) messageContainer.removeChild(el); }, 4000);
      }
      function showError(err) {
        const text = err && err.message ? err.message : String(err);
        showMessage(text, 'error');
        console.error(err);
      }

      // Detect sb whether it's window.sb or a global const sb
      function getGlobalSbIfAvailable() {
        if (typeof window !== 'undefined' && window.sb) return window.sb;
        // typeof sb avoids ReferenceError if sb not declared
        if (typeof sb !== 'undefined') return sb;
        return null;
      }

      // Wait for sb (either window.sb or global sb)
      async function waitForSb(timeout = 10000) {
        const start = Date.now();
        while (true) {
          const candidate = getGlobalSbIfAvailable();
          if (candidate) return candidate;
          if (Date.now() - start > timeout) {
            throw new Error('Supabase client (window.sb or sb) không được tìm thấy sau ' + timeout + 'ms. Kiểm tra supabaseClient.js và thứ tự script.');
          }
          await new Promise(r => setTimeout(r, 50));
        }
      }

      // requireSb throws if not available immediately (used in code paths where we expect sb to be ready)
      function requireSbImmediate() {
        const candidate = getGlobalSbIfAvailable();
        if (!candidate) throw new Error('Supabase client không được tìm thấy. Kiểm tra supabaseClient.js');
        return candidate;
      }

      async function getCurrentUser() {
        await waitForSb();
        const sb = requireSbImmediate();
        if (sb.auth && typeof sb.auth.getUser === 'function') {
          const { data, error } = await sb.auth.getUser();
          if (error) throw error;
          return data.user;
        }
        if (sb.auth && typeof sb.auth.user === 'function') {
          return sb.auth.user();
        }
        return sb.currentUser || null;
      }

      async function loadGrades() {
        try {
          const sb = requireSbImmediate();
          const { data, error } = await sb.from('grades').select('id,name').order('name', { ascending: true });
          if (error) throw error;
          gradeSelect.innerHTML = '<option value="">-- Chọn khối --</option>';
          (data || []).forEach(g => {
            const o = document.createElement('option'); o.value = g.id; o.textContent = g.name; gradeSelect.appendChild(o);
          });
        } catch (err) {
          showError('Không tải được danh sách khối: ' + (err.message || err));
        }
      }

      async function loadSubjects(gradeId) {
        try {
          const sb = requireSbImmediate();
          if (!gradeId) { subjectSelect.innerHTML = '<option value="">-- Chọn khối trước --</option>'; return; }
          const { data, error } = await sb.from('subjects').select('id,name,grade_id').eq('grade_id', gradeId).order('name', { ascending: true });
          if (error) throw error;
          subjectSelect.innerHTML = '<option value="">-- Chọn môn --</option>';
          (data || []).forEach(s => {
            const o = document.createElement('option'); o.value = s.id; o.textContent = s.name; subjectSelect.appendChild(o);
          });
        } catch (err) {
          showError('Không tải được môn học: ' + (err.message || err));
        }
      }

      gradeSelect.addEventListener('change', () => loadSubjects(gradeSelect.value));

      function createScheduleRow(initial = {}) {
        const row = document.createElement('div'); row.className = 'schedule-row';

        const weekdaySelect = document.createElement('select');
        weekdaySelect.innerHTML = WEEKDAYS.map(w => `<option value="${w.v}">${w.label}</option>`).join('');
        if (initial.weekday !== undefined && initial.weekday !== null) weekdaySelect.value = initial.weekday;

        const startInput = document.createElement('input'); startInput.type = 'time'; startInput.value = initial.start_time || '';
        const endInput = document.createElement('input'); endInput.type = 'time'; endInput.value = initial.end_time || '';

        const roomSelect = document.createElement('select'); roomSelect.innerHTML = '<option value="">Đang tải phòng...</option>';

        const removeBtn = document.createElement('button'); removeBtn.type = 'button'; removeBtn.className = 'small'; removeBtn.textContent = '-';

        row.appendChild(weekdaySelect);
        row.appendChild(startInput);
        row.appendChild(endInput);
        row.appendChild(roomSelect);
        row.appendChild(removeBtn);

        async function refreshRooms() {
          const weekday = weekdaySelect.value;
          const start = startInput.value;
          const end = endInput.value;
          roomSelect.innerHTML = '<option value="">Đang kiểm tra...</option>';
          if (weekday === '' || !start || !end) { roomSelect.innerHTML = '<option value="">Chọn ngày/giờ hợp lệ</option>'; return; }
          if (start >= end) { roomSelect.innerHTML = '<option value="">Thời gian không hợp lệ</option>'; return; }

          try {
            const sb = requireSbImmediate();
            const [{ data: rooms, error: rErr }, { data: schedules, error: sErr }] = await Promise.all([
              sb.from('rooms').select('id,room_name,capacity').order('room_name'),
              sb.from('class_schedules').select('id,class_id,room_id,weekday,start_time,end_time').eq('weekday', parseInt(weekday, 10))
            ]);
            if (rErr) throw rErr;
            if (sErr) throw sErr;

            const occupied = new Set();
            (schedules || []).forEach(s => {
              const sStart = (s.start_time || '').slice(0,5);
              const sEnd = (s.end_time || '').slice(0,5);
              if (sStart && sEnd && sStart < end && sEnd > start) {
                if (s.room_id) occupied.add(s.room_id);
              }
            });

            const freeRooms = (rooms || []).filter(r => !occupied.has(r.id));
            roomSelect.innerHTML = '';
            if (freeRooms.length === 0) roomSelect.innerHTML = '<option value="">Không có phòng trống</option>';
            else {
              roomSelect.appendChild(new Option('-- Chọn phòng --', ''));
              freeRooms.forEach(r => roomSelect.appendChild(new Option(r.room_name + (r.capacity ? ` (${r.capacity})` : ''), r.id)));
              if (initial.room_id) roomSelect.value = initial.room_id;
            }
          } catch (err) {
            console.error(err);
            roomSelect.innerHTML = '<option value="">Lỗi tải phòng</option>';
          }
        }

        weekdaySelect.addEventListener('change', refreshRooms);
        startInput.addEventListener('change', refreshRooms);
        endInput.addEventListener('change', refreshRooms);
        removeBtn.addEventListener('click', () => row.remove());
        setTimeout(refreshRooms, 0);
        return row;
      }

      schedulesEl.appendChild(createScheduleRow());
      addScheduleBtn.addEventListener('click', () => schedulesEl.appendChild(createScheduleRow()));

      async function loadMyClasses() {
        try {
          listContainer.innerHTML = '<div class="muted">Đang tải danh sách...</div>';
          const sb = requireSbImmediate();
          const { data: classes, error } = await sb.from('classes').select('id,class_name,grade_id,subject_id,tuition_type,tuition_fee,created_by,created_at').order('created_at', { ascending: false });
          if (error) throw error;
          const { data: viaCT, error: ctErr } = await sb.from('class_teachers').select('class_id').eq('teacher_id', currentUser ? currentUser.id : '');
          if (ctErr) throw ctErr;
          const ctClassIds = new Set((viaCT || []).map(x => x.class_id));
          const filtered = (classes || []).filter(c => (c.created_by === (currentUser && currentUser.id)) || ctClassIds.has(c.id));
          renderClassList(filtered);
        } catch (err) {
          console.error(err);
          listContainer.innerHTML = '<div class="muted">Không thể tải danh sách lớp.</div>';
        }
      }

      function renderClassList(items) {
        listContainer.innerHTML = '';
        if (!items || items.length === 0) {
          listContainer.innerHTML = '<div class="muted">Bạn chưa quản lý lớp nào.</div>';
          countText.textContent = '0 lớp';
          return;
        }
        countText.textContent = items.length + ' lớp';
        const grid = document.createElement('div'); grid.className = 'grid';
        items.forEach(c => {
          const card = document.createElement('div'); card.className = 'class-card';
          const title = document.createElement('div'); title.className = 'class-title'; title.textContent = c.class_name || '(Không tên)';
          const meta = document.createElement('div'); meta.className = 'meta';
          const tuitionText = (c.tuition_type === 'per_session') ? 'Theo buổi' : 'Theo khóa';
          meta.textContent = `${tuitionText} • ${c.tuition_fee ? new Intl.NumberFormat('vi-VN').format(c.tuition_fee) + ' đ' : ''}`;
          card.appendChild(title); card.appendChild(meta);
          card.addEventListener('click', () => {
            window.location.href = `class_manage.html?class_id=${encodeURIComponent(c.id)}`;
          });
          grid.appendChild(card);
        });
        listContainer.appendChild(grid);
      }

      classForm.addEventListener('submit', async (ev) => {
        ev.preventDefault();
        setLoading(true);
        try {
          if (!currentUser) throw new Error('Bạn chưa đăng nhập.');
          const sb = requireSbImmediate();
          const class_name = classForm.class_name.value.trim();
          const grade_id = gradeSelect.value || null;
          const subject_id = subjectSelect.value || null;
          const tuition_type = tuitionType.value;
          const tuition_fee_val = parseInt(tuitionFee.value || '0', 10) || 0;
          const note = noteInput.value.trim();

          if (!class_name) throw new Error('Vui lòng nhập tên lớp.');
          if (!grade_id) throw new Error('Vui lòng chọn khối.');
          if (!subject_id) throw new Error('Vui lòng chọn môn.');

          const classPayload = {
            class_name,
            grade_id,
            subject_id,
            tuition_type,
            tuition_fee: tuition_fee_val,
            note,
            created_by: currentUser.id,
            created_at: new Date().toISOString()
          };

          const { data: classData, error: classErr } = await sb.from('classes').insert([classPayload]).select('id').single();
          if (classErr) throw classErr;
          const classId = classData.id;

          const rows = Array.from(schedulesEl.querySelectorAll('.schedule-row'));
          const scheduleInserts = [];
          for (const r of rows) {
            const weekday = r.children[0].value;
            const start_time = r.children[1].value;
            const end_time = r.children[2].value;
            const room_id = r.children[3].value || null;
            if (!weekday || !start_time || !end_time) continue;
            if (start_time >= end_time) throw new Error('Thời gian bắt đầu phải nhỏ hơn thời gian kết thúc trong một buổi.');
            scheduleInserts.push({
              class_id: classId,
              weekday: parseInt(weekday, 10),
              start_time,
              end_time,
              room_id,
              created_at: new Date().toISOString()
            });
          }

          if (scheduleInserts.length > 0) {
            const { error: schedErr } = await sb.from('class_schedules').insert(scheduleInserts);
            if (schedErr) throw schedErr;
          }

          const { error: ctErr } = await sb.from('class_teachers').insert([{
            class_id: classId,
            teacher_id: currentUser.id,
            role: 'owner'
          }]);
          if (ctErr) throw ctErr;

          showMessage('Tạo lớp thành công');
          classForm.reset();
          schedulesEl.innerHTML = '';
          schedulesEl.appendChild(createScheduleRow());
          await loadMyClasses();
        } catch (err) {
          showError(err);
        } finally {
          setLoading(false);
        }
      });

      resetBtn.addEventListener('click', () => {
        classForm.reset();
        schedulesEl.innerHTML = '';
        schedulesEl.appendChild(createScheduleRow());
      });

      function setLoading(loading) {
        saveBtn.disabled = loading;
        saveBtn.textContent = loading ? 'Đang lưu...' : 'Lưu lớp';
      }

      tuitionType.addEventListener('change', () => {
        if (tuitionType.value === 'per_session') tuitionLabel.textContent = 'Số tiền (VNĐ) / 1 buổi';
        else tuitionLabel.textContent = 'Số tiền (VNĐ) / 1 khóa';
      });

      (async function init() {
        try {
          await waitForSb(10000);
        } catch (err) {
          showError(err);
          return;
        }

        try {
          currentUser = await getCurrentUser();
        } catch (err) {
          console.warn('Không lấy được user:', err);
          currentUser = null;
        }

        if (currentUser) {
          userInfo.textContent = currentUser.email || (currentUser.user_metadata && currentUser.user_metadata.full_name) || 'Giáo viên';
        } else {
          userInfo.textContent = 'Người dùng chưa đăng nhập';
        }

        try {
          await loadGrades();
          await loadSubjects(gradeSelect.value);
        } catch (err) {
          console.warn('Lỗi load danh mục:', err);
        }

        if (currentUser) {
          await loadMyClasses();
        } else {
          listContainer.innerHTML = '<div class="muted">Đăng nhập để xem các lớp bạn quản lý.</div>';
        }
      })();

      // Debug helper
      window.__classAdmin = { reload: async () => { await loadGrades(); await loadMyClasses(); } };
    })();
  </script>
</body>
</html>
