<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class Management</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
}

header{
    background:#2563eb;
    color:white;
    padding:15px;
    font-size:20px;
}

.container{
    width:95%;
    max-width:1100px;
    margin:auto;
}

.create-class{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.create-class h2{
    margin-top:0;
}

.form-row{
    margin-bottom:12px;
}

input,select{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    padding:10px 15px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1e4fd1;
}

.class-list{
    margin-top:30px;
}

.class-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:15px;
}

.class-box{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    cursor:pointer;
    transition:0.2s;
}

.class-box:hover{
    transform:scale(1.03);
}

.class-title{
    font-size:18px;
    font-weight:bold;
}

.class-info{
    font-size:14px;
    margin-top:5px;
    color:#555;
}
</style>

</head>

<body>

<header>
Class Management
</header>

<div class="container">

<!-- CREATE CLASS -->
<div class="create-class">

<h2>Create New Class</h2>

<div class="form-row">
<label>Class Name</label>
<input id="className">
</div>

<div class="form-row">
<label>Grade</label>
<select id="gradeSelect"></select>
</div>

<div class="form-row">
<label>Subject</label>
<select id="subjectSelect"></select>
</div>

<div class="form-row">
<label>Tuition Type</label>
<select id="tuitionType">
<option value="month">Monthly</option>
<option value="course">Course</option>
</select>
</div>

<div class="form-row">
<label>Tuition Fee</label>
<input type="number" id="tuitionFee">
</div>

<div class="form-row">
<label>Day of week</label>
<select id="dayOfWeek">
<option value="2">Monday</option>
<option value="3">Tuesday</option>
<option value="4">Wednesday</option>
<option value="5">Thursday</option>
<option value="6">Friday</option>
<option value="7">Saturday</option>
<option value="8">Sunday</option>
</select>
</div>

<div class="form-row">
<label>Start Time</label>
<input type="time" id="startTime">
</div>

<button onclick="createClass()">Create Class</button>

</div>


<!-- CLASS LIST -->
<div class="class-list">

<h2>Your Classes</h2>

<div class="class-grid" id="classGrid">

</div>

</div>

</div>

<script>

let grades=[]
let subjects=[]
let classes=[]


async function loadGrades(){
    let res = await fetch("/api/grades")
    grades = await res.json()

    let gradeSelect=document.getElementById("gradeSelect")

    gradeSelect.innerHTML=grades.map(g=>
        `<option value="${g.id}">${g.name}</option>`
    ).join("")
}

async function loadSubjects(){
    let res = await fetch("/api/subjects")
    subjects = await res.json()

    filterSubjects()
}

function filterSubjects(){

    let gradeId=document.getElementById("gradeSelect").value

    let subjectSelect=document.getElementById("subjectSelect")

    let filtered=subjects.filter(s=>s.grade_id==gradeId)

    subjectSelect.innerHTML=filtered.map(s=>
        `<option value="${s.id}">${s.name}</option>`
    ).join("")
}

document.getElementById("gradeSelect").addEventListener("change",filterSubjects)


async function loadClasses(){

    let res=await fetch("/api/my_classes")
    classes=await res.json()

    renderClasses()
}

function renderClasses(){

    let grid=document.getElementById("classGrid")

    grid.innerHTML=classes.map(c=>

        `<div class="class-box" onclick="openClass(${c.id})">

            <div class="class-title">${c.class_name}</div>

            <div class="class-info">
            Grade: ${c.grade_name}
            </div>

            <div class="class-info">
            Subject: ${c.subject_name}
            </div>

            <div class="class-info">
            Fee: ${c.tuition_fee}
            </div>

        </div>`

    ).join("")
}


async function createClass(){

    let data={
        class_name:document.getElementById("className").value,
        grade_id:document.getElementById("gradeSelect").value,
        subject_id:document.getElementById("subjectSelect").value,
        tuition_type:document.getElementById("tuitionType").value,
        tuition_fee:document.getElementById("tuitionFee").value,
        day_of_week:document.getElementById("dayOfWeek").value,
        start_time:document.getElementById("startTime").value
    }

    await fetch("/api/classes",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(data)
    })

    loadClasses()
}


function openClass(id){

    window.location="class_detail.html?id="+id

}


async function init(){

    await loadGrades()
    await loadSubjects()
    await loadClasses()

}

init()

</script>

</body>
</html>
