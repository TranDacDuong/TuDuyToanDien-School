<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý lớp</title>

<style>

body{
    font-family: Arial;
    background:#f5f6fa;
    margin:0;
}

header{
    background:#2563eb;
    color:white;
    padding:15px;
    font-size:20px;
}

.container{
    width:95%;
    max-width:1100px;
    margin:auto;
}

.top-bar{
    margin-top:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1e4fd1;
}

.form-box{
    display:none;
    background:white;
    padding:20px;
    border-radius:10px;
    margin-top:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.form-row{
    margin-bottom:10px;
}

input,select{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:6px;
}

.class-grid{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:15px;
}

.class-box{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    cursor:pointer;
}

.class-box:hover{
    transform:scale(1.03);
}

.class-title{
    font-weight:bold;
    font-size:17px;
}

.class-info{
    font-size:14px;
    margin-top:5px;
    color:#555;
}

</style>
</head>

<body>

<header>
Quản lý lớp học
</header>

<div class="container">

<div class="top-bar">
<h2>Lớp của tôi</h2>
<button onclick="toggleForm()">Tạo lớp</button>
</div>


<!-- FORM TẠO LỚP -->

<div class="form-box" id="createForm">

<div class="form-row">
<label>Tên lớp</label>
<input id="className">
</div>

<div class="form-row">
<label>Khối</label>
<select id="gradeSelect"></select>
</div>

<div class="form-row">
<label>Môn học</label>
<select id="subjectSelect"></select>
</div>

<div class="form-row">
<label>Hình thức học phí</label>
<select id="tuitionType">
<option value="month">Theo tháng</option>
<option value="course">Theo khóa</option>
</select>
</div>

<div class="form-row">
<label>Học phí</label>
<input type="number" id="tuitionFee">
</div>

<div class="form-row">
<label>Thứ</label>
<select id="dayOfWeek">
<option value="2">Thứ 2</option>
<option value="3">Thứ 3</option>
<option value="4">Thứ 4</option>
<option value="5">Thứ 5</option>
<option value="6">Thứ 6</option>
<option value="7">Thứ 7</option>
<option value="8">Chủ nhật</option>
</select>
</div>

<div class="form-row">
<label>Giờ bắt đầu</label>
<input type="time" id="startTime">
</div>

<button onclick="createClass()">Lưu lớp</button>

</div>


<!-- DANH SÁCH LỚP -->

<div class="class-grid" id="classGrid"></div>

</div>


<script>

let grades=[]
let subjects=[]
let classes=[]


function toggleForm(){

let form=document.getElementById("createForm")

form.style.display = form.style.display=="block" ? "none":"block"

}


async function loadGrades(){

let res=await fetch("/api/grades")

grades=await res.json()

let select=document.getElementById("gradeSelect")

select.innerHTML=grades.map(g=>
`<option value="${g.id}">${g.name}</option>`
).join("")

}


async function loadSubjects(){

let res=await fetch("/api/subjects")

subjects=await res.json()

filterSubjects()

}


function filterSubjects(){

let gradeId=document.getElementById("gradeSelect").value

let list=subjects.filter(s=>s.grade_id==gradeId)

let select=document.getElementById("subjectSelect")

select.innerHTML=list.map(s=>
`<option value="${s.id}">${s.name}</option>`
).join("")

}

document.getElementById("gradeSelect").addEventListener("change",filterSubjects)



async function loadClasses(){

let res=await fetch("/api/my_classes")

classes=await res.json()

renderClasses()

}


function renderClasses(){

let grid=document.getElementById("classGrid")

grid.innerHTML=classes.map(c=>

`<div class="class-box" onclick="openClass(${c.id})">

<div class="class-title">${c.class_name}</div>

<div class="class-info">
Khối: ${c.grade_name}
</div>

<div class="class-info">
Môn: ${c.subject_name}
</div>

<div class="class-info">
Học phí: ${c.tuition_fee}
</div>

</div>`

).join("")

}


async function createClass(){

let data={
class_name:document.getElementById("className").value,
grade_id:document.getElementById("gradeSelect").value,
subject_id:document.getElementById("subjectSelect").value,
tuition_type:document.getElementById("tuitionType").value,
tuition_fee:document.getElementById("tuitionFee").value,
day_of_week:document.getElementById("dayOfWeek").value,
start_time:document.getElementById("startTime").value
}

await fetch("/api/classes",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify(data)
})

toggleForm()

loadClasses()

}


function openClass(id){

window.location="class_detail.html?id="+id

}


async function init(){

await loadGrades()
await loadSubjects()
await loadClasses()

}

init()

</script>

</body>
</html>
