<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý lớp học</title>

<style>

body{
font-family:Arial;
background:#f5f6fa;
margin:30px;
}

.container{
max-width:1200px;
margin:auto;
}

h2{
margin-bottom:10px;
}

.box-form{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:30px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

label{
display:block;
margin-top:10px;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
}

.lich-row{
display:flex;
gap:10px;
margin-top:10px;
}

.nut{
background:#007bff;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

.nut-them{
background:#28a745;
margin-top:10px;
}

.danh-sach-lop{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

.lop-box{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
cursor:pointer;
}

.lop-box:hover{
transform:scale(1.02);
}

</style>
</head>

<body>

<div class="container">

<h2>Tạo lớp học mới</h2>

<div class="box-form">

<form id="formTaoLop">

<label>Tên lớp</label>
<input type="text" name="ten_lop">

<label>Khối</label>
<select id="chonKhoi"></select>

<label>Môn học</label>
<select id="chonMon"></select>

<label>Loại học phí</label>
<select id="loaiHocPhi">

<option value="theo_buoi">Theo buổi</option>
<option value="theo_khoa">Theo khóa</option>

</select>

<label>Số tiền</label>
<input type="number" name="hoc_phi">

<h3>Lịch học</h3>

<div id="lichHocContainer"></div>

<button type="button" class="nut nut-them" onclick="themLichHoc()">
Thêm buổi học
</button>

<br><br>

<button type="submit" class="nut">
Tạo lớp
</button>

</form>

</div>


<h2>Các lớp tôi quản lý</h2>

<div class="danh-sach-lop" id="danhSachLop">

</div>

</div>


<script>

const lichContainer = document.getElementById("lichHocContainer")

function themLichHoc(){

const row = document.createElement("div")
row.className="lich-row"

row.innerHTML = `

<select name="thu[]">

<option value="1">Thứ 2</option>
<option value="2">Thứ 3</option>
<option value="3">Thứ 4</option>
<option value="4">Thứ 5</option>
<option value="5">Thứ 6</option>
<option value="6">Thứ 7</option>
<option value="7">Chủ nhật</option>

</select>

<input type="time" name="gio_bat_dau[]">

<input type="time" name="gio_ket_thuc[]">

`

lichContainer.appendChild(row)

}

themLichHoc()


/* Demo danh sách lớp */

const dsLop = [

{
id:1,
ten:"Toán 10A",
khoi:"10",
mon:"Toán",
lich:"Thứ 2, Thứ 5 - 18:00"
},

{
id:2,
ten:"Lý 11B",
khoi:"11",
mon:"Vật lý",
lich:"Thứ 3, Thứ 6 - 19:00"
}

]

const danhSachLop = document.getElementById("danhSachLop")

dsLop.forEach(lop=>{

const box=document.createElement("div")
box.className="lop-box"

box.innerHTML=`

<h3>${lop.ten}</h3>
<p>Khối: ${lop.khoi}</p>
<p>Môn: ${lop.mon}</p>
<p>${lop.lich}</p>

`

box.onclick=()=>{

window.location="class_detail.html?id="+lop.id

}

danhSachLop.appendChild(box)

})

</script>

</body>
</html>
