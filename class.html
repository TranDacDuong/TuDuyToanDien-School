<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Class Management</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:30px;
}

.container{
max-width:1200px;
margin:auto;
}

h2{
margin-bottom:10px;
}

.form-box{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:30px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
padding:8px;
margin:5px 0;
width:100%;
}

.schedule-row{
display:flex;
gap:10px;
margin-bottom:10px;
}

.btn{
background:#007bff;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

.btn-add{
background:#28a745;
}

.class-list{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

.class-box{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
cursor:pointer;
}

.class-box:hover{
transform:scale(1.02);
}

.tuition-box{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h2>Create New Class</h2>

<div class="form-box">

<form id="createClassForm">

<label>Class Name</label>
<input type="text" name="class_name">

<label>Grade</label>
<select id="gradeSelect"></select>

<label>Subject</label>
<select id="subjectSelect"></select>

<label>Tuition Type</label>
<select id="tuitionType">

<option value="per_session">Per Session</option>
<option value="per_course">Per Course</option>

</select>

<div class="tuition-box" id="tuitionFeeBox">

<label>Tuition Fee</label>
<input type="number" name="tuition_fee">

</div>

<h3>Schedule</h3>

<div id="scheduleContainer"></div>

<button type="button" class="btn btn-add" onclick="addSchedule()">
Add Schedule
</button>

<br><br>

<button type="submit" class="btn">
Create Class
</button>

</form>

</div>


<h2>Your Classes</h2>

<div class="class-list" id="classList">

<!-- class boxes render here -->

</div>

</div>


<script>

const scheduleContainer = document.getElementById("scheduleContainer")

function addSchedule(){

const row = document.createElement("div")
row.className="schedule-row"

row.innerHTML=`

<select name="weekday[]">

<option value="1">Mon</option>
<option value="2">Tue</option>
<option value="3">Wed</option>
<option value="4">Thu</option>
<option value="5">Fri</option>
<option value="6">Sat</option>
<option value="7">Sun</option>

</select>

<input type="time" name="start_time[]">

<input type="time" name="end_time[]">

`

scheduleContainer.appendChild(row)

}

addSchedule()

document.getElementById("tuitionType").addEventListener("change",function(){

document.getElementById("tuitionFeeBox").style.display="block"

})



/* Demo render classes */

const classes = [

{
name:"Math 10A",
grade:"10",
subject:"Math",
schedule:"Mon, Wed 18:00"
},

{
name:"Physics 11B",
grade:"11",
subject:"Physics",
schedule:"Tue, Thu 19:00"
}

]


const classList=document.getElementById("classList")

classes.forEach(c=>{

const box=document.createElement("div")
box.className="class-box"

box.innerHTML=`

<h3>${c.name}</h3>
<p>Grade: ${c.grade}</p>
<p>Subject: ${c.subject}</p>
<p>${c.schedule}</p>

`

box.onclick=()=>{

window.location="class_detail.html?id="+c.id

}

classList.appendChild(box)

})

</script>

</body>
</html>
