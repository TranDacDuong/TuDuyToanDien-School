<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Title</title>
</head>
<body>
    <script>
        // Initialize Supabase client
        const sb = window.sb;
        sb.auth.onAuthStateChanged(user => {
            if (user) {
                console.log('User is logged in:', user);
            } else {
                console.log('User is not logged in.');
            }
        });

        // Error handling with Supabase
        sb.from('your_table').select('*').then(response => {
            if (response.error) {
                console.error('Error fetching data from sb:', response.error);
            } else {
                console.log('Data:', response.data);
            }
        });
    </script>
</body>
</html>
