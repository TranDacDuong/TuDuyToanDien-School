function getOfficialFamilyKey(user) {
  if (!user?.id || !isStudentOrParentRole(user.role)) return `user:${user?.id || ""}`;
  if (user.role === "parent") return `family:${user.id}`;
  const parents = (_studentParentIds.get(user.id) || []).filter(Boolean).sort();
  return parents.length ? `family:${parents[0]}` : `student:${user.id}`;
}

function shouldRenderOfficialAudienceItem(item) {
  return isMindUpStaffRole(currentProfile?.role) &&
    (item?.isOfficialMindUpChannel || isStudentOrParentRole(item?.users?.role));
}

function officialFamilySortWeight(user) {
  if (user?.role === "parent") return 0;
  if (user?.role === "student") return 1;
  return 2;
}

function sortConversationsByFamily(list) {
  const groupLatest = new Map();
  const groupNames = new Map();
  (list || []).forEach(item => {
    const user = item.users || {};
    const groupKey = shouldRenderOfficialAudienceItem(item) ? getOfficialFamilyKey(user) : `solo:${item.friend_id}`;
    item._familyGroupKey = groupKey;
    const ts = item.lastActivity ? new Date(item.lastActivity).getTime() : 0;
    groupLatest.set(groupKey, Math.max(groupLatest.get(groupKey) || 0, ts));
    const groupName = groupNames.get(groupKey);
    const candidateName = user.role === "parent"
      ? (user.full_name || user.email || "")
      : (groupName || user.full_name || user.email || "");
    if (!groupName || (candidateName && String(candidateName).localeCompare(groupName, "vi") < 0)) {
      groupNames.set(groupKey, candidateName);
    }
  });
  const groupRank = new Map([...groupLatest.keys()]
    .sort((a, b) => {
      const latestA = groupLatest.get(a) || 0;
      const latestB = groupLatest.get(b) || 0;
      if (latestA !== latestB) return latestB - latestA;
      return String(groupNames.get(a) || "").localeCompare(String(groupNames.get(b) || ""), "vi");
    })
    .map((key, index) => [key, index]));
  return (list || []).slice().sort((a, b) => {
    if (a._familyGroupKey !== b._familyGroupKey) {
      return (groupRank.get(a._familyGroupKey) || 0) - (groupRank.get(b._familyGroupKey) || 0);
    }
    const weightA = officialFamilySortWeight(a.users);
    const weightB = officialFamilySortWeight(b.users);
    if (weightA !== weightB) return weightA - weightB;
    const timeA = a.lastActivity ? new Date(a.lastActivity).getTime() : 0;
    const timeB = b.lastActivity ? new Date(b.lastActivity).getTime() : 0;
    if (timeA !== timeB) return timeB - timeA;
    return String(a.users?.full_name || "").localeCompare(String(b.users?.full_name || ""), "vi");
  });
}

function getUniqueGradeLabel(grades) {
  const names = [...new Set((grades || []).map(name => String(name || "").trim()).filter(Boolean))];
  if (!names.length) return "";
  return names
    .map(name => /^khối\s+/i.test(name) ? name : `Khối ${name}`)
    .join(", ");
}

async function prefetchUserContextProfiles(profiles) {
  const relevantProfiles = (profiles || []).filter(profile =>
    profile?.id &&
    (profile.role === "student" || profile.role === "parent") &&
    (
      !_senderContextLoaded.has(profile.id) ||
      (profile.role === "parent" && !_parentChildrenLabels.has(profile.id)) ||
      (profile.role === "student" && !_studentParentIds.has(profile.id))
    )
  );
  if (!relevantProfiles.length) return;

  relevantProfiles.forEach(profile => _senderContextLoaded.add(profile.id));

  const directStudentIds = relevantProfiles
    .filter(profile => profile.role === "student")
    .map(profile => profile.id);
  const parentIds = relevantProfiles
    .filter(profile => profile.role === "parent")
    .map(profile => profile.id);

  const childProfilesById = new Map();
  let parentLinks = [];

  try {
    if (parentIds.length || directStudentIds.length) {
      const links = await fetchMessageFamilyLinks([...parentIds, ...directStudentIds]);
      const linkMap = new Map();
      (links || []).forEach(link => {
        if (link?.parent_id && link?.student_id) linkMap.set(`${link.parent_id}:${link.student_id}`, link);
      });
      parentLinks = [...linkMap.values()];

      const childIds = [...new Set(parentLinks.map(link => link.student_id).filter(Boolean))];
      if (childIds.length) {
        const { data: children, error: childError } = await sb
          .from("users")
          .select("id, full_name, email, role, birth_year")
          .in("id", childIds);
        if (childError) throw childError;
        (children || []).forEach(child => childProfilesById.set(child.id, child));
      }
    }

    const allStudentIds = [...new Set([
      ...directStudentIds,
      ...parentLinks.map(link => link.student_id).filter(Boolean)
    ])];

    if (allStudentIds.length) {
      const { data: classLinks, error: classLinkError } = await sb
        .from("class_students")
        .select("student_id, class_id, left_at")
        .in("student_id", allStudentIds);
      if (classLinkError) throw classLinkError;

      const activeLinks = (classLinks || []).filter(link => !link.left_at);
      const linksForGrade = activeLinks.length ? activeLinks : (classLinks || []);
      const classIds = [...new Set(linksForGrade.map(link => link.class_id).filter(Boolean))];

      if (classIds.length) {
        const { data: classes, error: classError } = await sb
          .from("classes")
          .select("id, grade_id")
          .in("id", classIds);
        if (classError) throw classError;

        const gradeIds = [...new Set((classes || []).map(cls => cls.grade_id).filter(Boolean))];
        const gradeNameById = new Map();
        if (gradeIds.length) {
          const { data: grades, error: gradeError } = await sb
            .from("grades")
            .select("id, name")
            .in("id", gradeIds);
          if (gradeError) throw gradeError;
          (grades || []).forEach(grade => gradeNameById.set(grade.id, grade.name));
        }

        const classGradeById = new Map((classes || []).map(cls => [cls.id, gradeNameById.get(cls.grade_id) || ""]));
        allStudentIds.forEach(studentId => {
          const gradeNames = linksForGrade
            .filter(link => link.student_id === studentId)
            .map(link => classGradeById.get(link.class_id))
            .filter(Boolean);
          const label = getUniqueGradeLabel(gradeNames);
          if (label) _studentGradeLabels.set(studentId, label);
        });
      }
    }

    parentIds.forEach(parentId => {
      const labels = parentLinks
        .filter(link => link.parent_id === parentId)
        .map(link => childProfilesById.get(link.student_id))
        .filter(Boolean)
        .map(child => formatStudentNameWithContext(child));
      _parentChildrenLabels.set(parentId, labels);
    });
  } catch (error) {
    console.warn("Could not load sender context for MindUp chat", error);
  }
}

async function prefetchRealSenderProfiles() {
  const ids = [...new Set(loadedMessages.flatMap(m => [m.real_sender_id, m.sender_id]).filter(Boolean))];
  const missing = ids.filter(id => !_realSenderProfiles.has(id));
  if (!missing.length) return;
  try {
    const { data } = await sb.from('users').select('id,full_name,email,role,birth_year').in('id', missing);
    (data || []).forEach(u => {
      _realSenderProfiles.set(u.id, u);
      _realSenderNames.set(u.id, u.full_name || u.id);
    });
    await prefetchUserContextProfiles(data || []);
    renderLoadedMessages();
  } catch {}
}

// Render markdown **bold** and *italic*
function renderMarkdown(text) {
  if (!text) return '';
  const escaped = esc(text);
  return escaped
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

// Handle evaluation widget click
window.handleEvalOption = async function(sessionId, value, optIdx, totalOpts) {
  // Disable all options
  for(let i=0;i<totalOpts;i++) {
    const el = document.getElementById(`evopt_${sessionId}_${i}`);
    if(el) { el.classList.add('disabled'); el.onclick = null; }
  }
  const selected = document.getElementById(`evopt_${sessionId}_${optIdx}`);
  if(selected) selected.classList.add('selected');
  // Save response
  try {
    await sb.from('session_evaluations').insert({
      session_id: sessionId,
      student_id: currentUser.id,
      response: value,
      responded_at: new Date().toISOString()
    });
  } catch(e) { console.warn('[MindUp Eval]', e); }
  const widget = document.getElementById(`evalWidget_${sessionId}`);
  if(widget) {
    const done = document.createElement('div');
    done.className = 'eval-submitted';
    done.textContent = '✅ Cảm ơn em đã phản hồi!';
    widget.appendChild(done);
  }
};

window.handleMessageAction = function(type, url) {
  const actionType = String(type || "");
  if (actionType === "reply" || actionType === "open_chat") {
    const input = document.getElementById("messageInput");
    if (input) {
      input.disabled = false;
      input.focus();
      input.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }
    return;
  }
  const targetUrl = String(url || "").trim();
  if (!targetUrl) return;
  try {
    if (window.top && window.top !== window && typeof window.top.openDashboardPage === "function") {
      window.top.openDashboardPage(targetUrl, { syncMenu: true, syncMobile: true });
      return;
    }
  } catch (_) {}
  try {
    if (window.parent && window.parent !== window && typeof window.parent.openDashboardPage === "function") {
      window.parent.openDashboardPage(targetUrl, { syncMenu: true, syncMobile: true });
      return;
    }
  } catch (_) {}
  window.location.href = targetUrl;
};

// == Friend list: Pin MindUp at top for student/parent ==
async function ensureMindupInFriendList() {
  const isStudentOrParent = ['student','parent'].includes(currentProfile?.role || '');
  if (!isStudentOrParent) return;
  // Check if MindUp bot is already in allFriends
  if (allFriends.some(f => f.friend_id === MINDUP_BOT_ID)) return;
  // Look up bot conversation
  const directKey = [currentUser.id, MINDUP_BOT_ID].sort().join('_');
  const { data: conv } = await sb.from('conversations').select('id').eq('direct_key', directKey).maybeSingle();
  let previewText = 'Kênh liên hệ thầy cô 📩';
  let lastActivity = null;
  if(conv?.id) {
    const { data: lastMsg } = await sb.from('messages').select('content,created_at').eq('conversation_id', conv.id).order('created_at',{ascending:false}).limit(1).maybeSingle();
    if(lastMsg) { previewText = getMessagePreview(lastMsg.content); lastActivity = lastMsg.created_at; }
  }
  const botEntry = makeConversationListItem({ id: MINDUP_BOT_ID, full_name: 'MindUp - Tư Duy Toàn Diện', avatar_url: 'favicon.png', role: 'bot' }, {
    conversationId: conv?.id || null,
    preview: previewText,
    lastActivity: lastActivity,
    isFriend: false
  });
  allFriends = [botEntry, ...allFriends.filter(f => f.friend_id !== MINDUP_BOT_ID)];
  friendMap.set(MINDUP_BOT_ID, botEntry);
}

// == Override renderFriendList to handle MindUp pinned card ==
const _renderFriendListCore = (list) => {
  const wrap = document.getElementById("friendList");
  const topActions = document.getElementById("friendListTopActions");
  if (!list.length) {
    if (topActions) topActions.innerHTML = "";
    wrap.innerHTML = '<div class="empty"><strong>Không tìm thấy kết quả</strong>Hãy thử tên người dùng khác.</div>';
    return;
  }
  const BOT_ID = MINDUP_BOT_ID;
  const hasKeyword = Boolean(document.getElementById("friendSearch")?.value?.trim());
  const displayLimit = isTrayMode ? TRAY_CONVERSATION_LIMIT : (hasKeyword ? list.length : visibleConversationCount);
  const visibleList = list.slice(0, displayLimit);
  const hasMore = !isTrayMode && !hasKeyword && list.length > visibleList.length;
  if (topActions) topActions.innerHTML = renderFriendListActions(list.length, visibleList.length, hasMore);
  wrap.innerHTML = visibleList.map(item => {
    const isMindUp = item.friend_id === BOT_ID;
    const isLearning = item.isLearningThread;
    const isOfficialAudience = shouldRenderOfficialAudienceItem(item);
    const rawDisplayName = isMindUp
      ? 'MindUp - Tư Duy Toàn Diện'
      : (isOfficialAudience ? getOfficialAudienceDisplayName(item.users) : (item.users?.full_name || 'Người dùng'));
    const nameHtml = renderConversationNameHtml(item, rawDisplayName, isOfficialAudience);
    const avatar = (isMindUp || isLearning) ? 'favicon.png' : (item.users?.avatar_url || 'default-avatar.png');
    const relationLabel = isLearning ? (item.metaName || 'Hồ sơ học tập') : (isMindUp || isOfficialAudience ? '' : (item.isFriend ? 'Bạn bè' : (item.conversationId ? 'Đã nhắn tin' : 'Người dùng')));
    const metaText = (isMindUp || isOfficialAudience) ? "" : `${isLearning ? '🤖 MindUp' : formatRole(item.users?.role || '')} • ${relationLabel}`;
    const preview = item.preview || (item.isSearchResult ? 'Bắt đầu trò chuyện' : 'Chưa có tin nhắn nào');
    const click = isLearning
      ? `openLearningConversation('${escapeJs(item.conversationId)}')`
      : `openConversation('${item.friend_id}', '${escapeJs(rawDisplayName)}', '${escapeJs(avatar)}', '${escapeJs(item.users?.role || '')}')`;
    return `
      <div class="friend-card ${isMindUp || isLearning ? 'mindup-pinned' : ''} ${isOfficialAudience ? 'official-audience' : ''}" id="friend_${item.friend_id}" onclick="${click}">
        <img class="avatar" src="${avatar}" alt="Avatar" onerror="this.src='default-avatar.png'">
        <div class="friend-main">
          <div class="friend-top">
            ${(!isMindUp && !isLearning) ? `<span class="status-dot ${activePresenceIds.has(item.friend_id) ? 'online' : ''}"></span>` : ''}
            <div class="name">${nameHtml}</div>
          </div>
          <div class="meta">${esc(metaText)}</div>
          <div class="preview">${esc(preview)}</div>
          ${item.lastActivity ? `<div class="friend-footer"><span class="friend-time">${esc(formatListTime(item.lastActivity))}</span></div>` : ''}
        </div>
        <div class="friend-badge ${item.unreadCount ? 'show' : ''}">${item.unreadCount > 99 ? '99+' : item.unreadCount || ''}</div>
      </div>
    `;
  }).join('');
};

function renderFriendListActions(total, visible, hasMore) {
  if (isTrayMode) {
    return "";
  }
  if (!hasMore) return "";
  return `
    <div class="friend-list-actions">
      <button class="friend-list-action-btn" type="button" onclick="loadMoreConversations()">Xem thêm 10 đoạn tin nhắn (${visible}/${total})</button>
    </div>
  `;
}

window.loadMoreConversations = function() {
  visibleConversationCount += FULL_CONVERSATION_PAGE_SIZE;
  loadFriends().catch(console.warn);
};

window.openFullMessagesPage = function() {
  const target = "messages.html?v=20260713-message-list9";
  try {
    if (window.top && window.top !== window && typeof window.top.openDashboardPage === "function") {
      window.top.openDashboardPage(target, { syncMenu: true, syncMobile: true });
      return;
    }
  } catch (_) {}
  try {
    if (window.parent && window.parent !== window && typeof window.parent.openDashboardPage === "function") {
      window.parent.openDashboardPage(target, { syncMenu: true, syncMobile: true });
      return;
    }
  } catch (_) {}
  window.open(target, "_blank", "noopener,noreferrer");
};
