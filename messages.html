<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Nhắn tin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-body); background: var(--cream); color: var(--ink); }
.page { height: 100vh; padding: 18px; }
.shell { display: grid; grid-template-columns: 320px minmax(0,1fr); gap: 18px; height: calc(100vh - 36px); }
.panel { background: var(--white); border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow-sm); overflow: hidden; }
.sidebar-head, .chat-head { padding: 18px 20px 14px; border-bottom: 1px solid var(--surface); }
.sidebar-title, .chat-title { font-family: var(--font-display); color: var(--navy); font-size: 1.12rem; }
.sidebar-sub, .chat-sub { margin-top: 4px; color: var(--ink-light); font-size: .78rem; }
.search-wrap { padding: 14px 14px 0; }
.search-input {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
  font-family: var(--font-body);
  font-size: .86rem;
  background: var(--white);
}
.search-input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(200,150,42,.08);
}
.friend-list { padding: 14px; display: flex; flex-direction: column; gap: 10px; max-height: 100%; overflow: auto; }
.friend-card {
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 12px;
  cursor: pointer;
  transition: .15s;
  background: linear-gradient(180deg,#fff 0%,#fbfbfe 100%);
}
.friend-card:hover, .friend-card.active { border-color: var(--gold-border); background: var(--gold-pale); }
.avatar { width: 46px; height: 46px; border-radius: 14px; object-fit: cover; border: 2px solid var(--gold-border); background: var(--surface); }
.name { color: var(--navy); font-weight: 700; font-size: .9rem; }
.meta { color: var(--ink-light); font-size: .78rem; margin-top: 3px; }
.preview {
  color: var(--ink-mid);
  font-size: .78rem;
  margin-top: 4px;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.friend-main { flex: 1; min-width: 0; }
.friend-top { display: flex; gap: 8px; align-items: center; }
.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #cbd5e1;
  flex-shrink: 0;
}
.status-dot.online {
  background: #22c55e;
  box-shadow: 0 0 0 4px rgba(34,197,94,.15);
}
.friend-time {
  margin-left: auto;
  color: var(--ink-light);
  font-size: .72rem;
  white-space: nowrap;
}
.friend-badge {
  display: none;
  min-width: 20px;
  height: 20px;
  padding: 0 6px;
  border-radius: 999px;
  background: #ef4444;
  color: #fff;
  font-size: .72rem;
  font-weight: 700;
  align-items: center;
  justify-content: center;
  margin-top: 8px;
  margin-left: auto;
}
.friend-badge.show { display: inline-flex; }
.chat-panel { display: grid; grid-template-rows: auto 1fr auto; min-height: 0; }
.message-list {
  padding: 18px;
  overflow: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: linear-gradient(180deg,#fafbff 0%,#f8f5ef 100%);
}
.message-row { display: flex; }
.message-row.mine { justify-content: flex-end; }
.bubble {
  max-width: min(76%, 560px);
  padding: 10px 14px;
  border-radius: 16px;
  line-height: 1.6;
  font-size: .88rem;
  border: 1px solid var(--border);
  background: var(--white);
}
.message-row.mine .bubble {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  color: #fff;
  border-color: transparent;
}
.bubble-image {
  display: block;
  max-width: min(100%, 320px);
  border-radius: 12px;
  margin-bottom: 8px;
  border: 1px solid rgba(255,255,255,.18);
}
.bubble-caption {
  white-space: pre-wrap;
  word-break: break-word;
}
.bubble-time { margin-top: 6px; font-size: .72rem; opacity: .75; }
.composer {
  border-top: 1px solid var(--surface);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.composer-row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.composer textarea {
  min-height: 52px;
  max-height: 140px;
  resize: vertical;
  flex: 1;
}
.composer-tools {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.attach-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.hidden-input { display: none; }
.attach-name {
  color: var(--ink-light);
  font-size: .78rem;
}
.image-preview {
  display: none;
  max-width: 180px;
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  background: var(--surface);
}
.image-preview.show { display: block; }
.image-preview img {
  width: 100%;
  height: auto;
  display: block;
}
.empty { padding: 22px; color: var(--ink-light); text-align: center; }
@media (max-width: 860px) {
  .page { padding: 10px; }
  .shell { grid-template-columns: 1fr; height: auto; }
  .panel { min-height: 320px; }
}
</style>
</head>
<body>
<div class="page">
  <div class="shell">
    <aside class="panel">
      <div class="sidebar-head">
        <div class="sidebar-title">Nhắn tin</div>
        <div class="sidebar-sub">Chọn một người bạn để bắt đầu trò chuyện</div>
      </div>
      <div class="search-wrap">
        <input id="friendSearch" class="search-input" placeholder="Tìm bạn bè..." oninput="filterFriends()">
      </div>
      <div id="friendList" class="friend-list">
        <div class="empty">Đang tải danh sách bạn bè...</div>
      </div>
    </aside>

    <section class="panel chat-panel">
      <div class="chat-head">
        <div id="chatTitle" class="chat-title">Chưa chọn cuộc trò chuyện</div>
        <div id="chatSub" class="chat-sub">Hãy chọn một người ở cột bên trái</div>
      </div>
      <div id="messageList" class="message-list">
        <div class="empty">Chưa có cuộc trò chuyện nào được mở.</div>
      </div>
      <div class="composer">
        <div id="imagePreview" class="image-preview">
          <img id="imagePreviewImg" alt="Xem trước ảnh">
        </div>
        <div class="composer-row">
          <textarea id="messageInput" placeholder="Nhập tin nhắn..." disabled></textarea>
          <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()" disabled>Gửi</button>
        </div>
        <div class="composer-tools">
          <div class="attach-wrap">
            <input id="messageImage" class="hidden-input" type="file" accept="image/*" onchange="previewMessageImage()">
            <button class="btn" type="button" id="attachBtn" onclick="document.getElementById('messageImage').click()" disabled>Thêm ảnh</button>
            <button class="btn" type="button" id="clearImageBtn" onclick="clearMessageImage()" disabled>Xóa ảnh</button>
            <span id="attachName" class="attach-name"></span>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script>
let currentUser = null;
let currentProfile = null;
let currentConversationId = null;
let activeFriend = null;
let friendMap = new Map();
let allFriends = [];
let selectedUserFromQuery = null;
let messageChannel = null;
let notificationChannel = null;
let presenceChannel = null;
let presencePingInterval = null;
let activePresenceIds = new Set();

const CHAT_IMAGE_PREFIX = "__CHAT_IMAGE__";
const ACTIVE_WINDOW_MS = 2 * 60 * 1000;

async function createNotification(userId, type, message, refId) {
  if (!userId || userId === currentUser.id) return;
  await sb.from("notifications").insert({
    user_id: userId,
    actor_id: currentUser.id,
    type,
    ref_id: refId || null,
    message
  });
}

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    location.href = "index.html";
    return;
  }

  currentUser = user;
  const { data: profile } = await sb.from("users").select("*").eq("id", user.id).single();
  currentProfile = profile;
  selectedUserFromQuery = new URLSearchParams(location.search).get("user");

  subscribePresence();
  subscribeNotificationChanges();
  await loadFriends();
}

async function loadFriends() {
  const { data, error } = await sb
    .from("friendships")
    .select("friend_id, users!friendships_friend_id_fkey(full_name, avatar_url, role)")
    .eq("user_id", currentUser.id)
    .order("created_at", { ascending: false });

  const wrap = document.getElementById("friendList");
  if (error) {
    wrap.innerHTML = '<div class="empty">Không tải được danh sách bạn bè.</div>';
    return;
  }
  if (!data || !data.length) {
    wrap.innerHTML = '<div class="empty">Bạn chưa có bạn bè nào để nhắn tin.</div>';
    return;
  }

  const enriched = await Promise.all((data || []).map(async item => {
    const directKey = [currentUser.id, item.friend_id].sort().join("_");
    const { data: conversation } = await sb
      .from("conversations")
      .select("id")
      .eq("direct_key", directKey)
      .maybeSingle();

    let preview = "";
    let lastActivity = null;
    let unreadCount = 0;

    if (conversation?.id) {
      const { data: lastMessage } = await sb
        .from("messages")
        .select("content, sender_id, created_at")
        .eq("conversation_id", conversation.id)
        .order("created_at", { ascending: false })
        .limit(1)
        .maybeSingle();

      if (lastMessage?.content) {
        preview = (lastMessage.sender_id === currentUser.id ? "Bạn: " : "") + getMessagePreview(lastMessage.content);
        lastActivity = lastMessage.created_at || null;
      }
    }

    const { count } = await sb
      .from("notifications")
      .select("*", { count: "exact", head: true })
      .eq("user_id", currentUser.id)
      .eq("actor_id", item.friend_id)
      .eq("type", "message_new")
      .eq("is_read", false);

    unreadCount = count || 0;

    return { ...item, preview, lastActivity, unreadCount };
  }));

  enriched.sort((a, b) => {
    const timeA = a.lastActivity ? new Date(a.lastActivity).getTime() : 0;
    const timeB = b.lastActivity ? new Date(b.lastActivity).getTime() : 0;
    if (timeA !== timeB) return timeB - timeA;
    return String(a.users?.full_name || "").localeCompare(String(b.users?.full_name || ""), "vi");
  });

  allFriends = enriched;
  friendMap = new Map(enriched.map(item => [item.friend_id, item]));
  renderFriendList(getFilteredFriendList());

  if (activeFriend?.id) {
    document.getElementById("friend_" + activeFriend.id)?.classList.add("active");
  }

  const selectedUserId = !currentConversationId ? selectedUserFromQuery : null;
  if (selectedUserId && friendMap.has(selectedUserId)) {
    const item = friendMap.get(selectedUserId);
    selectedUserFromQuery = null;
    openConversation(
      selectedUserId,
      item.users?.full_name || "Người dùng",
      item.users?.avatar_url || "default-avatar.png",
      item.users?.role || ""
    );
  }
}

function renderFriendList(list) {
  const wrap = document.getElementById("friendList");
  if (!list.length) {
    wrap.innerHTML = '<div class="empty">Không tìm thấy người phù hợp.</div>';
    return;
  }

  wrap.innerHTML = list.map(item => `
    <div class="friend-card" id="friend_${item.friend_id}" onclick="openConversation('${item.friend_id}', '${escapeJs(item.users?.full_name || "Người dùng")}', '${escapeJs(item.users?.avatar_url || "default-avatar.png")}', '${escapeJs(item.users?.role || "")}')">
      <img class="avatar" src="${item.users?.avatar_url || "default-avatar.png"}" alt="Avatar" onerror="this.src='default-avatar.png'">
      <div class="friend-main">
        <div class="friend-top">
          <span class="status-dot ${activePresenceIds.has(item.friend_id) ? "online" : ""}"></span>
          <div class="name">${esc(item.users?.full_name || "Người dùng")}</div>
          <div class="friend-time">${item.lastActivity ? esc(formatListTime(item.lastActivity)) : ""}</div>
        </div>
        <div class="meta">${esc(formatRole(item.users?.role || ""))}</div>
        <div class="preview">${esc(item.preview || "Chưa có tin nhắn nào")}</div>
      </div>
      <div class="friend-badge ${item.unreadCount ? "show" : ""}">${item.unreadCount > 99 ? "99+" : item.unreadCount || ""}</div>
    </div>
  `).join("");
}

window.filterFriends = function() {
  renderFriendList(getFilteredFriendList());
  if (activeFriend?.id) {
    document.getElementById("friend_" + activeFriend.id)?.classList.add("active");
  }
};

window.openConversation = async function(friendId, friendName, friendAvatar, friendRole) {
  document.querySelectorAll(".friend-card").forEach(el => el.classList.remove("active"));
  document.getElementById("friend_" + friendId)?.classList.add("active");

  activeFriend = { id: friendId, name: friendName, avatar: friendAvatar, role: friendRole };
  document.getElementById("chatTitle").textContent = friendName;
  document.getElementById("chatSub").textContent = buildChatSub(friendId, friendRole);
  document.getElementById("messageInput").disabled = false;
  document.getElementById("sendBtn").disabled = false;
  document.getElementById("attachBtn").disabled = false;
  document.getElementById("clearImageBtn").disabled = false;

  currentConversationId = await ensureConversation(friendId);
  await markMessageNotificationsRead(friendId);
  await loadMessages();
  await loadFriends();
  subscribeConversationMessages(currentConversationId);
};

async function markMessageNotificationsRead(friendId) {
  if (!friendId) return;
  await sb
    .from("notifications")
    .update({ is_read: true })
    .eq("user_id", currentUser.id)
    .eq("actor_id", friendId)
    .eq("type", "message_new")
    .eq("is_read", false);
}

async function ensureConversation(friendId) {
  const directKey = [currentUser.id, friendId].sort().join("_");

  const { data: existing } = await sb
    .from("conversations")
    .select("id")
    .eq("direct_key", directKey)
    .maybeSingle();

  if (existing?.id) return existing.id;

  const { data: conversation, error } = await sb
    .from("conversations")
    .insert({ kind: "direct", direct_key: directKey })
    .select("id")
    .single();

  if (error) {
    const { data: retry } = await sb
      .from("conversations")
      .select("id")
      .eq("direct_key", directKey)
      .maybeSingle();
    if (retry?.id) return retry.id;
    throw error;
  }

  await sb.from("conversation_members").upsert([
    { conversation_id: conversation.id, user_id: currentUser.id },
    { conversation_id: conversation.id, user_id: friendId }
  ], { onConflict: "conversation_id,user_id" });

  return conversation.id;
}

function subscribeConversationMessages(conversationId) {
  if (messageChannel) {
    sb.removeChannel(messageChannel);
    messageChannel = null;
  }
  if (!conversationId) return;

  messageChannel = sb
    .channel("messages:" + conversationId)
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "messages", filter: "conversation_id=eq." + conversationId },
      async () => {
        await loadMessages();
        await loadFriends();
      }
    )
    .subscribe();
}

function subscribeNotificationChanges() {
  if (notificationChannel) {
    sb.removeChannel(notificationChannel);
    notificationChannel = null;
  }

  notificationChannel = sb
    .channel("message-notifications:" + currentUser.id)
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "notifications", filter: "user_id=eq." + currentUser.id },
      async () => {
        await loadFriends();
      }
    )
    .subscribe();
}

function subscribePresence() {
  if (presenceChannel) {
    sb.removeChannel(presenceChannel);
    presenceChannel = null;
  }
  if (presencePingInterval) {
    clearInterval(presencePingInterval);
    presencePingInterval = null;
  }

  presenceChannel = sb.channel("chat-presence", {
    config: { presence: { key: currentUser.id } }
  });

  const syncPresence = () => {
    const state = presenceChannel.presenceState();
    const next = new Set();

    Object.entries(state).forEach(([id, entries]) => {
      const latest = Array.isArray(entries) ? entries[entries.length - 1] : null;
      if (!latest?.online_at) return;
      if (Date.now() - new Date(latest.online_at).getTime() <= ACTIVE_WINDOW_MS) {
        next.add(id);
      }
    });

    activePresenceIds = next;
    renderFriendList(getFilteredFriendList());
    if (activeFriend?.id) {
      document.getElementById("friend_" + activeFriend.id)?.classList.add("active");
      document.getElementById("chatSub").textContent = buildChatSub(activeFriend.id, activeFriend.role);
    }
  };

  presenceChannel
    .on("presence", { event: "sync" }, syncPresence)
    .subscribe(async status => {
      if (status === "SUBSCRIBED") {
        await refreshPresence();
      }
    });

  presencePingInterval = setInterval(refreshPresence, 45000);
}

async function refreshPresence() {
  if (!presenceChannel) return;
  await presenceChannel.track({
    user_id: currentUser.id,
    online_at: new Date().toISOString()
  });
}

async function loadMessages() {
  if (!currentConversationId) return;

  const { data, error } = await sb
    .from("messages")
    .select("id, content, created_at, sender_id")
    .eq("conversation_id", currentConversationId)
    .order("created_at", { ascending: true });

  const wrap = document.getElementById("messageList");
  if (error) {
    wrap.innerHTML = '<div class="empty">Không tải được tin nhắn.</div>';
    return;
  }
  if (!data || !data.length) {
    wrap.innerHTML = '<div class="empty">Chưa có tin nhắn nào. Hãy gửi lời chào đầu tiên.</div>';
    return;
  }

  wrap.innerHTML = data.map(item => `
    <div class="message-row ${item.sender_id === currentUser.id ? "mine" : ""}">
      <div class="bubble">
        ${renderMessageBody(item.content)}
        <div class="bubble-time">${formatTime(item.created_at)}</div>
      </div>
    </div>
  `).join("");
  wrap.scrollTop = wrap.scrollHeight;
}

window.sendMessage = async function() {
  const input = document.getElementById("messageInput");
  const imageInput = document.getElementById("messageImage");
  const imageFile = imageInput.files?.[0];
  const text = input.value.trim();

  if ((!text && !imageFile) || !currentConversationId) return;

  let content = text;
  if (imageFile) {
    content = await uploadChatImage(imageFile, text);
    if (!content) return;
  }

  const { error } = await sb.from("messages").insert({
    conversation_id: currentConversationId,
    sender_id: currentUser.id,
    content
  });

  if (error) {
    alert("Không gửi được tin nhắn: " + error.message);
    return;
  }

  if (activeFriend?.id) {
    await createNotification(
      activeFriend.id,
      "message_new",
      (currentProfile?.full_name || currentUser.email || "Một người dùng") + " đã gửi cho bạn một tin nhắn mới.",
      currentConversationId
    );
  }

  input.value = "";
  clearMessageImage();
  await loadFriends();
  await loadMessages();
};

window.previewMessageImage = function() {
  const input = document.getElementById("messageImage");
  const file = input.files?.[0];
  const preview = document.getElementById("imagePreview");
  const img = document.getElementById("imagePreviewImg");
  const name = document.getElementById("attachName");

  if (!file) {
    preview.classList.remove("show");
    img.src = "";
    name.textContent = "";
    return;
  }

  name.textContent = file.name;
  const reader = new FileReader();
  reader.onload = function(event) {
    img.src = event.target.result;
    preview.classList.add("show");
  };
  reader.readAsDataURL(file);
};

window.clearMessageImage = function() {
  document.getElementById("messageImage").value = "";
  document.getElementById("attachName").textContent = "";
  document.getElementById("imagePreview").classList.remove("show");
  document.getElementById("imagePreviewImg").src = "";
};

async function uploadChatImage(file, caption) {
  const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
  const path = currentUser.id + "/" + Date.now() + "-" + Math.random().toString(36).slice(2) + "." + ext;
  const { error } = await sb.storage.from("chat-media").upload(path, file);
  if (error) {
    alert("Không upload được ảnh chat: " + error.message);
    return null;
  }

  const { data } = sb.storage.from("chat-media").getPublicUrl(path);
  return CHAT_IMAGE_PREFIX + JSON.stringify({
    url: data.publicUrl,
    caption: caption || ""
  });
}

window.addEventListener("beforeunload", () => {
  if (messageChannel) sb.removeChannel(messageChannel);
  if (notificationChannel) sb.removeChannel(notificationChannel);
  if (presenceChannel) sb.removeChannel(presenceChannel);
  if (presencePingInterval) clearInterval(presencePingInterval);
});

document.getElementById("messageInput").addEventListener("keydown", function(event) {
  if (event.key === "Enter" && !event.shiftKey) {
    event.preventDefault();
    sendMessage();
  }
});

function formatTime(value) {
  return new Date(value).toLocaleString("vi-VN", {
    day: "2-digit",
    month: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function formatListTime(value) {
  return new Date(value).toLocaleString("vi-VN", {
    day: "2-digit",
    month: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function formatRole(role) {
  if (role === "admin") return "Quản trị viên";
  if (role === "teacher") return "Giáo viên";
  if (role === "student") return "Học sinh";
  return "Thành viên";
}

function buildChatSub(friendId, friendRole) {
  const roleText = formatRole(friendRole);
  if (activePresenceIds.has(friendId)) return roleText + " • Đang hoạt động";
  return roleText + " • Hoạt động gần đây";
}

function getFilteredFriendList() {
  const keyword = document.getElementById("friendSearch")?.value?.trim().toLowerCase() || "";
  if (!keyword) return allFriends;
  return allFriends.filter(item =>
    String(item.users?.full_name || "").toLowerCase().includes(keyword) ||
    String(formatRole(item.users?.role || "")).toLowerCase().includes(keyword)
  );
}

function parseMessageContent(value) {
  const text = String(value || "");
  if (!text.startsWith(CHAT_IMAGE_PREFIX)) {
    return { type: "text", text };
  }

  try {
    const payload = JSON.parse(text.slice(CHAT_IMAGE_PREFIX.length));
    return { type: "image", url: payload.url || "", caption: payload.caption || "" };
  } catch {
    return { type: "text", text };
  }
}

function renderMessageBody(value) {
  const payload = parseMessageContent(value);
  if (payload.type !== "image") {
    return `<div class="bubble-caption">${esc(payload.text)}</div>`;
  }

  const caption = payload.caption ? `<div class="bubble-caption">${esc(payload.caption)}</div>` : "";
  return `
    <img class="bubble-image" src="${esc(payload.url)}" alt="Ảnh chat">
    ${caption}
  `;
}

function getMessagePreview(value) {
  const payload = parseMessageContent(value);
  if (payload.type !== "image") return payload.text;
  return payload.caption ? "[Ảnh] " + payload.caption : "[Ảnh]";
}

function esc(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function escapeJs(value) {
  return String(value || "")
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'");
}

init();
</script>
</body>
</html>
