```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý hệ thống</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:#f1f5f9;
margin:0;
padding:40px;
color:#0f172a;
}

h2{margin-bottom:25px;font-weight:600;}

.tabs{
display:flex;
gap:10px;
margin-bottom:25px;
}

.tab{
padding:10px 16px;
background:white;
border-radius:8px;
cursor:pointer;
border:1px solid #e2e8f0;
}

.tab.active{
background:#2563eb;
color:white;
}

.container{
display:grid;
grid-template-columns:420px 1fr;
gap:30px;
}

.card{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

label{
font-size:14px;
color:#475569;
font-weight:500;
}

input,select{
width:100%;
padding:11px;
margin-top:6px;
margin-bottom:16px;
border:1px solid #e2e8f0;
border-radius:8px;
font-size:14px;
background:#fafafa;
}

input:focus,select:focus{
outline:none;
border-color:#2563eb;
background:white;
}

button{
background:#2563eb;
color:white;
border:none;
padding:11px 16px;
border-radius:8px;
cursor:pointer;
font-weight:500;
}

button:hover{background:#1d4ed8;}

.delete{
background:#ef4444;
}

.delete:hover{
background:#dc2626;
}

.table-card{
background:white;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:14px 16px;
border-bottom:1px solid #f1f5f9;
font-size:14px;
}

th{
background:#f8fafc;
text-align:left;
}

.actions button{
padding:6px 10px;
margin-right:6px;
font-size:13px;
}

.hidden{display:none;}

</style>
</head>

<body>

<h2>Quản lý hệ thống</h2>

<div class="tabs">
<div class="tab active" onclick="switchTab(event,'rooms')">Phòng học</div>
<div class="tab" onclick="switchTab(event,'grades')">Khối</div>
<div class="tab" onclick="switchTab(event,'subjects')">Môn học</div>
<div class="tab" onclick="switchTab(event,'chapters')">Chương</div>
</div>


<!-- PHÒNG -->

<div id="rooms" class="container">

<div class="card">

<input type="hidden" id="roomId">

<label>Tên phòng</label>
<input id="roomName">

<label>Sức chứa</label>
<input id="roomCapacity" type="number">

<button onclick="saveRoom()">Lưu</button>

</div>

<div class="table-card">

<table>
<thead>
<tr>
<th>Tên phòng</th>
<th>Sức chứa</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="roomTable"></tbody>

</table>

</div>

</div>


<!-- KHỐI -->

<div id="grades" class="container hidden">

<div class="card">

<input type="hidden" id="gradeId">

<label>Tên khối</label>
<input id="gradeName">

<button onclick="saveGrade()">Lưu</button>

</div>

<div class="table-card">

<table>

<thead>
<tr>
<th>Khối</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="gradeTable"></tbody>

</table>

</div>

</div>


<!-- MÔN -->

<div id="subjects" class="container hidden">

<div class="card">

<input type="hidden" id="subjectId">

<label>Khối</label>
<select id="subjectGrade"></select>

<label>Tên môn</label>
<input id="subjectName">

<button onclick="saveSubject()">Lưu</button>

</div>

<div class="table-card">

<table>

<thead>
<tr>
<th>Khối</th>
<th>Môn học</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="subjectTable"></tbody>

</table>

</div>

</div>


<!-- CHƯƠNG -->

<div id="chapters" class="container hidden">

<div class="card">

<input type="hidden" id="chapterId">

<label>Khối</label>
<select id="chapterGrade"></select>

<label>Môn học</label>
<select id="chapterSubject"></select>

<label>Tên chương</label>
<input id="chapterName">

<button onclick="saveChapter()">Lưu</button>

</div>

<div class="table-card">

<table>

<thead>
<tr>
<th>Khối</th>
<th>Môn</th>
<th>Chương</th>
<th></th>
</tr>
</thead>

<tbody id="chapterTable"></tbody>

</table>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<script>

/* TAB */

function switchTab(event,id){

document.querySelectorAll(".container")
.forEach(e=>e.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

document.querySelectorAll(".tab")
.forEach(e=>e.classList.remove("active"))

event.target.classList.add("active")

}

init()

async function init(){

loadRooms()
loadGrades()
loadSubjects()
loadChapters()
loadDropdowns()

}

/* PHÒNG */

async function loadRooms(){

const {data}=await sb
.from("rooms")
.select("*")
.order("room_name",{ascending:true})

let html=""

for(const r of data){

html+=`
<tr>
<td>${r.room_name}</td>
<td>${r.capacity ?? ""}</td>
<td class="actions">
<button onclick="editRoom('${r.id}','${r.room_name}','${r.capacity}')">Sửa</button>
<button class="delete" onclick="deleteRoom('${r.id}')">Xóa</button>
</td>
</tr>
`
}

roomTable.innerHTML=html

}

async function saveRoom(){

const id=roomId.value
const name=roomName.value
const capacity=parseInt(roomCapacity.value)||0

if(id){

await sb.from("rooms")
.update({room_name:name,capacity})
.eq("id",id)

}else{

await sb.from("rooms")
.insert({room_name:name,capacity})

}

roomId.value=""
roomName.value=""
roomCapacity.value=""

loadRooms()

}

function editRoom(id,name,capacity){

roomId.value=id
roomName.value=name
roomCapacity.value=capacity

}

async function deleteRoom(id){

if(!confirm("Xóa phòng?")) return

await sb.from("rooms").delete().eq("id",id)

loadRooms()

}

/* KHỐI */

async function loadGrades(){

const {data}=await sb.from("grades").select("*")

data.sort((a,b)=>parseInt(a.name)-parseInt(b.name))

let html=""

for(const g of data){

html+=`
<tr>
<td>${g.name}</td>
<td class="actions">
<button onclick="editGrade('${g.id}','${g.name}')">Sửa</button>
<button class="delete" onclick="deleteGrade('${g.id}')">Xóa</button>
</td>
</tr>
`
}

gradeTable.innerHTML=html

}

async function saveGrade(){

const id=gradeId.value
const name=gradeName.value.trim()

if(id){

await sb.from("grades").update({name}).eq("id",id)

}else{

await sb.from("grades").insert({name})

}

gradeId.value=""
gradeName.value=""

loadGrades()
loadDropdowns()

}

function editGrade(id,name){

gradeId.value=id
gradeName.value=name

}

async function deleteGrade(id){

if(!confirm("Xóa khối?")) return

await sb.from("grades").delete().eq("id",id)

loadGrades()
loadDropdowns()

}

/* MÔN */

async function loadSubjects(){

const {data}=await sb
.from("subjects")
.select("id,name,grade_id,grades(name)")

data.sort((a,b)=>{

const g1=parseInt(a.grades?.name||0)
const g2=parseInt(b.grades?.name||0)

if(g1!==g2) return g1-g2

return a.name.localeCompare(b.name)

})

let html=""

for(const s of data){

html+=`
<tr>
<td>${s.grades?.name}</td>
<td>${s.name}</td>
<td class="actions">
<button onclick="editSubject('${s.id}','${s.name}','${s.grade_id}')">Sửa</button>
<button class="delete" onclick="deleteSubject('${s.id}')">Xóa</button>
</td>
</tr>
`
}

subjectTable.innerHTML=html

}

async function saveSubject(){

const id=subjectId.value
const name=subjectName.value
const grade_id=subjectGrade.value

if(id){

await sb.from("subjects")
.update({name,grade_id})
.eq("id",id)

}else{

await sb.from("subjects")
.insert({name,grade_id})

}

subjectId.value=""
subjectName.value=""

loadSubjects()
loadDropdowns()

}

function editSubject(id,name,grade){

subjectId.value=id
subjectName.value=name
subjectGrade.value=grade

}

async function deleteSubject(id){

if(!confirm("Xóa môn?")) return

await sb.from("subjects").delete().eq("id",id)

loadSubjects()

}

/* CHƯƠNG */

async function loadChapters(){

const {data}=await sb
.from("chapters")
.select("id,name,subjects(id,name,grades(name))")

data.sort((a,b)=>{

const g1=parseInt(a.subjects?.grades?.name||0)
const g2=parseInt(b.subjects?.grades?.name||0)

if(g1!==g2) return g1-g2

const s1=a.subjects?.name||""
const s2=b.subjects?.name||""

if(s1!==s2) return s1.localeCompare(s2)

return a.name.localeCompare(b.name)

})

let html=""

for(const c of data){

html+=`
<tr>
<td>${c.subjects?.grades?.name}</td>
<td>${c.subjects?.name}</td>
<td>${c.name}</td>
<td class="actions">
<button onclick="editChapter('${c.id}','${c.name}','${c.subjects?.id}')">Sửa</button>
<button class="delete" onclick="deleteChapter('${c.id}')">Xóa</button>
</td>
</tr>
`
}

chapterTable.innerHTML=html

}

async function saveChapter(){

const id=chapterId.value
const subject_id=chapterSubject.value
const name=chapterName.value

if(id){

await sb.from("chapters")
.update({subject_id,name})
.eq("id",id)

}else{

await sb.from("chapters")
.insert({subject_id,name})

}

chapterId.value=""
chapterName.value=""

loadChapters()

}

function editChapter(id,name,subject){

chapterId.value=id
chapterName.value=name
chapterSubject.value=subject

}

async function deleteChapter(id){

if(!confirm("Xóa chương?")) return

await sb.from("chapters").delete().eq("id",id)

loadChapters()

}

/* DROPDOWN */

async function loadDropdowns(){

const {data:grades}=await sb.from("grades").select("*")

grades.sort((a,b)=>parseInt(a.name)-parseInt(b.name))

chapterGrade.innerHTML=grades.map(g=>`<option value="${g.id}">${g.name}</option>`).join("")
subjectGrade.innerHTML=chapterGrade.innerHTML

loadSubjectsByGrade()

}

chapterGrade.onchange=async ()=>{

await loadSubjectsByGrade()
filterChapters()

}

chapterSubject.onchange=filterChapters

async function loadSubjectsByGrade(){

const grade_id=chapterGrade.value

const {data}=await sb
.from("subjects")
.select("*")
.eq("grade_id",grade_id)

chapterSubject.innerHTML=data
.map(s=>`<option value="${s.id}">${s.name}</option>`)
.join("")

}

/* FILTER CHAPTER */

function filterChapters(){

const grade=chapterGrade.options[chapterGrade.selectedIndex].text
const subject=chapterSubject.options[chapterSubject.selectedIndex]?.text

const rows=document.querySelectorAll("#chapterTable tr")

rows.forEach(r=>{

const g=r.children[0].innerText
const s=r.children[1].innerText

let show=true

if(grade && g!==grade) show=false
if(subject && s!==subject) show=false

r.style.display=show?"":"none"

})

}

</script>

</body>
</html>
```
