<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản lý phòng học</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>   
    body { font-family: Arial; margin: 0; background: #f3f4f6; }
    header { background: #1f2937; color: white; padding: 15px; }
    main { padding: 20px; }
    input, button { padding: 8px; margin-right: 5px; }
    button { cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background: #e5e7eb; }
    .danger { background: red; color: white; }
    
    /* CSS đẹp hơn cho button */
  button{
    border:none;
    padding:6px 12px;
    border-radius:5px;
    background:#2563eb;
    color:white;
  }

  button:hover{
    opacity:0.8;
  }
    #toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#333;
  color:white;
  padding:12px 20px;
  border-radius:6px;
  opacity:0;
  transition:0.3s;
}

#toast.show{
  opacity:1;
}

.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:white;
  padding:20px;
  border-radius:8px;
  text-align:center;
}

.popup-content button{
  margin:10px;
  padding:8px 15px;
}
  </style>
</head>
<body>

<header>
  <h2>🏛️ Quản lý phòng học</h2>
</header>
  
<main>
  <h3>Tổng số phòng: <span id="roomCount">0</span></h3>

  <div id="form-area">
  <input type="text" id="roomName" placeholder="Tên phòng học">

  <input type="number" id="roomCapacity" placeholder="Sức chứa">

  <button id="saveBtn" onclick="saveRoom()">Thêm phòng</button>
</div>

  <table>
   <thead>
  <tr>
    <th>Tên phòng</th>
    <th>Sức chứa</th>
    <th>Hành động</th>
  </tr>
</thead>
    <tbody id="roomTable"></tbody>
  </table>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script>

  let currentUser = null;
  let currentRole = null;
  let editingRoomId = null;
  let deletingRoomId = null;
 async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;
  
  const { data: profile } = await sb
    .from("users")
    .select("role")
    .eq("id", user.id)
    .single();

  if (!profile) {
    alert("Không tìm thấy quyền người dùng");
    return;
  }

  currentRole = profile.role;

  // 🔥 CHỈ ADMIN ĐƯỢC VÀO
  if (currentRole !== "admin") {
  document.getElementById("form-area").style.display = "none";
  }
  if (currentRole !== "admin") {
    alert("Bạn không có quyền truy cập trang này");
    window.location.href = "dashboard.html";
    return;
  }

  loadRooms();
}

  async function loadRooms() {
  const { data, error } = await sb
    .from("rooms")
    .select("*")
  .order("room_name", { ascending: true });
  renderRooms(data);
  document.getElementById("roomCount").innerText = data.length;
  if (error) {
    console.error(error);
    return;
  }

  const table = document.getElementById("roomTable");
  table.innerHTML = "";

  data.forEach(room => {
    const row = document.createElement("tr");

    row.innerHTML = `
  <td>${room.room_name}</td>
  <td>${room.capacity ?? "-"}</td>
  <td>
    <button onclick="editRoom('${room.id}','${room.room_name}',${room.capacity})">
      Sửa
    </button>

    <button class="danger" onclick="openDeletePopup('${room.id}')">
  Xóa
</button>
  </td>
`;

    table.appendChild(row);
  });
}

function openDeletePopup(id){
  deletingRoomId = id;
  document.getElementById("confirmPopup").style.display="flex";
}

  function closePopup(){
  document.getElementById("confirmPopup").style.display="none";
}

  async function confirmDelete(){

  await supabase
    .from("rooms")
    .delete()
    .eq("id",deletingRoomId);

  closePopup();

  showToast("Đã xóa phòng");

  loadRooms();

}
  
  function showToast(message){

  const toast = document.getElementById("toast");

  toast.innerText = message;
  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  },2000);

}
  
function editRoom(id, name, capacity){

  editingRoomId = id;

  document.getElementById("roomName").value = name;
  document.getElementById("roomCapacity").value = capacity ?? 0;

  document.getElementById("saveBtn").innerText = "Cập nhật";

}
  async function saveRoom(){

  if (currentRole !== "admin") {
    alert("Không có quyền");
    return;
  }

  const name = document.getElementById("roomName").value.trim();
  const capacity = parseInt(document.getElementById("roomCapacity").value) || 0;

  if (!name){
    alert("Nhập tên phòng");
    return;
  }

  // CREATE
  if(!editingRoomId){

    const { error } = await sb
      .from("rooms")
      .insert({
        room_name: name,
        capacity: capacity,
        note: "",
        created_by: currentUser.id
      });

    if(error){
      console.error(error);
      alert("Lỗi khi thêm phòng");
      return;
    }
showToast("Thêm phòng thành công");
  }

  // UPDATE
  else{

    const { error } = await sb
      .from("rooms")
      .update({
        room_name: name,
        capacity: capacity
      })
      .eq("id", editingRoomId);

    if(error){
      console.error(error);
      alert("Lỗi khi cập nhật");
      return;
    }
showToast("Cập nhật phòng thành công");
    editingRoomId = null;
    document.getElementById("saveBtn").innerText = "Thêm phòng";

  }

  document.getElementById("roomName").value = "";
  document.getElementById("roomCapacity").value = "";

  loadRooms();
}

  async function deleteRoom(id) {
    if (currentRole !== "admin") {
  alert("Không có quyền");
  return;
}
    if (!confirm("Xóa phòng này?")) return;

    const { error } = await sb
      .from("rooms")
      .delete()
      .eq("id", id);

    if (error) {
      console.error(error);
      alert("Lỗi khi xóa");
      return;
    }

    loadRooms();
  }
  init();
</script>
<div id="toast"></div>

<div id="confirmPopup" class="popup">
  <div class="popup-content">
    <p>Bạn có chắc muốn xóa phòng này?</p>
    <button onclick="confirmDelete()">Xóa</button>
    <button onclick="closePopup()">Hủy</button>
  </div>
</div>
</body>
</html>
