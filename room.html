<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý hệ thống</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:#f1f5f9;
margin:0;
padding:40px;
color:#0f172a;
}

h2{margin-bottom:25px;font-weight:600;}

.tabs{
display:flex;
gap:10px;
margin-bottom:25px;
}

.tab{
padding:10px 16px;
background:white;
border-radius:8px;
cursor:pointer;
border:1px solid #e2e8f0;
}

.tab.active{
background:#2563eb;
color:white;
}

.container{
display:grid;
grid-template-columns:420px 1fr;
gap:30px;
}

.card{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

label{
font-size:14px;
color:#475569;
font-weight:500;
}

input,select{
width:100%;
padding:11px;
margin-top:6px;
margin-bottom:16px;
border:1px solid #e2e8f0;
border-radius:8px;
font-size:14px;
background:#fafafa;
}

input:focus,select:focus{
outline:none;
border-color:#2563eb;
background:white;
}

button{
background:#2563eb;
color:white;
border:none;
padding:11px 16px;
border-radius:8px;
cursor:pointer;
font-weight:500;
}

button:hover{background:#1d4ed8;}

.delete{
background:#ef4444;
}

.delete:hover{
background:#dc2626;
}

.table-card{
background:white;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:14px 16px;
border-bottom:1px solid #f1f5f9;
font-size:14px;
}

th{
background:#f8fafc;
text-align:left;
}

.actions button{
padding:6px 10px;
margin-right:6px;
font-size:13px;
}

.hidden{display:none;}

</style>
</head>

<body>

<h2>Quản lý hệ thống</h2>

<div class="tabs">
<div class="tab active" onclick="switchTab(event,'rooms')">Phòng học</div>
<div class="tab" onclick="switchTab(event,'grades')">Khối</div>
<div class="tab" onclick="switchTab(event,'subjects')">Môn học</div>
<div class="tab" onclick="switchTab(event,'chapters')">Chương</div>
</div>

<!-- PHÒNG -->

<div id="rooms" class="container">

<div class="card">

<input type="hidden" id="roomId">

<label>Tên phòng</label>
<input id="roomName">

<label>Sức chứa</label>
<input id="roomCapacity" type="number">

<button onclick="saveRoom()">Lưu</button>

</div>

<div class="table-card">

<table>
<thead>
<tr>
<th>Tên phòng</th>
<th>Sức chứa</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="roomTable"></tbody>

</table>

</div>

</div>

<!-- KHỐI -->

<div id="grades" class="container hidden">

<div class="card">

<input type="hidden" id="gradeId">

<label>Tên khối</label>
<input id="gradeName">

<button onclick="saveGrade()">Lưu</button>

</div>

<div class="table-card">

<table>
<thead>
<tr>
<th>Khối</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="gradeTable"></tbody>

</table>

</div>

</div>

<!-- MÔN -->

<div id="subjects" class="container hidden">

<div class="card">

<input type="hidden" id="subjectId">

<label>Khối</label>
<select id="subjectGrade"></select>

<label>Tên môn</label>
<input id="subjectName">

<button onclick="saveSubject()">Lưu</button>

</div>

<div class="table-card">

<table>
<thead>
<tr>
<th>Khối</th>
<th>Môn</th>
<th></th>
</tr>
</thead>

<tbody id="subjectTable"></tbody>

</table>

</div>

</div>

<!-- CHƯƠNG -->

<div id="chapters" class="container hidden">

<div class="card">

<input type="hidden" id="chapterId">

<label>Khối</label>
<select id="chapterGrade"></select>

<label>Môn</label>
<select id="chapterSubject"></select>

<label>Tên chương</label>
<input id="chapterName">

<button onclick="saveChapter()">Lưu</button>

</div>

<div class="table-card">

<table>
<thead>
<tr>
<th>Khối</th>
<th>Môn</th>
<th>Chương</th>
<th></th>
</tr>
</thead>

<tbody id="chapterTable"></tbody>

</table>

</div>

</div>

<script src="supabaseClient.js"></script>

<script>

/* CACHE */

let rooms=[]
let grades=[]
let subjects=[]
let chapters=[]

/* TAB */

function switchTab(event,id){

document.querySelectorAll(".container")
.forEach(e=>e.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

document.querySelectorAll(".tab")
.forEach(e=>e.classList.remove("active"))

event.target.classList.add("active")

}

/* INIT */

init()

async function init(){

await loadAll()
renderAll()
loadDropdowns()

}

/* LOAD DATABASE */

async function loadAll(){

const r=await sb.from("rooms").select("*")
rooms=r.data||[]

const g=await sb.from("grades").select("*")
grades=g.data||[]

const s=await sb.from("subjects").select("*,grades(name)")
subjects=s.data||[]

const c=await sb.from("chapters").select("*,subjects(id,name,grades(name,id))")
chapters=c.data||[]

}

/* RENDER */

function renderAll(){

renderRooms()
renderGrades()
renderSubjects()
renderChapters()

}

/* ROOMS */

function renderRooms(){

rooms.sort((a,b)=>a.room_name.localeCompare(b.room_name))

roomTable.innerHTML=rooms.map(r=>`
<tr>
<td>${r.room_name}</td>
<td>${r.capacity||""}</td>
<td class="actions">
<button onclick="editRoom('${r.id}')">Sửa</button>
<button class="delete" onclick="deleteRoom('${r.id}')">Xóa</button>
</td>
</tr>
`).join("")

}

async function saveRoom(){

const id=roomId.value
const name=roomName.value
const capacity=parseInt(roomCapacity.value)||0

if(id){

await sb.from("rooms").update({room_name:name,capacity}).eq("id",id)

}else{

await sb.from("rooms").insert({room_name:name,capacity})

}

await loadAll()
renderRooms()

roomId.value=""
roomName.value=""
roomCapacity.value=""

}

function editRoom(id){

const r=rooms.find(x=>x.id===id)

roomId.value=r.id
roomName.value=r.room_name
roomCapacity.value=r.capacity

}

async function deleteRoom(id){

if(!confirm("Xóa phòng?"))return

await sb.from("rooms").delete().eq("id",id)

await loadAll()
renderRooms()

}

/* GRADES */

function renderGrades(){

grades.sort((a,b)=>parseInt(a.name)-parseInt(b.name))

gradeTable.innerHTML=grades.map(g=>`
<tr>
<td>${g.name}</td>
<td class="actions">
<button onclick="editGrade('${g.id}')">Sửa</button>
<button class="delete" onclick="deleteGrade('${g.id}')">Xóa</button>
</td>
</tr>
`).join("")

}

async function saveGrade(){

const id=gradeId.value
const name=gradeName.value

if(id){

await sb.from("grades").update({name}).eq("id",id)

}else{

await sb.from("grades").insert({name})

}

await loadAll()
renderGrades()
loadDropdowns()

gradeId.value=""
gradeName.value=""

}

function editGrade(id){

const g=grades.find(x=>x.id===id)

gradeId.value=g.id
gradeName.value=g.name

}

async function deleteGrade(id){

if(!confirm("Xóa khối?"))return

await sb.from("grades").delete().eq("id",id)

await loadAll()
renderGrades()
loadDropdowns()

}

/* SUBJECTS */

function renderSubjects(){

subjects.sort((a,b)=>{

const g1=parseInt(a.grades?.name||0)
const g2=parseInt(b.grades?.name||0)

if(g1!==g2)return g1-g2

return a.name.localeCompare(b.name)

})

subjectTable.innerHTML=subjects.map(s=>`
<tr>
<td>${s.grades?.name}</td>
<td>${s.name}</td>
<td class="actions">
<button onclick="editSubject('${s.id}')">Sửa</button>
<button class="delete" onclick="deleteSubject('${s.id}')">Xóa</button>
</td>
</tr>
`).join("")

}

async function saveSubject(){

const id=subjectId.value
const name=subjectName.value
const grade_id=subjectGrade.value

if(id){

await sb.from("subjects").update({name,grade_id}).eq("id",id)

}else{

await sb.from("subjects").insert({name,grade_id})

}

await loadAll()
renderSubjects()
loadDropdowns()

subjectId.value=""
subjectName.value=""

}

function editSubject(id){

const s=subjects.find(x=>x.id===id)

subjectId.value=s.id
subjectName.value=s.name
subjectGrade.value=s.grade_id

}

async function deleteSubject(id){

if(!confirm("Xóa môn?"))return

await sb.from("subjects").delete().eq("id",id)

await loadAll()
renderSubjects()

}

/* CHAPTERS */

function renderChapters(){

let g=chapterGrade.value
let s=chapterSubject.value

let list=[...chapters]

if(g){

const gradeName=grades.find(x=>x.id===g)?.name
list=list.filter(c=>c.subjects?.grades?.name===gradeName)

}

if(s){

list=list.filter(c=>c.subjects?.id===s)

}

list.sort((a,b)=>{

const g1=parseInt(a.subjects?.grades?.name||0)
const g2=parseInt(b.subjects?.grades?.name||0)

if(g1!==g2)return g1-g2

const s1=a.subjects?.name||""
const s2=b.subjects?.name||""

if(s1!==s2)return s1.localeCompare(s2)

return a.name.localeCompare(b.name)

})

chapterTable.innerHTML=list.map(c=>`
<tr>
<td>${c.subjects?.grades?.name}</td>
<td>${c.subjects?.name}</td>
<td>${c.name}</td>
<td class="actions">
<button onclick="editChapter('${c.id}')">Sửa</button>
<button class="delete" onclick="deleteChapter('${c.id}')">Xóa</button>
</td>
</tr>
`).join("")

}

async function saveChapter(){

const id=chapterId.value
const subject_id=chapterSubject.value
const name=chapterName.value

if(id){

await sb.from("chapters").update({subject_id,name}).eq("id",id)

}else{

await sb.from("chapters").insert({subject_id,name})

}

await loadAll()
renderChapters()

chapterId.value=""
chapterName.value=""

}

function editChapter(id){

const c=chapters.find(x=>x.id===id)

chapterId.value=c.id
chapterName.value=c.name
chapterGrade.value=c.subjects.grades.id

loadSubjectsByGrade()

setTimeout(()=>{

chapterSubject.value=c.subjects.id

},50)

window.scrollTo({top:0,behavior:"smooth"})

}

/* DELETE */

async function deleteChapter(id){

if(!confirm("Xóa chương?"))return

await sb.from("chapters").delete().eq("id",id)

await loadAll()
renderChapters()

}

/* DROPDOWN */

function loadDropdowns(){

grades.sort((a,b)=>parseInt(a.name)-parseInt(b.name))

chapterGrade.innerHTML=grades.map(g=>`
<option value="${g.id}">${g.name}</option>
`).join("")

subjectGrade.innerHTML=chapterGrade.innerHTML

loadSubjectsByGrade()

}

chapterGrade.onchange=()=>{

loadSubjectsByGrade()
renderChapters()

}

chapterSubject.onchange=renderChapters

function loadSubjectsByGrade(){

const grade=chapterGrade.value

let list=subjects.filter(s=>s.grade_id===grade)

chapterSubject.innerHTML=list.map(s=>`
<option value="${s.id}">${s.name}</option>
`).join("")

}

</script>

</body>
</html>
```
