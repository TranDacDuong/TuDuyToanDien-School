<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý hệ thống</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:#f1f5f9;
margin:0;
padding:40px;
color:#0f172a;
}

h2{margin-bottom:25px;font-weight:600;}

.tabs{
display:flex;
gap:10px;
margin-bottom:25px;
}

.tab{
padding:10px 16px;
background:white;
border-radius:8px;
cursor:pointer;
border:1px solid #e2e8f0;
}

.tab.active{
background:#2563eb;
color:white;
}

.container{
display:grid;
grid-template-columns:420px 1fr;
gap:30px;
}

.card{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

label{
font-size:14px;
color:#475569;
font-weight:500;
}

input,select{
width:100%;
padding:11px;
margin-top:6px;
margin-bottom:16px;
border:1px solid #e2e8f0;
border-radius:8px;
font-size:14px;
background:#fafafa;
}

input:focus,select:focus{
outline:none;
border-color:#2563eb;
background:white;
}

button{
background:#2563eb;
color:white;
border:none;
padding:11px 16px;
border-radius:8px;
cursor:pointer;
font-weight:500;
}

button:hover{background:#1d4ed8;}

.delete{
background:#ef4444;
}

.delete:hover{
background:#dc2626;
}

.table-card{
background:white;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:14px 16px;
border-bottom:1px solid #f1f5f9;
font-size:14px;
}

th{
background:#f8fafc;
text-align:left;
}

.actions button{
padding:6px 10px;
margin-right:6px;
font-size:13px;
}

.hidden{display:none;}

</style>
</head>

<body>

<h2>Quản lý hệ thống</h2>

<div class="tabs">
<div class="tab active" onclick="switchTab(event,'rooms')">Phòng học</div>
<div class="tab" onclick="switchTab(event,'grades')">Khối</div>
<div class="tab" onclick="switchTab(event,'subjects')">Môn học</div>
<div class="tab" onclick="switchTab(event,'chapters')">Chương</div>
</div>


<!-- PHÒNG -->

<div id="rooms" class="container">

<div class="card">

<input type="hidden" id="roomId">

<label>Tên phòng</label>
<input id="roomName">

<label>Sức chứa</label>
<input id="roomCapacity" type="number">

<button onclick="saveRoom()">Lưu</button>

</div>

<div class="table-card">

<table>
<thead>
<tr>
<th>Tên phòng</th>
<th>Sức chứa</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="roomTable"></tbody>

</table>

</div>

</div>


<!-- KHỐI -->

<div id="grades" class="container hidden">

<div class="card">

<input type="hidden" id="gradeId">

<label>Tên khối</label>
<input id="gradeName">

<button onclick="saveGrade()">Lưu</button>

</div>

<div class="table-card">

<table>

<thead>
<tr>
<th>Khối</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="gradeTable"></tbody>

</table>

</div>

</div>


<!-- MÔN -->

<div id="subjects" class="container hidden">

<div class="table-card">

<table>

<thead>
<tr>
<th>Môn học</th>
</tr>
</thead>

<tbody id="subjectTable"></tbody>

</table>

</div>

</div>


<!-- CHƯƠNG -->

<div id="chapters" class="container hidden">

<div class="card">

<label>Môn học</label>
<select id="chapterSubject"></select>

<label>Khối</label>
<select id="chapterGrade"></select>

<label>Tên chương</label>
<input id="chapterName">

<button onclick="saveChapter()">Lưu</button>

</div>

<div class="table-card">

<table>

<thead>
<tr>
<th>Môn</th>
<th>Khối</th>
<th>Chương</th>
<th></th>
</tr>
</thead>

<tbody id="chapterTable"></tbody>

</table>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<script>

/* TAB */

function switchTab(event,id){

document.querySelectorAll(".container")
.forEach(e=>e.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

document.querySelectorAll(".tab")
.forEach(e=>e.classList.remove("active"))

event.target.classList.add("active")

}

init()

async function init(){

loadRooms()
loadGrades()
loadSubjects()
loadChapters()
loadDropdowns()

}

/* PHÒNG */

async function loadRooms(){

const {data}=await sb
.from("rooms")
.select("*")
.order("room_name",{ascending:true})

let html=""

for(const r of data){

html+=`
<tr>
<td>${r.room_name}</td>
<td>${r.capacity ?? ""}</td>
<td class="actions">
<button onclick="editRoom('${r.id}','${r.room_name}','${r.capacity}')">Sửa</button>
<button class="delete" onclick="deleteRoom('${r.id}')">Xóa</button>
</td>
</tr>
`
}

roomTable.innerHTML=html

}

async function saveRoom(){

const id=roomId.value
const name=roomName.value
const capacity=parseInt(roomCapacity.value)||0

if(id){

await sb.from("rooms")
.update({room_name:name,capacity})
.eq("id",id)

}else{

await sb.from("rooms")
.insert({room_name:name,capacity})

}

roomId.value=""
roomName.value=""
roomCapacity.value=""

loadRooms()

}

function editRoom(id,name,capacity){

roomId.value=id
roomName.value=name
roomCapacity.value=capacity

}

async function deleteRoom(id){

if(!confirm("Xóa phòng?")) return

await sb.from("rooms").delete().eq("id",id)

loadRooms()

}

/* KHỐI */

async function loadGrades(){

const {data}=await sb
.from("grades")
.select("*")

data.sort((a,b)=>parseInt(a.name)-parseInt(b.name))

let html=""

for(const g of data){

html+=`
<tr>
<td>${g.name}</td>
<td class="actions">
<button onclick="editGrade('${g.id}','${g.name}')">Sửa</button>
<button class="delete" onclick="deleteGrade('${g.id}')">Xóa</button>
</td>
</tr>
`
}

gradeTable.innerHTML=html

}

/* MÔN */

async function loadSubjects(){

const {data}=await sb
.from("subjects")
.select("*")

let html=""

for(const s of data){

html+=`
<tr>
<td>${s.name}</td>
</tr>
`
}

subjectTable.innerHTML=html

}

/* DROPDOWN */

async function loadDropdowns(){

const {data:subjects}=await sb.from("subjects").select("*")
const {data:grades}=await sb.from("grades").select("*")

grades.sort((a,b)=>parseInt(a.name)-parseInt(b.name))

chapterSubject.innerHTML=subjects.map(s=>`<option value="${s.id}">${s.name}</option>`).join("")
chapterGrade.innerHTML=grades.map(g=>`<option value="${g.id}">${g.name}</option>`).join("")

}

/* CHƯƠNG */

async function loadChapters(){

const {data}=await sb
.from("chapters")
.select("id,name,subjects(name),grades(name)")
.order("name",{ascending:true})

let html=""

for(const c of data){

html+=`
<tr>
<td>${c.subjects?.name}</td>
<td>${c.grades?.name}</td>
<td>${c.name}</td>
<td><button class="delete" onclick="deleteChapter('${c.id}')">Xóa</button></td>
</tr>
`
}

chapterTable.innerHTML=html

}

async function saveChapter(){

const subject=chapterSubject.value
const grade=chapterGrade.value
const name=chapterName.value

await sb.from("chapters").insert({
subject_id:subject,
grade_id:grade,
name
})

chapterName.value=""

loadChapters()

}

async function deleteChapter(id){

if(!confirm("Xóa chương?")) return

await sb.from("chapters").delete().eq("id",id)

loadChapters()

}

</script>

</body>
</html>
