<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý phòng học</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:#f1f5f9;
margin:0;
padding:40px;
color:#0f172a;
}

h2{
margin-bottom:25px;
font-weight:600;
}

.container{
display:grid;
grid-template-columns:420px 1fr;
gap:30px;
align-items:start;
}

/* CARD */

.card{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

/* FORM */

label{
font-weight:500;
font-size:14px;
color:#475569;
}

input{
width:100%;
padding:11px;
margin-top:6px;
margin-bottom:16px;
border:1px solid #e2e8f0;
border-radius:8px;
font-size:14px;
background:#fafafa;
}

input:focus{
outline:none;
border-color:#2563eb;
background:white;
}

button{
background:#2563eb;
color:white;
border:none;
padding:11px 16px;
border-radius:8px;
cursor:pointer;
font-weight:500;
font-size:14px;
}

button:hover{
background:#1d4ed8;
}

/* TABLE */

.table-card{
background:white;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:14px 16px;
border-bottom:1px solid #f1f5f9;
font-size:14px;
}

th{
background:#f8fafc;
font-weight:600;
color:#475569;
}

tr:hover{
background:#f9fafb;
}

.actions button{
margin-right:6px;
padding:7px 10px;
font-size:13px;
}

.delete{
background:#ef4444;
}

.delete:hover{
background:#dc2626;
}

.badge{
background:#e0f2fe;
color:#0369a1;
padding:4px 8px;
border-radius:6px;
font-size:12px;
font-weight:500;
}

</style>
</head>

<body>

<h2>Quản lý phòng học</h2>

<div class="container">

<!-- FORM -->

<div class="card">

<input type="hidden" id="editRoomId">

<label>Tên phòng</label>
<input id="roomName" placeholder="Ví dụ: Phòng A101">

<label>Sức chứa</label>
<input id="roomCapacity" type="number" placeholder="Ví dụ: 40">

<button id="submitBtn" onclick="submitRoom()">Thêm phòng</button>

</div>

<!-- TABLE -->

<div class="table-card">

<table>

<thead>
<tr>
<th>STT</th>
<th>Tên phòng</th>
<th>Sức chứa</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<script>

let currentUser=null
let currentRole=null

async function init(){

const {data:{user}}=await sb.auth.getUser()

if(!user){
location.href="index.html"
return
}

currentUser=user

const {data:profile}=await sb
.from("users")
.select("role")
.eq("id",user.id)
.single()

currentRole=profile.role

if(currentRole!=="admin"){
alert("Bạn không có quyền truy cập")
location.href="dashboard.html"
return
}

loadRooms()

}


/* LOAD ROOMS */

async function loadRooms(){

const {data,error}=await sb
.from("rooms")
.select("*")
.order("room_name",{ascending:true})

if(error){
alert(error.message)
return
}

let html=""
let i=1

for(const r of data){

html+=`
<tr>

<td>${i++}</td>

<td>
<span class="badge">${r.room_name}</span>
</td>

<td>${r.capacity ?? "-"}</td>

<td class="actions">
<button onclick="editRoom('${r.id}','${r.room_name}','${r.capacity}')">Sửa</button>
<button onclick="deleteRoom('${r.id}')" class="delete">Xóa</button>
</td>

</tr>
`

}

document.getElementById("table").innerHTML=html

}


/* ADD / UPDATE */

async function submitRoom(){

const id=document.getElementById("editRoomId").value
const name=document.getElementById("roomName").value.trim()
const capacity=parseInt(document.getElementById("roomCapacity").value)||0

if(!name){
alert("Nhập tên phòng")
return
}

/* UPDATE */

if(id){

const {error}=await sb
.from("rooms")
.update({
room_name:name,
capacity:capacity
})
.eq("id",id)

if(error){
alert(error.message)
return
}

resetForm()
loadRooms()
return

}


/* CREATE */

const {error}=await sb
.from("rooms")
.insert({
room_name:name,
capacity:capacity,
created_by:currentUser.id
})

if(error){
alert(error.message)
return
}

resetForm()
loadRooms()

}


/* EDIT */

function editRoom(id,name,capacity){

document.getElementById("editRoomId").value=id
document.getElementById("roomName").value=name
document.getElementById("roomCapacity").value=capacity ?? ""

document.getElementById("submitBtn").innerText="Cập nhật"

window.scrollTo({top:0,behavior:"smooth"})

}


/* DELETE */

async function deleteRoom(id){

if(!confirm("Bạn có chắc muốn xóa phòng này?")) return

const {error}=await sb
.from("rooms")
.delete()
.eq("id",id)

if(error){
alert(error.message)
return
}

loadRooms()

}


/* RESET */

function resetForm(){

document.getElementById("editRoomId").value=""
document.getElementById("roomName").value=""
document.getElementById("roomCapacity").value=""

document.getElementById("submitBtn").innerText="Thêm phòng"

}

init()

</script>

</body>
</html>
