<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Lịch học của tôi</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css?v=20260615-ios1">
<style>
body {
  margin: 0;
  background: radial-gradient(circle at top left, rgba(200,150,42,.1), transparent 24%), linear-gradient(180deg, #f4efe4 0%, #f8f5ef 26%, #f7faff 100%);
  font-family: var(--font-body);
  color: var(--ink);
}
.week-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-top: 24px;
}
.day-card {
  background: var(--white);
  border: 1px solid rgba(15,31,61,.08);
  border-radius: 20px;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 200px;
  transition: var(--t);
}
.day-card.today {
  border: 2px solid var(--gold);
  box-shadow: var(--shadow);
}
.day-header {
  background: var(--navy);
  color: var(--gold-light);
  padding: 12px 16px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.day-card.today .day-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
}
.day-body {
  padding: 16px;
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: #fafbfc;
}
.session-card {
  background: var(--white);
  border: 1px solid rgba(15,31,61,.06);
  border-radius: 14px;
  padding: 12px 14px;
  box-shadow: 0 2px 6px rgba(15,31,61,0.03);
  transition: var(--t);
  position: relative;
}
.session-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-sm);
  border-color: rgba(200,150,42,.3);
}
.session-time {
  font-weight: 800;
  color: var(--navy);
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  gap: 6px;
}
.session-class {
  font-weight: 700;
  font-size: 0.88rem;
  color: var(--ink);
  margin-top: 4px;
}
.session-subject {
  font-size: 0.78rem;
  color: var(--ink-mid);
  margin-top: 2px;
}
.session-room {
  font-size: 0.76rem;
  color: var(--ink-light);
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.session-badge {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 800;
  padding: 4px 8px;
  border-radius: 6px;
  margin-top: 8px;
  text-transform: uppercase;
  width: fit-content;
}
.status-present { background: var(--green-bg); color: var(--green); }
.status-absent { background: var(--red-bg); color: var(--red); }
.status-makeup { background: var(--amber-bg); color: var(--amber); }
.status-excused { background: var(--blue-bg); color: var(--blue); }
.status-none { background: #f1f3f7; color: var(--ink-mid); }

.empty-day {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-light);
  font-size: 0.82rem;
  font-style: italic;
  flex-grow: 1;
  padding: 24px 0;
  text-align: center;
}
.nav-btn {
  background: rgba(255,255,255,0.16);
  border: 1px solid rgba(255,255,255,0.24);
  color: #fff;
  border-radius: 8px;
  padding: 6px 12px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--t);
  font-size: 0.8rem;
}
.nav-btn:hover {
  background: rgba(255,255,255,0.28);
}
.active-week-text {
  color: #fff;
  font-weight: 700;
  font-size: 0.85rem;
  margin: 0 10px;
}
</style>
</head>
<body>
<div class="page-wrap">
  <header class="page-hero">
    <div class="page-hero-copy">
      <h1 class="page-hero-title">📅 Lịch học cá nhân</h1>
      <p class="page-hero-subtitle" id="scheduleSubtitle">Xem thời khóa biểu và trạng thái điểm danh chi tiết của bạn.</p>
    </div>
    <div class="page-hero-actions" style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
      <!-- Child selector for parent role -->
      <div id="parentSelectorContainer" style="display: none; align-items: center; gap: 8px;">
        <label for="parentStudentSelect" style="color: rgba(255,255,255,0.85); font-size: 0.82rem; font-weight: 600; white-space: nowrap;">Chọn con:</label>
        <select id="parentStudentSelect" style="width: 170px; background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.24); color: #fff; border-radius: 12px; padding: 8px 12px; outline: none; font-weight: 700; cursor: pointer;"></select>
      </div>

      <!-- Navigation toolbar -->
      <div style="display: flex; align-items: center; background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.24); border-radius: 12px; padding: 4px;">
        <button class="nav-btn" onclick="navigateWeek(-1)">◀ Tuần trước</button>
        <button class="nav-btn" style="background: rgba(255,255,255,0.25);" onclick="navigateCurrentWeek()">Tuần này</button>
        <button class="nav-btn" onclick="navigateWeek(1)">Tuần sau ▶</button>
      </div>
      <input type="date" id="weekPicker" style="background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.24); color: #fff; border-radius: 12px; padding: 8px 12px; outline: none; font-weight: 700; width: 140px; cursor: pointer;">
    </div>
  </header>

  <!-- Week Dates Overview Subtitle -->
  <div style="margin-top: 14px; font-size: 0.95rem; font-weight: 600; color: var(--navy); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(15,31,61,0.08); padding-bottom: 10px;">
    <span id="weekSpanLabel">Đang tải khoảng thời gian...</span>
    <span style="font-size: 0.78rem; font-weight: 700; color: var(--gold); background: var(--gold-pale); border: 1px solid var(--gold-border); padding: 4px 10px; border-radius: 20px;" id="selectedStudentName">Đang tải học sinh...</span>
  </div>

  <!-- Main Week Grid -->
  <main class="week-grid" id="weekGridContainer">
    <div class="empty-state" style="grid-column: 1 / -1; padding: 48px;">Đang tải lịch học tuần...</div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script>
const DAYS_VN = {
  1: "Thứ Hai",
  2: "Thứ Ba",
  3: "Thứ Tư",
  4: "Thứ Năm",
  5: "Thứ Sáu",
  6: "Thứ Bảy",
  7: "Chủ Nhật"
};

let currentUser = null;
let currentRole = "guest";
let selectedStudentId = null;
let currentMonday = null; // Date object representing the Monday of the selected week

function esc(s) {
  return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function toLocalDateString(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function getMonday(d) {
  d = new Date(d);
  const day = d.getDay();
  // Adjust when day is Sunday (getDay() returns 0)
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff));
}

function getWeekDates(monday) {
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const nextDate = new Date(monday);
    nextDate.setDate(monday.getDate() + i);
    dates.push(nextDate);
  }
  return dates;
}

function fmtDisplayDate(date) {
  const d = String(date.getDate()).padStart(2, "0");
  const m = String(date.getMonth() + 1).padStart(2, "0");
  return `${d}/${m}`;
}

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    window.location.href = "dashboard.html";
    return;
  }
  currentUser = user;

  const { data: p } = await sb.from("users").select("*").eq("id", user.id).single();
  if (!p) {
    window.location.href = "dashboard.html";
    return;
  }
  currentRole = p.role;

  // Initialize date to current week
  currentMonday = getMonday(new Date());
  document.getElementById("weekPicker").value = toLocalDateString(new Date());
  document.getElementById("weekPicker").addEventListener("change", function(e) {
    if (e.target.value) {
      currentMonday = getMonday(new Date(e.target.value));
      loadSchedule();
    }
  });

  if (currentRole === "student") {
    selectedStudentId = currentUser.id;
    document.getElementById("selectedStudentName").textContent = p.full_name;
    document.getElementById("parentSelectorContainer").style.display = "none";
    await loadSchedule();
  } else if (currentRole === "parent") {
    // Load student connections
    const { data: links, error: lErr } = await sb
      .from("parent_students")
      .select("student_id, student:users!student_id(id, full_name)")
      .eq("parent_id", currentUser.id)
      .is("revoked_at", null);

    if (lErr || !links || links.length === 0) {
      document.getElementById("weekGridContainer").innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          ⚠️ Không tìm thấy tài khoản học sinh liên kết với phụ huynh này.
        </div>
      `;
      document.getElementById("selectedStudentName").textContent = "Không tìm thấy con";
      return;
    }

    const students = links.map(l => l.student).filter(Boolean);
    const select = document.getElementById("parentStudentSelect");
    select.innerHTML = students.map(s => `<option value="${s.id}">${esc(s.full_name)}</option>`).join("");
    
    selectedStudentId = select.value;
    document.getElementById("selectedStudentName").textContent = select.options[select.selectedIndex].text;
    document.getElementById("parentSelectorContainer").style.display = "flex";

    select.addEventListener("change", function() {
      selectedStudentId = select.value;
      document.getElementById("selectedStudentName").textContent = select.options[select.selectedIndex].text;
      loadSchedule();
    });

    await loadSchedule();
  } else {
    alert("Bạn không có quyền truy cập trang này.");
    window.location.href = "dashboard.html";
  }
}

function navigateWeek(weeksOffset) {
  const newDate = new Date(currentMonday);
  newDate.setDate(currentMonday.getDate() + (weeksOffset * 7));
  currentMonday = getMonday(newDate);
  
  // Set date picker value to the middle of the target week to keep it sync
  const centerOfWeek = new Date(currentMonday);
  centerOfWeek.setDate(currentMonday.getDate() + 3);
  document.getElementById("weekPicker").value = toLocalDateString(centerOfWeek);

  loadSchedule();
}

function navigateCurrentWeek() {
  currentMonday = getMonday(new Date());
  document.getElementById("weekPicker").value = toLocalDateString(new Date());
  loadSchedule();
}

async function loadSchedule() {
  if (!selectedStudentId) return;

  const weekDates = getWeekDates(currentMonday);
  const weekStartStr = toLocalDateString(weekDates[0]);
  const weekEndStr = toLocalDateString(weekDates[6]);

  document.getElementById("weekSpanLabel").textContent = `Tuần: ${fmtDisplayDate(weekDates[0])} - ${fmtDisplayDate(weekDates[6])}`;
  document.getElementById("weekGridContainer").innerHTML = `<div class="empty-state" style="grid-column: 1 / -1; padding: 48px;">Đang tải lịch học...</div>`;

  try {
    // 1. Fetch active class enrollments for the student during this week
    const { data: enrollments, error: enrollError } = await sb
      .from("class_students")
      .select("class_id, joined_at, left_at, class:classes!class_students_class_id_fkey(id, class_name, subjects(name))")
      .eq("student_id", selectedStudentId);

    if (enrollError) throw enrollError;

    // Filter enrollments active in this week
    const activeEnrollments = (enrollments || []).filter(e => {
      const joined = e.joined_at ? e.joined_at.slice(0, 10) : "0000-00-00";
      const left = e.left_at ? e.left_at.slice(0, 10) : "9999-99-99";
      return joined <= weekEndStr && left >= weekStartStr;
    });

    if (activeEnrollments.length === 0) {
      renderEmptyGrid(weekDates);
      return;
    }

    const classIds = activeEnrollments.map(e => e.class_id);
    const enrollmentMap = {};
    activeEnrollments.forEach(e => {
      enrollmentMap[e.class_id] = e;
    });

    // 2. Fetch schedules for these classes
    const { data: schedules, error: schedError } = await sb
      .from("class_schedules")
      .select("id, class_id, weekday, start_time, end_time, effective_from, room_id, rooms(id, room_name), session_no")
      .in("class_id", classIds);

    if (schedError) throw schedError;

    // 3. Fetch custom student schedule choices (opt-in/opt-out)
    const { data: customSchedules, error: customError } = await sb
      .from("class_student_schedules")
      .select("class_id, student_id, schedule_id")
      .eq("student_id", selectedStudentId);

    if (customError) throw customError;

    // Group custom schedules by class_id
    const customMap = {};
    (customSchedules || []).forEach(row => {
      if (!customMap[row.class_id]) customMap[row.class_id] = new Set();
      customMap[row.class_id].add(Number(row.schedule_id));
    });

    // 4. Group all schedules by class_id
    const schedulesByClass = {};
    (schedules || []).forEach(s => {
      if (!schedulesByClass[s.class_id]) schedulesByClass[s.class_id] = [];
      schedulesByClass[s.class_id].push(s);
    });

    // 5. Select active schedules for the week matching monthly exclusion/inclusion logic
    const activeSchedules = [];
    classIds.forEach(classId => {
      const classScheds = schedulesByClass[classId] || [];
      if (classScheds.length === 0) return;

      // Find maximum effective_from that is <= weekEndStr
      const eligible = classScheds.filter(s => (s.effective_from || "2000-01-01") <= weekEndStr);
      const source = eligible.length ? eligible : classScheds;
      const maxEffective = source.reduce((max, s) => {
        const ef = s.effective_from || "2000-01-01";
        return ef > max ? ef : max;
      }, "2000-01-01");

      const currentActive = source.filter(s => (s.effective_from || "2000-01-01") === maxEffective);

      // Apply student choices if they exist
      const chosenIds = customMap[classId];
      const finalActive = (chosenIds && chosenIds.size)
        ? currentActive.filter(s => chosenIds.has(Number(s.id)))
        : currentActive;

      activeSchedules.push(...finalActive);
    });

    // 6. Fetch attendance checked records for this week
    const { data: attendance, error: attError } = await sb
      .from("attendance")
      .select("class_id, date, status, schedule_id")
      .eq("student_id", selectedStudentId)
      .gte("date", weekStartStr)
      .lte("date", weekEndStr);

    if (attError) throw attError;

    const attMap = {};
    (attendance || []).forEach(a => {
      const key = `${a.class_id}_${a.date}_${a.schedule_id || 0}`;
      attMap[key] = a.status;
    });

    // 7. Render week days
    renderWeekGrid(weekDates, activeSchedules, enrollmentMap, attMap);

  } catch (err) {
    console.error("Lỗi khi tải lịch học:", err);
    document.getElementById("weekGridContainer").innerHTML = `
      <div class="empty-state" style="grid-column: 1 / -1; color: var(--red);">
        ❌ Có lỗi xảy ra khi tải lịch học: ${esc(err.message)}
      </div>
    `;
  }
}

function renderEmptyGrid(weekDates) {
  const grid = document.getElementById("weekGridContainer");
  const todayStr = toLocalDateString(new Date());

  grid.innerHTML = weekDates.map((date, idx) => {
    const weekdayNo = idx + 1;
    const dateStr = toLocalDateString(date);
    const isToday = dateStr === todayStr;

    return `
      <div class="day-card ${isToday ? 'today' : ''}">
        <div class="day-header">
          <span>${DAYS_VN[weekdayNo]}</span>
          <span style="font-size: 0.85rem; opacity: 0.9;">${fmtDisplayDate(date)}</span>
        </div>
        <div class="day-body">
          <div class="empty-day">Không có lịch học</div>
        </div>
      </div>
    `;
  }).join("");
}

function renderWeekGrid(weekDates, activeSchedules, enrollmentMap, attMap) {
  const grid = document.getElementById("weekGridContainer");
  const todayStr = toLocalDateString(new Date());

  grid.innerHTML = weekDates.map((date, idx) => {
    const weekdayNo = idx + 1;
    const dateStr = toLocalDateString(date);
    const isToday = dateStr === todayStr;

    // Filter schedules active on this weekday
    const daySchedules = activeSchedules.filter(s => Number(s.weekday) === weekdayNo);

    // Filter by student enrollment period for this specific date
    const daySessions = daySchedules.filter(s => {
      const enrollment = enrollmentMap[s.class_id];
      if (!enrollment) return false;
      const joined = enrollment.joined_at ? enrollment.joined_at.slice(0, 10) : "0000-00-00";
      const left = enrollment.left_at ? enrollment.left_at.slice(0, 10) : "9999-99-99";
      return joined <= dateStr && left >= dateStr;
    });

    // Sort chronologically by start_time
    daySessions.sort((a, b) => (a.start_time || "").localeCompare(b.start_time || ""));

    let bodyContent = "";
    if (daySessions.length === 0) {
      bodyContent = `<div class="empty-day">Không có lịch học</div>`;
    } else {
      bodyContent = daySessions.map(s => {
        const enrollment = enrollmentMap[s.class_id];
        const className = enrollment.class?.class_name || "Lớp học";
        const subjectName = enrollment.class?.subjects?.name || "Khác";
        const roomName = s.rooms?.room_name || "Chưa xếp phòng";
        const start = s.start_time ? s.start_time.slice(0, 5) : "--:--";
        const end = s.end_time ? s.end_time.slice(0, 5) : "--:--";

        const attStatus = attMap[`${s.class_id}_${dateStr}_${s.id}`] || attMap[`${s.class_id}_${dateStr}_0`] || null;
        let badgeHtml = "";
        if (attStatus === "present") {
          badgeHtml = `<span class="session-badge status-present">✓ Có mặt</span>`;
        } else if (attStatus === "absent") {
          badgeHtml = `<span class="session-badge status-absent">✗ Vắng mặt</span>`;
        } else if (attStatus === "makeup") {
          badgeHtml = `<span class="session-badge status-makeup">✦ Học bù</span>`;
        } else if (attStatus === "excused") {
          badgeHtml = `<span class="session-badge status-excused">✉ Vắng có phép</span>`;
        } else {
          badgeHtml = `<span class="session-badge status-none">Chưa học / Chưa điểm danh</span>`;
        }

        return `
          <div class="session-card">
            <div class="session-time">
              <span>⏱</span>
              <span>${esc(start)} - ${esc(end)}</span>
            </div>
            <div class="session-class">${esc(className)}</div>
            <div class="session-subject">Môn học: <b>${esc(subjectName)}</b></div>
            <div class="session-room">
              <span>📍</span>
              <span>${esc(roomName)}</span>
            </div>
            ${badgeHtml}
          </div>
        `;
      }).join("");
    }

    return `
      <div class="day-card ${isToday ? 'today' : ''}">
        <div class="day-header">
          <span>${DAYS_VN[weekdayNo]} ${isToday ? ' (Hôm nay)' : ''}</span>
          <span style="font-size: 0.85rem; opacity: 0.9;">${fmtDisplayDate(date)}</span>
        </div>
        <div class="day-body">
          ${bodyContent}
        </div>
      </div>
    `;
  }).join("");
}

init();
</script>
</body>
</html>
