<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập hệ thống</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:white;
padding:35px;
width:360px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#1d4ed8;
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

.switch{
text-align:center;
margin-top:15px;
font-size:14px;
}

.switch span{
color:#2563eb;
cursor:pointer;
font-weight:bold;
}

.hidden{
display:none;
}

#toast{
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:white;
padding:12px 18px;
border-radius:6px;
opacity:0;
transition:0.3s;
}

#toast.show{
opacity:1;
}

</style>
</head>

<body>

<div class="card">

<h2 id="title">Đăng nhập</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Mật khẩu">

<input id="password2" type="password" placeholder="Nhập lại mật khẩu" class="hidden">

<button onclick="submitForm()" id="submitBtn">Đăng nhập</button>

<div class="switch">
<span onclick="toggleMode()" id="switchText">
Chưa có tài khoản? Đăng ký
</span>
</div>

</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<script>

let isLogin = true;

function toggleMode(){

isLogin = !isLogin;

document.getElementById("password2").classList.toggle("hidden");

if(isLogin){
document.getElementById("title").innerText="Đăng nhập";
document.getElementById("submitBtn").innerText="Đăng nhập";
document.getElementById("switchText").innerText="Chưa có tài khoản? Đăng ký";
}else{
document.getElementById("title").innerText="Đăng ký";
document.getElementById("submitBtn").innerText="Tạo tài khoản";
document.getElementById("switchText").innerText="Đã có tài khoản? Đăng nhập";
}

}

if(isLogin){
document.getElementById("title").innerText="Đăng nhập";
document.getElementById("submitBtn").innerText="Đăng nhập";
document.getElementById("switchText").innerText="Chưa có tài khoản? Đăng ký";
}else{
document.getElementById("title").innerText="Đăng ký";
document.getElementById("submitBtn").innerText="Tạo tài khoản";
document.getElementById("switchText").innerText="Đã có tài khoản? Đăng nhập";
}

}

async function submitForm(){

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value;

if(!email||!password){
showToast("Thiếu email hoặc mật khẩu");
return;
}

if(isLogin){
login(email,password);
}else{
register();
}

}

async function login(email,password){

const {data,error}=await sb.auth.signInWithPassword({
email,
password
});

if(error){
showToast(error.message);
return;
}

const user = data.user;

// kiểm tra profile
const { data:profile } = await sb
.from("users")
.select("*")
.eq("id",user.id)
.maybeSingle();

if(!profile){

// tạo profile rỗng
await sb.from("users").insert({
id:user.id,
email:user.email,
role:"student"
});

}

showToast("Đăng nhập thành công");

setTimeout(()=>{
window.location.href="dashboard.html";
},600);

}

async function register(){

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;
const password2 = document.getElementById("password2").value;

if(!email || !password || !password2){
showToast("Nhập đầy đủ thông tin");
return;
}

if(password !== password2){
showToast("Mật khẩu không khớp");
return;
}

const { error } = await sb.auth.signUp({
email,
password
});

if(error){
showToast(error.message);
return;
}

showToast("Tạo tài khoản thành công");

}

function resetBtn(){
const btn = document.getElementById("submitBtn");
btn.disabled=false;
btn.innerText="Tạo tài khoản";
}

function showToast(message){

const toast=document.getElementById("toast");

toast.innerText=message;
toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}

</script>

</body>
</html>
