<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:white;
padding:35px;
width:360px;
border-radius:12px;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:11px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:11px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
font-size:15px;
}

button:hover{
background:#1d4ed8;
}

.hidden{
display:none;
}

.switch{
text-align:center;
margin-top:14px;
font-size:14px;
}

.switch span{
color:#2563eb;
cursor:pointer;
font-weight:bold;
}

.password-wrapper{
position:relative;
}

.eye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:16px;
color:#555;
}

#toast{
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:white;
padding:12px 18px;
border-radius:6px;
opacity:0;
transition:0.3s;
font-size:14px;
}

#toast.show{
opacity:1;
}

</style>
</head>

<body>

<div class="card">

<h2 id="title">Đăng nhập</h2>

<input id="email" type="email" placeholder="Email">

<div class="password-wrapper">
<input id="password" type="password" placeholder="Mật khẩu">
<span class="eye" onclick="togglePassword()">👁</span>
</div>

<input id="password2" type="password" placeholder="Nhập lại mật khẩu" class="hidden">

<button onclick="submitForm()" id="btn">Đăng nhập</button>

<div class="switch">
<span onclick="toggleMode()" id="switchText">
Chưa có tài khoản? Đăng ký
</span>
</div>

</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<script>

let isLogin = true;

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const password2Input = document.getElementById("password2");

const title = document.getElementById("title");
const btn = document.getElementById("btn");
const switchText = document.getElementById("switchText");

function toggleMode(){

isLogin = !isLogin;

password2Input.classList.toggle("hidden");

if(isLogin){

title.innerText="Đăng nhập";
btn.innerText="Đăng nhập";
switchText.innerText="Chưa có tài khoản? Đăng ký";

}else{

title.innerText="Đăng ký";
btn.innerText="Tạo tài khoản";
switchText.innerText="Đã có tài khoản? Đăng nhập";

}

}

function togglePassword(){

const type = passwordInput.type === "password" ? "text" : "password";

passwordInput.type = type;
password2Input.type = type;

}

async function submitForm(){

const email = emailInput.value.trim();
const password = passwordInput.value;
const password2 = password2Input.value;

if(!email || !password){
showToast("Vui lòng nhập email và mật khẩu");
return;
}

if(isLogin){

await login(email,password);

}else{

if(password !== password2){
showToast("Mật khẩu nhập lại không khớp");
return;
}

await register(email,password);

}

}

async function login(email,password){

const {error} = await sb.auth.signInWithPassword({
email,
password
});

if(error){
showToast("Email hoặc mật khẩu không đúng");
return;
}

showToast("Đăng nhập thành công");

setTimeout(()=>{
window.location.href="dashboard.html";
},700);

}

async function register(email,password){

const {error} = await sb.auth.signUp({
email,
password
});

if(error){

if(error.message.toLowerCase().includes("already")){
showToast("Email đã được đăng ký");
}else{
showToast(error.message);
}

return;

}

showToast("Đăng ký thành công. Hãy đăng nhập.");

toggleMode();

}

function showToast(msg){

const toast=document.getElementById("toast");

toast.innerText=msg;

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}

</script>

</body>
</html>
