<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:white;
padding:35px;
width:360px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:11px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:11px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
font-size:15px;
}

button:hover{
background:#1d4ed8;
}

.hidden{
display:none;
}

.switch{
text-align:center;
margin-top:12px;
font-size:14px;
}

.switch span{
color:#2563eb;
cursor:pointer;
font-weight:bold;
}

#toast{
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:white;
padding:12px 18px;
border-radius:6px;
opacity:0;
transform:translateY(10px);
transition:0.3s;
}

#toast.show{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<div class="card">

<h2 id="title">Đăng nhập</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Mật khẩu">

<input id="password2" type="password" placeholder="Nhập lại mật khẩu" class="hidden">

<button onclick="submitForm()" id="btn">Đăng nhập</button>

<div class="switch">
<span onclick="toggleMode()" id="switchText">
Chưa có tài khoản? Đăng ký
</span>
</div>

</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<script>

let isLogin = true;

const title = document.getElementById("title");
const btn = document.getElementById("btn");
const switchText = document.getElementById("switchText");
const password2Input = document.getElementById("password2");

function toggleMode(){

isLogin = !isLogin;

password2Input.classList.toggle("hidden");

if(isLogin){
title.innerText="Đăng nhập";
btn.innerText="Đăng nhập";
switchText.innerText="Chưa có tài khoản? Đăng ký";
}else{
title.innerText="Đăng ký";
btn.innerText="Tạo tài khoản";
switchText.innerText="Đã có tài khoản? Đăng nhập";
}

}

async function submitForm(){

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;
const password2 = document.getElementById("password2").value;

if(!email || !password){
showToast("Vui lòng nhập email và mật khẩu");
return;
}

if(isLogin){

login(email,password);

}else{

if(password !== password2){
showToast("Mật khẩu nhập lại không khớp");
return;
}

register(email,password);

}

}

async function login(email,password){

const {data,error} = await sb.auth.signInWithPassword({
email:email,
password:password
});

if(error){
showToast("Email hoặc mật khẩu không đúng");
return;
}

showToast("Đăng nhập thành công");

setTimeout(()=>{
window.location.href="dashboard.html";
},800);

}

async function register(email,password){

const { data, error } = await sb.auth.signUp({
email: email,
password: password
});

if(error){

if(error.message.toLowerCase().includes("already")){
showToast("Email đã được đăng ký");
}else{
showToast("Không thể tạo tài khoản");
}

return;

}

// Supabase bảo mật: email đã tồn tại đôi khi vẫn trả success
// nhưng user = null

if(!data.user){
showToast("Email đã được đăng ký");
return;
}

showToast("Đăng ký thành công. Hãy đăng nhập.");

toggleMode();

}

  
function showToast(msg){

const toast = document.getElementById("toast");

toast.innerText = msg;

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}

</script>

</body>
</html>
