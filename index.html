<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập hệ thống</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:35px;
width:340px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.switch{
text-align:center;
margin-top:15px;
font-size:14px;
}

.switch span{
color:#2563eb;
cursor:pointer;
}

.hidden{
display:none;
}

#toast{
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:white;
padding:12px 18px;
border-radius:6px;
opacity:0;
transition:0.3s;
}

#toast.show{
opacity:1;
}

</style>
</head>

<body>

<div class="card">

<h2 id="title">Đăng nhập</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Mật khẩu">

<input id="password2" type="password" placeholder="Nhập lại mật khẩu" class="hidden">

<input id="fullname" type="text" placeholder="Họ và tên" class="hidden">

<input id="phone" type="text" placeholder="Số điện thoại" class="hidden">

<input id="birthyear" type="number" placeholder="Năm sinh" class="hidden">

<button onclick="submitForm()" id="submitBtn">Đăng nhập</button>

<div class="switch">
<span onclick="toggleMode()" id="switchText">
Chưa có tài khoản? Đăng ký
</span>
</div>

</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<script>

let isLogin = true;

function toggleMode(){

isLogin = !isLogin;

const fields = ["password2","fullname","phone","birthyear"];

fields.forEach(id=>{
document.getElementById(id).classList.toggle("hidden");
});

if(isLogin){
document.getElementById("title").innerText="Đăng nhập";
document.getElementById("submitBtn").innerText="Đăng nhập";
document.getElementById("switchText").innerText="Chưa có tài khoản? Đăng ký";
}else{
document.getElementById("title").innerText="Đăng ký";
document.getElementById("submitBtn").innerText="Tạo tài khoản";
document.getElementById("switchText").innerText="Đã có tài khoản? Đăng nhập";
}

}

async function submitForm(){

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value;

if(!email||!password){
showToast("Thiếu email hoặc mật khẩu");
return;
}

if(isLogin){
login(email,password);
}else{
register();
}

}

async function login(email,password){

const {data,error}=await sb.auth.signInWithPassword({
email,
password
});

if(error){
showToast(error.message);
return;
}

showToast("Đăng nhập thành công");

setTimeout(()=>{
window.location.href="dashboard.html";
},600);

}

async function register(){

const btn = document.getElementById("submitBtn");
btn.disabled = true;

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;
const password2 = document.getElementById("password2").value;

const fullname = document.getElementById("fullname").value.trim();
const phone = document.getElementById("phone").value.trim();
const birthyear = document.getElementById("birthyear").value.trim();


// kiểm tra thiếu thông tin
if(!email || !password || !password2 || !fullname || !phone || !birthyear){
showToast("Vui lòng nhập đầy đủ thông tin");
btn.disabled = false;
return;
}

// kiểm tra mật khẩu
if(password !== password2){
showToast("Mật khẩu nhập lại không khớp");
btn.disabled = false;
return;
}

// kiểm tra email đã tồn tại trong bảng users
const { data: existingUser } = await sb
.from("users")
.select("id")
.eq("email", email)
.maybeSingle();

if(existingUser){
showToast("Email đã tồn tại");
btn.disabled = false;
return;
}


// tạo tài khoản auth
const { data, error } = await sb.auth.signUp({
email,
password
});

if(error){
showToast(error.message);
btn.disabled = false;
return;
}


// đăng nhập ngay sau khi đăng ký
const { data: loginData, error: loginError } = await sb.auth.signInWithPassword({
email,
password
});

if(loginError){
showToast("Tài khoản tạo rồi nhưng không đăng nhập được");
btn.disabled = false;
return;
}

const user = loginData.user;


// lưu thông tin profile
const { error: profileError } = await sb
.from("users")
.insert({
id: user.id,
email: email,
full_name: fullname,
phone: phone,
birth_year: parseInt(birthyear),
role: "teacher"
});

if(profileError){
showToast("Lỗi lưu thông tin người dùng");
console.log(profileError);
btn.disabled = false;
return;
}

showToast("Tạo tài khoản thành công");

setTimeout(()=>{
window.location.href="dashboard.html";
},800);

}

function showToast(message){

const toast=document.getElementById("toast");

toast.innerText=message;
toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}

</script>

</body>
</html>
