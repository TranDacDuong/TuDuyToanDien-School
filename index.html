<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:white;
padding:35px;
width:360px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#1d4ed8;
}

.hidden{
display:none;
}

.switch{
text-align:center;
margin-top:10px;
font-size:14px;
}

.switch span{
color:#2563eb;
cursor:pointer;
font-weight:bold;
}

#toast{
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:white;
padding:12px 18px;
border-radius:6px;
opacity:0;
transition:0.3s;
}

#toast.show{
opacity:1;
}

</style>
</head>

<body>

<div class="card">

<h2 id="title">Đăng nhập</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Mật khẩu">

<input id="password2" type="password" placeholder="Nhập lại mật khẩu" class="hidden">

<button onclick="submitForm()" id="btn">Đăng nhập</button>

<div class="switch">
<span onclick="toggleMode()" id="switchText">
Chưa có tài khoản? Đăng ký
</span>
</div>

</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<script>

let isLogin = true;

function toggleMode(){

isLogin = !isLogin;

document.getElementById("password2").classList.toggle("hidden");

if(isLogin){
document.getElementById("title").innerText="Đăng nhập";
document.getElementById("btn").innerText="Đăng nhập";
document.getElementById("switchText").innerText="Chưa có tài khoản? Đăng ký";
}else{
document.getElementById("title").innerText="Đăng ký";
document.getElementById("btn").innerText="Tạo tài khoản";
document.getElementById("switchText").innerText="Đã có tài khoản? Đăng nhập";
}

}

async function submitForm(){

const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value;
const password2 = document.getElementById("password2").value;

if(!email || !password){
showToast("Vui lòng nhập email và mật khẩu");
return;
}

if(password.length < 6){
showToast("Mật khẩu tối thiểu 6 ký tự");
return;
}

if(isLogin){

await login(email,password);

}else{

if(password !== password2){
showToast("Mật khẩu không khớp");
return;
}

await register(email,password);

}

}

async function login(email,password){

try{

const {data,error} = await sb.auth.signInWithPassword({
email,
password
});

if(error){
showToast("Email hoặc mật khẩu sai");
return;
}

const user = data.user;

const {data:profile,error:profileError} = await sb
.from("users")
.select("*")
.eq("id",user.id)
.maybeSingle();

if(profileError){
showToast("Lỗi tải dữ liệu người dùng");
return;
}

if(!profile){

await sb.from("users").insert({
id:user.id,
email:user.email,
role:"student"
});

}

showToast("Đăng nhập thành công");

setTimeout(()=>{
window.location.href="dashboard.html";
},800);

}catch(e){

showToast("Lỗi hệ thống");

}

}

async function register(email,password){

try{

// kiểm tra email đã tồn tại chưa
const {data:exist} = await sb
.from("users")
.select("email")
.eq("email",email)
.maybeSingle();

if(exist){
showToast("Email đã được đăng ký");
return;
}

const {data,error} = await sb.auth.signUp({
email,
password
});

if(error){
showToast(error.message);
return;
}

if(!data.user){
showToast("Không thể tạo tài khoản");
return;
}

await sb.from("users").insert({
id:data.user.id,
email:email,
role:"student"
});

showToast("Tạo tài khoản thành công");

}catch(e){

showToast("Lỗi hệ thống");

}

}

function showToast(msg){

const toast = document.getElementById("toast");

toast.innerText = msg;

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}

</script>

</body>
</html>
