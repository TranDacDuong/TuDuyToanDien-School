<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trang cá nhân</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: var(--font-body);
  background: linear-gradient(180deg, #f6f1e6 0%, var(--cream) 24%, #fafbff 100%);
  color: var(--ink);
}
.hidden { display: none !important; }
.page {
  max-width: 1000px;
  margin: 0 auto;
  padding: 28px 20px 56px;
}
.box {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: var(--shadow-sm);
}
.loading,
.error,
.empty {
  padding: 22px;
  text-align: center;
  color: var(--ink-mid);
}
.error { color: var(--red); }
.hero {
  overflow: hidden;
  border-radius: 24px;
  box-shadow: var(--shadow-lg);
  background: var(--white);
  margin-bottom: 22px;
}
.cover {
  height: 240px;
  background:
    radial-gradient(circle at top right, rgba(228,184,77,.28), transparent 34%),
    linear-gradient(135deg, rgba(15,31,61,.96) 0%, rgba(31,65,128,.92) 50%, rgba(200,150,42,.76) 100%);
  background-size: cover;
  background-position: center;
}
.hero-body {
  padding: 0 26px 26px;
  margin-top: -56px;
}
.hero-top {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  align-items: flex-end;
  flex-wrap: wrap;
}
.identity {
  display: flex;
  gap: 18px;
  align-items: flex-end;
  flex-wrap: wrap;
}
.avatar {
  width: 122px;
  height: 122px;
  border-radius: 28px;
  object-fit: cover;
  background: var(--surface);
  border: 5px solid rgba(255,255,255,.96);
  box-shadow: 0 12px 30px rgba(15,31,61,.18);
}
.name {
  font-family: var(--font-display);
  font-size: 2rem;
  color: var(--navy);
  line-height: 1.08;
  margin-bottom: 8px;
}
.role {
  display: inline-flex;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--gold-pale);
  color: var(--gold);
  border: 1px solid var(--gold-border);
  font-size: .78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.meta {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--ink-mid);
  border-radius: 999px;
  padding: 7px 12px;
  font-size: .8rem;
}
.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.actions .btn {
  min-width: 132px;
  justify-content: center;
}
.friend-response {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.layout {
  display: grid;
  grid-template-columns: 320px minmax(0, 1fr);
  gap: 20px;
}
.panel-head {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--surface);
}
.panel-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  color: var(--navy);
}
.panel-sub {
  margin-top: 4px;
  color: var(--ink-light);
  font-size: .78rem;
}
.panel-body {
  padding: 18px 20px 20px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.stat {
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  background: linear-gradient(180deg, #fff 0%, #fbfbfd 100%);
}
.stat-label {
  font-size: .74rem;
  color: var(--ink-light);
  text-transform: uppercase;
  letter-spacing: .05em;
}
.stat-value {
  margin-top: 6px;
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--navy);
}
.bio {
  white-space: pre-wrap;
  line-height: 1.72;
  font-size: .9rem;
}
.bio-empty {
  color: var(--ink-light);
  font-size: .85rem;
}
.info {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.info-row {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--surface);
}
.info-row:last-child {
  border-bottom: none;
  padding-bottom: 0;
}
.info-key {
  min-width: 84px;
  color: var(--ink-light);
  font-size: .78rem;
  text-transform: uppercase;
}
.info-value {
  color: var(--ink);
  font-size: .88rem;
}
.friend-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.friend-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--surface);
}
.friend-item:last-child {
  border-bottom: none;
  padding-bottom: 0;
}
.friend-avatar {
  width: 42px;
  height: 42px;
  border-radius: 14px;
  object-fit: cover;
  border: 1px solid var(--gold-border);
  background: var(--surface);
}
.friend-name {
  color: var(--navy);
  font-size: .88rem;
  font-weight: 700;
}
.friend-link {
  text-decoration: none;
}
.friend-link:hover .friend-name {
  text-decoration: underline;
}
.friend-empty {
  color: var(--ink-light);
  font-size: .84rem;
}
.posts {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.post {
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  background: linear-gradient(180deg, #fff 0%, #fcfcfe 100%);
  box-shadow: var(--shadow-sm);
}
.post-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding: 18px 20px 0;
}
.post-author {
  display: flex;
  gap: 12px;
  align-items: center;
}
.post-avatar {
  width: 44px;
  height: 44px;
  border-radius: 16px;
  object-fit: cover;
  border: 2px solid var(--gold-border);
  background: var(--surface);
}
.post-name {
  font-size: .9rem;
  font-weight: 700;
  color: var(--navy);
}
.post-time {
  margin-top: 3px;
  color: var(--ink-light);
  font-size: .77rem;
}
.post-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: flex-end;
}
.post-body {
  padding: 14px 20px 16px;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.7;
  font-size: .92rem;
}
.media-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  padding: 0 20px 16px;
}
.media-item {
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--surface);
}
.post-foot {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  padding: 14px 20px 18px;
  border-top: 1px solid var(--surface);
  color: var(--ink-mid);
  font-size: .84rem;
}
@media (max-width: 860px) {
  .layout { grid-template-columns: 1fr; }
  .cover { height: 210px; }
  .hero-body { padding: 0 18px 20px; }
}
@media (max-width: 560px) {
  .page { padding: 18px 12px 32px; }
  .avatar { width: 96px; height: 96px; border-radius: 22px; }
  .name { font-size: 1.55rem; }
  .actions .btn { flex: 1; min-width: 0; }
}
</style>
</head>
<body>
<div class="page">
  <div id="loadingBox" class="box loading">Đang tải trang cá nhân...</div>
  <div id="profileView" class="hidden">
    <section class="hero">
      <div class="cover" id="coverBox"></div>
      <div class="hero-body">
        <div class="hero-top">
          <div class="identity">
            <img id="avatarBox" class="avatar" src="default-avatar.png" alt="Avatar">
            <div>
              <div id="nameBox" class="name">Người dùng</div>
              <div id="roleBox" class="role">Thành viên</div>
              <div id="metaBox" class="meta"></div>
            </div>
          </div>
          <div id="actionBox" class="actions"></div>
        </div>
      </div>
    </section>
    <div class="layout">
      <aside>
        <section class="box">
          <div class="panel-head">
            <div class="panel-title">Tổng quan</div>
            <div class="panel-sub">Những thông tin nổi bật trên hồ sơ</div>
          </div>
          <div class="panel-body">
            <div id="statsBox" class="stats"></div>
          </div>
        </section>
        <section class="box" style="margin-top:20px;">
          <div class="panel-head">
            <div class="panel-title">Giới thiệu</div>
            <div class="panel-sub">Thông tin cá nhân cơ bản</div>
          </div>
          <div class="panel-body">
            <div id="bioBox" class="bio-empty">Chưa có mô tả cá nhân.</div>
            <div class="divider"></div>
            <div id="infoBox" class="info"></div>
          </div>
        </section>

        <section class="box" style="margin-top:20px;">
          <div class="panel-head">
            <div class="panel-title">Bạn bè</div>
            <div class="panel-sub">Những kết nối gần đây trên trang cá nhân</div>
          </div>
          <div class="panel-body">
            <div id="friendListBox" class="friend-list">
              <div class="friend-empty">Đang tải danh sách bạn bè...</div>
            </div>
          </div>
        </section>
      </aside>
      <main>
        <section class="box">
          <div class="panel-head">
            <div class="panel-title">Bài viết</div>
            <div id="postSubBox" class="panel-sub">Bài viết trên trang cá nhân</div>
          </div>
          <div class="panel-body">
            <div id="postList" class="posts"></div>
          </div>
        </section>
      </main>
    </div>
  </div>
  <div id="errorBox" class="box error hidden"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script>
let currentUser = null;
let viewedProfile = null;
let viewedUserId = null;
let profileChannels = [];
let profileRefreshTimer = null;

async function createNotification(userId, type, message, refId) {
  if (!userId || userId === currentUser.id) return;
  await sb.from("notifications").insert({
    user_id: userId,
    actor_id: currentUser.id,
    type,
    ref_id: refId || null,
    message
  });
}

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    location.href = "index.html";
    return;
  }

  currentUser = user;
  const params = new URLSearchParams(location.search);
  viewedUserId = params.get("id") || user.id;

  const { data: profile, error } = await sb.from("users").select("*").eq("id", viewedUserId).single();
  if (error || !profile) throw new Error("Không tìm thấy trang cá nhân này.");
  viewedProfile = profile;

  renderHeader();
  await renderPostsAndStats();
  await renderFriendList();
  subscribeProfileRealtime();

  document.getElementById("loadingBox").classList.add("hidden");
  document.getElementById("profileView").classList.remove("hidden");
}

function subscribeProfileRealtime() {
  clearProfileRealtime();

  const tables = [
    { table: "users", filter: "id=eq." + viewedUserId, handler: refreshProfileView },
    { table: "posts", filter: "user_id=eq." + viewedUserId, handler: refreshPostSection },
    { table: "friendships", handler: refreshProfileView },
    { table: "friend_requests", handler: refreshRelationshipState }
  ];

  profileChannels = tables.map(item =>
    sb
      .channel("profile:" + item.table + ":" + viewedUserId + ":" + Math.random().toString(36).slice(2))
      .on(
        "postgres_changes",
        { event: "*", schema: "public", table: item.table, filter: item.filter },
        () => item.handler()
      )
      .subscribe()
  );
}

function clearProfileRealtime() {
  profileChannels.forEach(channel => sb.removeChannel(channel));
  profileChannels = [];
}

function queueProfileRefresh(task) {
  clearTimeout(profileRefreshTimer);
  profileRefreshTimer = setTimeout(task, 180);
}

async function refreshProfileView() {
  queueProfileRefresh(async () => {
    const { data: profile } = await sb.from("users").select("*").eq("id", viewedUserId).single();
    if (profile) {
      viewedProfile = profile;
      renderHeader();
    }
    await renderPostsAndStats();
    await renderFriendList();
  });
}

async function refreshPostSection() {
  queueProfileRefresh(async () => {
    await renderPostsAndStats();
  });
}

async function refreshRelationshipState() {
  queueProfileRefresh(async () => {
    if (viewedProfile.id !== currentUser.id) {
      await setupFriendButton();
    }
    await renderPostsAndStats();
    await renderFriendList();
  });
}

function renderHeader() {
  document.getElementById("nameBox").textContent = viewedProfile.full_name || "Người dùng";
  document.getElementById("roleBox").textContent = formatRole(viewedProfile.role);
  document.getElementById("avatarBox").src = viewedProfile.avatar_url || "default-avatar.png";
  document.getElementById("avatarBox").onerror = function() { this.src = "default-avatar.png"; };

  if (viewedProfile.cover_url) {
    document.getElementById("coverBox").style.backgroundImage =
      "linear-gradient(180deg, rgba(15,31,61,.18), rgba(15,31,61,.38)), url('" + safeUrl(viewedProfile.cover_url) + "')";
  }

  const meta = [];
  if (viewedProfile.school) meta.push(viewedProfile.school);
  if (viewedProfile.province) meta.push(viewedProfile.province);
  if (viewedProfile.subject) meta.push("Môn: " + viewedProfile.subject);
  document.getElementById("metaBox").innerHTML = meta.length
    ? meta.map(item => '<span class="chip">' + esc(item) + '</span>').join("")
    : '<span class="chip">Hồ sơ đang được hoàn thiện</span>';

  const bioBox = document.getElementById("bioBox");
  if (viewedProfile.bio && viewedProfile.bio.trim()) {
    bioBox.className = "bio";
    bioBox.textContent = viewedProfile.bio;
  }

  const info = [
    { key: "Email", value: viewedProfile.email || "Chưa cập nhật" },
    { key: "Điện thoại", value: viewedProfile.phone || "Chưa cập nhật" },
    { key: "Năm sinh", value: viewedProfile.birth_year || "Chưa cập nhật" },
    { key: "Trường", value: viewedProfile.school || "Chưa cập nhật" },
    { key: "Tỉnh", value: viewedProfile.province || "Chưa cập nhật" }
  ];
  document.getElementById("infoBox").innerHTML = info.map(item => `
    <div class="info-row">
      <div class="info-key">${esc(item.key)}</div>
      <div class="info-value">${esc(String(item.value))}</div>
    </div>
  `).join("");

  const actionBox = document.getElementById("actionBox");
  if (viewedProfile.id === currentUser.id) {
    actionBox.innerHTML = '<a class="btn btn-primary" href="account.html">Chỉnh sửa hồ sơ</a><a class="btn btn-outline" href="home.html">Về bảng tin</a>';
    document.getElementById("postSubBox").textContent = "Các bài viết bạn đã chia sẻ";
  } else {
    actionBox.innerHTML = '<button class="btn btn-gold" id="friendBtn" type="button">Kết bạn</button><a class="btn btn-outline" href="messages.html?user=' + viewedProfile.id + '">Nhắn tin</a><a class="btn btn-outline" href="home.html">Về bảng tin</a>';
    document.getElementById("postSubBox").textContent = "Những bài viết có thể xem được";
    setupFriendButton();
  }
}

async function setupFriendButton() {
  const btn = document.getElementById("friendBtn");
  if (!btn) return;

  const { data: friendship } = await sb
    .from("friendships")
    .select("id")
    .eq("user_id", currentUser.id)
    .eq("friend_id", viewedProfile.id)
    .maybeSingle();
  if (friendship) {
    const actionBox = document.getElementById("actionBox");
    actionBox.innerHTML = `
      <button class="btn btn-outline" type="button" disabled>Bạn bè</button>
      <button class="btn btn-outline" type="button" onclick="removeFriend()">Gỡ bạn</button>
      <a class="btn btn-outline" href="messages.html?user=${viewedProfile.id}">Nhắn tin</a>
      <a class="btn btn-outline" href="home.html">Về bảng tin</a>
    `;
    return;
  }

  const { data: sent } = await sb
    .from("friend_requests")
    .select("id")
    .eq("sender_id", currentUser.id)
    .eq("receiver_id", viewedProfile.id)
    .eq("status", "pending")
    .maybeSingle();
  if (sent) {
    const actionBox = document.getElementById("actionBox");
    actionBox.innerHTML = `
      <button class="btn btn-outline" type="button" disabled>Đã gửi lời mời</button>
      <button class="btn btn-outline" type="button" onclick="cancelFriendRequest('${sent.id}')">Hủy lời mời</button>
      <a class="btn btn-outline" href="messages.html?user=${viewedProfile.id}">Nhắn tin</a>
      <a class="btn btn-outline" href="home.html">Về bảng tin</a>
    `;
    return;
  }

  const { data: received } = await sb
    .from("friend_requests")
    .select("id")
    .eq("sender_id", viewedProfile.id)
    .eq("receiver_id", currentUser.id)
    .eq("status", "pending")
    .maybeSingle();
  if (received) {
    const actionBox = document.getElementById("actionBox");
    actionBox.innerHTML = `
      <div class="friend-response">
        <button class="btn btn-gold" type="button" onclick="acceptFriendRequest('${received.id}')">Chấp nhận</button>
        <button class="btn btn-outline" type="button" onclick="rejectFriendRequest('${received.id}')">Từ chối</button>
      </div>
      <a class="btn btn-outline" href="messages.html?user=${viewedProfile.id}">Nhắn tin</a>
      <a class="btn btn-outline" href="home.html">Về bảng tin</a>
    `;
    return;
  }

  btn.onclick = async function() {
    btn.disabled = true;
    const { error } = await sb.from("friend_requests").insert({
      sender_id: currentUser.id,
      receiver_id: viewedProfile.id,
      status: "pending"
    });
    if (error) {
      alert("Không gửi được lời mời kết bạn: " + error.message);
      btn.disabled = false;
      return;
    }
    await createNotification(viewedProfile.id, "friend_request", (currentUser.email || "Một người dùng") + " đã gửi cho bạn lời mời kết bạn.", null);
    btn.textContent = "Đã gửi lời mời";
    btn.className = "btn btn-outline";
  };
}

window.acceptFriendRequest = async function(requestId) {
  const { error: requestError } = await sb
    .from("friend_requests")
    .update({ status: "accepted", responded_at: new Date().toISOString() })
    .eq("id", requestId);

  if (requestError) {
    alert("Không thể chấp nhận lời mời: " + requestError.message);
    return;
  }

  const payload = [
    { user_id: currentUser.id, friend_id: viewedProfile.id },
    { user_id: viewedProfile.id, friend_id: currentUser.id }
  ];

  const { error: friendError } = await sb.from("friendships").upsert(payload, { onConflict: "user_id,friend_id" });
  if (friendError) {
    alert("Đã duyệt lời mời nhưng tạo quan hệ bạn bè lỗi: " + friendError.message);
    return;
  }
  await createNotification(viewedProfile.id, "friend_accept", (currentUser.email || "Một người dùng") + " đã chấp nhận lời mời kết bạn của bạn.", null);

  const actionBox = document.getElementById("actionBox");
  actionBox.innerHTML = '<button class="btn btn-outline" type="button" disabled>Bạn bè</button><a class="btn btn-outline" href="messages.html?user=' + viewedProfile.id + '">Nhắn tin</a><a class="btn btn-outline" href="home.html">Về bảng tin</a>';
};

window.rejectFriendRequest = async function(requestId) {
  const { error } = await sb
    .from("friend_requests")
    .update({ status: "rejected", responded_at: new Date().toISOString() })
    .eq("id", requestId);

  if (error) {
    alert("Không thể từ chối lời mời: " + error.message);
    return;
  }

  const actionBox = document.getElementById("actionBox");
  actionBox.innerHTML = '<button class="btn btn-gold" id="friendBtn" type="button">Kết bạn</button><a class="btn btn-outline" href="home.html">Về bảng tin</a>';
  setupFriendButton();
};

window.cancelFriendRequest = async function(requestId) {
  const { error } = await sb
    .from("friend_requests")
    .update({ status: "cancelled", responded_at: new Date().toISOString() })
    .eq("id", requestId);

  if (error) {
    alert("Không thể hủy lời mời: " + error.message);
    return;
  }

  const actionBox = document.getElementById("actionBox");
  actionBox.innerHTML = '<button class="btn btn-gold" id="friendBtn" type="button">Kết bạn</button><a class="btn btn-outline" href="home.html">Về bảng tin</a>';
  setupFriendButton();
};

window.removeFriend = async function() {
  if (!confirm("Bạn có chắc muốn gỡ bạn không?")) return;

  const { error } = await sb
    .from("friendships")
    .delete()
    .or(`and(user_id.eq.${currentUser.id},friend_id.eq.${viewedProfile.id}),and(user_id.eq.${viewedProfile.id},friend_id.eq.${currentUser.id})`);

  if (error) {
    alert("Không thể gỡ bạn: " + error.message);
    return;
  }

  const actionBox = document.getElementById("actionBox");
  actionBox.innerHTML = '<button class="btn btn-gold" id="friendBtn" type="button">Kết bạn</button><a class="btn btn-outline" href="home.html">Về bảng tin</a>';
  setupFriendButton();
};

async function renderPostsAndStats() {
  const isOwner = viewedProfile.id === currentUser.id;
  const { data: friendship } = isOwner ? { data: { id: "self" } } : await sb
    .from("friendships")
    .select("id")
    .eq("user_id", currentUser.id)
    .eq("friend_id", viewedProfile.id)
    .maybeSingle();

  const { data: posts, error } = await sb
    .from("posts")
    .select(`
      *,
      users(full_name, avatar_url),
      likes(count),
      comments(count),
      post_media(file_url, file_type, sort_order)
    `)
    .eq("user_id", viewedProfile.id)
    .eq("status", "approved")
    .order("created_at", { ascending: false });

  if (error) throw new Error("Không tải được bài viết trên trang cá nhân.");

  const visiblePosts = (posts || []).filter(post => {
    if (isOwner) return true;
    if (post.visibility === "public" || !post.visibility) return true;
    if (post.visibility === "friends" && friendship) return true;
    return false;
  });

  const { count: friendCount } = await sb
    .from("friendships")
    .select("*", { count: "exact", head: true })
    .eq("user_id", viewedProfile.id);

  document.getElementById("statsBox").innerHTML = [
    statCard("Bài viết", visiblePosts.length),
    statCard("Bạn bè", friendCount || 0),
    statCard("Lượt thích", visiblePosts.reduce((sum, post) => sum + (post.likes?.[0]?.count || 0), 0)),
    statCard("Bình luận", visiblePosts.reduce((sum, post) => sum + (post.comments?.[0]?.count || 0), 0))
  ].join("");

  const postList = document.getElementById("postList");
  if (!visiblePosts.length) {
    postList.innerHTML = '<div class="empty">Chưa có bài viết nào để hiển thị.</div>';
    return;
  }

  postList.innerHTML = visiblePosts.map(post => {
    const media = (post.post_media || [])
      .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0))
      .map(item => item.file_type === "video"
        ? '<video class="media-item" src="' + safeUrl(item.file_url) + '" controls></video>'
        : '<img class="media-item" src="' + safeUrl(item.file_url) + '" alt="Ảnh bài viết">')
      .join("");

    const badges = [];
    if (post.is_pinned) badges.push('<span class="badge badge-gold">Đã ghim</span>');
    if (post.visibility === "friends") badges.push('<span class="badge badge-blue">Bạn bè</span>');
    if (post.visibility === "private") badges.push('<span class="badge badge-navy">Riêng tư</span>');

    return `
      <article class="post">
        <div class="post-head">
          <div class="post-author">
            <img class="post-avatar" src="${safeUrl(post.users?.avatar_url || "default-avatar.png")}" alt="Avatar" onerror="this.src='default-avatar.png'">
            <div>
              <div class="post-name">${esc(post.users?.full_name || "Người dùng")}</div>
              <div class="post-time">${formatTime(post.created_at)}</div>
            </div>
          </div>
          <div class="post-badges">${badges.join("")}</div>
        </div>
        <div class="post-body">${esc(post.content || "")}</div>
        ${media ? '<div class="media-grid">' + media + '</div>' : ""}
        <div class="post-foot">
          <span>${post.likes?.[0]?.count || 0} lượt thích</span>
          <span>${post.comments?.[0]?.count || 0} bình luận</span>
        </div>
      </article>
    `;
  }).join("");
}

async function renderFriendList() {
  const { data, error } = await sb
    .from("friendships")
    .select("friend_id, users!friendships_friend_id_fkey(full_name, avatar_url)")
    .eq("user_id", viewedProfile.id)
    .order("created_at", { ascending: false })
    .limit(8);

  const wrap = document.getElementById("friendListBox");
  if (error) {
    wrap.innerHTML = '<div class="friend-empty">Không tải được danh sách bạn bè.</div>';
    return;
  }

  if (!data || !data.length) {
    wrap.innerHTML = '<div class="friend-empty">Chưa có bạn bè nào.</div>';
    return;
  }

  wrap.innerHTML = data.map(item => `
    <a class="friend-link" href="profile.html?id=${item.friend_id}">
      <div class="friend-item">
        <img class="friend-avatar" src="${safeUrl(item.users?.avatar_url || "default-avatar.png")}" alt="Avatar" onerror="this.src='default-avatar.png'">
        <div class="friend-name">${esc(item.users?.full_name || "Người dùng")}</div>
      </div>
    </a>
  `).join("");
}

function statCard(label, value) {
  return '<div class="stat"><div class="stat-label">' + esc(label) + '</div><div class="stat-value">' + esc(String(value)) + '</div></div>';
}

function formatRole(role) {
  if (role === "admin") return "Quản trị viên";
  if (role === "teacher") return "Giáo viên";
  if (role === "student") return "Học sinh";
  return "Thành viên";
}

function formatTime(value) {
  return new Date(value).toLocaleString("vi-VN", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function esc(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function safeUrl(value) {
  return String(value || "").replace(/"/g, "&quot;");
}

window.addEventListener("beforeunload", () => {
  clearProfileRealtime();
  if (profileRefreshTimer) clearTimeout(profileRefreshTimer);
});

init().catch(err => {
  document.getElementById("loadingBox").classList.add("hidden");
  const errorBox = document.getElementById("errorBox");
  errorBox.textContent = err.message || "Có lỗi xảy ra khi tải trang cá nhân.";
  errorBox.classList.remove("hidden");
});
</script>
