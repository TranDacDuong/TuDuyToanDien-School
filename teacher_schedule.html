<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Giáo viên và thời khóa biểu</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="theme.css?v=20260615-ios1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script src="visual-effects.js?v=20260602-mindup1" defer></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:var(--font-body);background:radial-gradient(circle at top left,rgba(200,150,42,.12),transparent 24%),linear-gradient(180deg,#f4efe4 0%,#f8f5ef 24%,#f7faff 100%);color:var(--ink)}
.page{max-width:1280px;margin:0 auto;padding:24px 22px 48px}
.hero{margin-bottom:18px;padding:24px 26px;border-radius:24px;background:radial-gradient(circle at top right,rgba(255,255,255,.2),transparent 30%),linear-gradient(135deg,rgba(15,31,61,.98) 0%,rgba(31,65,128,.95) 55%,rgba(200,150,42,.86) 100%);border:1px solid rgba(35,56,92,.08);box-shadow:0 18px 42px rgba(15,23,42,.08)}
.hero h1{margin:0 0 8px;color:#fff;font-family:var(--font-display);font-size:2rem}
.hero p{margin:0;color:rgba(255,255,255,.82);line-height:1.65}
.toolbar{display:grid;grid-template-columns:minmax(220px,1fr) minmax(180px,260px) auto;gap:12px;margin-bottom:18px;padding:14px;border-radius:22px;background:rgba(255,255,255,.9);border:1px solid rgba(15,31,61,.08);box-shadow:0 14px 28px rgba(15,31,61,.07)}
.input,.select{width:100%;border:1px solid rgba(39,58,91,.14);border-radius:14px;padding:11px 13px;font:inherit;background:#fff;color:var(--navy)}
.layout{display:grid;grid-template-columns:minmax(280px,340px) 1fr;gap:18px;align-items:start}
.card{background:#fff;border:1px solid rgba(35,56,92,.08);border-radius:24px;box-shadow:0 18px 42px rgba(15,23,42,.08);overflow:hidden}
.card-hd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 18px;border-bottom:1px solid rgba(39,58,91,.08);background:linear-gradient(180deg,#fff 0%,#fbfcff 100%)}
.card-hd h2{margin:0;font-family:var(--font-display);font-size:1.08rem;color:var(--navy)}
.count{border-radius:999px;padding:5px 10px;background:#edf4ff;color:#35507c;font-size:.76rem;font-weight:800}
.teacher-list{display:grid;gap:8px;padding:14px;max-height:calc(100vh - 230px);overflow:auto}
.teacher-link{display:flex;gap:10px;align-items:center;padding:10px 11px;border:1px solid rgba(39,58,91,.08);border-radius:16px;background:#fff;color:inherit;text-decoration:none;transition:.15s}
.teacher-link:hover{transform:translateY(-1px);border-color:rgba(200,150,42,.34);box-shadow:0 10px 22px rgba(15,31,61,.08)}
.avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:var(--gold-light);display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.teacher-name{font-weight:800;color:var(--navy);font-size:.92rem}
.teacher-meta{font-size:.76rem;color:var(--ink-light);margin-top:2px;line-height:1.35}
.schedule-stack{display:grid;gap:18px}
.room-card{background:#fff;border:1px solid rgba(35,56,92,.08);border-radius:24px;box-shadow:0 18px 42px rgba(15,23,42,.08);overflow:hidden}
.room-title{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:16px 18px;background:linear-gradient(180deg,#fff 0%,#fbfcff 100%);border-bottom:1px solid rgba(39,58,91,.08)}
.room-title h3{margin:0;font-family:var(--font-display);font-size:1.05rem;color:var(--navy)}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:840px}
th{background:var(--navy);color:var(--gold-light);padding:10px 12px;text-align:left;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid rgba(39,58,91,.08);vertical-align:top}
tbody tr:nth-child(even) td{background:#fbfdff}
.time-cell{font-weight:800;color:var(--navy);white-space:nowrap}
.lesson-list{display:grid;gap:8px;min-height:34px}
.lesson{border:1px solid rgba(29,107,209,.12);border-radius:14px;padding:9px 10px;background:linear-gradient(180deg,#fff 0%,#f8fbff 100%)}
.lesson-class{font-weight:800;color:var(--navy);line-height:1.35}
.lesson-meta{margin-top:4px;color:var(--ink-mid);font-size:.75rem;line-height:1.45;font-weight:700}
.empty{padding:28px;text-align:center;color:var(--ink-light)}
@media(max-width:920px){
  .page{padding:16px 12px 32px}
  .toolbar{grid-template-columns:1fr}
  .layout{grid-template-columns:1fr}
  .teacher-list{max-height:none}
  .hero,.card,.room-card,.toolbar{border-radius:20px}
}
</style>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f1f3d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MindUp">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script src="pwa.js?v=20260630-push-vapid7" defer></script>
</head>
<body>
<div class="page">
  <section class="hero">
    <h1>Giáo viên và thời khóa biểu</h1>
    <p>Xem nhanh danh sách giáo viên và lịch học theo từng phòng. Click vào giáo viên để mở trang cá nhân.</p>
  </section>

  <section class="toolbar">
    <input id="keyword" class="input" placeholder="Tìm giáo viên, lớp, phòng, môn...">
    <select id="roomFilter" class="select"><option value="">Tất cả phòng</option></select>
    <button class="btn btn-primary" type="button" onclick="loadPageData()">Tải lại</button>
  </section>

  <main class="layout">
    <aside class="card">
      <div class="card-hd">
        <h2>Danh sách giáo viên</h2>
        <span class="count" id="teacherCount">0</span>
      </div>
      <div id="teacherList" class="teacher-list"><div class="empty">Đang tải giáo viên...</div></div>
    </aside>

    <section id="roomSchedules" class="schedule-stack">
      <div class="empty card">Đang tải thời khóa biểu...</div>
    </section>
  </main>
</div>

<script>
const DAYS = {1:"Thứ hai",2:"Thứ ba",3:"Thứ tư",4:"Thứ năm",5:"Thứ sáu",6:"Thứ bảy",7:"Chủ nhật"};
let STATE = { teachers:[], rooms:[], classes:[], schedules:[], classTeachers:[], classStudents:[], teacherById:{}, classById:{}, teacherNamesByClass:{}, rosterCountByClass:{} };

function esc(s){ return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s){ return esc(s).replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function normalizeText(value){ return String(value || "").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim(); }
function initials(name){ return String(name || "?").trim().split(/\s+/).slice(-2).map(part => part[0] || "").join("").toUpperCase() || "?"; }
function timeText(item){ return `${String(item.start_time || "").slice(0,5)} - ${String(item.end_time || "").slice(0,5)}`; }

function getMonthStart(){
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-01`;
}

function activeSchedulesForCurrentMonth(schedules){
  const monthStart = getMonthStart();
  const grouped = new Map();
  (schedules || []).forEach(item => {
    if(!item.class_id) return;
    const list = grouped.get(item.class_id) || [];
    list.push(item);
    grouped.set(item.class_id, list);
  });
  const active = [];
  grouped.forEach(list => {
    const eligible = list.filter(item => (item.effective_from || "2000-01-01") <= monthStart);
    const source = eligible.length ? eligible : list;
    const maxEffective = source.reduce((max, item) => {
      const value = item.effective_from || "2000-01-01";
      return value > max ? value : max;
    }, "2000-01-01");
    source.filter(item => (item.effective_from || "2000-01-01") === maxEffective).forEach(item => active.push(item));
  });
  return active;
}

function renderTeachers(){
  const q = normalizeText(document.getElementById("keyword")?.value || "");
  const teachers = STATE.teachers.filter(t => {
    const text = normalizeText(`${t.full_name || ""} ${t.email || ""} ${t.subject || ""} ${t.phone || ""}`);
    return !q || text.includes(q);
  });
  document.getElementById("teacherCount").textContent = teachers.length;
  const list = document.getElementById("teacherList");
  if(!teachers.length){
    list.innerHTML = '<div class="empty">Không có giáo viên phù hợp.</div>';
    return;
  }
  list.innerHTML = teachers.map(t => `
    <a class="teacher-link" href="profile.html?id=${encodeURIComponent(t.id)}">
      ${t.avatar_url ? `<img class="avatar" src="${escAttr(t.avatar_url)}" alt="">` : `<div class="avatar">${esc(initials(t.full_name))}</div>`}
      <div>
        <div class="teacher-name">${esc(t.full_name || "Giáo viên")}</div>
        <div class="teacher-meta">${esc(t.subject || t.email || "Chưa có thông tin")}</div>
      </div>
    </a>
  `).join("");
}

function scheduleSearchText(item){
  const cls = STATE.classById[item.class_id] || {};
  const teachers = STATE.teacherNamesByClass[item.class_id] || [];
  return normalizeText(`${cls.class_name || ""} ${cls.grades?.name || ""} ${cls.subjects?.name || ""} ${teachers.join(" ")} ${item.rooms?.room_name || ""} ${timeText(item)}`);
}

function renderRoomSchedules(){
  const wrap = document.getElementById("roomSchedules");
  const roomNeedle = document.getElementById("roomFilter")?.value || "";
  const q = normalizeText(document.getElementById("keyword")?.value || "");
  const baseSchedules = activeSchedulesForCurrentMonth(STATE.schedules)
    .filter(item => STATE.classById[item.class_id]);
  const activeSchedules = baseSchedules
    .filter(item => !roomNeedle || String(item.room_id || "") === roomNeedle)
    .filter(item => !q || scheduleSearchText(item).includes(q));
  const roomIds = new Set(activeSchedules.map(item => item.room_id || "__none__"));
  let rooms = roomNeedle
    ? STATE.rooms.filter(room => room.id === roomNeedle)
    : q
      ? STATE.rooms.filter(room => roomIds.has(room.id))
      : [...STATE.rooms];
  if(roomIds.has("__none__")) rooms.push({ id:"__none__", room_name:"Chưa xếp phòng", capacity:null });
  if(!rooms.length){
    wrap.innerHTML = '<div class="empty card">Không có lịch học phù hợp.</div>';
    return;
  }
  wrap.innerHTML = rooms.map(room => renderRoomTable(room, activeSchedules.filter(item => (item.room_id || "__none__") === room.id))).join("");
}

function renderRoomTable(room, schedules){
  const slots = [...new Set(schedules.map(item => `${String(item.start_time || "").slice(0,5)}|${String(item.end_time || "").slice(0,5)}`))]
    .filter(slot => slot !== "|")
    .sort((a,b) => a.localeCompare(b));
  const scheduleCount = schedules.length;
  return `
    <article class="room-card">
      <div class="room-title">
        <h3>${esc(room.room_name || "Phòng học")}</h3>
        <span class="count">${scheduleCount} lịch${room.capacity ? ` • ${esc(room.capacity)} chỗ` : ""}</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Khung giờ</th>${Object.values(DAYS).map(day => `<th>${day}</th>`).join("")}</tr></thead>
          <tbody>
            ${slots.length ? slots.map(slot => {
              const [start, end] = slot.split("|");
              return `<tr>
                <td class="time-cell">${esc(start)} - ${esc(end)}</td>
                ${Object.keys(DAYS).map(day => `<td>${renderLessonCell(schedules, Number(day), slot)}</td>`).join("")}
              </tr>`;
            }).join("") : '<tr><td colspan="8"><div class="empty">Phòng này chưa có lịch học.</div></td></tr>'}
          </tbody>
        </table>
      </div>
    </article>
  `;
}

function renderLessonCell(schedules, weekday, slot){
  const items = schedules
    .filter(item => Number(item.weekday) === weekday && `${String(item.start_time || "").slice(0,5)}|${String(item.end_time || "").slice(0,5)}` === slot)
    .sort((a,b) => Number(a.session_no || 1)-Number(b.session_no || 1) || String(STATE.classById[a.class_id]?.class_name || "").localeCompare(String(STATE.classById[b.class_id]?.class_name || ""), "vi"));
  if(!items.length) return '<div class="lesson-list"></div>';
  return `<div class="lesson-list">${items.map(item => {
    const cls = STATE.classById[item.class_id] || {};
    const rosterCount = STATE.rosterCountByClass[item.class_id] || 0;
    return `
      <div class="lesson">
        <div class="lesson-class">${esc(cls.class_name || "Lớp học")}</div>
        <div class="lesson-meta">Buổi ${esc(item.session_no || 1)} • Sĩ số ${esc(rosterCount)}</div>
      </div>
    `;
  }).join("")}</div>`;
}

function renderRoomFilter(){
  const sel = document.getElementById("roomFilter");
  const prev = sel.value || "";
  sel.innerHTML = '<option value="">Tất cả phòng</option>' + STATE.rooms.map(room => `<option value="${escAttr(room.id)}" ${room.id === prev ? "selected" : ""}>${esc(room.room_name || "Phòng học")}</option>`).join("");
}

function renderAll(){
  renderTeachers();
  renderRoomFilter();
  renderRoomSchedules();
}

async function loadPageData(){
  const teacherList = document.getElementById("teacherList");
  const roomSchedules = document.getElementById("roomSchedules");
  teacherList.innerHTML = '<div class="empty">Đang tải giáo viên...</div>';
  roomSchedules.innerHTML = '<div class="empty card">Đang tải thời khóa biểu...</div>';
  const [{ data: teachers, error: teacherError }, { data: rooms, error: roomError }, { data: classes, error: classError }, { data: schedules, error: scheduleError }, { data: classTeachers, error: classTeacherError }, { data: classStudents, error: classStudentError }] = await Promise.all([
    sb.from("users").select("id,full_name,email,phone,subject,avatar_url,role").eq("role","teacher").order("full_name"),
    sb.from("rooms").select("id,room_name,capacity").order("room_name"),
    sb.from("classes").select("id,class_name,hidden,grades(name),subjects(name)").eq("hidden",false).order("class_name"),
    sb.from("class_schedules").select("id,class_id,session_no,weekday,start_time,end_time,effective_from,room_id,rooms(id,room_name)").order("weekday").order("start_time"),
    sb.from("class_teachers").select("class_id,teacher_id"),
    sb.from("class_students").select("class_id,student_id,left_at").is("left_at", null),
  ]);
  const firstError = teacherError || roomError || classError || scheduleError || classTeacherError || classStudentError;
  if(firstError){
    teacherList.innerHTML = `<div class="empty">${esc(firstError.message || "Không tải được dữ liệu.")}</div>`;
    roomSchedules.innerHTML = `<div class="empty card">${esc(firstError.message || "Không tải được dữ liệu.")}</div>`;
    return;
  }
  STATE.teachers = teachers || [];
  STATE.rooms = rooms || [];
  STATE.classes = classes || [];
  STATE.schedules = schedules || [];
  STATE.classTeachers = classTeachers || [];
  STATE.classStudents = classStudents || [];
  STATE.teacherById = Object.fromEntries(STATE.teachers.map(t => [t.id, t]));
  STATE.classById = Object.fromEntries(STATE.classes.map(cls => [cls.id, cls]));
  STATE.teacherNamesByClass = {};
  STATE.classTeachers.forEach(row => {
    const name = STATE.teacherById[row.teacher_id]?.full_name;
    if(!name) return;
    if(!STATE.teacherNamesByClass[row.class_id]) STATE.teacherNamesByClass[row.class_id] = [];
    STATE.teacherNamesByClass[row.class_id].push(name);
  });
  STATE.rosterCountByClass = {};
  STATE.classStudents.forEach(row => {
    if(!row.class_id || !row.student_id) return;
    STATE.rosterCountByClass[row.class_id] = (STATE.rosterCountByClass[row.class_id] || 0) + 1;
  });
  renderAll();
}

document.getElementById("keyword").addEventListener("input", () => {
  renderTeachers();
  renderRoomSchedules();
});
document.getElementById("roomFilter").addEventListener("change", renderRoomSchedules);
loadPageData();
</script>
</body>
</html>
