<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý giáo viên</title>

<style>

body{
font-family:Arial;
background:#f1f5f9;
padding:30px;
}

h2{
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
max-width:500px;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:6px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f8fafc;
}

.actions button{
margin-right:6px;
}

.delete{
background:#ef4444;
}

</style>

</head>

<body>

<h2>Quản lý giáo viên</h2>

<!-- PHẦN ĐIỀN -->

<div class="card">

<input type="hidden" id="editUserId">

<label>Email</label> <input id="email">

<label>Môn giảng dạy</label> <select id="subject">

<option value="">Chọn môn</option>
<option>Toán</option>
<option>Văn</option>
<option>Anh</option>
<option>Lý</option>
<option>Hóa</option>
<option>Sinh</option>
<option>Sử</option>
<option>Địa</option>
</select>

<div id="extraFields" style="display:none">

<label>Năm sinh</label> <input id="birth_year">

<label>SĐT</label> <input id="phone">

</div>

<button id="submitBtn" onclick="submitTeacher()">Thêm giáo viên</button>

</div>

<!-- BẢNG GIÁO VIÊN -->

<table>

<thead>
<tr>
<th>STT</th>
<th>Tên</th>
<th>Email</th>
<th>Môn</th>
<th>Năm sinh</th>
<th>SĐT</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../supabaseClient.js"></script>

<script>

async function init(){
loadTeachers()
}



/* LOAD DANH SÁCH */

async function loadTeachers(){

const {data}=await sb
.from("users")
.select(`
id,
full_name,
email,
birth_year,
phone,
teachers(subject)
`)
.eq("role","teacher")

let html=""
let i=1

for(const u of data){

const t=u.teachers?.[0] || {}

html+=`

<tr>

<td>${i++}</td>
<td>${u.full_name ?? ""}</td>
<td>${u.email}</td>
<td>${t.subject ?? ""}</td>
<td>${u.birth_year ?? ""}</td>
<td>${u.phone ?? ""}</td>

<td>

<button onclick="editTeacher('${u.id}')">Sửa</button>

<button onclick="deleteTeacher('${u.id}')" class="delete">Xóa</button>

</td>

</tr>

`

}

document.getElementById("table").innerHTML=html

}



/* THÊM / CẬP NHẬT */

async function submitTeacher(){

const userId=document.getElementById("editUserId").value
const email=document.getElementById("email").value.trim()
const subject=document.getElementById("subject").value

/* ===== UPDATE ===== */

if(userId){

const {error}=await sb
.from("teachers")
.update({
subject
})
.eq("user_id",userId)

if(error){
alert(error.message)
return
}

resetForm()
loadTeachers()
return
}


/* ===== ADD ===== */

const {data:user,error:userError}=await sb
.from("users")
.select("*")
.eq("email",email)
.maybeSingle()

if(userError){
alert(userError.message)
return
}

if(!user){
alert("Không tìm thấy user")
return
}

if(user.role!=="student"){
alert("User này không phải student")
return
}


/* update role */

const {error:updateError}=await sb
.from("users")
.update({role:"teacher"})
.eq("id",user.id)

if(updateError){
alert(updateError.message)
return
}


/* insert teachers */

const {error:insertError}=await sb
.from("teachers")
.insert({
user_id:user.id,
subject
})

if(insertError){
alert(insertError.message)
return
}

resetForm()
loadTeachers()

}



/* SỬA */

async function editTeacher(id){

const {data}=await sb
.from("users")
.select(`
id,
email,
teachers(subject,birth_year,phone)
`)
.eq("id",id)
.single()

const t=data.teachers?.[0] || {}

document.getElementById("editUserId").value=id
document.getElementById("email").value=data.email
document.getElementById("subject").value=t.subject ?? ""
document.getElementById("birth_year").value=t.birth_year ?? ""
document.getElementById("phone").value=t.phone ?? ""

document.getElementById("extraFields").style.display="block"

document.getElementById("submitBtn").innerText="Cập nhật"

window.scrollTo({top:0,behavior:"smooth"})

}



/* XÓA */

async function deleteTeacher(id){

if(!confirm("Bạn có chắc muốn xóa giáo viên này?")) return


/* delete teachers */

const {error:deleteError}=await sb
.from("teachers")
.delete()
.eq("user_id",id)

if(deleteError){
alert(deleteError.message)
return
}


/* update role */

const {error:updateError}=await sb
.from("users")
.update({role:"student"})
.eq("id",id)

if(updateError){
alert(updateError.message)
return
}

loadTeachers()

}



/* RESET FORM */

function resetForm(){

document.getElementById("editUserId").value=""
document.getElementById("email").value=""
document.getElementById("subject").value=""
document.getElementById("birth_year").value=""
document.getElementById("phone").value=""

document.getElementById("extraFields").style.display="none"

document.getElementById("submitBtn").innerText="Thêm giáo viên"

}


init()

</script>

</body>
</html>
