<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý giáo viên</title>

<style>

body{
font-family:Arial;
background:#f1f5f9;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
max-width:500px;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:6px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f8fafc;
}

.actions button{
margin-right:5px;
}

.delete{
background:#ef4444;
}

.editbox{
display:none;
background:#f9fafb;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<h2>Quản lý giáo viên</h2>

<div class="card">

<label>Email</label> <input id="email">

<label>Môn giảng dạy</label> <select id="subject">

<option value="">Chọn môn</option>
<option>Toán</option>
<option>Văn</option>
<option>Anh</option>
<option>Lý</option>
<option>Hóa</option>
<option>Sinh</option>
<option>Sử</option>
<option>Địa</option>
</select>

<button onclick="addTeacher()">Thêm giáo viên</button>

</div>

<table>

<thead>
<tr>
<th>Tên</th>
<th>Email</th>
<th>Môn</th>
<th>Năm sinh</th>
<th>SĐT</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../supabaseClient.js"></script>

<script>

async function init(){
await ensureTeacherRows()
loadTeachers()
}


async function ensureTeacherRows(){

const {data:teachers} = await sb
.from("teachers")
.select("user_id")

const teacherIds = teachers.map(t=>t.user_id)

const {data:users} = await sb
.from("users")
.select("*")
.eq("role","teacher")

for(const u of users){

if(!teacherIds.includes(u.id)){

await sb.from("teachers").insert({
user_id:u.id
})

}

}

}



async function addTeacher(){

const email=document.getElementById("email").value.trim()
const subject=document.getElementById("subject").value

if(!email || !subject){
alert("Thiếu thông tin")
return
}

const {data:user}=await sb
.from("users")
.select("*")
.ilike("email",email)
.maybeSingle()

if(!user){
alert("Không tìm thấy user")
return
}

await sb
.from("users")
.update({role:"teacher"})
.eq("id",user.id)

await sb
.from("teachers")
.upsert({
user_id:user.id,
subject
})

document.getElementById("email").value=""
document.getElementById("subject").value=""

loadTeachers()

}



async function loadTeachers(){

const {data}=await sb
.from("users")
.select(`
id,
email,
full_name,
teachers(subject,birth_year,phone)
`)
.eq("role","teacher")

let html=""

for(const u of data){

const t=u.teachers?.[0] || {}

html+=`

<tr>

<td>${u.full_name ?? ""}</td>
<td>${u.email}</td>
<td>${t.subject ?? ""}</td>
<td>${t.birth_year ?? ""}</td>
<td>${t.phone ?? ""}</td>

<td class="actions">

<button onclick="showEdit('${u.id}','${t.subject ?? ""}','${t.birth_year ?? ""}','${t.phone ?? ""}')">
Sửa
</button>

<button class="delete" onclick="deleteTeacher('${u.id}')">
Xóa
</button>

<div class="editbox" id="edit-${u.id}">

<label>Môn</label>
<input id="subject-${u.id}" value="${t.subject ?? ""}">

<label>Năm sinh</label>
<input id="birth-${u.id}" value="${t.birth_year ?? ""}">

<label>SĐT</label>
<input id="phone-${u.id}" value="${t.phone ?? ""}">

<button onclick="saveEdit('${u.id}')">Lưu</button>

</div>

</td>

</tr>

`

}

document.getElementById("table").innerHTML=html

}



function showEdit(id){

const box=document.getElementById("edit-"+id)

box.style.display = box.style.display==="block" ? "none":"block"

}



async function saveEdit(id){

const subject=document.getElementById("subject-"+id).value
const birth=document.getElementById("birth-"+id).value
const phone=document.getElementById("phone-"+id).value

await sb
.from("teachers")
.update({
subject,
birth_year:birth,
phone
})
.eq("user_id",id)

loadTeachers()

}



async function deleteTeacher(id){

if(!confirm("Bạn có chắc muốn xóa giáo viên này?")) return

await sb
.from("users")
.update({
role:"student"
})
.eq("id",id)

await sb
.from("teachers")
.delete()
.eq("user_id",id)

loadTeachers()

}



init()

</script>

</body>
</html>
