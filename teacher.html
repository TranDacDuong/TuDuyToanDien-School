<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý giáo viên</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#f1f5f9;
margin:0;
padding:40px;
color:#0f172a;
}

h2{
margin-bottom:25px;
font-weight:600;
}

.container{
display:grid;
grid-template-columns:420px 1fr;
gap:30px;
align-items:start;
}

.card{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

label{
font-weight:500;
font-size:14px;
color:#475569;
}

input,select{
width:100%;
padding:11px;
margin-top:6px;
margin-bottom:16px;
border:1px solid #e2e8f0;
border-radius:8px;
font-size:14px;
background:#fafafa;
}

input:focus,select:focus{
outline:none;
border-color:#2563eb;
background:white;
}

button{
background:#2563eb;
color:white;
border:none;
padding:11px 16px;
border-radius:8px;
cursor:pointer;
font-weight:500;
font-size:14px;
}

button:hover{
background:#1d4ed8;
}

.table-card{
background:white;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:14px 16px;
border-bottom:1px solid #f1f5f9;
font-size:14px;
}

th{
background:#f8fafc;
font-weight:600;
color:#475569;
}

tr:hover{
background:#f9fafb;
}

.actions button{
margin-right:6px;
padding:7px 10px;
font-size:13px;
}

.delete{
background:#ef4444;
}

.delete:hover{
background:#dc2626;
}

.teacher{
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:32px;
height:32px;
border-radius:50%;
background:#2563eb;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
font-weight:600;
}

.badge{
background:#e0f2fe;
color:#0369a1;
padding:4px 8px;
border-radius:6px;
font-size:12px;
font-weight:500;
}

</style>
</head>

<body>

<h2>Quản lý giáo viên</h2>

<div class="container">

<!-- FORM -->

<div class="card">

<input type="hidden" id="editUserId">

<label>Email</label>
<input id="email" placeholder="Nhập email học sinh">

<label>Môn giảng dạy</label>
<select id="subject">
<option value="">Chọn môn</option>
<option>Toán</option>
<option>Văn</option>
<option>Anh</option>
<option>Lý</option>
<option>Hóa</option>
<option>Sinh</option>
<option>Sử</option>
<option>Địa</option>
</select>

<div id="extraFields" style="display:none">

<label>Năm sinh</label>
<input id="birth_year">

<label>SĐT</label>
<input id="phone">

</div>

<button id="submitBtn" onclick="submitTeacher()">Thêm giáo viên</button>

</div>


<!-- TABLE -->

<div class="table-card">

<table>

<thead>
<tr>
<th>STT</th>
<th>Giáo viên</th>
<th>Email</th>
<th>Môn</th>
<th>Năm sinh</th>
<th>SĐT</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabaseClient.js"></script>

<script>

async function init(){
loadTeachers()
}


/* LOAD TEACHERS */

async function loadTeachers(){

const {data,error}=await sb
.from("users")
.select(`
id,
full_name,
email,
birth_year,
phone,
teachers(subject)
`)
.eq("role","teacher")

if(error){
alert(error.message)
return
}

let html=""
let i=1

for(const u of data){

const t=u.teachers?.[0] || {}

const letter=(u.full_name||"?").charAt(0).toUpperCase()

html+=`

<tr>

<td>${i++}</td>

<td>
<div class="teacher">
<div class="avatar">${letter}</div>
<div>${u.full_name ?? ""}</div>
</div>
</td>

<td>${u.email}</td>

<td><span class="badge">${t.subject ?? ""}</span></td>

<td>${u.birth_year ?? ""}</td>

<td>${u.phone ?? ""}</td>

<td class="actions">

<button onclick="editTeacher('${u.id}')">Sửa</button>

<button onclick="deleteTeacher('${u.id}')" class="delete">Xóa</button>

</td>

</tr>

`

}

document.getElementById("table").innerHTML=html

}



/* ADD / UPDATE */

async function submitTeacher(){

const userId=document.getElementById("editUserId").value
const email=document.getElementById("email").value.trim()
const subject=document.getElementById("subject").value
const birth_year=document.getElementById("birth_year").value
const phone=document.getElementById("phone").value


if(userId){

const {error:teacherError}=await sb
.from("teachers")
.update({subject})
.eq("user_id",userId)

if(teacherError){
alert(teacherError.message)
return
}

const {error:userError}=await sb
.from("users")
.update({
birth_year,
phone
})
.eq("id",userId)

if(userError){
alert(userError.message)
return
}

resetForm()
loadTeachers()
return
}



const {data:user,error:userError}=await sb
.from("users")
.select("*")
.eq("email",email)
.maybeSingle()

if(userError){
alert(userError.message)
return
}

if(!user){
alert("Không tìm thấy user")
return
}

if(user.role!=="student"){
alert("User này không phải student")
return
}


const {error:updateError}=await sb
.from("users")
.update({role:"teacher"})
.eq("id",user.id)

if(updateError){
alert(updateError.message)
return
}


const {error:insertError}=await sb
.from("teachers")
.insert({
user_id:user.id,
subject
})

if(insertError){
alert(insertError.message)
return
}

resetForm()
loadTeachers()

}



/* EDIT */

async function editTeacher(id){

const {data,error}=await sb
.from("users")
.select(`
id,
email,
birth_year,
phone,
teachers(subject)
`)
.eq("id",id)
.single()

if(error){
alert(error.message)
return
}

const t=data.teachers?.[0] || {}

document.getElementById("editUserId").value=id
document.getElementById("email").value=data.email
document.getElementById("subject").value=t.subject ?? ""
document.getElementById("birth_year").value=data.birth_year ?? ""
document.getElementById("phone").value=data.phone ?? ""

document.getElementById("extraFields").style.display="block"

document.getElementById("submitBtn").innerText="Cập nhật"

window.scrollTo({top:0,behavior:"smooth"})

}



/* DELETE */

async function deleteTeacher(id){

if(!confirm("Bạn có chắc muốn xóa giáo viên này?")) return


const {error:deleteError}=await sb
.from("teachers")
.delete()
.eq("user_id",id)

if(deleteError){
alert(deleteError.message)
return
}


const {error:updateError}=await sb
.from("users")
.update({role:"student"})
.eq("id",id)

if(updateError){
alert(updateError.message)
return
}

loadTeachers()

}



/* RESET FORM */

function resetForm(){

document.getElementById("editUserId").value=""
document.getElementById("email").value=""
document.getElementById("subject").value=""
document.getElementById("birth_year").value=""
document.getElementById("phone").value=""

document.getElementById("extraFields").style.display="none"

document.getElementById("submitBtn").innerText="Thêm giáo viên"

}


init()

</script>

</body>
</html>
