<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Làm bài khóa học</title>
<link rel="stylesheet" href="theme.css">
<style>
body{margin:0;background:#eef3fb;color:var(--ink);font-family:var(--font-body)}
.exam-shell{position:fixed;inset:0;display:flex;flex-direction:column}
.topbar{height:58px;background:var(--navy);color:#fff;display:flex;align-items:center;gap:12px;padding:0 18px}
.topbar h1{margin:0;flex:1;font-size:1.05rem;font-family:var(--font-display)}
.clock{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);padding:7px 16px;border-radius:8px}
.clock strong{font-size:1.2rem;font-family:monospace;color:var(--gold-light)}
.exam-body{flex:1;display:flex;min-height:0}
.exam-nav{width:120px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);overflow:auto;padding:10px 8px}
.exam-main{flex:1;overflow:auto;padding:18px 20px;background:#f8fafc}
.nav-dot{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:#fff;cursor:pointer;margin-bottom:8px}
.nav-indicator{width:12px;height:12px;border-radius:999px;background:var(--border)}
.qcard{background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:16px;overflow:hidden}
.qhead{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.qnum{width:30px;height:30px;border-radius:999px;background:var(--navy);color:var(--gold-light);display:flex;align-items:center;justify-content:center;font-weight:700}
.qbody{padding:16px}.choice{display:flex;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;margin-top:10px;align-items:flex-start;background:#fff}.choice.active{border-color:var(--navy);background:#eff6ff}
.result-wrap{max-width:640px;margin:40px auto;text-align:center}
@media(max-width:760px){.exam-body{flex-direction:column}.exam-nav{width:auto;border-right:none;border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.nav-dot{margin-bottom:0}}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script src="review_helper.js"></script>
<script src="ai_solution.js"></script>
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']]
  },
  svg: { fontCache: 'global' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<script src="course_practice.js"></script>
</body>
</html>
