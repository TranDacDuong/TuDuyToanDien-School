<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">
<title>Ngân hàng câu hỏi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabaseClient.js"></script>

<style>

body{
font-family:Arial;
background:#f1f5f9;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

button{
padding:6px 12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.filterBar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

select,input{
padding:6px;
border:1px solid #ccc;
border-radius:5px;
}

/* IMAGE */

.questionImgBox{
width:320px;
aspect-ratio:7/2;
overflow:hidden;
border-radius:6px;
background:#f1f5f9;
display:flex;
align-items:center;
justify-content:center;
}

.questionImg{
width:100%;
height:100%;
object-fit:contain;
cursor:pointer;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:25px;
border-radius:10px;
width:1100px;
max-width:95%;
}

/* GRID */

.createGrid{
display:grid;
grid-template-columns:220px 1fr 320px;
gap:25px;
}

.leftCol,
.centerCol,
.rightCol{
display:flex;
flex-direction:column;
gap:10px;
}

/* TEXT IMAGE SWITCH */

.modeBtn{
background:#64748b;
font-size:12px;
margin-right:6px;
}

/* PREVIEW */

.previewImg{
max-width:100%;
border-radius:6px;
display:none;
}

/* ANSWERS */

.answerRow{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.answerBox{
border:1px solid #ccc;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.correct{
background:#22c55e;
color:white;
}

.wrong{
background:#ef4444;
color:white;
}

.shortInput{
width:80px;
}

</style>

</head>

<body>

<div class="container">

<h2>Ngân hàng câu hỏi</h2>

<button onclick="openModal()">Tạo câu hỏi</button>

<div class="filterBar">

<select id="f_grade"><option value="">Khối</option></select> <select id="f_subject"><option value="">Môn</option></select> <select id="f_chapter"><option value="">Chương</option></select>

<select id="f_type">
<option value="">Loại câu hỏi</option>
<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>
</select>

<select id="f_difficulty">
<option value="">Mức độ</option>
</select>

</div>

<table>

<thead>
<tr>
<th>STT</th>
<th>Ảnh</th>
<th>Khối</th>
<th>Môn</th>
<th>Chương</th>
<th>Loại</th>
<th>Mức độ</th>
<th>Đáp án</th>
<th></th>
</tr>
</thead>

<tbody id="questionTable">

<tr>
<td>1</td>
<td>—</td>
<td>10</td>
<td>Toán</td>
<td>Chương 1</td>
<td>Nhiều lựa chọn</td>
<td>3</td>
<td>A</td>
<td>
<button>Sửa</button>
<button style="background:#ef4444">Xóa</button>
</td>
</tr>

</tbody>

</table>

</div>

<!-- MODAL CREATE -->

<div class="modal" id="modal">

<div class="modal-box">

<h3>Tạo câu hỏi</h3>

<div class="createGrid">

<!-- LEFT -->

<div class="leftCol">

<label>Khối</label> <select id="grade"></select>

<label>Môn</label> <select id="subject"></select>

<label>Chương</label> <select id="chapter"></select>

</div>

<!-- CENTER -->

<div class="centerCol">

<label>

<button class="modeBtn" onclick="toggleMode('question')">Chữ/Ảnh</button>
Câu hỏi

</label>

<input id="questionText" placeholder="Nhập câu hỏi">

<img id="questionImg" class="previewImg">

<label>

<button class="modeBtn" onclick="toggleMode('answer')">Chữ/Ảnh</button>
Đáp án

</label>

<input id="answerText" placeholder="Nhập đáp án">

<img id="answerImg" class="previewImg">

</div>

<!-- RIGHT -->

<div class="rightCol">

<label>Loại câu hỏi</label>

<select id="question_type" onchange="changeType()">

<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>

</select>

<label>Mức độ</label> <select id="difficulty"></select>

<label>

Thiết lập đáp án <button onclick="addAnswer()">+</button> <button onclick="removeAnswer()">-</button>

</label>

<div id="answerArea"></div>

</div>

</div>

<br>

<button>Lưu câu hỏi</button> <button onclick="closeModal()">Đóng</button>

</div>

</div>

<script>

/* MODAL */

function openModal(){
modal.style.display="flex"
changeType()
}

function closeModal(){
modal.style.display="none"
}

/* MODE */

let questionMode="text"
let answerMode="text"

function toggleMode(type){

if(type==="question"){

questionMode=questionMode==="text"?"image":"text"

questionText.style.display=questionMode==="text"?"block":"none"
questionImg.style.display="none"

}

if(type==="answer"){

answerMode=answerMode==="text"?"image":"text"

answerText.style.display=answerMode==="text"?"block":"none"
answerImg.style.display="none"

}

}

/* PASTE IMAGE */

document.addEventListener("paste",function(e){

const items=e.clipboardData.items

for(let item of items){

if(item.type.indexOf("image")!==-1){

const file=item.getAsFile()

const reader=new FileReader()

reader.onload=function(event){

if(questionMode==="image"){

questionImg.src=event.target.result
questionImg.style.display="block"

}

if(answerMode==="image"){

answerImg.src=event.target.result
answerImg.style.display="block"

}

}

reader.readAsDataURL(file)

}

}

})

/* ANSWER TYPE */

let answerCount=4

function changeType(){

const type=question_type.value

answerArea.innerHTML=""
answerCount=4

if(type==="multi_choice"){

renderMulti()

}

if(type==="true_false"){

renderTrueFalse()

}

if(type==="short_answer"){

renderShort()

}

}

function renderMulti(){

answerArea.innerHTML=`<div class="answerRow"></div>`
const row=answerArea.firstChild

const letters=["A","B","C","D"]

letters.forEach(l=>{
row.innerHTML+=`<div class="answerBox">[]${l}</div>`
})

}

function renderTrueFalse(){

answerArea.innerHTML=`<div class="answerRow"></div>`
const row=answerArea.firstChild

const letters=["a","b","c","d"]

letters.forEach(l=>{
row.innerHTML+=`<div class="answerBox correct" onclick="toggleTF(this)">${l}) Đúng</div>`
})

}

function toggleTF(el){

if(el.classList.contains("correct")){

el.classList.remove("correct")
el.classList.add("wrong")
el.innerText=el.innerText.replace("Đúng","Sai")

}else{

el.classList.remove("wrong")
el.classList.add("correct")
el.innerText=el.innerText.replace("Sai","Đúng")

}

}

function renderShort(){

answerArea.innerHTML=`<div class="answerRow">
<input class="shortInput">
</div>`

}

function addAnswer(){

answerCount++

const type=question_type.value

if(type==="multi_choice"){

answerArea.firstChild.innerHTML+=`<div class="answerBox">[]</div>`

}

if(type==="true_false"){

answerArea.firstChild.innerHTML+=`<div class="answerBox correct" onclick="toggleTF(this)">Đúng</div>`

}

if(type==="short_answer"){

answerArea.firstChild.innerHTML+=`<input class="shortInput">`

}

}

function removeAnswer(){

const row=answerArea.firstChild

if(row.children.length>1){

row.removeChild(row.lastChild)

}

}

</script>

<script src="questionList.js"></script>

</body>
</html>
