<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>Ngân hàng câu hỏi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<style>

body{
font-family:Arial;
background:#f1f5f9;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

h2{
margin-bottom:15px;
}

button{
padding:7px 12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button.delete{
background:#ef4444;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:#fafafa;
}

.filterBar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

select,input{
padding:6px;
border:1px solid #ccc;
border-radius:5px;
}

.questionImgBox{
width:210px;
aspect-ratio:7/2;
overflow:hidden;
border-radius:6px;
background:#f1f5f9;
display:flex;
align-items:center;
justify-content:center;
}

.questionImg{
width:100%;
height:100%;
object-fit:contain;
cursor:pointer;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:10px;
width:520px;
max-height:90vh;
overflow:auto;
}

.label{
font-weight:bold;
margin-top:10px;
display:block;
}

.answerRow{
display:flex;
gap:5px;
margin-bottom:6px;
align-items:center;
}

</style>

</head>

<body>

<div class="container">

<h2>Ngân hàng câu hỏi</h2>

<button onclick="openCreate()">Tạo câu hỏi</button>

<div class="filterBar">

<select id="f_grade"><option value="">Khối</option></select>
<select id="f_subject"><option value="">Môn</option></select>
<select id="f_chapter"><option value="">Chương</option></select>

<select id="f_type">

<option value="">Loại câu hỏi</option>
<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>

</select>

<select id="f_difficulty">

<option value="">Mức độ</option>

</select>

<input id="searchBox" placeholder="Tìm kiếm...">

</div>

<table>

<thead>

<tr>

<th>STT</th>
<th>Ảnh</th>
<th>Khối</th>
<th>Môn</th>
<th>Chương</th>
<th>Loại câu hỏi</th>
<th>Mức độ</th>
<th></th>

</tr>

</thead>

<tbody id="questionTable"></tbody>

</table>

</div>

<div class="modal" id="modal">

<div class="modal-box">

<h3>Tạo câu hỏi</h3>

<label class="label">Ảnh câu hỏi</label>

<input type="file" id="imageFile">

<img id="previewImage" style="max-width:100%;margin-bottom:10px">

<label class="label">Khối</label>
<select id="grade"></select>

<label class="label">Môn</label>
<select id="subject"></select>

<label class="label">Chương</label>
<select id="chapter"></select>

<label class="label">Loại câu hỏi</label>

<select id="question_type">

<option value="multi_choice">Nhiều phương án lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>

</select>

<label class="label">Mức độ</label>

<select id="difficulty"></select>

<label class="label">Đáp án</label>

<div id="answerBox"></div>

<label class="label">Ảnh đáp án</label>

<input type="file" id="answerFile">

<br><br>

<button onclick="saveQuestion()">Lưu</button>
<button onclick="closeModal()">Đóng</button>

</div>

</div>

<script>

let grades=[]
let subjects=[]
let chapters=[]
let questions=[]

let image_url=""
let answer_image_url=""

const typeText={
multi_choice:"Nhiều lựa chọn",
true_false:"Đúng/Sai",
short_answer:"Trả lời ngắn",
essay:"Tự luận"
}

/* difficulty */

for(let i=1;i<=10;i++){

difficulty.innerHTML+=`<option value="${i}">${i}</option>`
f_difficulty.innerHTML+=`<option value="${i}">${i}</option>`

}

/* LOAD GRADES */

async function loadGrades(){

grades=(await sb.from("grades").select("*")).data

grades.sort((a,b)=>parseInt(a.name)-parseInt(b.name))

grade.innerHTML="<option value=''>Chọn khối</option>"
f_grade.innerHTML="<option value=''>Khối</option>"

grades.forEach(g=>{

grade.innerHTML+=`<option value="${g.id}">${g.name}</option>`
f_grade.innerHTML+=`<option value="${g.id}">${g.name}</option>`

})

}

/* SUBJECT */

grade.onchange=async()=>{

subjects=(await sb.from("subjects")
.select("*")
.eq("grade_id",grade.value)).data

subject.innerHTML="<option value=''>Chọn môn</option>"

subjects.forEach(s=>{
subject.innerHTML+=`<option value="${s.id}">${s.name}</option>`
})

}

/* CHAPTER */

subject.onchange=async()=>{

chapters=(await sb.from("chapters")
.select("*")
.eq("subject_id",subject.value)).data

chapter.innerHTML="<option value=''>Chọn chương</option>"

chapters.forEach(c=>{
chapter.innerHTML+=`<option value="${c.id}">${c.name}</option>`
})

}

/* ANSWER UI */

question_type.onchange=renderAnswerUI

function renderAnswerUI(){

answerBox.innerHTML=""

const t=question_type.value

if(t==="multi_choice"){

for(let i=0;i<4;i++){

answerBox.innerHTML+=`

<div class="answerRow">

<span>${String.fromCharCode(65+i)})</span>

<input class="answerInput">

<input type="radio" name="correct">

</div>

`

}

}

if(t==="true_false"){

for(let i=0;i<4;i++){

answerBox.innerHTML+=`

<div class="answerRow">

<span>${String.fromCharCode(97+i)})</span>

<select>

<option value="true">Đúng</option>
<option value="false">Sai</option>

</select>

</div>

`

}

}

if(t==="short_answer"){

answerBox.innerHTML=`<input id="shortAnswer" placeholder="Đáp án">`

}

if(t==="essay"){

answerBox.innerHTML=`<textarea id="essayAnswer" placeholder="Đáp án gợi ý"></textarea>`

}

}

/* IMAGE UPLOAD */

imageFile.onchange=async()=>{

const file=imageFile.files[0]

const path="q_"+Date.now()+file.name

await sb.storage.from("question-images").upload(path,file,{upsert:true})

const {data}=sb.storage.from("question-images").getPublicUrl(path)

image_url=data.publicUrl

previewImage.src=image_url

}

/* CTRL V IMAGE */

document.addEventListener("paste",async(e)=>{

for(const item of e.clipboardData.items){

if(item.type.includes("image")){

const file=item.getAsFile()

const path="q_"+Date.now()+".png"

await sb.storage.from("question-images").upload(path,file,{upsert:true})

const {data}=sb.storage.from("question-images").getPublicUrl(path)

image_url=data.publicUrl

previewImage.src=image_url

}

}

})

/* LOAD QUESTIONS */

async function loadQuestions(){

questions=(await sb
.from("question_bank")
.select(`*,
chapters(
name,
subjects(
name,
grades(name)
)
)`)
.eq("hidden",false)).data

render()

}

/* RENDER */

function render(){

let list=[...questions]

questionTable.innerHTML=""

if(f_type.value)
list=list.filter(x=>x.question_type===f_type.value)

if(f_difficulty.value)
list=list.filter(x=>x.difficulty==f_difficulty.value)

const keyword=searchBox.value.toLowerCase()

if(keyword){

list=list.filter(q=>

(q.chapters?.name||"").toLowerCase().includes(keyword) ||

(q.chapters?.subjects?.name||"").toLowerCase().includes(keyword)

)

}

list.forEach((q,i)=>{

questionTable.innerHTML+=`

<tr>

<td>${i+1}</td>

<td>

${q.image_url?

`<div class="questionImgBox">
<img class="questionImg"
src="${q.image_url}"
onclick="window.open('${q.image_url}')">
</div>`

:"—"}

</td>

<td>${q.chapters?.subjects?.grades?.name||""}</td>
<td>${q.chapters?.subjects?.name||""}</td>
<td>${q.chapters?.name||""}</td>

<td>${typeText[q.question_type]}</td>

<td>${q.difficulty}</td>

<td>

<button onclick="deleteQ('${q.id}')">Xóa</button>

</td>

</tr>

`

})

}

/* SAVE */

async function saveQuestion(){

const payload={

image_url,
chapter_id:chapter.value,
question_type:question_type.value,
difficulty:difficulty.value,
answer:"demo",
answer_image_url

}

const {data}=await sb.auth.getUser()

payload.created_by=data.user.id

await sb.from("question_bank").insert(payload)

await loadQuestions()

/* RESET FORM */

image_url=""
answer_image_url=""

previewImage.src=""

imageFile.value=""
answerFile.value=""

grade.value=""

subject.innerHTML="<option value=''>Chọn môn</option>"
chapter.innerHTML="<option value=''>Chọn chương</option>"

question_type.value="multi_choice"

difficulty.value=""

renderAnswerUI()

}

async function deleteQ(id){

if(!confirm("Xóa câu hỏi?"))return

await sb.from("question_bank")
.update({hidden:true})
.eq("id",id)

loadQuestions()

}

function openCreate(){

modal.style.display="flex"

renderAnswerUI()

}

function closeModal(){

modal.style.display="none"

}

/* FILTER */

f_type.onchange=render
f_difficulty.onchange=render
searchBox.oninput=render

/* INIT */

async function init(){

await loadGrades()

await loadQuestions()

}

init()

</script>

</body>
</html>
