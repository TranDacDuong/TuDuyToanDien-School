<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>Ngân hàng câu hỏi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<style>

body{
font-family:Arial;
background:#f1f5f9;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

button{
padding:7px 12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button.delete{
background:#ef4444;
}

/* FILTER */

.filterBar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

select,input{
padding:6px;
border:1px solid #ccc;
border-radius:5px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.questionImgBox{
width:320px;
aspect-ratio:7/2;
overflow:hidden;
border-radius:6px;
background:#f1f5f9;
display:flex;
align-items:center;
justify-content:center;
}

.questionImg{
width:100%;
height:100%;
object-fit:contain;
cursor:pointer;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:25px;
border-radius:10px;
width:1100px;
max-width:95%;
}

/* GRID */

.createGrid{
display:grid;
grid-template-columns:220px 1fr 300px;
gap:25px;
}

.leftCol,
.centerCol,
.rightCol{
display:flex;
flex-direction:column;
gap:10px;
}

/* PREVIEW */

.previewImg{
max-width:100%;
border-radius:6px;
display:none;
margin-top:10px;
}

.answerList{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.answerItem{
padding:6px 10px;
border:1px solid #ccc;
border-radius:6px;
cursor:pointer;
}

.answerItem.correct{
background:#22c55e;
color:white;
}

</style>

</head>



<body>

<div class="container">

<h2>Ngân hàng câu hỏi</h2>

<button onclick="openModal()">Tạo câu hỏi</button>

<!-- FILTER -->

<div class="filterBar">

<select id="f_grade">
<option value="">Khối</option>
</select>

<select id="f_subject">
<option value="">Môn</option>
</select>

<select id="f_chapter">
<option value="">Chương</option>
</select>

<select id="f_type">
<option value="">Loại câu hỏi</option>
<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>
</select>

<select id="f_difficulty">
<option value="">Mức độ</option>
</select>

</div>


<table>

<thead>
<tr>
<th>STT</th>
<th>Ảnh</th>
<th>Khối</th>
<th>Môn</th>
<th>Chương</th>
<th>Loại</th>
<th>Mức độ</th>
<th>Đáp án</th>
<th></th>
</tr>
</thead>

<tbody id="questionTable"></tbody>

</table>

</div>



<!-- MODAL CREATE QUESTION -->

<div class="modal" id="modal">

<div class="modal-box">

<h3>Tạo câu hỏi</h3>

<div class="createGrid">

<!-- LEFT -->

<div class="leftCol">

<label>Khối</label>
<select id="grade"></select>

<label>Môn</label>
<select id="subject"></select>

<label>Chương</label>
<select id="chapter"></select>

</div>



<!-- CENTER -->

<div class="centerCol">

<label>Câu hỏi</label>
<input id="questionText" placeholder="Nhập câu hỏi">

<img id="questionPreview" class="previewImg">

<label>Đáp án</label>
<input id="answerText" placeholder="Nhập đáp án">

<img id="answerPreview" class="previewImg">

</div>



<!-- RIGHT -->

<div class="rightCol">

<label>Loại câu hỏi</label>

<select id="question_type">
<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>
</select>


<label>Mức độ</label>
<select id="difficulty"></select>


<label>Đáp án trắc nghiệm</label>

<div class="answerList" id="answerList"></div>

<button onclick="addAnswer()">+ Thêm đáp án</button>

</div>

</div>

<br>

<button onclick="saveQuestion()">Lưu câu hỏi</button>
<button onclick="closeModal()">Đóng</button>

</div>

</div>



<script>

/* MODAL */

function openModal(){
modal.style.display="flex"
}

function closeModal(){
modal.style.display="none"
}


/* ADD ANSWER */

function addAnswer(){

const div=document.createElement("div")

div.className="answerItem"
div.innerText="Đáp án"

div.onclick=function(){
div.classList.toggle("correct")
}

answerList.appendChild(div)

}


/* PASTE IMAGE */

document.addEventListener("paste",function(e){

const items=e.clipboardData.items

for(let item of items){

if(item.type.indexOf("image")!==-1){

const file=item.getAsFile()

const reader=new FileReader()

reader.onload=function(event){

if(document.activeElement===questionText){

questionPreview.src=event.target.result
questionPreview.style.display="block"

}else{

answerPreview.src=event.target.result
answerPreview.style.display="block"

}

}

reader.readAsDataURL(file)

}

}

})

</script>


<script src="questionList.js"></script>

</body>
</html>
