<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ngân hàng câu hỏi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabaseClient.js"></script>

<style>

body{
font-family:Arial;
background:#f1f5f9;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

h2{
margin-bottom:20px;
}

button{
padding:8px 12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button.delete{
background:#e53935;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#fafafa;
}

img{
max-width:120px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:10px;
width:420px;
}

.modal-box select,
.modal-box input{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>Ngân hàng câu hỏi</h2>

<button onclick="openCreate()">Tạo câu hỏi</button>

<table>

<thead>

<tr>
<th>Ảnh</th>
<th>Khối</th>
<th>Môn</th>
<th>Chương</th>
<th>Loại</th>
<th>Độ khó</th>
<th>Hành động</th>
</tr>

</thead>

<tbody id="questionTable"></tbody>

</table>

</div>

<div class="modal" id="modal">

<div class="modal-box">

<h3 id="modalTitle"></h3>

<input id="image_url" placeholder="Link ảnh câu hỏi">

<select id="grade"></select>

<select id="subject"></select>

<select id="chapter"></select>

<select id="question_type">

<option value="multi_choice">multi_choice</option>
<option value="true_false">true_false</option>
<option value="short_answer">short_answer</option>
<option value="essay">essay</option>

</select>

<input id="difficulty" placeholder="Độ khó">

<input id="answer" placeholder="Đáp án">

<input id="answer_image_url" placeholder="Link ảnh đáp án">

<button onclick="saveQuestion()">Lưu</button> <button onclick="closeModal()">Đóng</button>

</div>

</div>

<script>

let questions=[]
let grades=[]
let subjects=[]
let chapters=[]
let editingId=null

/* LOAD GRADES */

async function loadGrades(){

const {data}=await sb
.from("grades")
.select("*")
.order("name")

grades=data

grade.innerHTML="<option value=''>Chọn khối</option>"

grades.forEach(g=>{
grade.innerHTML+=`<option value="${g.id}">${g.name}</option>`
})

}

/* LOAD SUBJECTS */

grade.onchange=async()=>{

const {data}=await sb
.from("subjects")
.select("*")
.eq("grade_id",grade.value)
.order("name")

subjects=data

subject.innerHTML=""

subjects.forEach(s=>{
subject.innerHTML+=`<option value="${s.id}">${s.name}</option>`
})

loadChapters()

}

/* LOAD CHAPTERS */

subject.onchange=loadChapters

async function loadChapters(){

const {data}=await sb
.from("chapters")
.select("*")
.eq("subject_id",subject.value)
.order("name")

chapters=data

chapter.innerHTML=""

chapters.forEach(c=>{
chapter.innerHTML+=`<option value="${c.id}">${c.name}</option>`
})

}

/* LOAD QUESTIONS */

async function loadQuestions(){

const {data}=await sb

.from("question_bank")

.select(`
*,
chapters(
name,
subjects(
name,
grades(name)
)
)
`)

.eq("hidden",false)

.order("created_at",{ascending:false})

questions=data

render()

}

/* RENDER TABLE */

function render(){

questionTable.innerHTML=""

questions.forEach(q=>{

questionTable.innerHTML+=`

<tr>

<td>${q.image_url ? `<img src="${q.image_url}">` : ""}</td>

<td>${q.chapters?.subjects?.grades?.name||""}</td>

<td>${q.chapters?.subjects?.name||""}</td>

<td>${q.chapters?.name||""}</td>

<td>${q.question_type}</td>

<td>${q.difficulty}</td>

<td>

<button onclick="editQuestion('${q.id}')">Sửa</button>

<button class="delete"
onclick="requestDelete('${q.id}')">Xóa</button>

</td>

</tr>

`

})

}

/* CREATE */

function openCreate(){

editingId=null

modalTitle.innerText="Tạo câu hỏi"

modal.style.display="flex"

}

/* EDIT */

function editQuestion(id){

const q=questions.find(x=>x.id===id)

editingId=id

image_url.value=q.image_url||""
question_type.value=q.question_type
difficulty.value=q.difficulty
answer.value=q.answer
answer_image_url.value=q.answer_image_url||""

modalTitle.innerText="Sửa câu hỏi"

modal.style.display="flex"

}

/* CLOSE */

function closeModal(){
modal.style.display="none"
}

/* SAVE */

async function saveQuestion(){

const payload={

image_url:image_url.value,
chapter_id:chapter.value,
question_type:question_type.value,
difficulty:difficulty.value,
answer:answer.value,
answer_image_url:answer_image_url.value

}

if(editingId){

await sb
.from("question_bank")
.update(payload)
.eq("id",editingId)

}else{

const {data}=await sb.auth.getUser()

payload.created_by=data.user.id

await sb
.from("question_bank")
.insert(payload)

}

closeModal()

loadQuestions()

}

/* DELETE */

async function requestDelete(id){

if(!confirm("Xóa câu hỏi?")) return

await sb
.from("question_bank")
.update({hidden:true})
.eq("id",id)

loadQuestions()

}

/* INIT */

async function init(){

await loadGrades()

await loadQuestions()

}

init()

</script>

</body>
</html>
