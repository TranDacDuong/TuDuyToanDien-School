<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Ngân hàng câu hỏi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<style>

.pasteBox{
border:2px dashed #cbd5f5;
padding:20px;
text-align:center;
border-radius:6px;
margin-top:5px;
margin-bottom:10px;
background:#f8fafc;
cursor:pointer;
}

.previewImg{
max-width:100%;
margin-bottom:10px;
border-radius:6px;
display:none;
}

.answerRow{
display:flex;
align-items:center;
gap:8px;
margin-bottom:6px;
}

.answerBtn{
width:26px;
height:26px;
border-radius:50%;
border:1px solid #ccc;
cursor:pointer;
}

.trueBtn{
background:#22c55e;
color:white;
}

.falseBtn{
background:#ef4444;
color:white;
}
  
body{
font-family:Arial;
background:#f1f5f9;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

h2{
margin-bottom:15px;
}

button{
padding:7px 12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button.delete{
background:#ef4444;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:#fafafa;
}

.filterBar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

select,input{
padding:6px;
border:1px solid #ccc;
border-radius:5px;
}

.questionImgBox{
width:320px;
aspect-ratio:7/2;
overflow:hidden;
border-radius:6px;
background:#f1f5f9;
display:flex;
align-items:center;
justify-content:center;
}

.questionImg{
width:100%;
height:100%;
object-fit:contain;
cursor:pointer;
}

.answerCell{
max-width:200px;
word-break:break-word;
}

</style>

</head>

<body>


  
<div class="container">

<h2>Ngân hàng câu hỏi</h2>

<div class="modal" id="modal">

<div class="modal-box">

<h3>Tạo câu hỏi</h3>

<!-- KHỐI -->

<label class="label">Khối</label>
<select id="grade"></select>

<!-- MÔN -->

<label class="label">Môn</label>
<select id="subject"></select>

<!-- CHƯƠNG -->

<label class="label">Chương</label>
<select id="chapter"></select>

<!-- NHẬP CÂU HỎI -->

<label class="label">Nhập câu hỏi</label>

<input id="questionText" placeholder="Nhập câu hỏi dạng text">

<div class="pasteBox" id="questionPaste">
Dán ảnh câu hỏi (Ctrl + V)
</div>

<img id="questionPreview" class="previewImg">

<!-- LOẠI CÂU HỎI -->

<label class="label">Loại câu hỏi</label>

<select id="question_type">
<option value="multi_choice">Nhiều phương án lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>
</select>

<!-- MỨC ĐỘ -->

<label class="label">Mức độ</label>
<select id="difficulty"></select>

<!-- ĐÁP ÁN -->

<div id="answerSection">

<label class="label">
Đáp án
<button onclick="removeAnswer()">-</button>
<button onclick="addAnswer()">+</button>
</label>

<div id="answerBox"></div>

<!-- NHẬP ĐÁP ÁN -->

<label class="label">Nhập đáp án</label>

<input id="answerText" placeholder="Nhập đáp án dạng text">

<div class="pasteBox" id="answerPaste">
Dán ảnh đáp án (Ctrl + V)
</div>

<img id="answerPreview" class="previewImg">

</div>

<br>

<button onclick="saveQuestion()">Lưu</button>
<button onclick="closeModal()">Đóng</button>

</div>
</div>

<div class="filterBar">

<select id="f_grade"><option value="">Khối</option></select>
<select id="f_subject"><option value="">Môn</option></select>
<select id="f_chapter"><option value="">Chương</option></select>

<select id="f_type">
<option value="">Loại câu hỏi</option>
<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>
</select>

<select id="f_difficulty">
<option value="">Mức độ</option>
</select>

<input id="searchBox" placeholder="Tìm kiếm...">

</div>

<table>

<thead>
<tr>
<th>STT</th>
<th>Ảnh</th>
<th>Khối</th>
<th>Môn</th>
<th>Chương</th>
<th>Loại câu hỏi</th>
<th>Mức độ</th>
<th>Đáp án</th>
<th></th>
</tr>
</thead>

<tbody id="questionTable"></tbody>

</table>

</div>

<script>

let grades=[]
let questions=[]

const typeText={
multi_choice:"Nhiều lựa chọn",
true_false:"Đúng/Sai",
short_answer:"Trả lời ngắn",
essay:"Tự luận"
}

/* difficulty */

for(let i=1;i<=10;i++){
f_difficulty.innerHTML+=`<option value="${i}">${i}</option>`
}

/* LOAD GRADES */

async function loadGrades(){

grades=(await sb.from("grades").select("*")).data

grades.sort((a,b)=>parseInt(a.name)-parseInt(b.name))

f_grade.innerHTML="<option value=''>Khối</option>"

grades.forEach(g=>{
f_grade.innerHTML+=`<option value="${g.id}">${g.name}</option>`
})

}

/* FILTER SUBJECT BY GRADE */

f_grade.onchange=async()=>{

if(!f_grade.value){
f_subject.innerHTML="<option value=''>Môn</option>"
render()
return
}

let data=(await sb.from("subjects")
.select("*")
.eq("grade_id",f_grade.value)).data

f_subject.innerHTML="<option value=''>Môn</option>"

data.forEach(s=>{
f_subject.innerHTML+=`<option value="${s.id}">${s.name}</option>`
})

render()

}

/* FILTER CHAPTER BY SUBJECT */

f_subject.onchange=async()=>{

if(!f_subject.value){
f_chapter.innerHTML="<option value=''>Chương</option>"
render()
return
}

let data=(await sb.from("chapters")
.select("*")
.eq("subject_id",f_subject.value)).data

f_chapter.innerHTML="<option value=''>Chương</option>"

data.forEach(c=>{
f_chapter.innerHTML+=`<option value="${c.id}">${c.name}</option>`
})

render()

}

f_chapter.onchange=render

/* LOAD QUESTIONS */

async function loadQuestions(){

questions=(await sb
.from("question_bank")
.select(`*,
chapters(
id,
name,
subjects(
id,
name,
grades(
id,
name
)
)
)`)
.eq("hidden",false)).data

render()

}

/* RENDER */

function render(){

let list=[...questions]

questionTable.innerHTML=""

if(f_grade.value)
list=list.filter(q=>q.chapters?.subjects?.grades?.id==f_grade.value)

if(f_subject.value)
list=list.filter(q=>q.chapters?.subjects?.id==f_subject.value)

if(f_chapter.value)
list=list.filter(q=>q.chapter_id==f_chapter.value)

if(f_type.value)
list=list.filter(q=>q.question_type===f_type.value)

if(f_difficulty.value)
list=list.filter(q=>q.difficulty==f_difficulty.value)

const keyword=searchBox.value.toLowerCase()

if(keyword){
list=list.filter(q=>
(q.chapters?.name||"").toLowerCase().includes(keyword) ||
(q.chapters?.subjects?.name||"").toLowerCase().includes(keyword)
)
}

list.forEach((q,i)=>{

questionTable.innerHTML+=`

<tr>

<td>${i+1}</td>

<td>
${q.image_url ?
`<div class="questionImgBox">
<img class="questionImg"
src="${q.image_url}"
onclick="window.open('${q.image_url}')">
</div>`
:"—"}
</td>

<td>${q.chapters?.subjects?.grades?.name||""}</td>
<td>${q.chapters?.subjects?.name||""}</td>
<td>${q.chapters?.name||""}</td>

<td>${typeText[q.question_type]}</td>

<td>${q.difficulty}</td>

<td class="answerCell">${q.answer||""}</td>

<td>
<button onclick="deleteQ('${q.id}')">Xóa</button>
</td>

</tr>

`

})

}

/* DELETE */

async function deleteQ(id){

if(!confirm("Xóa câu hỏi?"))return

await sb.from("question_bank")
.update({hidden:true})
.eq("id",id)

loadQuestions()

}

/* FILTER */

f_type.onchange=render
f_difficulty.onchange=render
searchBox.oninput=render

/* INIT */

async function init(){

await loadGrades()
await loadQuestions()

}

/* TẠO CÂU HỎI */

let answerCount = 4

function renderAnswerUI(){

answerBox.innerHTML=""

const type = question_type.value

if(type==="essay"){
answerSection.style.display="none"
return
}

answerSection.style.display="block"

if(type==="multi_choice"){

for(let i=0;i<answerCount;i++){

let letter = String.fromCharCode(65+i)

answerBox.innerHTML+=`
<div class="answerRow">
<input type="checkbox" class="correctBox">
<span>${letter}</span>
</div>`
}

}

if(type==="true_false"){

for(let i=0;i<answerCount;i++){

let letter = String.fromCharCode(97+i)

answerBox.innerHTML+=`
<div class="answerRow">
<span>${letter})</span>

<button class="answerBtn trueBtn">Đ</button>
<button class="answerBtn falseBtn">S</button>

</div>`
}

}

if(type==="short_answer"){

for(let i=0;i<answerCount;i++){

answerBox.innerHTML+=`
<div class="answerRow">
<input class="shortAnswerInput" placeholder="Đáp án ${i+1}">
</div>`
}

}

}

/* Tạo câu hỏi */

function addAnswer(){

answerCount++

renderAnswerUI()

}

function removeAnswer(){

if(answerCount<=1) return

answerCount--

renderAnswerUI()

}

/* Đổi loại câu hỏi */
question_type.onchange = () => {

answerCount = 4

renderAnswerUI()

}

/* Paste Ảnh */

document.addEventListener("paste",function(e){

const items = e.clipboardData.items

for(let item of items){

if(item.type.indexOf("image")!==-1){

const file = item.getAsFile()

const reader = new FileReader()

reader.onload=function(ev){

questionPreview.src = ev.target.result
questionPreview.style.display="block"

}

reader.readAsDataURL(file)

}

}

})


init()

</script>

</body>
</html>
