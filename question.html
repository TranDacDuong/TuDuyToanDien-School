<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Ngân hàng câu hỏi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<style>

.modal-large{
width:1100px;
max-width:95%;
}

.createGrid{
display:grid;
grid-template-columns:220px 1fr 300px;
gap:25px;
}

.leftCol,
.centerCol,
.rightCol{
display:flex;
flex-direction:column;
gap:10px;
}

.pasteBox{
border:2px dashed #cbd5f5;
padding:18px;
text-align:center;
border-radius:6px;
background:#f8fafc;
cursor:pointer;
}

.previewImg{
max-width:100%;
border-radius:6px;
display:none;
}

.answerHorizontal{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:5px;
}

.answerItem{
display:flex;
align-items:center;
gap:4px;
padding:6px 10px;
border:1px solid #ddd;
border-radius:6px;
background:#fafafa;
}
  
.pasteBox{
border:2px dashed #cbd5f5;
padding:20px;
text-align:center;
border-radius:6px;
margin-top:5px;
margin-bottom:10px;
background:#f8fafc;
cursor:pointer;
}

.previewImg{
max-width:100%;
margin-bottom:10px;
border-radius:6px;
display:none;
}

.answerRow{
display:flex;
align-items:center;
gap:8px;
margin-bottom:6px;
}

.answerBtn{
width:26px;
height:26px;
border-radius:50%;
border:1px solid #ccc;
cursor:pointer;
}

.trueBtn{
background:#22c55e;
color:white;
}

.falseBtn{
background:#ef4444;
color:white;
}
  
body{
font-family:Arial;
background:#f1f5f9;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

h2{
margin-bottom:15px;
}

button{
padding:7px 12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button.delete{
background:#ef4444;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:#fafafa;
}

.filterBar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

select,input{
padding:6px;
border:1px solid #ccc;
border-radius:5px;
}

.questionImgBox{
width:320px;
aspect-ratio:7/2;
overflow:hidden;
border-radius:6px;
background:#f1f5f9;
display:flex;
align-items:center;
justify-content:center;
}

.questionImg{
width:100%;
height:100%;
object-fit:contain;
cursor:pointer;
}

.answerCell{
max-width:200px;
word-break:break-word;
}

</style>

</head>

<body>


  
<div class="container">

<h2>Ngân hàng câu hỏi</h2>

<div class="modal" id="modal">

<div class="modal-box modal-large">

<h3>Tạo câu hỏi</h3>

<div class="createGrid">

<!-- CỘT TRÁI -->

<div class="leftCol">

<label class="label">Khối</label>
<select id="grade"></select>

<label class="label">Môn</label>
<select id="subject"></select>

<label class="label">Chương</label>
<select id="chapter"></select>

</div>


<!-- CỘT GIỮA -->

<div class="centerCol">

<label class="label">Nhập câu hỏi</label>

<input id="questionText" placeholder="Nhập câu hỏi">

<div class="pasteBox" id="questionPaste">
Ctrl + V để dán ảnh câu hỏi
</div>

<img id="questionPreview" class="previewImg">


<label class="label">Nhập đáp án</label>

<input id="answerText" placeholder="Nhập đáp án">

<div class="pasteBox" id="answerPaste">
Ctrl + V để dán ảnh đáp án
</div>

<img id="answerPreview" class="previewImg">

</div>


<!-- CỘT PHẢI -->

<div class="rightCol">

<label class="label">Loại câu hỏi</label>

<select id="question_type">
<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>
</select>

<label class="label">Mức độ</label>
<select id="difficulty"></select>


<label class="label">
Đáp án
<button onclick="removeAnswer()">-</button>
<button onclick="addAnswer()">+</button>
</label>

<div id="answerBox" class="answerHorizontal"></div>

</div>

</div>


<br>

<button onclick="saveQuestion()">Lưu</button>
<button onclick="closeModal()">Đóng</button>

</div>
</div>

<div class="filterBar">

<select id="f_grade"><option value="">Khối</option></select>
<select id="f_subject"><option value="">Môn</option></select>
<select id="f_chapter"><option value="">Chương</option></select>

<select id="f_type">
<option value="">Loại câu hỏi</option>
<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>
</select>

<select id="f_difficulty">
<option value="">Mức độ</option>
</select>

<input id="searchBox" placeholder="Tìm kiếm...">

</div>

<table>

<thead>
<tr>
<th>STT</th>
<th>Ảnh</th>
<th>Khối</th>
<th>Môn</th>
<th>Chương</th>
<th>Loại câu hỏi</th>
<th>Mức độ</th>
<th>Đáp án</th>
<th></th>
</tr>
</thead>

<tbody id="questionTable"></tbody>

</table>

</div>

<script>

/* TẠO CÂU HỎI */

let answerCount = 4

function renderAnswerUI(){

answerBox.innerHTML=""

const type = question_type.value

if(type==="essay"){
answerBox.innerHTML=""
return
}

for(let i=0;i<answerCount;i++){

let letter = String.fromCharCode(65+i)

answerBox.innerHTML+=`

<div class="answerItem">

<input type="checkbox">

<span>${letter}</span>

</div>

`

}

if(type==="true_false"){

for(let i=0;i<answerCount;i++){

let letter = String.fromCharCode(97+i)

answerBox.innerHTML+=`
<div class="answerRow">
<span>${letter})</span>

<button class="answerBtn trueBtn">Đ</button>
<button class="answerBtn falseBtn">S</button>

</div>`
}

}

if(type==="short_answer"){

for(let i=0;i<answerCount;i++){

answerBox.innerHTML+=`
<div class="answerRow">
<input class="shortAnswerInput" placeholder="Đáp án ${i+1}">
</div>`
}

}

}

/* Tạo câu hỏi */

function addAnswer(){

answerCount++

renderAnswerUI()

}

function removeAnswer(){

if(answerCount<=1) return

answerCount--

renderAnswerUI()

}

/* Đổi loại câu hỏi */
question_type.onchange = () => {

answerCount = 4

renderAnswerUI()

}

/* Dấu +, - */

function addAnswer(){

answerCount++
renderAnswerUI()

}

function removeAnswer(){

if(answerCount<=1) return

answerCount--
renderAnswerUI()

}

/* Paste Ảnh */

document.addEventListener("paste",function(e){

const items = e.clipboardData.items

for(let item of items){

if(item.type.indexOf("image")!==-1){

const file = item.getAsFile()

const reader = new FileReader()

reader.onload=function(ev){

questionPreview.src = ev.target.result
questionPreview.style.display="block"

}

reader.readAsDataURL(file)

}

}

})


init()

</script>

<script src="questionList.js"></script>
  
</body>
</html>
