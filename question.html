<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Ngân hàng câu hỏi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<style>

body{
font-family:Arial;
background:#f1f5f9;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

h2{
margin-bottom:15px;
}

button{
padding:7px 12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button.delete{
background:#ef4444;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:#fafafa;
}

.filterBar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

select,input,textarea{
padding:6px;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
width:100%;
}

.questionImgBox{
width:320px;
aspect-ratio:7/2;
overflow:hidden;
border-radius:6px;
background:#f1f5f9;
display:flex;
align-items:center;
justify-content:center;
}

.questionImg{
width:100%;
height:100%;
object-fit:contain;
cursor:pointer;
}

.answerCell{
max-width:200px;
word-break:break-word;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:10px;
width:520px;
max-height:90vh;
overflow:auto;
}

.label{
font-weight:bold;
margin-top:10px;
display:block;
}

.answerRow{
display:flex;
gap:5px;
margin-bottom:6px;
align-items:center;
}

.pasteBox{
border:2px dashed #ccc;
padding:15px;
text-align:center;
margin-top:6px;
}

.trueBtn{background:#16a34a}
.falseBtn{background:#dc2626}

</style>

</head>

<body>

<div class="container">

<h2>Ngân hàng câu hỏi</h2>

<button onclick="openCreate()">Tạo câu hỏi</button>

<div class="filterBar">

<select id="f_grade"><option value="">Khối</option></select>
<select id="f_subject"><option value="">Môn</option></select>
<select id="f_chapter"><option value="">Chương</option></select>

<select id="f_type">
<option value="">Loại câu hỏi</option>
<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>
</select>

<select id="f_difficulty">
<option value="">Mức độ</option>
</select>

<input id="searchBox" placeholder="Tìm kiếm...">

</div>

<table>

<thead>
<tr>
<th>STT</th>
<th>Câu hỏi</th>
<th>Khối</th>
<th>Môn</th>
<th>Chương</th>
<th>Loại</th>
<th>Mức độ</th>
<th>Đáp án</th>
<th></th>
</tr>
</thead>

<tbody id="questionTable"></tbody>

</table>

</div>


<div class="modal" id="modal">

<div class="modal-box">

<h3>Tạo câu hỏi</h3>

<label class="label">Khối</label>
<select id="grade"></select>

<label class="label">Môn</label>
<select id="subject"></select>

<label class="label">Chương</label>
<select id="chapter"></select>

<label class="label">Nhập câu hỏi</label>

<textarea id="question_text" placeholder="Nhập câu hỏi dạng text"></textarea>

<div class="pasteBox">Ctrl + V để dán ảnh câu hỏi</div>
<img id="question_preview" style="max-width:100%;margin-top:10px">

<label class="label">Loại câu hỏi</label>

<select id="question_type">
<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>
</select>

<label class="label">Mức độ</label>
<select id="difficulty"></select>

<label class="label">Đáp án</label>
<div id="answerBox"></div>

<label class="label">Nhập đáp án (ảnh)</label>

<div class="pasteBox">Ctrl + V để dán ảnh đáp án</div>
<img id="answer_preview" style="max-width:100%;margin-top:10px">

<br><br>

<button onclick="saveQuestion()">Lưu</button>
<button onclick="closeModal()">Đóng</button>

</div>
</div>


<script>

let grades=[]
let subjects=[]
let chapters=[]
let questions=[]

let question_image_url=""
let answer_image_url=""

let answerCount=4
let tfAnswers=[]
let shortAnswers=[]

const typeText={
multi_choice:"Nhiều lựa chọn",
true_false:"Đúng/Sai",
short_answer:"Trả lời ngắn",
essay:"Tự luận"
}

/* difficulty */

for(let i=1;i<=10;i++){
difficulty.innerHTML+=`<option value="${i}">${i}</option>`
f_difficulty.innerHTML+=`<option value="${i}">${i}</option>`
}

/* paste image */

document.addEventListener("paste",async(e)=>{

const item=e.clipboardData.items[0]

if(!item || item.type.indexOf("image")==-1) return

const blob=item.getAsFile()

const fileName=Date.now()+".png"

await sb.storage.from("questions").upload(fileName,blob)

const url=sb.storage.from("questions").getPublicUrl(fileName).data.publicUrl

if(document.activeElement===question_text){

if(question_text.value.trim()!==""){
alert("Đã có text, không dán ảnh")
return
}

question_image_url=url
question_preview.src=url

}else{

answer_image_url=url
answer_preview.src=url

}

})

/* LOAD GRADES */

async function loadGrades(){

grades=(await sb.from("grades").select("*")).data

grades.sort((a,b)=>parseInt(a.name)-parseInt(b.name))

grade.innerHTML="<option value=''>Chọn khối</option>"
f_grade.innerHTML="<option value=''>Khối</option>"

grades.forEach(g=>{
grade.innerHTML+=`<option value="${g.id}">${g.name}</option>`
f_grade.innerHTML+=`<option value="${g.id}">${g.name}</option>`
})

}

/* SUBJECT */

grade.onchange=async()=>{

subjects=(await sb.from("subjects").select("*").eq("grade_id",grade.value)).data

subject.innerHTML="<option value=''>Chọn môn</option>"

subjects.forEach(s=>{
subject.innerHTML+=`<option value="${s.id}">${s.name}</option>`
})

}

/* CHAPTER */

subject.onchange=async()=>{

chapters=(await sb.from("chapters").select("*").eq("subject_id",subject.value)).data

chapter.innerHTML="<option value=''>Chọn chương</option>"

chapters.forEach(c=>{
chapter.innerHTML+=`<option value="${c.id}">${c.name}</option>`
})

}

/* ANSWER UI */

question_type.onchange=renderAnswerUI

function renderAnswerUI(){

answerBox.innerHTML=""

if(question_type.value==="multi_choice"){

answerCount=4

drawMulti()

}

if(question_type.value==="true_false"){

tfAnswers=["","","",""]

drawTF()

}

if(question_type.value==="short_answer"){

shortAnswers=[""]

drawShort()

}

}

/* MULTI */

function drawMulti(){

answerBox.innerHTML=""

for(let i=0;i<answerCount;i++){

let letter=String.fromCharCode(65+i)

answerBox.innerHTML+=`
<div>
<input type="checkbox" value="${letter}">
${letter}
</div>`
}

answerBox.innerHTML+=`
<button onclick="answerCount--;drawMulti()">-</button>
<button onclick="answerCount++;drawMulti()">+</button>
`

}

/* TRUE FALSE */

function drawTF(){

answerBox.innerHTML=""

for(let i=0;i<tfAnswers.length;i++){

let letter=String.fromCharCode(97+i)

answerBox.innerHTML+=`
<div>

${letter})

<button class="trueBtn"
onclick="tfAnswers[${i}]='true'">Đúng</button>

<button class="falseBtn"
onclick="tfAnswers[${i}]='false'">Sai</button>

</div>
`
}

answerBox.innerHTML+=`
<button onclick="tfAnswers.pop();drawTF()">-</button>
<button onclick="tfAnswers.push('');drawTF()">+</button>
`

}

/* SHORT */

function drawShort(){

answerBox.innerHTML=""

shortAnswers.forEach((a,i)=>{

answerBox.innerHTML+=`
<input class="shortInput">
`

})

answerBox.innerHTML+=`
<button onclick="shortAnswers.pop();drawShort()">-</button>
<button onclick="shortAnswers.push('');drawShort()">+</button>
`

}

/* LOAD QUESTIONS */

async function loadQuestions(){

questions=(await sb
.from("question_bank")
.select(`*,
chapters(
name,
subjects(
name,
grades(name)
)
)`)

.eq("hidden",false)).data

render()

}

/* RENDER */

function render(){

questionTable.innerHTML=""

questions.forEach((q,i)=>{

let content=q.image_url
? `<img src="${q.image_url}" style="max-width:200px">`
: q.question_text || ""

questionTable.innerHTML+=`

<tr>

<td>${i+1}</td>

<td>${content}</td>

<td>${q.chapters?.subjects?.grades?.name||""}</td>
<td>${q.chapters?.subjects?.name||""}</td>
<td>${q.chapters?.name||""}</td>

<td>${typeText[q.question_type]}</td>

<td>${q.difficulty}</td>

<td>${q.answer||""}</td>

<td>
<button onclick="deleteQ('${q.id}')">Xóa</button>
</td>

</tr>

`

})

}

/* SAVE */

async function saveQuestion(){

if(!question_text.value && !question_image_url){
alert("Cần nhập câu hỏi")
return
}

let answer=""
let count=0

if(question_type.value==="multi_choice"){

document.querySelectorAll("#answerBox input:checked")
.forEach(e=>answer+=e.value)

count=answerCount

}

if(question_type.value==="true_false"){

tfAnswers.forEach((v,i)=>{
if(v==="true"){
answer+=String.fromCharCode(65+i)
}
})

count=tfAnswers.length

}

if(question_type.value==="short_answer"){

let arr=[]
document.querySelectorAll(".shortInput")
.forEach(e=>arr.push(e.value))

answer=arr.join(";")
count=arr.length

}

const payload={

question_text:question_text.value||null,
image_url:question_image_url||null,

chapter_id:chapter.value,
question_type:question_type.value,

difficulty:difficulty.value,

answer,
answer_count:count,

answer_image_url,

}

const {data}=await sb.auth.getUser()

payload.created_by=data.user.id

await sb.from("question_bank").insert(payload)

await loadQuestions()

question_text.value=""
question_image_url=""
question_preview.src=""

answer_preview.src=""
answer_image_url=""

renderAnswerUI()

}

/* DELETE */

async function deleteQ(id){

if(!confirm("Xóa câu hỏi?"))return

await sb.from("question_bank")
.update({hidden:true})
.eq("id",id)

loadQuestions()

}

function openCreate(){
modal.style.display="flex"
renderAnswerUI()
}

function closeModal(){
modal.style.display="none"
}

/* INIT */

async function init(){

await loadGrades()
await loadQuestions()

}

init()

</script>

</body>
</html>
