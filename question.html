<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">
<title>Ngân hàng câu hỏi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabaseClient.js"></script>

<style>

body{
font-family:Arial;
background:#f1f5f9;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

button{
padding:6px 12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.filterBar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

select,input{
padding:6px;
border:1px solid #ccc;
border-radius:5px;
}

/* IMAGE */

.questionImgBox{
width:320px;
aspect-ratio:7/2;
overflow:hidden;
border-radius:6px;
background:#f1f5f9;
display:flex;
align-items:center;
justify-content:center;
}

.questionImg{
width:100%;
height:100%;
object-fit:contain;
cursor:pointer;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:25px;
border-radius:10px;
width:1100px;
max-width:95%;
}

/* GRID */

.createGrid{
display:grid;
grid-template-columns:220px 1fr 320px;
gap:25px;
}

.leftCol,
.centerCol,
.rightCol{
display:flex;
flex-direction:column;
gap:10px;
}

/* MODE BUTTON */

.modeBtn{
background:#64748b;
font-size:12px;
margin-left:8px;
}

/* PREVIEW */

.previewImg{
max-width:100%;
border-radius:6px;
display:none;
}

/* ANSWERS */

.answerRow{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.answerBox{
border:1px solid #ccc;
padding:6px 8px;
border-radius:6px;
display:flex;
align-items:center;
gap:6px;
}

.correct{
color:#22c55e;
font-weight:bold;
cursor:pointer;
}

.wrong{
color:#ef4444;
font-weight:bold;
cursor:pointer;
}

.shortRow{
display:flex;
align-items:center;
gap:6px;
margin-bottom:6px;
}

</style>

</head>

<body>

<div class="container">

<h2>Ngân hàng câu hỏi</h2>

<button onclick="openModal()">Tạo câu hỏi</button>

<div class="filterBar">

<select id="f_grade"><option value="">Khối</option></select> <select id="f_subject"><option value="">Môn</option></select> <select id="f_chapter"><option value="">Chương</option></select>

<select id="f_type">
<option value="">Loại câu hỏi</option>
<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>
</select>

<select id="f_difficulty">
<option value="">Mức độ</option>
</select>

</div>

<table>

<thead>
<tr>
<th>STT</th>
<th>Ảnh</th>
<th>Khối</th>
<th>Môn</th>
<th>Chương</th>
<th>Loại</th>
<th>Mức độ</th>
<th>Đáp án</th>
<th></th>
</tr>
</thead>

<tbody id="questionTable">

<tr>
<td>1</td>
<td>—</td>
<td>10</td>
<td>Toán</td>
<td>Chương 1</td>
<td>Nhiều lựa chọn</td>
<td>3</td>
<td>A</td>
<td>
<button>Sửa</button>
<button style="background:#ef4444">Xóa</button>
</td>
</tr>

</tbody>

</table>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<h3>Tạo câu hỏi</h3>

<div class="createGrid">

<!-- LEFT -->

<div class="leftCol">

<label>Khối</label> <select id="grade"></select>

<label>Môn</label> <select id="subject"></select>

<label>Chương</label> <select id="chapter"></select>

</div>

<!-- CENTER -->

<div class="centerCol">

<label>

Câu hỏi <button class="modeBtn" onclick="toggleMode('question')" id="qMode">Ảnh</button>

</label>

<input id="questionText" placeholder="Paste ảnh tại đây">

<img id="questionImg" class="previewImg">

<label>

Đáp án <button class="modeBtn" onclick="toggleMode('answer')" id="aMode">Ảnh</button>

</label>

<input id="answerText" placeholder="Paste ảnh tại đây">

<img id="answerImg" class="previewImg">

</div>

<!-- RIGHT -->

<div class="rightCol">

<label>Loại câu hỏi</label>

<select id="question_type" onchange="changeType()">

<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>

</select>

<label>Mức độ</label> <select id="difficulty"></select>

<label id="answerLabel">

Chọn đáp án đúng <button onclick="addAnswer()">+</button> <button onclick="removeAnswer()">-</button>

</label>

<div id="answerArea"></div>

</div>

</div>

<br>

<button>Lưu câu hỏi</button> <button onclick="closeModal()">Đóng</button>

</div>

</div>

<script>

let activeField = null

questionText.onfocus = () => activeField = "question"
answerText.onfocus = () => activeField = "answer"
  
function openModal(){
modal.style.display="flex"
changeType()
}

function closeModal(){
modal.style.display="none"
}

/* TEXT IMAGE MODE */

let questionMode="image"
let answerMode="image"

function toggleMode(type){

if(type==="question"){

questionMode = questionMode==="image" ? "text" : "image"

if(questionMode==="image"){

qMode.innerText="Ảnh"

questionText.placeholder="Paste ảnh tại đây"
questionText.readOnly=true

/* XÓA CHỮ */

questionText.value=""

/* HIỆN ẢNH */

questionImg.style.display="block"

}else{

qMode.innerText="Chữ"

questionText.placeholder="Nhập câu hỏi tại đây"
questionText.readOnly=false

/* XÓA ẢNH */

questionImg.src=""
questionImg.style.display="none"

}

}


if(type==="answer"){

answerMode = answerMode==="image" ? "text" : "image"

if(answerMode==="image"){

aMode.innerText="Ảnh"

answerText.placeholder="Paste ảnh tại đây"
answerText.readOnly=true

/* XÓA CHỮ */

answerText.value=""

/* HIỆN ẢNH */

answerImg.style.display="block"

}else{

aMode.innerText="Chữ"

answerText.placeholder="Nhập đáp án tại đây"
answerText.readOnly=false

/* XÓA ẢNH */

answerImg.src=""
answerImg.style.display="none"

}

}

}

/* PASTE IMAGE */

document.addEventListener("paste",function(e){

if(activeField===null) return

const items = e.clipboardData.items

for(let item of items){

if(item.type.indexOf("image")!==-1){

if(
(activeField==="question" && questionMode==="text") ||
(activeField==="answer" && answerMode==="text")
){
return
}

const file = item.getAsFile()
const reader = new FileReader()

reader.onload=function(event){

if(activeField==="question"){

questionImg.src = event.target.result
questionImg.style.display="block"

}

if(activeField==="answer"){

answerImg.src = event.target.result
answerImg.style.display="block"

}

}

reader.readAsDataURL(file)

}

}

})

/* ANSWER TYPES */

let answerCount=4

function changeType(){

const type = question_type.value
answerArea.innerHTML=""

answerLabel.style.display = type==="essay" ? "none" : "block"

if(type==="multi_choice") answerCount=4
if(type==="true_false") answerCount=4
if(type==="short_answer") answerCount=1

if(type==="multi_choice") renderMulti()
if(type==="true_false") renderTF()
if(type==="short_answer") renderShort()

}

function renderMulti(){

const row=document.createElement("div")
row.className="answerRow"

for(let i=1;i<=answerCount;i++){

const letter=String.fromCharCode(64+i)

row.innerHTML+=`
<div class="answerBox">
<input type="checkbox">
${letter}
</div>
`

}

answerArea.appendChild(row)

}

function renderTF(){

const row=document.createElement("div")
row.className="answerRow"

for(let i=0;i<answerCount;i++){

const letter=String.fromCharCode(97+i)

row.innerHTML+=`
<div class="answerBox">
<span>${letter})</span>
<span class="correct" onclick="toggleTF(this)">Đúng</span>
</div>
`

}

answerArea.appendChild(row)

}

function toggleTF(el){

if(el.innerText==="Đúng"){
el.innerText="Sai"
el.classList.remove("correct")
el.classList.add("wrong")
}else{
el.innerText="Đúng"
el.classList.remove("wrong")
el.classList.add("correct")
}

}

function renderShort(){

for(let i=1;i<=answerCount;i++){

answerArea.innerHTML+=`
<div class="shortRow">
${i}
<input>
</div>`

}

}

function addAnswer(){

const type = question_type.value

answerCount++

/* MULTI CHOICE */

if(type==="multi_choice"){

const row = answerArea.firstChild
const letter = String.fromCharCode(64 + answerCount)

row.innerHTML += `
<div class="answerBox">
<input type="checkbox">
${letter}
</div>
`

}

/* TRUE FALSE */

if(type==="true_false"){

const row = answerArea.firstChild
const letter = String.fromCharCode(96 + answerCount)

row.innerHTML += `
<div class="answerBox">
<span>${letter})</span>
<span class="correct" onclick="toggleTF(this)">Đúng</span>
</div>
`

}

/* SHORT ANSWER */

if(type==="short_answer"){

answerArea.innerHTML += `
<div class="shortRow">
${answerCount}
<input>
</div>
`

}

}

function removeAnswer(){

const type = question_type.value

if(answerCount<=1) return

answerCount--

/* MULTI CHOICE */

if(type==="multi_choice"){

const row = answerArea.firstChild
row.removeChild(row.lastElementChild)

}

if(type==="true_false"){

const row = answerArea.firstChild
row.removeChild(row.lastElementChild)

}
  
/* SHORT ANSWER */

if(type==="short_answer"){

answerArea.removeChild(answerArea.lastElementChild)

}

}

</script>

<script src="questionList.js"></script>

</body>
</html>
