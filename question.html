<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Ngân hàng câu hỏi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<style>

body{
font-family:Arial;
background:#f1f5f9;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

button{
padding:7px 12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button.delete{
background:#ef4444;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.filterBar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

select,input{
padding:6px;
border:1px solid #ccc;
border-radius:5px;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:25px;
border-radius:10px;
}

.modal-large{
width:1100px;
max-width:95%;
}

/* GRID */

.createGrid{
display:grid;
grid-template-columns:220px 1fr 300px;
gap:25px;
}

.leftCol,
.centerCol,
.rightCol{
display:flex;
flex-direction:column;
gap:10px;
}

.previewImg{
max-width:100%;
border-radius:6px;
display:none;
margin-top:10px;
}

.answerHorizontal{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:5px;
}

.answerItem{
display:flex;
align-items:center;
gap:4px;
padding:6px 10px;
border:1px solid #ddd;
border-radius:6px;
background:#fafafa;
}

.answerBtn{
width:26px;
height:26px;
border-radius:50%;
border:1px solid #ccc;
cursor:pointer;
}

.trueBtn{
background:#22c55e;
color:white;
}

.falseBtn{
background:#ef4444;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>Ngân hàng câu hỏi</h2>

<button onclick="openModal()">Tạo câu hỏi</button>

<div class="modal" id="modal">

<div class="modal-box modal-large">

<h3>Tạo câu hỏi</h3>

<div class="createGrid">

<!-- LEFT -->

<div class="leftCol">

<label>Khối</label>
<select id="grade"></select>

<label>Môn</label>
<select id="subject"></select>

<label>Chương</label>
<select id="chapter"></select>

</div>

<!-- CENTER -->

<div class="centerCol">

<label>
Nhập câu hỏi
<button type="button" onclick="toggleQuestionMode()" id="questionModeBtn">
Ảnh
</button>
</label>

<input id="questionText" placeholder="Nhập câu hỏi">

<label>
Nhập đáp án
<button type="button" onclick="toggleAnswerMode()" id="answerModeBtn">
Ảnh
</button>
</label>

<input id="answerText" placeholder="Nhập đáp án">

</div>

<!-- RIGHT -->

<div class="rightCol">

<label>Loại câu hỏi</label>

<select id="question_type">
<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>
</select>

<label>Mức độ</label>
<select id="difficulty"></select>

<label>
Đáp án
<button onclick="removeAnswer()">-</button>
<button onclick="addAnswer()">+</button>
</label>

<div id="answerBox" class="answerHorizontal"></div>

</div>

</div>

<br>

<button onclick="saveQuestion()">Lưu</button>
<button onclick="closeModal()">Đóng</button>

</div>
</div>

</div>

<script>

/* =========================
ELEMENT
========================= */

const questionText = document.getElementById("questionText")
const answerText = document.getElementById("answerText")

const questionModeBtn = document.getElementById("questionModeBtn")
const answerModeBtn = document.getElementById("answerModeBtn")

const question_type = document.getElementById("question_type")
const answerBox = document.getElementById("answerBox")
const difficulty = document.getElementById("difficulty")

/* =========================
MỨC ĐỘ
========================= */

function loadDifficulty(){

if(!difficulty) return

difficulty.innerHTML=""

for(let i=1;i<=10;i++){

const option=document.createElement("option")
option.value=i
option.textContent=i

difficulty.appendChild(option)

}

}

/* =========================
MODE
========================= */

let questionMode="image"
let answerMode="image"

function toggleQuestionMode(){

if(questionMode==="image"){

questionMode="text"
questionModeBtn.innerText="Chữ"
questionText.readOnly=false

}else{

questionMode="image"
questionModeBtn.innerText="Ảnh"
questionText.readOnly=true
questionText.value=""
questionText.dataset.image=""

}

}

function toggleAnswerMode(){

if(answerMode==="image"){

answerMode="text"
answerModeBtn.innerText="Chữ"
answerText.readOnly=false

}else{

answerMode="image"
answerModeBtn.innerText="Ảnh"
answerText.readOnly=true
answerText.value=""
answerText.dataset.image=""

}

}

/* =========================
CHẶN GÕ
========================= */

questionText.addEventListener("keydown",e=>{
if(questionMode==="image") e.preventDefault()
})

answerText.addEventListener("keydown",e=>{
if(answerMode==="image") e.preventDefault()
})

/* =========================
PASTE IMAGE
========================= */

document.addEventListener("paste",function(e){

const items=e.clipboardData?.items
if(!items) return

for(let item of items){

if(item.type.indexOf("image")!==-1){

const file=item.getAsFile()
const reader=new FileReader()

reader.onload=function(ev){

const imgData=ev.target.result

if(document.activeElement===questionText){

if(questionMode==="text") return

questionText.dataset.image=imgData
questionText.value="[Ảnh câu hỏi]"

}

if(document.activeElement===answerText){

if(answerMode==="text") return

answerText.dataset.image=imgData
answerText.value="[Ảnh đáp án]"

}

}

reader.readAsDataURL(file)

}

}

})

/* =========================
ANSWER UI
========================= */

let answerCount=4

function renderAnswerUI(){

if(!answerBox) return

answerBox.innerHTML=""

const type=question_type.value

if(type==="multi_choice"){

for(let i=0;i<answerCount;i++){

let letter=String.fromCharCode(65+i)

answerBox.innerHTML+=`

<div class="answerItem">
<input type="checkbox">
<span>${letter}</span>
<input class="answerInput" placeholder="Đáp án">
</div>

`

}

}

if(type==="true_false"){

for(let i=0;i<answerCount;i++){

let letter=String.fromCharCode(97+i)

answerBox.innerHTML+=`

<div class="answerItem">
<span>${letter})</span>
<button class="answerBtn trueBtn">Đ</button>
<button class="answerBtn falseBtn">S</button>
</div>

`

}

}

if(type==="short_answer"){

answerBox.innerHTML=`<input class="answerInput" placeholder="Đáp án">`

}

}

function addAnswer(){

if(question_type.value==="short_answer") return

answerCount++
renderAnswerUI()

}

function removeAnswer(){

if(answerCount<=1) return

answerCount--
renderAnswerUI()

}

question_type.addEventListener("change",()=>{

if(question_type.value==="short_answer"){
answerCount=1
}else{
answerCount=4
}

renderAnswerUI()

})

/* =========================
MODAL
========================= */

const modal=document.getElementById("modal")

function openModal(){
modal.style.display="flex"
}

function closeModal(){
modal.style.display="none"
}

/* INIT */

loadDifficulty()
renderAnswerUI()

</script>

<script src="questionList.js"></script>
<script src="createQuestion.js"></script>

</body>
</html>
