<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>Ngân hàng câu hỏi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<style>

body{
font-family:Arial;
background:#f1f5f9;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

button{
padding:7px 12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button.delete{
background:#ef4444;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.filterBar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

select,input{
padding:6px;
border:1px solid #ccc;
border-radius:5px;
}

.questionImgBox{
width:320px;
aspect-ratio:7/2;
overflow:hidden;
border-radius:6px;
background:#f1f5f9;
display:flex;
align-items:center;
justify-content:center;
}

.questionImg{
width:100%;
height:100%;
object-fit:contain;
cursor:pointer;
}

</style>

</head>


<body>

<div class="container">

<h2>Ngân hàng câu hỏi</h2>

<!-- FILTER -->

<div class="filterBar">

<select id="f_grade">
<option value="">Khối</option>
</select>

<select id="f_subject">
<option value="">Môn</option>
</select>

<select id="f_chapter">
<option value="">Chương</option>
</select>

<select id="f_type">
<option value="">Loại câu hỏi</option>
<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>
</select>

<select id="f_difficulty">
<option value="">Mức độ</option>
</select>

</div>


<table>

<thead>

<tr>
<th>STT</th>
<th>Ảnh</th>
<th>Khối</th>
<th>Môn</th>
<th>Chương</th>
<th>Loại</th>
<th>Mức độ</th>
<th>Đáp án</th>
<th></th>
</tr>

</thead>

<tbody id="questionTable"></tbody>

</table>

</div>


<script src="questionList.js"></script>

</body>
</html>
