<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>Ngân hàng câu hỏi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<style>

body{
font-family:Arial;
background:#f1f5f9;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

button{
padding:7px 12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button.delete{
background:#ef4444;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.filterBar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

select,input{
padding:6px;
border:1px solid #ccc;
border-radius:5px;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:25px;
border-radius:10px;
}

.modal-large{
width:1100px;
max-width:95%;
}

/* GRID */

.createGrid{
display:grid;
grid-template-columns:220px 1fr 300px;
gap:25px;
}

.leftCol,
.centerCol,
.rightCol{
display:flex;
flex-direction:column;
gap:10px;
}

/* IMAGE */

.previewImg{
max-width:100%;
border-radius:6px;
display:none;
margin-top:10px;
}

.answerHorizontal{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:5px;
}

.answerItem{
display:flex;
align-items:center;
gap:4px;
padding:6px 10px;
border:1px solid #ddd;
border-radius:6px;
background:#fafafa;
}

</style>

</head>

<body>

<div class="container">

<h2>Ngân hàng câu hỏi</h2>

<button onclick="openModal()">Tạo câu hỏi</button>


<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box modal-large">

<h3>Tạo câu hỏi</h3>

<div class="createGrid">

<!-- LEFT -->

<div class="leftCol">

<label>Khối</label>
<select id="grade"></select>

<label>Môn</label>
<select id="subject"></select>

<label>Chương</label>
<select id="chapter"></select>

</div>


<!-- CENTER -->

<div class="centerCol">

<label>
Nhập câu hỏi
<button type="button" onclick="toggleQuestionMode()" id="questionModeBtn">
Ảnh
</button>
</label>

<input id="questionText" placeholder="Nhập câu hỏi">
<img id="questionPreview" class="previewImg">


<label>
Nhập đáp án
<button type="button" onclick="toggleAnswerMode()" id="answerModeBtn">
Ảnh
</button>
</label>

<input id="answerText" placeholder="Nhập đáp án">
<img id="answerPreview" class="previewImg">

</div>


<!-- RIGHT -->

<div class="rightCol">

<label>Loại câu hỏi</label>

<select id="question_type">
<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>
</select>

<label>Mức độ</label>
<select id="difficulty"></select>

<label>
Đáp án
<button onclick="removeAnswer()">-</button>
<button onclick="addAnswer()">+</button>
</label>

<div id="answerBox" class="answerHorizontal"></div>

</div>

</div>

<br>

<button onclick="saveQuestion()">Lưu</button>
<button onclick="closeModal()">Đóng</button>

</div>
</div>


<!-- FILTER -->

<div class="filterBar">

<select id="f_grade"><option value="">Khối</option></select>
<select id="f_subject"><option value="">Môn</option></select>
<select id="f_chapter"><option value="">Chương</option></select>

<select id="f_type">
<option value="">Loại câu hỏi</option>
<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>
</select>

<select id="f_difficulty">
<option value="">Mức độ</option>
</select>

<input id="searchBox" placeholder="Tìm kiếm...">

</div>


<table>

<thead>

<tr>
<th>STT</th>
<th>Ảnh</th>
<th>Khối</th>
<th>Môn</th>
<th>Chương</th>
<th>Loại</th>
<th>Mức độ</th>
<th>Đáp án</th>
<th></th>
</tr>

</thead>

<tbody id="questionTable"></tbody>

</table>

</div>


<script src="questionList.js"></script>
<script src="createQuestionUI.js"></script>
<script src="createQuestion.js"></script>

</body>
</html>
