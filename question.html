<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ngân hàng câu hỏi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabaseClient.js"></script>

<style>

body{
font-family:Arial;
background:#f1f5f9;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

h2{
margin-bottom:15px;
}

button{
padding:7px 12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button.delete{
background:#e53935;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
}

th{
background:#fafafa;
}

.questionImg{
width:120px;
max-height:90px;
object-fit:contain;
border-radius:6px;
cursor:pointer;
background:#f3f4f6;
padding:3px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:10px;
width:500px;
max-height:90vh;
overflow:auto;
}

.modal-box input,
.modal-box select{
width:100%;
padding:8px;
margin-bottom:8px;
border:1px solid #ccc;
border-radius:5px;
}

.answerRow{
display:flex;
gap:5px;
margin-bottom:5px;
}

.filterBar{
display:flex;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

</style>

</head>

<body>

<div class="container">

<h2>Ngân hàng câu hỏi</h2>

<button onclick="openCreate()">Tạo câu hỏi</button>

<div class="filterBar">

<select id="f_grade"></select> <select id="f_subject"></select> <select id="f_chapter"></select>

<select id="f_type">
<option value="">Loại</option>
<option value="multi_choice">Nhiều lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>
</select>

<select id="f_difficulty">
<option value="">Độ khó</option>
</select>

<input id="searchBox" placeholder="Tìm kiếm...">

</div>

<table>

<thead>
<tr>
<th>STT</th>
<th>Ảnh</th>
<th>Khối</th>
<th>Môn</th>
<th>Chương</th>
<th>Loại</th>
<th>Độ khó</th>
<th></th>
</tr>
</thead>

<tbody id="questionTable"></tbody>

</table>

</div>

<div class="modal" id="modal">

<div class="modal-box">

<h3 id="modalTitle"></h3>

<label>Ảnh câu hỏi</label>

<input type="file" id="imageFile">

<img id="previewImage">

<select id="grade"></select> <select id="subject"></select> <select id="chapter"></select>

<select id="question_type">

<option value="multi_choice">Nhiều phương án lựa chọn</option>
<option value="true_false">Đúng/Sai</option>
<option value="short_answer">Trả lời ngắn</option>
<option value="essay">Tự luận</option>

</select>

<select id="difficulty"></select>

<div id="answerBox"></div>

<label>Ảnh đáp án</label> <input type="file" id="answerFile">

<button onclick="saveQuestion()">Lưu</button> <button onclick="closeModal()">Đóng</button>

</div>

</div>

<script>

let questions=[]
let grades=[]
let subjects=[]
let chapters=[]

let image_url=""
let answer_image_url=""

/* difficulty */

for(let i=1;i<=10;i++){

difficulty.innerHTML+=`<option value="${i}">${i}</option>`
f_difficulty.innerHTML+=`<option value="${i}">${i}</option>`

}

/* LOAD DATA */

async function loadBase(){

grades=(await sb.from("grades").select("*")).data

grades.sort((a,b)=>a.name-b.name)

grade.innerHTML="<option value=''>Khối</option>"
f_grade.innerHTML="<option value=''>Khối</option>"

grades.forEach(g=>{
grade.innerHTML+=`<option value="${g.id}">${g.name}</option>`
f_grade.innerHTML+=`<option value="${g.id}">${g.name}</option>`
})

}

/* SUBJECT */

grade.onchange=async()=>{

subjects=(await sb.from("subjects")
.select("*")
.eq("grade_id",grade.value)).data

subject.innerHTML=""

subjects.forEach(s=>{
subject.innerHTML+=`<option value="${s.id}">${s.name}</option>`
})

loadChapters()

}

/* CHAPTER */

async function loadChapters(){

chapters=(await sb.from("chapters")
.select("*")
.eq("subject_id",subject.value)).data

chapter.innerHTML=""

chapters.forEach(c=>{
chapter.innerHTML+=`<option value="${c.id}">${c.name}</option>`
})

}

/* ANSWER UI */

question_type.onchange=renderAnswerUI

function renderAnswerUI(){

answerBox.innerHTML=""

const t=question_type.value

if(t==="multi_choice"){

for(let i=0;i<4;i++){

answerBox.innerHTML+=`

<div class="answerRow">

<input placeholder="Đáp án">

<input type="radio" name="correct">

</div>

`

}

}

if(t==="true_false"){

for(let i=0;i<4;i++){

answerBox.innerHTML+=`

<div class="answerRow">

<span>${String.fromCharCode(97+i)})</span>

<select>

<option>Đúng</option>
<option>Sai</option>

</select>

</div>

`

}

}

if(t==="short_answer"){

answerBox.innerHTML=`<input placeholder="Đáp án">`

}

if(t==="essay"){

answerBox.innerHTML=`<textarea placeholder="Đáp án gợi ý"></textarea>`

}

}

/* IMAGE UPLOAD */

imageFile.onchange=async()=>{

const file=imageFile.files[0]

const path="q_"+Date.now()+file.name

await sb.storage.from("question-images").upload(path,file)

const {data}=sb.storage.from("question-images").getPublicUrl(path)

image_url=data.publicUrl

previewImage.src=image_url

}

/* PASTE IMAGE */

document.addEventListener("paste",async(e)=>{

const item=e.clipboardData.items[0]

if(item.type.indexOf("image")!==-1){

const file=item.getAsFile()

const path="q_"+Date.now()+".png"

await sb.storage.from("question-images").upload(path,file)

const {data}=sb.storage.from("question-images").getPublicUrl(path)

image_url=data.publicUrl

previewImage.src=image_url

}

})

/* LOAD QUESTIONS */

async function loadQuestions(){

questions=(await sb
.from("question_bank")
.select(`*,
chapters(
name,
subjects(
name,
grades(name)
)
)`)
.eq("hidden",false)).data

render()

}

/* RENDER */

function render(){

questionTable.innerHTML=""

let list=[...questions]

/* FILTER */

if(f_type.value)
list=list.filter(x=>x.question_type===f_type.value)

if(f_difficulty.value)
list=list.filter(x=>x.difficulty==f_difficulty.value)

list.forEach((q,i)=>{

questionTable.innerHTML+=`

<tr>

<td>${i+1}</td>

<td>
${
q.image_url
? `<img class="questionImg"
src="${q.image_url}"
onclick="window.open('${q.image_url}')">`
: "—"
}
</td>

<td>${q.chapters?.subjects?.grades?.name||""}</td>

<td>${q.chapters?.subjects?.name||""}</td>

<td>${q.chapters?.name||""}</td>

<td>${q.question_type}</td>

<td>${q.difficulty}</td>

<td>

<button onclick="editQuestion('${q.id}')">Sửa</button>

<button class="delete" onclick="deleteQ('${q.id}')">Xóa</button>

</td>

</tr>

`

})

}

/* CREATE */

function openCreate(){

modal.style.display="flex"

renderAnswerUI()

}

/* SAVE */

async function saveQuestion(){

const payload={

image_url,
chapter_id:chapter.value,
question_type:question_type.value,
difficulty:difficulty.value,
answer:"demo"

}

const {data}=await sb.auth.getUser()

payload.created_by=data.user.id

await sb.from("question_bank").insert(payload)

closeModal()

loadQuestions()

}

/* DELETE */

async function deleteQ(id){

if(!confirm("Xóa câu hỏi?"))return

await sb.from("question_bank")
.update({hidden:true})
.eq("id",id)

loadQuestions()

}

function closeModal(){
modal.style.display="none"
}

/* INIT */

async function init(){

await loadBase()

await loadQuestions()

}

init()

</script>

</body>
</html>
