<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đề kiểm tra</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabaseClient.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f4f7fb; --card:#fff; --accent:var(--navy);
     
}
body { font-family:Inter,system-ui,sans-serif; background:var(--bg); color:#0f172a; }

/* ── LIST PAGE ── */
.page { padding:24px; max-width:1000px; margin:0 auto; }
h1 { font-size:22px; margin-bottom:4px; }
.subtitle { color:var(--muted); font-size:13px; margin-bottom:20px; }
.toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:18px; }

.btn {
  padding:7px 16px; border:none; border-radius:8px;
  background:var(--accent); color:#fff; font-size:13px;
  font-weight:600; cursor:pointer; transition:.15s;
}
.btn:hover { opacity:.85; }
.btn.sec { background:#fff; color:var(--accent); border:1px solid #cfe0f6; }
.btn.red  { background:var(--red); }

.exam-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
.exam-card {
  background:var(--card); border-radius:10px; padding:16px;
  box-shadow:0 1px 4px rgba(2,6,23,.07);
  border-left:4px solid var(--accent);
}
.exam-card h3 { font-size:15px; margin-bottom:6px; }
.exam-card .meta { font-size:12px; color:var(--muted); line-height:1.8; }
.exam-card .actions { display:flex; gap:6px; margin-top:10px; }
.exam-card .actions button {
  flex:1; padding:5px; font-size:12px; border:none;
  border-radius:6px; cursor:pointer; font-weight:600;
}
.edit-btn   { background:var(--accent); color:#fff; }
.delete-btn { background:var(--red); color:#fff; }

/* ── EDITOR OVERLAY ── */
.editor-overlay {
  display:none; position:fixed; inset:0; background:var(--bg);
  z-index:200; flex-direction:column;
}
.editor-overlay.open { display:flex; }

.editor-topbar {
  height:54px; background:var(--navy); color:#fff;
  display:flex; align-items:center; gap:12px; padding:0 18px; flex-shrink:0;
}
.editor-topbar h2 { font-size:15px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.editor-body { display:flex; flex:1; overflow:hidden; }

/* LEFT: bank */
.bank-panel {
  width:370px; flex-shrink:0; background:var(--card);
  border-right:1px solid var(--border); display:flex;
  flex-direction:column; overflow:hidden;
}
.panel-hd {
  padding:12px 14px; border-bottom:1px solid var(--border);
  background:var(--surface); flex-shrink:0;
}
.panel-hd h3 { font-size:13px; font-weight:700; margin-bottom:8px; }
.filters { display:flex; flex-direction:column; gap:5px; }
.filters select, .filters input {
  width:100%; padding:5px 8px; border:1px solid var(--border);
  border-radius:6px; font-size:12px;
}
.bank-list { flex:1; overflow-y:auto; padding:6px 8px; }

.bank-item {
  padding:8px 10px 8px 10px; border-radius:8px;
  border:1px solid var(--border); margin-bottom:5px;
  font-size:12px; background:#fff; position:relative;
  padding-right:68px; transition:.1s;
}
.bank-item:not(.in-exam):hover { border-color:var(--accent); background:#eff6ff; }
.bank-item.in-exam { opacity:.4; }
.type-chip {
  display:inline-block; font-size:10px; font-weight:700;
  padding:1px 7px; border-radius:8px; margin-bottom:3px;
}
.type-mc    { background:#eff6ff; color:#2563eb; }
.type-tf    { background:#f0fdf4; color:#16a34a; }
.type-sa    { background:#fef9c3; color:#854d0e; }
.type-essay { background:#fdf4ff; color:#7e22ce; }

.bank-item .q-text { line-height:1.4; color:#0f172a; max-height:3.2em; overflow:hidden; }
.bank-item .q-meta { color:var(--muted); margin-top:2px; }
.bank-add-btn {
  position:absolute; right:8px; top:50%; transform:translateY(-50%);
  background:var(--accent); color:#fff; border:none;
  border-radius:6px; padding:3px 9px; font-size:11px; font-weight:700;
  cursor:pointer; white-space:nowrap;
}
.bank-item.in-exam .bank-add-btn { display:none; }
.bank-pg { padding:8px; border-top:1px solid var(--border);
           display:flex; gap:6px; justify-content:center; flex-shrink:0; }
.bank-pg button { padding:3px 10px; font-size:12px; border:1px solid var(--border);
                  border-radius:5px; background:#fff; cursor:pointer; }
.bank-pg button.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* RIGHT: exam */
.exam-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.exam-panel .panel-hd { display:flex; align-items:center; gap:10px; }
.exam-panel .panel-hd h3 { flex:1; }
.exam-content { flex:1; overflow-y:auto; padding:14px 16px; }

/* Header fields */
.hdr-grid {
  display:grid; grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;
  gap:10px; background:var(--card); border-radius:10px;
  padding:14px; margin-bottom:14px;
  box-shadow:0 1px 4px rgba(2,6,23,.05);
}
.fg label { display:block; font-size:11px; color:var(--muted);
            font-weight:700; margin-bottom:3px; text-transform:uppercase; letter-spacing:.03em; }
.fg input, .fg select {
  width:100%; padding:6px 8px; border:1px solid var(--border);
  border-radius:6px; font-size:13px;
}

/* Section */
.sec-block { margin-bottom:14px; }
.sec-title {
  font-size:13px; font-weight:700; color:#1e40af;
  padding:7px 12px; background:#eff6ff; border-radius:8px; margin-bottom:8px;
}

/* Question row */
.eq-row {
  display:flex; gap:8px; align-items:flex-start;
  padding:10px 10px 10px 8px; background:var(--card);
  border-radius:8px; border:1px solid var(--border);
  margin-bottom:7px; transition:.1s;
}
.eq-row:hover { border-color:#bfdbfe; }
.eq-row.drag-over { border-color:var(--accent); background:#eff6ff; }

.drag-handle { cursor:grab; color:#94a3b8; font-size:15px;
               padding:2px 3px; flex-shrink:0; margin-top:3px; user-select:none; }
.order-input {
  width:34px; text-align:center; padding:3px 2px;
  border:1px solid var(--border); border-radius:5px;
  font-size:12px; font-weight:700; flex-shrink:0; background:var(--surface);
}
.eq-main { flex:1; min-width:0; }
.eq-qtext { font-size:13px; line-height:1.5; margin-bottom:6px; color:#0f172a; }
.eq-qimg  { max-width:220px; border-radius:6px; margin-top:4px; display:block; }

/* answer chips - student-view style */
.ans-row { display:flex; flex-wrap:wrap; gap:5px; margin-top:4px; }
.ans-chip {
  padding:3px 11px; border-radius:20px; font-size:11px; font-weight:600;
  border:1.5px solid #e2e8f0; background:var(--surface); color:#374151;
}
.ans-chip.correct { border-color:var(--green); background:#dcfce7; color:var(--green); }
.ans-chip.wrong   { border-color:#fca5a5; background:#fee2e2; color:#b91c1c; }

/* scoring */
.scoring { flex-shrink:0; width:210px; min-width:0; overflow:hidden; }
.scoring label { font-size:11px; color:var(--muted); font-weight:700;
                 display:block; margin-bottom:2px; text-transform:uppercase; }
.score-input {
  width:68px; padding:4px 6px; border:1px solid var(--border);
  border-radius:5px; font-size:12px; text-align:center;
}
.partial-tbl-wrap { width:100%; overflow-x:auto; margin-top:5px; }
.partial-tbl { width:100%; border-collapse:collapse; font-size:11px; min-width:0; }
.partial-tbl th, .partial-tbl td {
  border:1px solid var(--border); padding:3px 2px; text-align:center;
}
.partial-tbl th { background:#f1f5f9; font-weight:700; white-space:nowrap; }
.partial-tbl input {
  width:38px; border:none; background:transparent;
  text-align:center; font-size:11px; padding:0;
}

.remove-btn { color:var(--red); cursor:pointer; font-size:18px;
              padding:2px 4px; flex-shrink:0; line-height:1; }

.add-row-btn {
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 12px; border:1.5px dashed #93c5fd;
  border-radius:7px; font-size:12px; color:var(--accent);
  background:transparent; cursor:pointer; transition:.1s; font-weight:600;
}
.add-row-btn:hover { background:#eff6ff; }

.empty-exam { text-align:center; padding:60px; color:var(--muted); font-size:13px; }
</style>
</head>
<body>

<!-- LIST PAGE -->
<div class="page" id="listPage">
  <h1>📄 Đề kiểm tra</h1>
  <p class="subtitle">Tạo và quản lý đề kiểm tra từ ngân hàng câu hỏi</p>
  <div class="toolbar">
    <button class="btn" onclick="openEditor(null)">+ Tạo đề mới</button>
  </div>
  <div class="exam-grid" id="examGrid">
    <p style="color:var(--muted);font-size:13px">Đang tải...</p>
  </div>
</div>

<!-- EDITOR OVERLAY -->
<div class="editor-overlay" id="editorOverlay">

  <div class="editor-topbar">
    <button class="btn" style="background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2)"
      onclick="closeEditor()">← Quay lại</button>
    <h2 id="editorTitle">Tạo đề mới</h2>
    <span id="examStats" style="font-size:12px;color:#94a3b8;flex-shrink:0"></span>
    <button class="btn" style="background:#16a34a;flex-shrink:0" onclick="saveExam()">💾 Lưu đề</button>
  </div>

  <div class="editor-body">

    <!-- LEFT: bank -->
    <div class="bank-panel">
      <div class="panel-hd">
        <h3>📚 Ngân hàng câu hỏi</h3>
        <div class="filters">
          <select id="bGrade"   onchange="bankGradeChange()"><option value="">Tất cả khối</option></select>
          <select id="bSubject" onchange="bankSubjectChange()"><option value="">Tất cả môn</option></select>
          <select id="bChapter" onchange="loadBank()"><option value="">Tất cả chương</option></select>
          <div style="display:flex;gap:5px">
            <select id="bType" onchange="loadBank()" style="flex:1">
              <option value="">Tất cả loại</option>
              <option value="multi_choice">Trắc nghiệm</option>
              <option value="true_false">Đúng/Sai</option>
              <option value="short_answer">Trả lời ngắn</option>
              <option value="essay">Tự luận</option>
            </select>
            <select id="bDiff" onchange="loadBank()" style="flex:1">
              <option value="">Mức độ</option>
            </select>
          </div>
          <input type="text" id="bSearch" placeholder="🔍 Tìm câu hỏi..." oninput="debounceLoadBank()">
          <button class="btn" style="font-size:12px;padding:5px 10px"
            onclick="openRandomModal()">🎲 Thêm ngẫu nhiên</button>
        </div>
      </div>
      <div class="bank-list" id="bankList">
        <p style="color:var(--muted);padding:10px;font-size:12px">Chọn bộ lọc để xem câu hỏi</p>
      </div>
      <div class="bank-pg" id="bankPg"></div>
    </div>

    <!-- RIGHT: exam -->
    <div class="exam-panel">
      <div class="panel-hd">
        <h3>📝 Nội dung đề</h3>
      </div>
      <div class="exam-content">

        <!-- Header -->
        <div class="hdr-grid">
          <div class="fg">
            <label>Tên đề</label>
            <input id="fTitle" type="text" placeholder="VD: Kiểm tra 15 phút">
          </div>
          <div class="fg">
            <label>Thời gian (phút)</label>
            <input id="fDuration" type="number" value="45" min="1">
          </div>
          <div class="fg">
            <label>Tổng điểm</label>
            <input id="fTotal" type="number" value="10" step="0.5" min="1">
          </div>
        </div>

        <!-- Sections -->
        <div id="examSections"></div>

      </div>
    </div>

  </div><!-- /editor-body -->
</div><!-- /editor-overlay -->

<!-- Random modal -->
<div id="randomModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);
     z-index:300;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;padding:24px;width:340px;box-shadow:0 10px 40px rgba(0,0,0,.2)">
    <h3 style="margin-bottom:14px;font-size:16px">🎲 Thêm ngẫu nhiên</h3>
    <div style="display:flex;flex-direction:column;gap:8px">
      <label style="font-size:12px;font-weight:700;color:var(--muted)">Số câu</label>
      <input id="randCount" type="number" value="5" min="1" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px">
      <label style="font-size:12px;font-weight:700;color:var(--muted)">Loại câu hỏi</label>
      <select id="randType" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px">
        <option value="">Tất cả loại</option>
        <option value="multi_choice">Trắc nghiệm</option>
        <option value="true_false">Đúng/Sai</option>
        <option value="short_answer">Trả lời ngắn</option>
        <option value="essay">Tự luận</option>
      </select>
      <p style="font-size:12px;color:var(--muted)">Áp dụng bộ lọc hiện tại (khối/môn/chương)</p>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="btn sec" onclick="closeRandomModal()">Hủy</button>
      <button class="btn" onclick="addRandom()">Thêm</button>
    </div>
  </div>
</div>

<script src="./exam.js"></script>
</body>
</html>
