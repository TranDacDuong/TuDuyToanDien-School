<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Công việc - MindUp</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="theme.css?v=20260615-ios1">
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f4f6f9;color:var(--ink);font-family:var(--font-body);padding:18px}
    .task-page{width:min(1180px,100%);margin:0 auto}.task-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:14px}
    .task-head h1{margin:0;color:var(--navy);font-family:var(--font-display);font-size:1.55rem}.task-head p{margin:5px 0 0;color:var(--ink-mid);font-size:.86rem}
    .task-head-actions{display:flex;gap:8px;flex-wrap:wrap}.icon-command{width:38px;height:38px;border-radius:7px;border:1px solid var(--border);background:#fff;display:grid;place-items:center;cursor:pointer;font-size:1rem}
    .task-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}.task-stat{background:#fff;border:1px solid var(--border);border-radius:8px;padding:13px 14px}
    .task-stat span{display:block;color:var(--ink-light);font-size:.73rem;font-weight:800;text-transform:uppercase}.task-stat strong{display:block;color:var(--navy);font-size:1.45rem;margin-top:4px}
    .task-toolbar{background:#fff;border:1px solid var(--border);padding:10px;border-radius:8px;display:grid;gap:8px;margin-bottom:12px}
    .task-view-tabs{display:flex;gap:8px;flex-wrap:wrap}.task-view-tab{border:1px solid var(--border);background:#fff;color:var(--navy);height:36px;border-radius:999px;padding:0 14px;font:inherit;font-size:.8rem;font-weight:900;cursor:pointer}.task-view-tab.active{background:var(--navy);border-color:var(--navy);color:#fff}
    .task-admin-filter{display:none;grid-template-columns:120px minmax(180px,1fr);gap:8px;align-items:center}.task-admin-filter.show{display:grid}.task-admin-filter label{font-size:.78rem;font-weight:900;color:var(--ink-mid)}.task-admin-filter select{height:38px;border:1px solid var(--border);border-radius:7px;padding:0 10px;font:inherit;background:#fff}
    .task-datebar{display:grid;grid-template-columns:1fr minmax(150px,1.1fr) 1fr;gap:8px}.task-date-btn{border:1px solid var(--border);background:#fff;color:var(--navy);height:40px;border-radius:7px;font:inherit;font-size:.82rem;font-weight:900;cursor:pointer}.task-date-btn.current{background:var(--navy);border-color:var(--navy);color:#fff;cursor:default}
    .task-list{display:grid;gap:14px}.task-month-dashboard{display:grid;gap:14px}.task-month-overview{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.task-month-overview>div,.task-panel{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px}.task-month-overview span{display:block;color:var(--ink-light);font-size:.72rem;font-weight:800;text-transform:uppercase}.task-month-overview strong{display:block;color:var(--navy);font-size:1.3rem;margin-top:3px}.task-panel h2{margin:0 0 10px;color:var(--navy);font-size:.95rem}.task-progress-list{display:grid;gap:9px}.task-progress-row{display:grid;gap:6px}.task-progress-head{display:flex;justify-content:space-between;gap:10px;font-size:.8rem;font-weight:800;color:var(--navy)}.task-progress-track{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden}.task-progress-fill{height:100%;background:linear-gradient(90deg,#1d6bd1,#22c55e);border-radius:inherit}.task-mini-chart{display:grid;grid-template-columns:repeat(var(--bars,1),minmax(8px,1fr));align-items:end;gap:5px;height:120px;padding-top:8px}.task-mini-bar{background:linear-gradient(180deg,#1d6bd1,#0f1f3d);border-radius:6px 6px 2px 2px;min-height:5px}.task-month-section-title{margin:2px 0 -4px;color:var(--navy);font-size:.95rem;font-weight:900}.task-reminder-group{opacity:.82}.task-day{display:grid;gap:8px}.task-day-title{display:flex;align-items:center;gap:8px;margin:2px 0;color:var(--navy);font-size:.92rem;font-weight:900}.task-day-title:after{content:"";height:1px;background:var(--border);flex:1}.task-card{background:#fff;border:1px solid var(--border);border-left:4px solid #94a3b8;border-radius:8px;padding:14px;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px}
    .task-card.urgent{border-left-color:#dc2626}.task-card.important{border-left-color:#f59e0b}.task-card.completed{opacity:.68;border-left-color:#16a34a}
    .task-card-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.task-card h3{font-size:.96rem;color:var(--navy);margin:0}.task-badge{padding:3px 7px;border-radius:999px;background:#f1f5f9;color:#475569;font-size:.68rem;font-weight:800}
    .task-badge.urgent{background:#fee2e2;color:#b91c1c}.task-badge.important{background:#fff7ed;color:#c2410c}.task-badge.overdue{background:#7f1d1d;color:#fff}
    .task-description{margin:7px 0;color:var(--ink-mid);font-size:.82rem;line-height:1.5}.task-meta{display:flex;gap:12px;flex-wrap:wrap;color:var(--ink-light);font-size:.74rem}
    .task-actions{display:flex;align-items:center;justify-content:flex-end;gap:9px;flex-wrap:wrap}.task-status{display:inline-flex;align-items:center;gap:5px;font-size:.78rem;font-weight:900;white-space:nowrap}.task-status.done{color:#15803d}.task-status.todo{color:#dc2626}.task-status.reminder{color:#64748b}.task-btn{border:1px solid var(--border);background:#fff;color:var(--navy);padding:8px 10px;border-radius:7px;font:inherit;font-size:.78rem;font-weight:800;cursor:pointer}
    .task-btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}.task-btn.success{background:#15803d;color:#fff;border-color:#15803d}
    .task-empty{background:#fff;border:1px dashed var(--border);border-radius:8px;padding:48px 20px;text-align:center;color:var(--ink-light)}
    .task-modal{position:fixed;inset:0;z-index:900;background:rgba(15,31,61,.55);display:none;align-items:center;justify-content:center;padding:16px}.task-modal.show{display:flex}
    .task-modal-box{width:min(640px,100%);max-height:calc(100dvh - 32px);overflow:auto;background:#fff;border-radius:8px;padding:18px}.task-modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    .task-modal-head h2{margin:0;font-size:1.08rem;color:var(--navy)}.task-form{display:grid;grid-template-columns:1fr 1fr;gap:11px}.task-field{display:grid;gap:5px}.task-field.full{grid-column:1/-1}.task-field label{font-size:.76rem;font-weight:800;color:var(--ink-mid)}
    .task-field input,.task-field select,.task-field textarea{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px 10px;font:inherit}.task-field textarea{min-height:86px;resize:vertical}
    .assignee-list{max-height:190px;overflow:auto;border:1px solid var(--border);border-radius:7px;padding:7px;display:grid;gap:4px}.assignee-row{display:flex;align-items:center;gap:8px;padding:6px;border-radius:6px}.assignee-row:hover{background:#f8fafc}
    .task-modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}.task-toast{position:fixed;left:50%;bottom:22px;transform:translate(-50%,20px);opacity:0;pointer-events:none;background:#0f1f3d;color:#fff;padding:10px 14px;border-radius:7px;font-size:.82rem;transition:.2s;z-index:1000}.task-toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:760px){body{padding:12px 10px calc(18px + env(safe-area-inset-bottom))}.task-summary,.task-month-overview{grid-template-columns:repeat(2,1fr)}.task-admin-filter{grid-template-columns:1fr}.task-datebar{grid-template-columns:1fr 1.15fr 1fr}.task-date-btn{height:38px;font-size:.76rem}.task-card{grid-template-columns:1fr}.task-actions{justify-content:flex-start}.task-actions .task-btn{flex:1}.task-form{grid-template-columns:1fr}.task-field.full{grid-column:auto}.task-head h1{font-size:1.3rem}}
  </style>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0f1f3d">
  <script src="pwa.js?v=20260630-push-vapid8" defer></script>
</head>
<body>
  <main class="task-page">
    <header class="task-head">
      <div><h1>Công việc</h1><p id="taskGreeting">Công việc học tập và vận hành cần xử lý.</p></div>
      <div class="task-head-actions">
        <button class="icon-command" type="button" id="taskCreateButton" title="Giao việc" aria-label="Giao việc" style="display:none">＋</button>
        <button class="icon-command" type="button" id="taskDeleteOldButton" title="Xóa công việc cũ" aria-label="Xóa công việc cũ">🗑</button>
        <button class="icon-command" type="button" id="taskSettingsButton" title="Cài đặt thông báo" aria-label="Cài đặt thông báo">⚙</button>
        <button class="icon-command" type="button" id="taskRefreshButton" title="Làm mới" aria-label="Làm mới">↻</button>
      </div>
    </header>

    <section class="task-summary">
      <div class="task-stat"><span>Hôm nay</span><strong id="taskTodayCount">0</strong></div>
      <div class="task-stat"><span>Quan trọng</span><strong id="taskImportantCount">0</strong></div>
      <div class="task-stat"><span>Quá hạn</span><strong id="taskOverdueCount">0</strong></div>
      <div class="task-stat"><span>Đã hoàn thành</span><strong id="taskCompletedCount">0</strong></div>
    </section>

    <section class="task-toolbar">
      <div class="task-view-tabs" aria-label="Chế độ xem công việc">
        <button class="task-view-tab active" type="button" data-task-view="today">Hôm nay</button>
        <button class="task-view-tab" type="button" data-task-view="month">Tháng này</button>
      </div>
      <div class="task-admin-filter" id="taskAdminFilter">
        <label for="taskStaffFilter">Nhân viên</label>
        <select id="taskStaffFilter">
          <option value="all">Tất cả nhân viên</option>
        </select>
      </div>
      <div class="task-datebar" aria-label="Chọn ngày công việc">
        <button class="task-date-btn" type="button" id="taskPrevDay">Trước đó</button>
        <button class="task-date-btn current" type="button" id="taskCurrentDay" aria-current="date">17/06/2026</button>
        <button class="task-date-btn" type="button" id="taskNextDay">Sau đó</button>
      </div>
    </section>
    <section id="taskList" class="task-list"><div class="task-empty">Đang tổng hợp công việc...</div></section>
  </main>

  <div class="task-modal" id="taskCreateModal">
    <div class="task-modal-box">
      <div class="task-modal-head"><h2>Giao việc</h2><button class="icon-command" type="button" data-close-modal="taskCreateModal">×</button></div>
      <div class="task-form">
        <div class="task-field full"><label>Tiêu đề</label><input id="manualTaskTitle" maxlength="180"></div>
        <div class="task-field full"><label>Mô tả</label><textarea id="manualTaskDescription"></textarea></div>
        <div class="task-field"><label>Mức độ</label><select id="manualTaskPriority"><option value="normal">Thông thường</option><option value="important">Quan trọng</option><option value="urgent">Khẩn cấp</option></select></div>
        <div class="task-field"><label>Thời hạn</label><input id="manualTaskDueAt" type="datetime-local"></div>
        <div class="task-field full"><label>Đường dẫn xử lý</label><input id="manualTaskActionUrl" placeholder="VD: class.html hoặc tuition.html"></div>
        <div class="task-field full"><label>Người nhận</label><input id="manualTaskAssigneeSearch" placeholder="Tìm theo tên hoặc email"></div>
        <div class="task-field full"><div class="assignee-list" id="manualTaskAssignees"></div></div>
      </div>
      <div class="task-modal-actions"><button class="task-btn" type="button" data-close-modal="taskCreateModal">Hủy</button><button class="task-btn primary" type="button" id="manualTaskSave">Giao việc</button></div>
    </div>
  </div>

  <div class="task-modal" id="taskSettingsModal">
    <div class="task-modal-box">
      <div class="task-modal-head"><h2>Thông báo công việc</h2><button class="icon-command" type="button" data-close-modal="taskSettingsModal">×</button></div>
      <div class="task-form">
        <div class="task-field"><label>Nhận tổng hợp hằng ngày</label><select id="prefDigestEnabled"><option value="true">Bật</option><option value="false">Tắt</option></select></div>
        <div class="task-field"><label>Giờ nhận tổng hợp</label><input id="prefDigestTime" type="time"></div>
        <div class="task-field"><label>Nhắc sắp đến hạn</label><select id="prefDueEnabled"><option value="true">Bật</option><option value="false">Tắt</option></select></div>
        <div class="task-field"><label>Nhắc việc quá hạn</label><select id="prefOverdueEnabled"><option value="true">Bật</option><option value="false">Tắt</option></select></div>
      </div>
      <div class="task-modal-actions"><button class="task-btn" type="button" data-close-modal="taskSettingsModal">Hủy</button><button class="task-btn primary" type="button" id="taskPreferencesSave">Lưu cài đặt</button></div>
    </div>
  </div>
  <div class="task-toast" id="taskToast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="notification_helper.js"></script>
  <script src="tasks.js?v=20260703-manual-task-assignee1"></script>
</body>
</html>
