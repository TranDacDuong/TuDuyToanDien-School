<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MindUp - Dang ngoai tuyen</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f1f3d">
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: #1a2340;
  background:
    radial-gradient(circle at top left, rgba(200,150,42,.16), transparent 28%),
    linear-gradient(180deg, #fdfaf4 0%, #f7faff 100%);
}
main {
  width: min(100%, 440px);
  padding: 28px;
  border: 1px solid rgba(15,31,61,.1);
  border-radius: 12px;
  background: rgba(255,255,255,.92);
  box-shadow: 0 18px 50px rgba(15,31,61,.12);
}
h1 {
  margin: 0 0 12px;
  font-size: 1.45rem;
}
p {
  margin: 0 0 20px;
  color: #4a5578;
  line-height: 1.55;
}
button {
  border: 0;
  border-radius: 8px;
  padding: 12px 18px;
  color: #fff;
  background: #0f1f3d;
  font-weight: 700;
  cursor: pointer;
}
</style>
</head>
<body>
<main>
  <h1>Ban dang ngoai tuyen</h1>
  <p>MindUp can ket noi mang de dong bo bai hoc, de thi va du lieu lop hoc. Hay thu lai khi duong truyen on dinh hon.</p>
  <button type="button" onclick="window.location.reload()">Thu lai</button>
</main>
</body>
</html>
