<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý học sinh</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="supabaseClient.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b0f1a;
  --surface: #111827;
  --surface2: #1a2235;
  --surface3: #1f2d42;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(99,179,237,0.3);
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --accent-glow: rgba(59,130,246,0.15);
  --danger: #ef4444;
  --danger-glow: rgba(239,68,68,0.15);
  --success: #10b981;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --radius: 12px;
  --radius-sm: 8px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 32px 24px;
  overflow-x: hidden;
}

/* Background mesh */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(59,130,246,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(16,185,129,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* HEADER */
.header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 16px;
}

.header-left h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #f1f5f9 0%, #93c5fd 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-left p {
  font-size: 13px;
  color: var(--text3);
  margin-top: 4px;
  font-weight: 300;
}

/* STATS CARDS */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  transition: border-color 0.2s, transform 0.2s;
}

.stat-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
}

.stat-card .label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  margin-bottom: 8px;
}

.stat-card .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 500;
  color: var(--accent2);
  line-height: 1;
}

/* SEARCH */
.search-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.search-field {
  position: relative;
  flex: 1 1 160px;
}

.search-field svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  pointer-events: none;
  width: 14px;
  height: 14px;
}

.search-field input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px 10px 34px;
  color: var(--text);
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  transition: border-color 0.2s, background 0.2s;
  outline: none;
}

.search-field input::placeholder { color: var(--text3); }

.search-field input:focus {
  border-color: var(--accent);
  background: var(--surface3);
}

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 18px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 0 0 0 var(--accent-glow);
}

.btn-primary:hover {
  background: var(--accent2);
  box-shadow: 0 0 20px var(--accent-glow);
  transform: translateY(-1px);
}

.btn-ghost {
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
}

.btn-ghost:hover {
  border-color: var(--border-hover);
  color: var(--text);
  background: var(--surface3);
}

.btn-danger {
  background: transparent;
  color: var(--danger);
  border: 1px solid rgba(239,68,68,0.2);
  padding: 6px 12px;
  font-size: 12px;
}

.btn-danger:hover {
  background: var(--danger-glow);
  border-color: var(--danger);
}

.btn-edit {
  background: transparent;
  color: var(--accent2);
  border: 1px solid rgba(59,130,246,0.2);
  padding: 6px 12px;
  font-size: 12px;
}

.btn-edit:hover {
  background: var(--accent-glow);
  border-color: var(--accent);
}

/* TABLE */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}

th {
  padding: 13px 16px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  text-align: left;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  transition: color 0.2s;
}

th:hover { color: var(--accent2); }

th .sort-icon {
  display: inline-block;
  margin-left: 4px;
  opacity: 0.4;
  font-size: 10px;
}

th:hover .sort-icon { opacity: 1; }

td {
  padding: 13px 16px;
  font-size: 13px;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

tr:last-child td { border-bottom: none; }

tr:hover td {
  background: rgba(255,255,255,0.025);
  color: var(--text);
}

td.name { font-weight: 600; color: var(--text); }

td.mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

td.phone-cell {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--accent2);
  cursor: pointer;
}

td.phone-cell:hover { text-decoration: underline; }

.stt {
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

/* BADGE */
.badge {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  background: rgba(59,130,246,0.1);
  color: var(--accent2);
  border: 1px solid rgba(59,130,246,0.15);
}

/* ACTIONS col */
.actions { display: flex; gap: 6px; align-items: center; }

/* PAGINATION */
.pagination-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
  flex-wrap: wrap;
  gap: 10px;
}

.pagination-info {
  font-size: 12px;
  color: var(--text3);
}

.pagination-btns {
  display: flex;
  gap: 4px;
}

.pagination-btns button {
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  border-radius: 6px;
  font-family: 'Sora', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}

.pagination-btns button:hover {
  border-color: var(--border-hover);
  color: var(--text);
  background: var(--surface3);
}

.pagination-btns button.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 600;
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}

.modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%;
  max-width: 420px;
  padding: 28px;
  animation: slideUp 0.25s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-box h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--text);
}

.form-group {
  margin-bottom: 14px;
}

.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  margin-bottom: 6px;
}

.form-group input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Sora', sans-serif;
  font-size: 13px;
  transition: border-color 0.2s;
  outline: none;
}

.form-group input:focus {
  border-color: var(--accent);
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.modal-actions .btn { flex: 1; justify-content: center; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 18px;
  font-size: 13px;
  color: var(--text);
  z-index: 999;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  transform: translateX(120%);
  transition: transform 0.3s ease;
}

.toast.show { transform: translateX(0); }
.toast .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
.toast.error .dot { background: var(--danger); }

/* EMPTY STATE */
.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--text3);
}

.empty-state p { margin-top: 10px; font-size: 13px; }

/* Skeleton loader */
.skeleton {
  background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius: 4px;
  display: inline-block;
}
@keyframes shimmer {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}

.loading-row td { padding: 14px 16px; }
</style>
</head>

<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1>Quản lý học sinh</h1>
      <p>Hệ thống quản lý danh sách học viên</p>
    </div>
    <button class="btn btn-primary" onclick="exportExcel()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Xuất Excel
    </button>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="label">Tổng học sinh</div>
      <div class="value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Đang hiển thị</div>
      <div class="value" id="stat-filtered">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Trang hiện tại</div>
      <div class="value" id="stat-page">—</div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-panel">
    <div class="search-field">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search_name" placeholder="Tìm theo tên…">
    </div>
    <div class="search-field">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.72 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <input id="search_phone" placeholder="Số điện thoại…">
    </div>
    <div class="search-field">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <input id="search_birth" placeholder="Năm sinh…">
    </div>
    <div class="search-field">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <input id="search_province" placeholder="Tỉnh / thành…">
    </div>
    <div class="search-field">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <input id="search_school" placeholder="Trường học…">
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:48px">#</th>
          <th onclick="sortTable('full_name')">Họ tên <span class="sort-icon">↕</span></th>
          <th>Email</th>
          <th onclick="sortTable('phone')">SĐT <span class="sort-icon">↕</span></th>
          <th onclick="sortTable('birth_year')">Năm sinh <span class="sort-icon">↕</span></th>
          <th onclick="sortTable('province')">Tỉnh <span class="sort-icon">↕</span></th>
          <th onclick="sortTable('school')">Trường <span class="sort-icon">↕</span></th>
          <th style="width:120px">Thao tác</th>
        </tr>
      </thead>
      <tbody id="studentTable"></tbody>
    </table>

    <div class="pagination-row">
      <div class="pagination-info" id="paginationInfo"></div>
      <div class="pagination-btns" id="pagination"></div>
    </div>
  </div>

</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h3>✏️ Chỉnh sửa học sinh</h3>

    <div class="form-group">
      <label>Họ tên</label>
      <input id="edit_name" placeholder="Nhập họ tên…">
    </div>
    <div class="form-group">
      <label>Số điện thoại</label>
      <input id="edit_phone" placeholder="Nhập SĐT…">
    </div>
    <div class="form-group">
      <label>Năm sinh</label>
      <input id="edit_birth" placeholder="VD: 2005">
    </div>
    <div class="form-group">
      <label>Tỉnh / Thành phố</label>
      <input id="edit_province" placeholder="VD: Hà Nội">
    </div>
    <div class="form-group">
      <label>Trường</label>
      <input id="edit_school" placeholder="Tên trường…">
    </div>

    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveStudent()">Lưu thay đổi</button>
      <button class="btn btn-ghost" onclick="closeModal()">Hủy</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span class="dot"></span>
  <span id="toastMsg"></span>
</div>

<script>
let allStudents = []
let filteredStudents = []
let page = 1
let pageSize = 10
let editingId = null
let sortDirection = 1

function removeVN(str) {
  return str
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/đ/g, "d").replace(/Đ/g, "D")
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast')
  document.getElementById('toastMsg').textContent = msg
  t.className = 'toast' + (isError ? ' error' : '')
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2800)
}

// LOAD
async function loadStudents() {
  renderSkeleton()
  const { data, error } = await sb.from("users").select("*").eq("role", "student")
  if (error) { showToast("Lỗi tải dữ liệu", true); return }

  allStudents = data.filter(s => s.full_name && s.phone && s.birth_year && s.province && s.school)
  filteredStudents = [...allStudents]
  render()
}
loadStudents()

function renderSkeleton() {
  const tbody = document.getElementById('studentTable')
  let html = ''
  for (let i = 0; i < 6; i++) {
    html += `<tr class="loading-row">
      <td><span class="skeleton" style="width:24px;height:14px"></span></td>
      <td><span class="skeleton" style="width:130px;height:14px"></span></td>
      <td><span class="skeleton" style="width:170px;height:14px"></span></td>
      <td><span class="skeleton" style="width:100px;height:14px"></span></td>
      <td><span class="skeleton" style="width:48px;height:14px"></span></td>
      <td><span class="skeleton" style="width:90px;height:14px"></span></td>
      <td><span class="skeleton" style="width:120px;height:14px"></span></td>
      <td></td>
    </tr>`
  }
  tbody.innerHTML = html
}

// SEARCH
function filterStudents() {
  const name = removeVN(search_name.value.toLowerCase())
  const phone = search_phone.value
  const birth = search_birth.value
  const province = removeVN(search_province.value.toLowerCase())
  const school = removeVN(search_school.value.toLowerCase())

  filteredStudents = allStudents.filter(s =>
    removeVN((s.full_name||'').toLowerCase()).includes(name) &&
    (s.phone||'').includes(phone) &&
    (!birth || s.birth_year == birth) &&
    removeVN((s.province||'').toLowerCase()).includes(province) &&
    removeVN((s.school||'').toLowerCase()).includes(school)
  )
  page = 1
  render()
}

document.querySelectorAll(".search-panel input").forEach(i => i.addEventListener("input", filterStudents))

// SORT
function sortTable(field) {
  filteredStudents.sort((a, b) => {
    let A = a[field] || '', B = b[field] || ''
    if (field === 'birth_year') { A = parseInt(A); B = parseInt(B) }
    if (A > B) return sortDirection
    if (A < B) return -sortDirection
    return 0
  })
  sortDirection *= -1
  render()
}

// RENDER
function render() {
  const start = (page - 1) * pageSize
  const end = start + pageSize
  renderTable(filteredStudents.slice(start, end))
  renderPagination()
  renderStats()
}

function renderTable(list) {
  const tbody = document.getElementById('studentTable')
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>Không tìm thấy học sinh nào</p>
    </div></td></tr>`
    return
  }

  tbody.innerHTML = list.map((s, i) => `
    <tr>
      <td class="stt">${(page-1)*pageSize+i+1}</td>
      <td class="name">${s.full_name}</td>
      <td style="font-size:12px;color:var(--text3)">${s.email || '—'}</td>
      <td class="phone-cell" onclick="copyPhone('${s.phone}')" title="Click để copy">${s.phone}</td>
      <td><span class="badge">${s.birth_year}</span></td>
      <td>${s.province}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${s.school}">${s.school}</td>
      <td>
        <div class="actions">
          <button class="btn btn-edit" onclick="editStudent('${s.id}')">Sửa</button>
          <button class="btn btn-danger" onclick="deleteStudent('${s.id}')">Xóa</button>
        </div>
      </td>
    </tr>
  `).join('')
}

function copyPhone(phone) {
  navigator.clipboard.writeText(phone)
  showToast('Đã sao chép: ' + phone)
}

function editStudent(id) {
  const s = allStudents.find(x => x.id === id)
  editingId = id
  edit_name.value = s.full_name
  edit_phone.value = s.phone
  edit_birth.value = s.birth_year
  edit_province.value = s.province
  edit_school.value = s.school
  document.getElementById('editModal').classList.add('open')
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open')
}

async function saveStudent() {
  const { error } = await sb.from("users").update({
    full_name: edit_name.value,
    phone: edit_phone.value,
    birth_year: edit_birth.value,
    province: edit_province.value,
    school: edit_school.value
  }).eq("id", editingId)

  if (error) { showToast("Lỗi cập nhật", true) }
  else { closeModal(); showToast("Đã lưu thay đổi"); loadStudents() }
}

async function deleteStudent(id) {
  if (!confirm("Xóa học sinh này?")) return
  const { error } = await sb.from("users").delete().eq("id", id)
  if (error) { showToast("Không thể xóa", true); return }
  await sb.rpc("delete_auth_user", { uid: id })
  showToast("Đã xóa học sinh")
  loadStudents()
}

function renderPagination() {
  const total = Math.ceil(filteredStudents.length / pageSize)
  const pag = document.getElementById('pagination')
  let html = ''

  if (page > 1) html += `<button onclick="goPage(${page-1})">‹</button>`
  for (let i = 1; i <= total; i++) {
    if (total > 7 && i > 3 && i < total - 1 && Math.abs(i - page) > 1) {
      if (i === 4 || i === total - 2) html += `<button disabled style="opacity:0.3;cursor:default">…</button>`
      continue
    }
    html += `<button class="${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`
  }
  if (page < total) html += `<button onclick="goPage(${page+1})">›</button>`
  pag.innerHTML = html

  const start = (page - 1) * pageSize + 1
  const end = Math.min(page * pageSize, filteredStudents.length)
  document.getElementById('paginationInfo').textContent =
    filteredStudents.length ? `Hiển thị ${start}–${end} trong ${filteredStudents.length} học sinh` : ''
}

function goPage(p) { page = p; render() }

function renderStats() {
  document.getElementById('stat-total').textContent = allStudents.length
  document.getElementById('stat-filtered').textContent = filteredStudents.length
  const total = Math.ceil(filteredStudents.length / pageSize)
  document.getElementById('stat-page').textContent = total ? `${page}/${total}` : '0'
}

function exportExcel() {
  const data = filteredStudents.map(s => ({
    "Họ tên": s.full_name,
    "Email": s.email,
    "SĐT": s.phone,
    "Năm sinh": s.birth_year,
    "Tỉnh": s.province,
    "Trường": s.school
  }))
  const ws = XLSX.utils.json_to_sheet(data)
  const wb = XLSX.utils.book_new()
  XLSX.utils.book_append_sheet(wb, ws, "Students")
  XLSX.writeFile(wb, "students.xlsx")
  showToast("Đã xuất file Excel")
}

// Close modal on overlay click
document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal()
})
</script>
