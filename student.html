<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý học sinh</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="supabaseClient.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

h2{
margin-bottom:20px;
}

.search-row{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.search-row input{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
padding:8px 12px;
border:none;
background:#1976d2;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#125aa0;
}

button.delete{
background:#e53935;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#fafafa;
cursor:pointer;
}

tr:hover{
background:#f9f9f9;
}

.pagination{
margin-top:20px;
text-align:center;
}

.pagination button{
margin:3px;
background:#eee;
color:#333;
}

.pagination button.active{
background:#1976d2;
color:white;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:350px;
}

.modal-content input{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

.stats{
margin-bottom:15px;
color:#444;
}

.phone{
cursor:pointer;
color:#1976d2;
}

</style>
</head>

<body>

<div class="container">

<h2>Danh sách học sinh</h2>

<div class="search-row">

<input id="search_name" placeholder="Tên">
<input id="search_phone" placeholder="SĐT">
<input id="search_birth" placeholder="Năm sinh">
<input id="search_province" placeholder="Tỉnh">
<input id="search_school" placeholder="Trường">

<button onclick="exportExcel()">Xuất Excel</button>

</div>

<div class="stats" id="stats"></div>

<table>

<thead>
<tr>
<th>STT</th>
<th onclick="sortTable('full_name')">Tên</th>
<th>Email</th>
<th onclick="sortTable('phone')">SĐT</th>
<th onclick="sortTable('birth_year')">Năm sinh</th>
<th onclick="sortTable('province')">Tỉnh</th>
<th onclick="sortTable('school')">Trường</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

<div class="pagination" id="pagination"></div>

</div>


<div class="modal" id="editModal">

<div class="modal-content">

<h3>Sửa học sinh</h3>

<input id="edit_name" placeholder="Tên">
<input id="edit_phone" placeholder="SĐT">
<input id="edit_birth" placeholder="Năm sinh">
<input id="edit_province" placeholder="Tỉnh">
<input id="edit_school" placeholder="Trường">

<button onclick="saveStudent()">Lưu</button>
<button onclick="closeModal()">Đóng</button>

</div>

</div>


<script>

let allStudents=[]
let filteredStudents=[]

let page=1
let pageSize=10

let editingId=null
let sortDirection=1


function removeVN(str){

return str
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/đ/g,"d")
.replace(/Đ/g,"D")

}


// LOAD

async function loadStudents(){

const {data,error}=await sb
.from("users")
.select("*")
.eq("role","student")

if(error){
alert("Lỗi tải dữ liệu")
console.log(error)
return
}

allStudents=data.filter(s=>
s.full_name &&
s.phone &&
s.birth_year &&
s.province &&
s.school
)

filteredStudents=[...allStudents]

render()

}

loadStudents()


// SEARCH

function filterStudents(){

const name=removeVN(search_name.value.toLowerCase())
const phone=search_phone.value
const birth=search_birth.value
const province=removeVN(search_province.value.toLowerCase())
const school=removeVN(search_school.value.toLowerCase())

filteredStudents=allStudents.filter(s=>{

const matchName=
removeVN((s.full_name||"").toLowerCase()).includes(name)

const matchPhone=
(s.phone||"").includes(phone)

const matchBirth=
!birth || s.birth_year==birth

const matchProvince=
removeVN((s.province||"").toLowerCase()).includes(province)

const matchSchool=
removeVN((s.school||"").toLowerCase()).includes(school)

return matchName && matchPhone && matchBirth && matchProvince && matchSchool

})

page=1
render()

}

document.querySelectorAll(".search-row input")
.forEach(i=>{
i.addEventListener("input",filterStudents)
})


// SORT

function sortTable(field){

filteredStudents.sort((a,b)=>{

let A=a[field]||""
let B=b[field]||""

if(field==="birth_year"){
A=parseInt(A)
B=parseInt(B)
}

if(A>B) return sortDirection
if(A<B) return -sortDirection
return 0

})

sortDirection*=-1

render()

}


// RENDER

function render(){

const start=(page-1)*pageSize
const end=start+pageSize

renderTable(filteredStudents.slice(start,end))
renderPagination()
renderStats()

}


// TABLE

function renderTable(list){

studentTable.innerHTML=""

list.forEach((s,i)=>{

studentTable.innerHTML+=`

<tr>

<td>${(page-1)*pageSize+i+1}</td>

<td>${s.full_name}</td>

<td>${s.email}</td>

<td class="phone"
onclick="copyPhone('${s.phone}')">
${s.phone}
</td>

<td>${s.birth_year}</td>

<td>${s.province}</td>

<td>${s.school}</td>

<td>

<button onclick="editStudent('${s.id}')">
Sửa
</button>

<button class="delete"
onclick="deleteStudent('${s.id}')">
Xóa
</button>

</td>

</tr>

`

})

}


// COPY PHONE

function copyPhone(phone){

navigator.clipboard.writeText(phone)

alert("Đã copy SĐT")

}


// EDIT

function editStudent(id){

const s=allStudents.find(x=>x.id===id)

editingId=id

edit_name.value=s.full_name
edit_phone.value=s.phone
edit_birth.value=s.birth_year
edit_province.value=s.province
edit_school.value=s.school

editModal.style.display="flex"

}


// CLOSE

function closeModal(){
editModal.style.display="none"
}


// SAVE

async function saveStudent(){

const {error}=await sb
.from("users")
.update({

full_name:edit_name.value,
phone:edit_phone.value,
birth_year:edit_birth.value,
province:edit_province.value,
school:edit_school.value

})
.eq("id",editingId)

if(error){
alert("Lỗi cập nhật")
}else{
editModal.style.display="none"
loadStudents()
}

}


// DELETE

async function deleteStudent(id){

if(!confirm("Xóa học sinh này?")) return

const {error}=await sb
.from("users")
.delete()
.eq("id",id)

if(error){
alert("Không thể xóa")
return
}

await sb.rpc("delete_auth_user",{uid:id})

loadStudents()

}


// PAGINATION

function renderPagination(){

const total=Math.ceil(filteredStudents.length/pageSize)

pagination.innerHTML=""

for(let i=1;i<=total;i++){

pagination.innerHTML+=`

<button
class="${i===page?'active':''}"
onclick="goPage(${i})">

${i}

</button>

`

}

}

function goPage(p){

page=p
render()

}


// STATS

function renderStats(){

const total=filteredStudents.length

let html=`<b>Tổng hiển thị:</b> ${total}<br>`
html+=`<b>Tổng toàn bộ:</b> ${allStudents.length}`

stats.innerHTML=html

}


// EXPORT

function exportExcel(){

const data=filteredStudents.map(s=>({

Tên:s.full_name,
Email:s.email,
SĐT:s.phone,
"Năm sinh":s.birth_year,
Tỉnh:s.province,
Trường:s.school

}))

const ws=XLSX.utils.json_to_sheet(data)
const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Students")

XLSX.writeFile(wb,"students.xlsx")

}

</script>

</body>
</html>
