<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý học sinh</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="supabaseClient.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

h2{
margin-bottom:20px;
}

/* SEARCH */

.search-row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.search-row input{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

/* BUTTON */

button{
padding:8px 12px;
border:none;
background:#1976d2;
color:white;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#125aa0;
}

button.delete{
background:#e53935;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#fafafa;
}

tr:hover{
background:#f9f9f9;
}

/* PAGINATION */

.pagination{
margin-top:20px;
text-align:center;
}

.pagination button{
margin:3px;
background:#eee;
color:#333;
}

.pagination button.active{
background:#1976d2;
color:white;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:350px;
}

.modal-content input{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

.stats{
margin-bottom:15px;
color:#444;
}

</style>
</head>

<body>

<div class="container">

<h2>Danh sách học sinh</h2>

<div class="search-row">

<input id="search_name" placeholder="Tên">
<input id="search_phone" placeholder="SĐT">
<input id="search_birth" placeholder="Năm sinh">
<input id="search_province" placeholder="Tỉnh">
<input id="search_school" placeholder="Trường">

<button onclick="filterStudents()">Tìm</button>
<button onclick="exportExcel()">Xuất Excel</button>

</div>

<div class="stats" id="stats"></div>

<table>

<thead>
<tr>
<th>Tên</th>
<th>Email</th>
<th>SĐT</th>
<th>Năm sinh</th>
<th>Tỉnh</th>
<th>Trường</th>
<th>Hành động</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

<div class="pagination" id="pagination"></div>

</div>

<!-- MODAL -->

<div class="modal" id="editModal">

<div class="modal-content">

<h3>Sửa học sinh</h3>

<input id="edit_name" placeholder="Tên">
<input id="edit_phone" placeholder="SĐT">
<input id="edit_birth" placeholder="Năm sinh">
<input id="edit_province" placeholder="Tỉnh">
<input id="edit_school" placeholder="Trường">

<button onclick="saveStudent()">Lưu</button>

</div>

</div>

<script>

let allStudents=[]
let filteredStudents=[]

let page=1
let pageSize=10

let editingId=null

function removeVN(str){
return str
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/đ/g,"d")
.replace(/Đ/g,"D")
}


// LOAD DATA

async function loadStudents(){

const {data,error}=await sb
.from("users")
.select("*")
.eq("role","student")

if(error) return

allStudents=data.filter(s=>

s.full_name &&
s.phone &&
s.birth_year &&
s.province &&
s.school

)

filteredStudents=[...allStudents]

render()

}

loadStudents()


// FILTER

function filterStudents(){

const name = removeVN(search_name.value.toLowerCase())
const phone = search_phone.value
const birth = search_birth.value
const province = removeVN(search_province.value.toLowerCase())
const school = removeVN(search_school.value.toLowerCase())

filteredStudents = allStudents.filter(s=>{

const matchName =
removeVN((s.full_name || "").toLowerCase()).includes(name)

const matchPhone =
(s.phone || "").includes(phone)

const matchBirth =
!birth || s.birth_year == birth

const matchProvince =
removeVN((s.province || "").toLowerCase()).includes(province)

const matchSchool =
removeVN((s.school || "").toLowerCase()).includes(school)

return matchName && matchPhone && matchBirth && matchProvince && matchSchool

})

page=1
render()

}


// RENDER

function render(){

const start=(page-1)*pageSize
const end=start+pageSize

renderTable(filteredStudents.slice(start,end))
renderPagination()
renderStats()

}


// TABLE

function renderTable(list){

studentTable.innerHTML=""

list.forEach(s=>{

studentTable.innerHTML+=`

<tr>

<td>${s.full_name}</td>
<td>${s.email}</td>
<td>${s.phone}</td>
<td>${s.birth_year}</td>
<td>${s.province}</td>
<td>${s.school}</td>

<td>

<button onclick="editStudent('${s.id}')">Sửa</button>

<button class="delete"
onclick="deleteStudent('${s.id}')">
Xóa
</button>

</td>

</tr>

`

})

}


// EDIT

function editStudent(id){

const s=allStudents.find(x=>x.id===id)

editingId=id

edit_name.value=s.full_name
edit_phone.value=s.phone
edit_birth.value=s.birth_year
edit_province.value=s.province
edit_school.value=s.school

editModal.style.display="flex"

}


// SAVE

async function saveStudent(){

const {error}=await sb
.from("users")
.update({

full_name:edit_name.value,
phone:edit_phone.value,
birth_year:edit_birth.value,
province:edit_province.value,
school:edit_school.value

})
.eq("id",editingId)

if(error){

alert("Lỗi")

}else{

editModal.style.display="none"
loadStudents()

}

}


// DELETE

async function deleteStudent(id){

if(!confirm("Xóa học sinh này?")) return

await sb.from("users").delete().eq("id",id)

await sb.rpc("delete_auth_user",{uid:id})

loadStudents()

}


// PAGINATION

function renderPagination(){

const total=Math.ceil(filteredStudents.length/pageSize)

pagination.innerHTML=""

for(let i=1;i<=total;i++){

pagination.innerHTML+=`

<button 
class="${i===page?'active':''}"
onclick="goPage(${i})">
${i}
</button>

`

}

}

function goPage(p){

page=p
render()

}


// STATS

function renderStats(){

stats.innerHTML=`Tổng học sinh: <b>${filteredStudents.length}</b>`

}


// EXPORT

function exportExcel(){

const data=filteredStudents.map(s=>({

Tên:s.full_name,
Email:s.email,
SĐT:s.phone,
"Năm sinh":s.birth_year,
Tỉnh:s.province,
Trường:s.school

}))

const ws=XLSX.utils.json_to_sheet(data)

const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Students")

XLSX.writeFile(wb,"students.xlsx")

}

</script>

</body>
</html>
