<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tìm kiếm</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: var(--font-body);
  background: linear-gradient(180deg, #f7f2e8 0%, var(--cream) 55%, #f9fbff 100%);
  color: var(--ink);
}
.page {
  max-width: 920px;
  margin: 0 auto;
  padding: 16px;
}
.search-panel,
.results-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow-sm);
}
.search-panel {
  padding: 16px;
}
.search-row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.search-input {
  flex: 1;
  min-width: 0;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 13px 15px;
  font-family: var(--font-body);
  font-size: .94rem;
  background: var(--white);
}
.search-input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 4px rgba(200,150,42,.1);
}
.tabs {
  display: inline-flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.tab-btn {
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink-mid);
  border-radius: 999px;
  padding: 9px 14px;
  font-family: var(--font-body);
  font-weight: 600;
  cursor: pointer;
  transition: .15s;
}
.tab-btn.active {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
  border-color: transparent;
  color: var(--navy);
}
.results-card {
  margin-top: 14px;
}
.results-body {
  padding: 18px;
}
.result-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.empty,
.loading {
  padding: 22px;
  text-align: center;
  color: var(--ink-light);
  border: 1px dashed var(--border);
  border-radius: 16px;
  background: linear-gradient(180deg, #fcfcff 0%, #f8f6ef 100%);
}
.user-item,
.post-item {
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  background: linear-gradient(180deg, #fff 0%, #fbfbff 100%);
}
.user-item {
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.user-avatar,
.post-avatar {
  background: var(--surface);
  object-fit: cover;
}
.user-avatar {
  width: 58px;
  height: 58px;
  border-radius: 18px;
  border: 2px solid var(--gold-border);
  flex-shrink: 0;
}
.user-main {
  flex: 1;
  min-width: 0;
}
.user-top,
.post-head {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.user-name,
.post-author-name {
  color: var(--navy);
  font-weight: 700;
  text-decoration: none;
}
.user-name:hover,
.post-author-name:hover {
  text-decoration: underline;
}
.role-chip,
.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: .73rem;
  font-weight: 700;
}
.role-chip,
.badge-gold {
  background: var(--gold-pale);
  color: var(--gold);
  border: 1px solid var(--gold-border);
}
.badge-blue {
  background: var(--blue-bg);
  color: var(--blue);
  border: 1px solid rgba(37,99,235,.14);
}
.badge-navy {
  background: rgba(15,31,61,.08);
  color: var(--navy);
  border: 1px solid rgba(15,31,61,.08);
}
.user-meta {
  margin-top: 8px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.user-meta span {
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--ink-mid);
  font-size: .76rem;
  padding: 6px 10px;
}
.user-bio {
  margin-top: 10px;
  color: var(--ink);
  font-size: .86rem;
  line-height: 1.65;
  white-space: pre-wrap;
}
.user-actions,
.post-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 12px;
}
.post-head {
  justify-content: space-between;
  align-items: flex-start;
}
.post-author {
  display: flex;
  gap: 12px;
  min-width: 0;
}
.post-avatar {
  width: 46px;
  height: 46px;
  border-radius: 14px;
  border: 2px solid var(--gold-border);
  flex-shrink: 0;
}
.post-time {
  color: var(--ink-light);
  font-size: .76rem;
  margin-top: 4px;
}
.post-badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.post-body {
  margin-top: 12px;
  color: var(--ink);
  line-height: 1.7;
  white-space: pre-wrap;
}
.post-media {
  margin-top: 12px;
}
.post-media img {
  width: 100%;
  max-height: 300px;
  object-fit: cover;
  border-radius: 16px;
  border: 1px solid var(--border);
}
.post-foot {
  margin-top: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  color: var(--ink-light);
  font-size: .82rem;
}
@media (max-width: 560px) {
  .page {
    padding: 10px;
  }
  .search-row {
    flex-direction: column;
    align-items: stretch;
  }
  .user-item {
    flex-direction: column;
  }
}
</style>
</head>
<body>
<div class="page">
  <section class="search-panel">
    <div class="search-row">
      <input id="keywordInput" class="search-input" placeholder="Nhập tên người dùng, trường học hoặc nội dung bài viết...">
      <button class="btn btn-primary" onclick="performSearch()">Tìm kiếm</button>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="all" onclick="setTab('all')">Tất cả</button>
      <button class="tab-btn" data-tab="users" onclick="setTab('users')">Người dùng</button>
      <button class="tab-btn" data-tab="posts" onclick="setTab('posts')">Bài viết</button>
    </div>
  </section>

  <section class="results-card">
    <div class="results-body">
      <div id="resultList" class="result-list">
        <div class="empty">Chưa có kết quả nào. Hãy nhập từ khóa rồi bấm tìm kiếm.</div>
      </div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script>
let currentUser = null;
let activeTab = "all";
let friendIds = new Set();
let searchDebounceTimer = null;
let searchCache = new Map();

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    location.href = "index.html";
    return;
  }

  currentUser = user;
  await loadFriendIds();

  const keyword = new URLSearchParams(location.search).get("q");
  if (keyword) {
    document.getElementById("keywordInput").value = keyword;
    await performSearch();
  }
}

async function loadFriendIds() {
  const { data } = await sb
    .from("friendships")
    .select("friend_id")
    .eq("user_id", currentUser.id);
  friendIds = new Set((data || []).map(item => item.friend_id));
}

window.setTab = function(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.tab === tab);
  });
  performSearch();
};

window.resetSearch = function() {
  if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
  searchCache.clear();
  document.getElementById("keywordInput").value = "";
  document.getElementById("resultList").innerHTML = '<div class="empty">Chưa có kết quả nào. Hãy nhập từ khóa rồi bấm tìm kiếm.</div>';
};

window.performSearch = async function() {
  const keyword = document.getElementById("keywordInput").value.trim();
  const resultList = document.getElementById("resultList");

  if (!keyword) {
    resultList.innerHTML = '<div class="empty">Hãy nhập từ khóa để tìm kiếm.</div>';
    return;
  }

  if (keyword.length < 2) {
    resultList.innerHTML = '<div class="empty">Hãy nhập ít nhất 2 ký tự.</div>';
    return;
  }

  const cacheKey = activeTab + "::" + keyword.toLowerCase();
  if (searchCache.has(cacheKey)) {
    resultList.innerHTML = searchCache.get(cacheKey);
    return;
  }

  resultList.innerHTML = '<div class="loading">Đang tìm kiếm...</div>';

  const parts = [];
  if (activeTab === "all" || activeTab === "users") {
    const users = await searchUsers(keyword);
    if (users.length) {
      parts.push(users.map(renderUserItem).join(""));
    }
  }

  if (activeTab === "all" || activeTab === "posts") {
    const posts = await searchPosts(keyword);
    if (posts.length) {
      parts.push(posts.map(renderPostItem).join(""));
    }
  }

  if (!parts.length) {
    const emptyHtml = '<div class="empty">Không tìm thấy kết quả phù hợp.</div>';
    resultList.innerHTML = emptyHtml;
    searchCache.set(cacheKey, emptyHtml);
    return;
  }

  const nextHtml = parts.join("");
  resultList.innerHTML = nextHtml;
  searchCache.set(cacheKey, nextHtml);
};

async function searchUsers(keyword) {
  const lowerKeyword = keyword.toLowerCase();
  const { data, error } = await sb
    .from("users")
    .select("id, full_name, avatar_url, role, school, province, bio")
    .or([
      "full_name.ilike.%" + keyword + "%",
      "school.ilike.%" + keyword + "%",
      "province.ilike.%" + keyword + "%"
    ].join(","))
    .limit(12);

  if (error) return [];

  return (data || []).filter(item => {
    const roleText = formatRole(item.role).toLowerCase();
    return roleText.includes(lowerKeyword)
      || String(item.full_name || "").toLowerCase().includes(lowerKeyword)
      || String(item.school || "").toLowerCase().includes(lowerKeyword)
      || String(item.province || "").toLowerCase().includes(lowerKeyword);
  });
}

async function searchPosts(keyword) {
  const { data, error } = await sb
    .from("posts")
    .select(`
      id,
      user_id,
      content,
      created_at,
      visibility,
      is_pinned,
      users(full_name, avatar_url),
      likes(count),
      comments(count),
      post_media(file_url, file_type, sort_order)
    `)
    .eq("status", "approved")
    .ilike("content", "%" + keyword + "%")
    .order("created_at", { ascending: false })
    .limit(12);

  if (error) return [];

  return (data || []).filter(canViewPost);
}

function canViewPost(post) {
  if (post.user_id === currentUser.id) return true;
  if (!post.visibility || post.visibility === "public") return true;
  if (post.visibility === "friends" && friendIds.has(post.user_id)) return true;
  return false;
}

function renderUserItem(user) {
  const meta = [];
  if (user.school) meta.push("<span>" + esc(user.school) + "</span>");
  if (user.province) meta.push("<span>" + esc(user.province) + "</span>");

  return `
    <article class="user-item">
      <img class="user-avatar" src="${safeUrl(user.avatar_url || "default-avatar.png")}" alt="Avatar" onerror="this.src='default-avatar.png'">
      <div class="user-main">
        <div class="user-top">
          <a class="user-name" href="profile.html?id=${user.id}">${esc(user.full_name || "Người dùng")}</a>
          <span class="role-chip">${esc(formatRole(user.role))}</span>
        </div>
        ${meta.length ? `<div class="user-meta">${meta.join("")}</div>` : ""}
        ${user.bio ? `<div class="user-bio">${esc(user.bio)}</div>` : ""}
        <div class="user-actions">
          <a class="btn btn-outline" href="profile.html?id=${user.id}">Xem hồ sơ</a>
          ${user.id !== currentUser.id ? `<a class="btn btn-outline" href="messages.html?user=${user.id}">Nhắn tin</a>` : ""}
        </div>
      </div>
    </article>
  `;
}

function renderPostItem(post) {
  const badges = [];
  if (post.is_pinned) badges.push('<span class="badge badge-gold">Đã ghim</span>');
  if (!post.visibility || post.visibility === "public") badges.push('<span class="badge badge-blue">Công khai</span>');
  if (post.visibility === "friends") badges.push('<span class="badge badge-blue">Bạn bè</span>');
  if (post.visibility === "private") badges.push('<span class="badge badge-navy">Riêng tư</span>');

  const firstImage = (post.post_media || [])
    .filter(item => item.file_type === "image")
    .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0))[0];

  return `
    <article class="post-item">
      <div class="post-head">
        <div class="post-author">
          <img class="post-avatar" src="${safeUrl(post.users?.avatar_url || "default-avatar.png")}" alt="Avatar" onerror="this.src='default-avatar.png'">
          <div>
            <a class="post-author-name" href="profile.html?id=${post.user_id}">${esc(post.users?.full_name || "Người dùng")}</a>
            <div class="post-time">${formatTime(post.created_at)}</div>
          </div>
        </div>
        <div class="post-badges">${badges.join("")}</div>
      </div>
      <div class="post-body">${esc(post.content || "")}</div>
      ${firstImage ? `<div class="post-media"><img src="${safeUrl(firstImage.file_url)}" alt="Ảnh bài viết"></div>` : ""}
      <div class="post-foot">
        <span>${post.likes?.[0]?.count || 0} lượt thích • ${post.comments?.[0]?.count || 0} bình luận</span>
        <div class="post-actions">
          <a class="btn btn-outline" href="post.html?id=${post.id}">Mở bài viết</a>
          <a class="btn btn-outline" href="profile.html?id=${post.user_id}">Xem tác giả</a>
        </div>
      </div>
    </article>
  `;
}

document.getElementById("keywordInput").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    performSearch();
  }
});

document.getElementById("keywordInput").addEventListener("input", function() {
  if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
  const keyword = this.value.trim();
  if (!keyword) {
    resetSearch();
    return;
  }
  searchDebounceTimer = setTimeout(() => {
    performSearch();
  }, 320);
});

function formatRole(role) {
  if (role === "admin") return "Quản trị viên";
  if (role === "teacher") return "Giáo viên";
  if (role === "student") return "Học sinh";
  return "Thành viên";
}

function formatTime(value) {
  return new Date(value).toLocaleString("vi-VN", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function esc(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function safeUrl(value) {
  return String(value || "").replace(/"/g, "&quot;");
}

init();
</script>
</body>
</html>
