<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Thông báo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-body); background: linear-gradient(180deg, #f6f0e4 0%, var(--cream) 55%, #f8fbff 100%); color: var(--ink); }
.page { max-width: 920px; margin: 0 auto; padding: 18px 16px 28px; }
.header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.header p { display: none; }
.header h1 { margin: 0; font-size: 1.35rem; }
.list { display: flex; flex-direction: column; gap: 12px; }
.card { background: var(--white); border: 1px solid rgba(15,31,61,.08); border-radius: 18px; box-shadow: 0 10px 24px rgba(15,31,61,.06); padding: 16px; }
.card.unread { border-color: rgba(37,99,235,.18); box-shadow: 0 0 0 1px rgba(37,99,235,.12), 0 10px 24px rgba(15,31,61,.06); }
.row { display: flex; gap: 12px; align-items: flex-start; }
.avatar { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(15,31,61,.08); background: var(--surface); }
.title { font-weight: 700; color: var(--navy); font-size: .92rem; }
.message { margin-top: 6px; color: var(--ink-mid); font-size: .88rem; line-height: 1.6; }
.meta { margin-top: 4px; color: var(--ink-light); font-size: .78rem; }
.actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.empty { background: var(--white); border: 1px solid rgba(15,31,61,.08); border-radius: 18px; padding: 22px; text-align: center; color: var(--ink-light); }
@media (max-width: 640px) {
  .page { padding: 14px 10px 22px; }
  .header { align-items: stretch; }
  .header h1 { font-size: 1.2rem; }
  .header .btn { width: 100%; min-height: 46px; }
  .card, .empty { padding: 14px; border-radius: 16px; }
  .row { gap: 10px; }
  .avatar { width: 42px; height: 42px; }
  .title { font-size: .9rem; }
  .message { font-size: .84rem; line-height: 1.55; }
  .actions .btn { width: 100%; min-height: 42px; }
}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div>
      <h1>Thông báo</h1>
      <p>Những hoạt động mới liên quan đến tài khoản của bạn.</p>
    </div>
    <button class="btn btn-outline" onclick="markAllRead()">Đánh dấu đã đọc</button>
  </div>
  <div id="notificationList" class="list">
    <div class="empty">Đang tải thông báo...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script src="notification_helper.js"></script>
<script>
let currentUser = null;
let notificationChannel = null;
const HIDDEN_NOTIFICATION_TYPES = new Set(["friend_request", "friend_accept", "message_new"]);

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    location.href = "index.html";
    return;
  }
  currentUser = user;
  subscribeNotifications();
  await loadNotifications();
}

async function loadNotifications() {
  const { data, error } = await sb
    .from("notifications")
    .select("id, type, title, ref_id, target_url, meta, message, is_read, created_at, actor_id, users!notifications_actor_id_fkey(full_name, avatar_url)")
    .eq("user_id", currentUser.id)
    .order("created_at", { ascending: false });

  const wrap = document.getElementById("notificationList");
  if (error) {
    wrap.innerHTML = '<div class="empty">Không tải được thông báo.</div>';
    return;
  }
  const visibleItems = (data || []).filter(item => !HIDDEN_NOTIFICATION_TYPES.has(item.type));

  if (!visibleItems.length) {
    wrap.innerHTML = '<div class="empty">Bạn chưa có thông báo nào.</div>';
    return;
  }

  wrap.innerHTML = visibleItems.map(item => `
    <div class="card ${item.is_read ? "" : "unread"}">
      <div class="row">
        <img class="avatar" src="${item.users?.avatar_url || "default-avatar.png"}" alt="Avatar" onerror="this.src='default-avatar.png'">
        <div style="flex:1">
          <div class="title">${esc(item.title || item.users?.full_name || "Hệ thống")}</div>
          <div class="message">${esc(item.message || formatType(item.type))}</div>
          <div class="meta">${formatTime(item.created_at)}</div>
          <div class="actions">
            ${buildLink(item)}
            ${item.is_read ? "" : `<button class="btn btn-outline btn-sm" onclick="markRead('${item.id}')">Đã đọc</button>`}
          </div>
        </div>
      </div>
    </div>
  `).join("");
}

function buildLink(item) {
  const target = item.target_url || getNotificationFallbackTarget(item);
  if (target) {
    return `<button class="btn btn-outline btn-sm" type="button" data-target="${escAttr(target)}" onclick="openNotificationTarget(null, '${item.id}', this.dataset.target)">Mở chi tiết</button>`;
  }
  return "";
}

function getNotificationFallbackTarget(item) {
  if (!item) return "";
  if (item.type === "post_like" || item.type === "post_comment" || item.type === "post_approved" || item.type === "post_rejected") {
    return item.ref_id ? `post.html?id=${encodeURIComponent(item.ref_id)}` : "";
  }
  if (item.actor_id) {
    return `profile.html?id=${encodeURIComponent(item.actor_id)}`;
  }
  return "";
}

window.markRead = async function(id) {
  await sb.from("notifications").update({ is_read: true }).eq("id", id);
  loadNotifications();
};

window.markAllRead = async function() {
  await sb.from("notifications").update({ is_read: true }).eq("user_id", currentUser.id).eq("is_read", false);
  loadNotifications();
};

window.openNotificationTarget = async function(event, id, targetUrl) {
  if (event) event.preventDefault();
  if (!targetUrl) return;
  await sb.from("notifications").update({ is_read: true }).eq("id", id);
  navigateToTarget(targetUrl);
};

function navigateToTarget(targetUrl) {
  const cleanUrl = String(targetUrl || "").trim();
  if (!cleanUrl) return;

  const pageName = cleanUrl.split("?")[0];
  const ancestors = [];
  let cursor = window;
  while (cursor && !ancestors.includes(cursor)) {
    ancestors.push(cursor);
    if (cursor === cursor.parent) break;
    cursor = cursor.parent;
  }

  for (const frameWindow of ancestors) {
    try {
      const frame = frameWindow.document.getElementById("contentFrame");
      if (!frame) continue;
      frame.src = cleanUrl;

      const menuItems = frameWindow.document.querySelectorAll("#menu li");
      menuItems.forEach(item => {
        item.classList.toggle("active", item.dataset.page === pageName);
      });

      if (typeof frameWindow.closeSidebar === "function") {
        frameWindow.closeSidebar();
      }
      return;
    } catch (error) {}
  }

  for (const frameWindow of ancestors) {
    try {
      if (typeof frameWindow.closeSocialPanel === "function") {
        frameWindow.closeSocialPanel();
      }
      const socialFrame = frameWindow.document.getElementById("socialPanelFrame");
      if (socialFrame) {
        socialFrame.src = "about:blank";
        delete socialFrame.dataset.loaded;
      }
    } catch (error) {}
  }

  try {
    window.top.location.href = cleanUrl;
  } catch (error) {
    window.location.href = cleanUrl;
  }
}

function subscribeNotifications() {
  if (notificationChannel) {
    sb.removeChannel(notificationChannel);
    notificationChannel = null;
  }

  notificationChannel = sb
    .channel("notifications-page:" + currentUser.id)
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "notifications", filter: "user_id=eq." + currentUser.id },
      () => loadNotifications()
    )
    .subscribe();
}

function formatType(type) {
  if (type === "friend_request") return "đã gửi cho bạn một lời mời kết bạn.";
  if (type === "friend_accept") return "đã chấp nhận lời mời kết bạn.";
  if (type === "post_like") return "đã thích bài viết của bạn.";
  if (type === "post_comment") return "đã bình luận vào bài viết của bạn.";
  if (type === "post_approved") return "đã duyệt bài viết của bạn.";
  if (type === "post_rejected") return "đã từ chối bài viết của bạn.";
  if (type === "message_new") return "đã gửi cho bạn một tin nhắn mới.";
  if (type === "course_created") return "có một khóa học mới dành cho bạn.";
  if (type === "course_enrolled") return "đã thêm bạn vào khóa học.";
  if (type === "course_request_approved") return "đã duyệt yêu cầu đăng ký khóa học của bạn.";
  if (type === "course_request_rejected") return "đã từ chối yêu cầu đăng ký khóa học của bạn.";
  if (type === "course_session_added") return "đã thêm buổi học mới trong khóa học của bạn.";
  if (type === "course_session_updated") return "đã cập nhật nội dung học tập trong khóa học của bạn.";
  if (type === "class_session_added") return "đã thêm buổi học mới trong lớp học của bạn.";
  if (type === "class_session_updated") return "đã cập nhật buổi học trong lớp của bạn.";
  if (type === "class_exam_added") return "đã thêm đề kiểm tra mới trong lớp học của bạn.";
  if (type === "tuition_due") return "có học phí mới cần thanh toán.";
  if (type === "tuition_reminder") return "nhắc bạn hoàn tất học phí còn thiếu.";
  return "Bạn có một thông báo mới.";
}

function formatTime(value) {
  return new Date(value).toLocaleString("vi-VN", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function esc(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function escAttr(value) {
  return esc(value).replace(/'/g, "&#39;");
}

init();

window.addEventListener("beforeunload", () => {
  if (notificationChannel) sb.removeChannel(notificationChannel);
});
</script>
</body>
</html>
