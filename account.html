<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tài khoản</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Inter,Arial;
margin:0;
background:#f3f4f6;
color:#111827;
}

/* HEADER */

header{
background:#111827;
color:white;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
margin:0;
font-size:20px;
}

/* MAIN */

main{
max-width:900px;
margin:40px auto;
padding:20px;
}

/* CARD */

.card{
background:white;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
padding:30px;
}

/* PROFILE TOP */

.profile-top{
display:flex;
align-items:center;
gap:25px;
margin-bottom:30px;
}

.profile-top img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:4px solid #f1f5f9;
}

.avatar-actions input{
margin-bottom:10px;
}

/* FORM GRID */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
font-weight:600;
margin-bottom:6px;
font-size:14px;
}

input{
padding:11px;
border:1px solid #d1d5db;
border-radius:8px;
font-size:14px;
transition:0.2s;
}

input:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 0 2px rgba(37,99,235,0.2);
}

/* BUTTON */

button{
margin-top:15px;
border:none;
background:#2563eb;
color:white;
padding:11px 18px;
border-radius:8px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

button:hover{
background:#1d4ed8;
transform:translateY(-1px);
}

/* PASSWORD */

.password-box{
margin-top:35px;
padding-top:20px;
border-top:1px solid #e5e7eb;
}

/* TOAST */

#toast{
position:fixed;
bottom:30px;
right:30px;
background:#111827;
color:white;
padding:14px 22px;
border-radius:8px;
opacity:0;
transform:translateY(20px);
transition:0.3s;
}

#toast.show{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<header>
<h2>⚙️ Tài khoản</h2>
</header>

<main>

<div class="card">

<!-- PROFILE TOP -->

<div class="profile-top">

<img id="avatarPreview"
src="default-avatar.png">

<div class="avatar-actions">

<input type="file" id="avatarInput">

<button onclick="uploadAvatar()">
Đổi Avatar
</button>

</div>

</div>

<!-- FORM -->

<div class="form-grid">

<div class="form-group">
<label>Email</label>
<input id="email" disabled>
</div>

<div class="form-group">
<label>Họ và tên</label>
<input id="fullName">
</div>

<div class="form-group">
<label>Số điện thoại</label>
<input id="phone">
</div>

<div class="form-group">
<label>Năm sinh</label>
<input type="number" id="birthYear">
</div>

</div>

<button onclick="saveProfile()">
Lưu thông tin
</button>

<!-- PASSWORD -->

<div class="password-box">

<h3>Đổi mật khẩu</h3>

<input
type="password"
id="newPassword"
placeholder="Nhập mật khẩu mới">

<br>

<button onclick="changePassword()">
Đổi mật khẩu
</button>

</div>

</div>

</main>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabaseClient.js"></script>

<!-- GIỮ NGUYÊN JS CỦA BẠN -->

</body>
</html>

<script>

let currentUser=null;

/* INIT */

async function init(){

const { data:{user} } = await sb.auth.getUser();

if(!user){
window.location.href="../index.html";
return;
}

currentUser=user;

document.getElementById("email").value=user.email;

loadProfile();

}


/* LOAD PROFILE */

async function loadProfile(){

const { data , error } = await sb
.from("users")
.select("*")
.eq("id",currentUser.id)
.single();

if(error){
console.error(error);
return;
}

document.getElementById("fullName").value=data.full_name ?? "";
document.getElementById("phone").value=data.phone ?? "";
document.getElementById("birthYear").value=data.birth_year ?? "";

if(data.avatar_url){
document.getElementById("avatarPreview").src =
data.avatar_url;
}
}

async function changePassword(){

const password =
document.getElementById("newPassword").value;

if(password.length < 6){
alert("Mật khẩu tối thiểu 6 ký tự");
return;
}

const { error } =
await sb.auth.updateUser({
password: password
});

if(error){
alert("Lỗi đổi mật khẩu");
return;
}

showToast("Đổi mật khẩu thành công");

document.getElementById("newPassword").value="";

}
  
async function uploadAvatar(){

const file =
document.getElementById("avatarInput").files[0];

if(!file){
alert("Chọn ảnh");
return;
}

const filePath =
currentUser.id + "-" + Date.now();

const { error } = await sb.storage
.from("avatars")
.upload(filePath,file);

if(error){
console.error(error);
alert("Upload lỗi");
return;
}

const { data } = sb.storage
.from("avatars")
.getPublicUrl(filePath);

const avatarUrl = data.publicUrl;

await sb
.from("users")
.update({avatar_url:avatarUrl})
.eq("id",currentUser.id);

document.getElementById("avatarPreview").src = avatarUrl;

showToast("Đổi avatar thành công");

}

/* SAVE PROFILE */

async function saveProfile(){

const fullName=document.getElementById("fullName").value.trim();
const phone=document.getElementById("phone").value.trim();
const birthYear=parseInt(document.getElementById("birthYear").value);

if(!fullName || !phone || !birthYear){
alert("Vui lòng nhập đầy đủ thông tin");
return;
}

const { error } = await sb
.from("users")
.update({
full_name:fullName,
phone:phone,
birth_year:birthYear
})
.eq("id",currentUser.id);

if(error){
console.error(error);
alert("Lỗi khi cập nhật");
return;
}

showToast("Cập nhật thành công");

}


/* TOAST */

function showToast(message){

const toast=document.getElementById("toast");

toast.innerText=message;

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}


init();

</script>

</body>
</html>
